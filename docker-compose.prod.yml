# Prod compose for the `ask-wiki-rag` VPS tenant (issue #271).
#
# Deploys behind the shared `edge` Caddy as one self-contained compose
# project. Per the platform tenant contract:
#   - unique `name:` so this project is never merged into another tenant.
#   - NO host ports - `edge` owns :80/:443 and reverse-proxies to this
#     service at `ask-wiki-rag:8000` over the external `edge` network.
#   - `mem_limit` + `cpus` are both mandatory (bulkhead): a single tenant
#     cannot starve the box.
#   - Baked read-only KB, ephemeral writes, no named volume, no backup.
name: ask-wiki-rag

services:
  ask-wiki-rag:
    image: ghcr.io/paynepew/knowledge_base_qa_bot:latest
    mem_limit: 512m
    cpus: "0.5"
    env_file: .env.prod
    environment:
      # ACCEPTED DEVIATION from the reset workflow's "zero OpenAI tokens at
      # boot" default (issue #439): fires one tiny embeddings + one tiny LLM
      # ping per distinct OpenAI client at every startup/reset, priming
      # connections so the first real /chat per stack is not the one paying
      # cold-client latency. A few tokens per boot; see .env.example and
      # .github/workflows/reset.yml for the full tradeoff. Committed here
      # (not .env.prod) so the deviation is visible in version control.
      KB_WARMUP_PING: "true"
      # Transcribe (ADR-0032, issue #437): baked in here rather than left to
      # the hand-maintained .env.prod so the flag ships with every deploy of
      # this tracked file — `environment:` overrides `env_file` in Compose's
      # merge order. The demo corpus is scan-heavy (verified 63-page,
      # no-text-layer PDF, 2026-07-04); the page cap is sized above that with
      # headroom. A full ~63-page transcribe costs roughly $0.05-0.15 at the
      # default OPENAI_TRANSCRIBE_MODEL=gpt-5-mini (~$2/1k pages), well inside
      # the flat $0.10 POST /wiki/import budget charge and bounded further by
      # the admin-semaphore (KB_MAX_ADMIN) concurrency gate.
      KB_TRANSCRIBE_ENABLED: "true"
      KB_TRANSCRIBE_MAX_PAGES: "80"
      # issue #503: the process-wide page pool (issue #459) defaults to 16
      # concurrent in-flight pages; each holds its own PdfDocument + rendered
      # bitmap + PNG + base64 payload (~10-30 MB transient), and 16 of those
      # OOM-killed this 512 MB container ~20s into the verified 63-page scan
      # (8/63 pages done -> edge 502/503 -> restart -> in-memory job lost).
      # 3 keeps the transient burst inside the bulkhead's headroom while the
      # network-bound vision calls still overlap (~minutes for 63 pages, not
      # the pre-#459 30+ min sequential run). Read at import time - a
      # restart (deploy/reset) applies it.
      KB_TRANSCRIBE_CONCURRENCY: "3"
      # Admin-token kill-switch (issue #583, dark-ship scope decision): gates
      # every ADMIN_PATHS mutating endpoint in gateway/app/middleware.py behind
      # `Authorization: Bearer <token>` once set. `${KB_ADMIN_TOKEN:-}` passes
      # it through from the HOST shell env that invokes `docker compose`
      # (deploy.yml / reset.yml's SSH script), NOT from the hand-maintained
      # `.env.prod` file — deliberately so the switch can be flipped without
      # editing that file on the box. Unset/empty on the host = empty string
      # here = the existing "admin open" demo behavior (current default;
      # nothing sets this today). Turning it on for real needs a
      # `.github/workflows/*` change to export a `secrets.KB_ADMIN_TOKEN`
      # value in the SSH script before `docker compose up` — out of this
      # slice's scope (implement agents don't touch workflows); an ops step
      # for the human.
      KB_ADMIN_TOKEN: ${KB_ADMIN_TOKEN:-}
      # Per-IP heavy-path rate limit (issue #598 slice A): the code default of
      # 30 requests per rolling 5 min protects against scripted abuse but sits
      # within reach of a single human driving a brisk live demo from one IP
      # (16 starter chips + follow-ups + console ops). 120/5min keeps the
      # abuse ceiling while never touching interactive use. Host env can
      # still override: KB_RATE_LIMIT_PER_IP=<n> (0 disables).
      KB_RATE_LIMIT_PER_IP: ${KB_RATE_LIMIT_PER_IP:-120}
    networks:
      - default
      - edge
    restart: unless-stopped
    # issue #647: default json-file driver has no size cap, so uvicorn
    # access logs + tracebacks grow unbounded on the VPS disk for as long as
    # the container lives. Rotation only takes effect when the container is
    # recreated (the next deploy's / reset's `up -d`), not on a live one.
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  edge:
    external: true
