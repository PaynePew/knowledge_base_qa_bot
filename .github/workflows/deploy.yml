# Image-pull CD for the `ask-wiki-rag` VPS tenant (issue #272).
#
# Build linux/amd64 -> push GHCR (:latest + :<sha>) -> SSH to the box and
# `docker compose pull && up -d` the single `ask-wiki-rag` service, then smoke
# /healthz. This is an independent deploy path baked into this repo; there is no
# central orchestrator. Owner provisions secrets.DEPLOY_SSH_KEY and grants the
# workflow `packages: write` so GITHUB_TOKEN can push to GHCR.
name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Lowercase owner/repo for the GHCR path; github.repository is already
# lowercase for this repo, but GHCR rejects uppercase so we pin it explicitly.
env:
  IMAGE: ghcr.io/paynepew/knowledge_base_qa_bot

# Never let two pushes to main race a deploy on the same box.
concurrency:
  group: deploy-ask-wiki-rag
  cancel-in-progress: false

jobs:
  # Pre-deploy gate (issue #477): run the SAME test suite CI runs, and block the
  # deploy on it. Before this, deploy fired on `push: [main]` independently of
  # ci.yml, so a red main still deployed to the live VPS (2026-07-05: main went
  # red with a pdfium SIGSEGV for ~4h and deployed regardless). Reuses the single
  # test definition so "deployable" means exactly "CI-green" — no drift.
  #
  # Only gates AUTOMATIC (push) deploys. A manual `workflow_dispatch` skips this
  # job and remains the documented override for force-deploying past a red/flaky
  # suite (issue #477 AC).
  gate:
    if: ${{ github.event_name == 'push' }}
    uses: ./.github/workflows/test.yml

  build-and-deploy:
    needs: [gate]
    # Run when: owner repo AND the gate did not fail/cancel. On push the gate
    # must be green; on workflow_dispatch the gate is skipped (not a failure),
    # so `!failure()` is true and the manual override still deploys. Using a
    # status function (`failure()`) is also what lets this job run despite the
    # skipped `needs` on the dispatch path.
    if: ${{ !cancelled() && !failure() && github.repository_owner == 'PaynePew' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Ship the tracked compose file BEFORE compose up (issue #451). The box
      # copy at /opt/ask-wiki-rag/ used to be a static snapshot no step ever
      # refreshed, so `environment:` changes merged to main (e.g. #448 warmup,
      # #450 Transcribe flags) silently never reached the service. reset.yml
      # composes from the same path and inherits whatever this step last shipped.
      - name: Ship docker-compose.prod.yml to the box
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: docker-compose.prod.yml
          target: /opt/ask-wiki-rag/

      - name: Deploy over SSH and smoke /healthz
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /opt/ask-wiki-rag
            # Reclaim disk BEFORE pull (issue #453): every deploy leaves the
            # superseded image's layers behind and the small VPS fills up
            # (2026-07-04: pull died with "no space left on device"). -a prunes
            # all images not used by a container; the running service's image
            # is in use so in-place rollback stays possible until `up -d`
            # switches over.
            docker image prune -af
            docker compose -p ask-wiki-rag -f docker-compose.prod.yml pull
            docker compose -p ask-wiki-rag -f docker-compose.prod.yml up -d ask-wiki-rag
            # /healthz smoke via python (python:3.11-slim has NO curl). Retry to
            # let uvicorn + the langchain/faiss imports AND the Gateway startup
            # warmup (hybrid dense index + optional client pings, issue #439)
            # finish before treating a slow-starting box as unhealthy.
            for i in $(seq 1 10); do
              if docker compose -p ask-wiki-rag -f docker-compose.prod.yml exec -T ask-wiki-rag \
                   python -c "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/healthz', timeout=5).status == 200 else 1)"; then
                echo "healthz OK"; break
              fi
              [ "$i" -eq 10 ] && { echo "healthz did not come up in time"; exit 1; }
              echo "waiting for healthz... ($i/10)"; sleep 3
            done
