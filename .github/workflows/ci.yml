# Minimal pytest gate (issue #324; refactored to a reusable workflow in #477).
#
# Runs the full default test suite (no -m live, no ruff gate — ruff was a
# pre-existing repo-wide red tracked in issue #325) on every push and
# pull_request to main so a red suite can't merge unnoticed.
#
# The test job itself now lives in the reusable ./.github/workflows/test.yml so
# the deploy workflow's pre-deploy gate can call the identical suite (#477) and
# the two can never drift. See test.yml for the platform matrix and hermeticity
# notes.
name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    uses: ./.github/workflows/test.yml
