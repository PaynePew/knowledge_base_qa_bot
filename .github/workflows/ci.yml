# Minimal pytest gate (issue #324).
#
# Runs the full default test suite (no -m live, no ruff gate — ruff has
# pre-existing repo-wide failures tracked in issue #325) on every push and
# pull_request to main so a red suite can't merge unnoticed.
#
# Environment setup mirrors what the project needs:
#   - uv for dependency management (workspace with --all-packages)
#   - The committed .kb/FAISS seeds are in the repo (no re-bake step needed)
name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Sync all workspace packages
        run: uv sync --all-packages

      - name: Run pytest (default markers — skips live tests)
        run: uv run pytest
