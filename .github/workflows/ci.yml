# Minimal pytest gate (issue #324).
#
# Runs the full default test suite (no -m live, no ruff gate — ruff was a
# pre-existing repo-wide red tracked in issue #325) on every push and
# pull_request to main so a red suite can't merge unnoticed.
#
# Platform: windows-latest. The project's trusted green baseline (1512 passed)
# is established on Windows (the dev platform). The default suite is NOT fully
# CI-hermetic: it contains a Windows-specific path-validation test
# (test_rejects_windows_absolute_path) and several tests that *construct* an
# OpenAI client (retry/config — no real call) and so need *a* key present.
# Running on windows-latest with a dummy OPENAI_API_KEY reproduces the baseline
# faithfully. NOTE: production deploys to linux/amd64 (deploy.yml); making the
# suite Linux-portable so CI can run on the prod platform is a separate
# follow-up, not done here.
#
# The dummy OPENAI_API_KEY only satisfies client construction; -m live tests are
# skipped by default so no real API call is ever made.
name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: windows-latest
    permissions:
      contents: read
    env:
      # Not a real key — only needed so the OpenAI client constructor (exercised
      # by non-live retry/config tests) succeeds. Live tests stay skipped.
      OPENAI_API_KEY: sk-ci-dummy-key-not-real
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Sync all workspace packages
        run: uv sync --all-packages

      - name: Run pytest (default markers — skips live tests)
        # Two tests make REAL OpenAI calls in the default suite (not mocked, not
        # marked live) and 401 on the dummy key — deselected here pending the
        # hermeticity fix in #332. Remove these --deselect lines once #332 lands.
        run: >-
          uv run pytest
          --deselect "markdown_kb/tests/lint/test_c3_c4a_c11.py::TestCombinedC3C4aC11::test_combined_run_all_checks_fire"
          --deselect "gateway/tests/test_chat_stream.py::test_chat_stream_rag_stack_no_longer_returns_501"
