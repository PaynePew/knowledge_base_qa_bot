# Self-reset cron for the `ask-wiki-rag` VPS tenant (issue #272).
#
# Recreating the container from the SAME baked image discards its ephemeral
# writable layer, returning it to the pre-ingested / pre-indexed seed. There is
# NO pull and NO rebuild here, so the seed is exactly the image that is already
# on the box -> the reset costs ZERO OpenAI tokens by default (nothing ingests
# or indexes at boot; loading the committed BM25/FAISS/hybrid-dense seeds is a
# pure disk read). This workflow only force-recreates the single `ask-wiki-rag`
# service and smokes /healthz.
#
# ACCEPTED DEVIATION (issue #439): prod compose sets `KB_WARMUP_PING=true`, so
# every reset now also fires one tiny embeddings + one tiny LLM ping per
# distinct OpenAI client (a few tokens total) to prime connections and close
# the post-reset `/chat` cold start. This is a deliberate, small, bounded
# token cost traded for eliminating first-request latency after every reset;
# unset the flag in `docker-compose.prod.yml` to restore the strict
# zero-token boot.
name: reset

on:
  # Cron is UTC-only on GitHub Actions. `0 4 */2 * *` => 04:00 UTC on every odd
  # day-of-month (1, 3, 5, ... 29, 31), i.e. roughly every 2 days. day-of-month
  # stepping is NOT a true 48h rolling interval: the 31->1 wrap and short months
  # (Feb 29->Mar 1) produce a 1-day cadence at the month boundary. That drift is
  # acceptable for a "reset to seed every couple of days" hygiene job; a strict
  # 48h interval is not expressible in cron and is not required here.
  schedule:
    - cron: "0 4 */2 * *"
  workflow_dispatch:

# Do not let a scheduled reset overlap a manual reset on the same box.
concurrency:
  group: reset-ask-wiki-rag
  cancel-in-progress: false

jobs:
  reset:
    # Owner-only guard: skip on forks (no DEPLOY_* secrets; this cron must never
    # fire from a fork toward the owner's box).
    if: ${{ github.repository_owner == 'PaynePew' }}
    runs-on: ubuntu-latest
    steps:
      - name: Force-recreate to seed over SSH and smoke /healthz
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /opt/ask-wiki-rag
            # Scoping guardrail (platform contract): always pin the project with
            # -p AND name the single service, and NEVER pass --remove-orphans.
            # A bare `--force-recreate` / a stray --remove-orphans against a
            # shared project is exactly what bounced the shared Caddy in the
            # Phase-0 saga. This recreates ONLY ask-wiki-rag in its own project →
            # zero blast radius to the scheduler / qrcode tenants.
            docker compose -p ask-wiki-rag -f docker-compose.prod.yml up -d --force-recreate ask-wiki-rag
            # /healthz smoke via python (python:3.11-slim has NO curl). Retry to
            # let uvicorn + the langchain/faiss imports AND the Gateway startup
            # warmup (hybrid dense index + optional client pings, issue #439)
            # finish before treating a slow-starting box as unhealthy.
            for i in $(seq 1 10); do
              if docker compose -p ask-wiki-rag -f docker-compose.prod.yml exec -T ask-wiki-rag \
                   python -c "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/healthz', timeout=5).status == 200 else 1)"; then
                echo "healthz OK"; break
              fi
              [ "$i" -eq 10 ] && { echo "healthz did not come up in time"; exit 1; }
              echo "waiting for healthz... ($i/10)"; sleep 3
            done
