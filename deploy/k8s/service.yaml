# NodePort Service — the kind-local stand-in for the VPS's shared `edge` Caddy
# (which reverse-proxies ask-wiki-rag:8000 and owns :80/:443). On the shared
# box the compose service exposes NO host port by tenant contract; here the
# NodePort is published to the host only through kind-cluster.yaml's
# extraPortMapping (30080 -> localhost:8080). An Ingress + controller would be
# the closer analog of `edge` — stretch goal, see README §7.
apiVersion: v1
kind: Service
metadata:
  name: ask-wiki-rag
  namespace: ask-wiki-rag
spec:
  type: NodePort
  selector:
    app: ask-wiki-rag
  ports:
    - name: http
      port: 80          # in-cluster: http://ask-wiki-rag.ask-wiki-rag.svc
      targetPort: 8000  # the container's uvicorn port
      nodePort: 30080   # pinned so kind-cluster.yaml's hostPort mapping holds
