<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ask.Wiki&amp;RAG — grounded Q&amp;A</title>

<!--
  KB Gateway browser UI — Phase 9 Slice 6 (#122).
  Single vanilla HTML/CSS/JS file. NO framework, NO build step (CODING_STANDARD §12.1).
  SSE client: fetch() + ReadableStream — EventSource is GET-only (§12.2).
  XSS: all server/LLM-derived content inserted via textContent, never innerHTML (§12.4).
  Sources render before any answer token (§12.3 sources-first invariant).
  Cannot Confirm is uniform: token(s) of fixed phrase + done{passed:false} (§12.3).
  No business logic: grounding/filing/citation decisions consumed from server events (§12.5).
-->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
  :root {
    --bg:      #fafaf9;
    --surface: #ffffff;
    --ink:     #111111;
    --ink-2:   #555555;
    --ink-3:   #8a8a8a;
    --ink-4:   #b8b8b8;
    --rule:    #e5e5e3;
    --rule-2:  #ececea;
    --accent:  #1f1f1f;
    --pass:    #2f6b3e;
    --fail:    #a83a26;
    --selection: #e9e9e7;
  }

  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  #stage { height: 100%; display: block; }
  button { font: inherit; cursor: pointer; }
  ::selection { background: var(--selection); color: var(--ink); }

  @keyframes pulse-dot { 0%, 100% { opacity: .25; } 50% { opacity: 1; } }
  @keyframes blink     { 50% { opacity: 0; } }
  @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation: none !important; transition: none !important; } }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: "IBM Plex Sans", system-ui, sans-serif;
    font-size: 15px;
    line-height: 1.5;
    height: 100vh;
    height: 100dvh;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  .page {
    max-width: 680px;
    margin: 0 auto;
    height: 100%;
    display: flex; flex-direction: column;
    padding: 0 32px;
  }

  /* ── Masthead ────────────────────────────────────────── */
  .masthead {
    flex: none;
    padding: 22px 0 16px;
    display: flex; align-items: center; gap: 16px;
    border-bottom: 1px solid var(--rule);
  }
  .mast-logo {
    font-family: "IBM Plex Sans", sans-serif;
    font-weight: 500; font-size: 15px;
    letter-spacing: -.005em; color: var(--ink);
  }
  .mast-logo .dot { color: var(--ink-4); margin: 0 1px; }
  .mast-logo .amp { color: var(--ink-4); margin: 0 1px; font-weight: 400; }
  .mast-toggle {
    margin-left: auto;
    display: inline-flex;
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    background: var(--surface);
    border: 1px solid var(--rule);
    border-radius: 4px;
    padding: 2px;
    gap: 1px;
  }
  .mast-toggle button {
    border: 0; background: transparent;
    padding: 5px 12px;
    color: var(--ink-3);
    border-radius: 3px;
    letter-spacing: .02em;
  }
  .mast-toggle button[aria-pressed="true"] { background: var(--ink); color: var(--surface); }

  /* ── Stream ──────────────────────────────────────────── */
  .stream {
    flex: 1;
    min-height: 0;
    display: flex; flex-direction: column;
    padding: 4px 14px 24px 0;
    overflow-y: auto;
    overscroll-behavior: contain;
    scroll-behavior: smooth;
    scrollbar-width: thin;
    scrollbar-color: var(--rule) transparent;
  }
  .stream::-webkit-scrollbar { width: 8px; }
  .stream::-webkit-scrollbar-track { background: transparent; }
  .stream::-webkit-scrollbar-thumb {
    background: transparent;
    border-radius: 4px;
    border: 2px solid transparent;
    background-clip: padding-box;
    transition: background-color .2s ease;
  }
  .stream:hover::-webkit-scrollbar-thumb { background-color: var(--rule); }
  .stream::-webkit-scrollbar-thumb:hover { background-color: var(--ink-4); }
  .entry { display: flex; flex-direction: column; }

  .label {
    font-family: "IBM Plex Mono", monospace;
    font-size: 10.5px; letter-spacing: .08em; text-transform: uppercase;
    color: var(--ink-3);
    margin: 28px 0 12px;
    display: flex; align-items: center; gap: 8px;
  }
  .label .count {
    font-variant-numeric: tabular-nums;
    color: var(--ink-2);
  }

  /* QUERY */
  .query {
    font-size: 19px; line-height: 1.4; font-weight: 400;
    color: var(--ink);
    padding-bottom: 4px;
  }

  /* RECORDS */
  .records summary { list-style: none; cursor: pointer; outline: none; }
  .records summary::-webkit-details-marker { display: none; }
  .records[open] .chev { transform: rotate(180deg); }
  .recs-body { overflow: hidden; }
  .recs-toggle {
    display: inline-flex; align-items: center; gap: 6px;
    font-family: "IBM Plex Mono", monospace; font-size: 11px;
    color: var(--ink-3);
    padding: 0 0 12px;
    user-select: none;
    transition: color .15s ease;
  }
  .recs-toggle:hover { color: var(--ink-2); }
  .recs-toggle .chev {
    display: inline-block; font-size: 9px;
    transition: transform .25s cubic-bezier(.22,.61,.36,1);
  }
  .rec {
    display: grid;
    grid-template-columns: 24px 1fr auto;
    column-gap: 12px;
    padding: 14px 0;
    border-top: 1px solid var(--rule);
  }
  .rec:last-child { border-bottom: 1px solid var(--rule); }
  .rec .num {
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px; color: var(--ink-3);
    font-variant-numeric: tabular-nums;
    padding-top: 3px;
  }
  .rec .body { min-width: 0; }
  .rec .id {
    font-family: "IBM Plex Mono", monospace;
    font-size: 12.5px; color: var(--ink); font-weight: 500;
  }
  .rec .crumb {
    font-size: 12px; color: var(--ink-3); margin-top: 2px;
  }
  .rec .snip {
    font-size: 14px; line-height: 1.55; color: var(--ink-2);
    margin-top: 8px;
  }
  .rec .prov {
    margin-top: 8px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 10.5px; color: var(--ink-3);
  }
  .rec .prov b { color: var(--ink-2); font-weight: 500; }
  .rec .score {
    font-family: "IBM Plex Mono", monospace;
    font-size: 10.5px; color: var(--ink-4);
    font-variant-numeric: tabular-nums;
    padding-top: 3px;
  }

  .recs-empty {
    padding: 22px 0;
    border-top: 1px solid var(--rule);
    border-bottom: 1px solid var(--rule);
    font-size: 13.5px;
    color: var(--ink-3);
    text-align: center;
  }

  /* VERIFY */
  .verify {
    display: inline-flex; align-items: center; gap: 10px;
    font-family: "IBM Plex Mono", monospace; font-size: 11.5px;
    color: var(--ink-2);
    padding: 2px 0 4px;
  }
  .verify .dots { display: inline-flex; gap: 3px; }
  .verify .dots i {
    width: 4px; height: 4px; background: var(--ink-2);
    border-radius: 50%;
    animation: pulse-dot 1.1s infinite ease-in-out;
  }
  .verify .dots i:nth-child(2) { animation-delay: .15s; }
  .verify .dots i:nth-child(3) { animation-delay: .30s; }

  /* ANSWER */
  .answer .body {
    font-size: 16px; line-height: 1.65; color: var(--ink);
    white-space: pre-wrap;
    text-wrap: pretty;
  }
  .answer.cannot .body { color: var(--ink-2); }
  .cursor {
    display: inline-block;
    width: 7px; height: 1em;
    background: var(--ink);
    margin-left: 2px;
    transform: translateY(2px);
    animation: blink 1s steps(1) infinite;
  }

  .foot {
    display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
    margin-top: 20px; padding-top: 14px;
    border-top: 1px solid var(--rule);
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
  }
  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    color: var(--ink-2);
    letter-spacing: .02em;
  }
  .chip.pass .dot { background: var(--pass); }
  .chip.fail .dot { background: var(--fail); }
  .chip .dot {
    width: 7px; height: 7px; border-radius: 50%;
    display: inline-block;
  }
  .chip .label-txt {
    font-weight: 500; text-transform: uppercase; letter-spacing: .06em;
  }
  .chip.pass .label-txt { color: var(--pass); }
  .chip.fail .label-txt { color: var(--fail); }
  .reason {
    font-family: "IBM Plex Sans", sans-serif;
    font-size: 12.5px;
    color: var(--ink-3);
  }
  .filed {
    margin-left: auto;
    color: var(--ink-3);
  }
  .filed b { color: var(--ink); font-weight: 500; }

  /* ERROR */
  .err {
    padding: 16px 18px;
    border: 1px solid var(--rule);
    background: var(--surface);
    border-radius: 4px;
  }
  .err .h {
    font-family: "IBM Plex Mono", monospace;
    font-size: 10.5px;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--fail);
    margin-bottom: 6px;
  }
  .err .m {
    font-size: 14.5px;
    color: var(--ink);
    line-height: 1.5;
  }
  .err button {
    margin-top: 14px;
    background: var(--ink); color: var(--surface);
    border: 0;
    padding: 7px 14px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    letter-spacing: .04em;
    border-radius: 3px;
  }
  .err button:hover { background: #000; }

  /* COMPOSER */
  .composer {
    flex: none;
    background: var(--bg);
    padding: 14px 0 20px;
    border-top: 1px solid var(--rule);
  }
  .composer .box {
    display: flex; align-items: center; gap: 8px;
    background: var(--surface);
    border: 1px solid var(--rule);
    border-radius: 6px;
    padding: 6px 6px 6px 14px;
  }
  .composer .box:focus-within {
    border-color: var(--ink-3);
  }
  .composer input {
    flex: 1; border: 0; outline: none; background: transparent;
    font-family: inherit; font-size: 14.5px; color: var(--ink);
    padding: 8px 0;
  }
  .composer input::placeholder { color: var(--ink-3); }
  .composer .send {
    background: var(--ink); color: var(--surface);
    border: 0;
    padding: 8px 14px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    letter-spacing: .04em;
    border-radius: 4px;
  }
  .composer .send:hover { background: #000; }
  .composer .hint {
    margin-top: 8px;
    text-align: right;
    font-family: "IBM Plex Mono", monospace;
    font-size: 10px;
    color: var(--ink-4);
    letter-spacing: .04em;
  }
  .composer .hint kbd {
    border: 1px solid var(--rule);
    background: var(--surface);
    padding: 1px 5px;
    border-radius: 2px;
    font-family: inherit;
    font-size: 9.5px;
    color: var(--ink-3);
  }

  @media (max-width: 540px) {
    .page { padding: 0 20px; }
    .query { font-size: 17px; }
    .answer .body { font-size: 15px; }
  }
</style>
</head>
<body>
  <main id="stage" aria-live="polite"></main>

<script>
"use strict";
/* §12.3: BM25 score hidden by default (dev-only). Enable with ?dev=1.
   RAG cards never show score regardless of this flag. */
const DEV = new URLSearchParams(location.search).has("dev");

/* textContent-only DOM helper — innerHTML is banned (XSS, §12.4) */
function el(tag, props) {
  const kids = Array.prototype.slice.call(arguments, 2);
  const n = document.createElement(tag);
  if (props) {
    const entries = Object.entries(props);
    for (let i = 0; i < entries.length; i++) {
      const k = entries[i][0], v = entries[i][1];
      if (v == null) continue;
      if (k === "class") n.className = v;
      else if (k === "text") n.textContent = v;
      else if (k === "html") throw new Error("innerHTML banned");
      else if (k.startsWith("on") && typeof v === "function") n.addEventListener(k.slice(2).toLowerCase(), v);
      else n.setAttribute(k, v);
    }
  }
  for (let i = 0; i < kids.length; i++) {
    const kid = kids[i];
    if (kid == null || kid === false) continue;
    n.append(kid.nodeType ? kid : document.createTextNode(String(kid)));
  }
  return n;
}

/* ── PURE SSE PARSER (§12.2, §12.7) ─────────────────────────────────────────
   Pure function factory: text chunks → parsed events.
   Keeps a buffer between calls; handles partial frames across chunk boundaries.
   Unknown event types are ignored by callers (forward-compat, §12.2).
   No DOM access, no side effects — unit-testable without a browser (§12.7).
   ─────────────────────────────────────────────────────────────────────────── */
function createSSEParser() {
  var buf = "";
  return function push(chunk) {
    buf += chunk;
    var out = [];
    var idx;
    while ((idx = buf.indexOf("\n\n")) !== -1) {
      var raw = buf.slice(0, idx);
      buf = buf.slice(idx + 2);
      var event = "message";
      var dataStr = "";
      var lines = raw.split("\n");
      for (var i = 0; i < lines.length; i++) {
        var line = lines[i];
        if (line.startsWith("event:")) event = line.slice(6).trim();
        else if (line.startsWith("data:")) dataStr += line.slice(5).trim();
      }
      var data = null;
      try { data = JSON.parse(dataStr); } catch (_) {}
      out.push({ event: event, data: data });
    }
    return out;
  };
}

/* ── REASON MAP ──────────────────────────────────────────────────────────── */
var REASON_TEXT = {
  claim_supported: "Every claim is supported by the cited sources.",
  claim_unsupported: "The draft made a claim the sources don't support — the answer was withheld.",
  verifier_unavailable: "The grounding verifier was unavailable — the answer was withheld to stay safe.",
  below_threshold: "No source cleared the relevance threshold.",
  retrieval_empty: "No matching sources were found.",
  index_missing: "The knowledge base index has not been built yet.",
};

/* ── STATE ───────────────────────────────────────────────────────────────── */
var stack = "wiki";
var answerEl = null, answerBody = null, verifyEl = null;
var currentQuery = "";
var stream, segWiki, segRag, input;

/* ── LAYOUT ──────────────────────────────────────────────────────────────── */
function build() {
  stream = el("div", { class: "stream" });
  input = el("input", { type: "text", placeholder: "Ask the knowledge base…" });
  segWiki = el("button", { type: "button", text: "Wiki", onclick: function() { setStack("wiki"); } });
  segRag  = el("button", { type: "button", text: "RAG",  onclick: function() { setStack("rag"); } });
  var send = el("button", { class: "send", type: "button", text: "Ask", onclick: submit });
  input.addEventListener("keydown", function(e) { if (e.key === "Enter") submit(); });

  var masthead = el("header", { class: "masthead" },
    el("div", { class: "mast-logo" },
      "ask",
      el("span", { class: "dot" }, "."),
      "Wiki",
      el("span", { class: "amp" }, "&"),
      "RAG",
    ),
    el("div", { class: "mast-toggle", role: "tablist" }, segWiki, segRag),
  );

  var composer = el("div", { class: "composer" },
    el("div", { class: "box" }, input, send),
    el("div", { class: "hint" }, "Press ", el("kbd", { text: "↵" }), " to submit"),
  );

  document.getElementById("stage").replaceChildren(
    el("div", { class: "page" }, masthead, stream, composer)
  );
}

function syncSeg() {
  segWiki.setAttribute("aria-pressed", String(stack === "wiki"));
  segRag.setAttribute("aria-pressed", String(stack === "rag"));
}

/* ── HELPERS ─────────────────────────────────────────────────────────────── */
function makeLabel(text, opts) {
  var lbl = el("div", { class: "label" }, el("span", { text: text }));
  if (opts && opts.count != null) lbl.append(el("span", { class: "count", text: "· " + opts.count }));
  return lbl;
}

function add(node) {
  stream.append(node);
  if (!matchMedia("(prefers-reduced-motion: reduce)").matches) {
    node.animate(
      [{ opacity: 0, transform: "translateY(4px)" }, { opacity: 1, transform: "none" }],
      { duration: 320, easing: "cubic-bezier(.22,.61,.36,1)", fill: "backwards" }
    );
  }
  requestAnimationFrame(function() {
    stream.scrollTo({ top: stream.scrollHeight, behavior: "smooth" });
  });
}

function setStack(s) {
  if (s === stack) return;
  stack = s;
  syncSeg();
  /* Switching stacks = fresh request (§12.3). Re-submit current query if any. */
  if (currentQuery) {
    resetStreamState();
    stream.replaceChildren();
    startRequest(currentQuery);
  }
}

function resetStreamState() {
  answerEl = null;
  answerBody = null;
  verifyEl = null;
}

/* ── EVENT RENDER FUNCTIONS ──────────────────────────────────────────────── */
function onQuery(text) {
  var entry = el("div", { class: "entry" },
    makeLabel("Query"),
    el("div", { class: "query", text: text }),
  );
  add(entry);
}

function onSources(sources) {
  /* §12.3 sources-first: this function is called before any answer area is
     created. The answer entry is only created in onToken, which runs after. */
  var entry = el("div", { class: "entry" });
  entry.append(makeLabel("Records", { count: sources.length }));

  if (!sources.length) {
    entry.append(el("div", { class: "recs-empty", text: "No record met the relevance threshold." }));
    add(entry);
    return;
  }

  var det = el("details", { class: "records", open: "" });
  var toggle = el("summary", { class: "recs-toggle" },
    el("span", { text: "Show " + sources.length + " " + (sources.length === 1 ? "record" : "records") }),
    el("span", { class: "chev", text: "▾" }),
  );
  det.append(toggle);

  var recsBody = el("div", { class: "recs-body" });
  sources.forEach(function(s, i) {
    var rec = el("div", { class: "rec" });
    rec.append(el("div", { class: "num", text: String(i + 1).padStart(2, "0") }));
    var body = el("div", { class: "body" });
    /* §12.4: all server-derived content via textContent */
    body.append(
      el("div", { class: "id", text: s.source }),
      el("div", { class: "crumb", text: s.heading }),
      el("div", { class: "snip", text: s.content }),
    );
    if (s.derived_from && s.derived_from.length) {
      var provEl = el("div", { class: "prov" });
      provEl.append(el("b", {}, "Derived from "));
      /* derived_from is an array of {source, heading} objects — join source ids */
      var provText = s.derived_from.map(function(x) { return x.source; }).join(", ");
      provEl.append(document.createTextNode(provText));
      body.append(provEl);
    }
    rec.append(body);
    /* §12.3: score hidden by default (dev-only), and only for Wiki; RAG: never */
    if (DEV && stack === "wiki" && typeof s.score === "number") {
      rec.append(el("div", { class: "score", text: s.score.toFixed(2) }));
    } else {
      rec.append(el("div", {}));
    }
    recsBody.append(rec);
  });
  det.append(recsBody);
  animateDetails(det);

  entry.append(det);
  add(entry);
}

function animateDetails(det) {
  var summary = det.querySelector("summary");
  var body = det.querySelector(".recs-body");
  if (!summary || !body) return;
  var running = null, fallback = null;

  function cleanup() {
    if (running) { try { running.cancel(); } catch (_) {} running = null; }
    if (fallback) { clearTimeout(fallback); fallback = null; }
    body.style.height = "";
    body.style.opacity = "";
  }

  summary.addEventListener("click", function(e) {
    if (matchMedia("(prefers-reduced-motion: reduce)").matches) return;
    e.preventDefault();
    cleanup();

    var dur = 260;
    var ease = "cubic-bezier(.22,.61,.36,1)";

    if (det.open) {
      var h = body.offsetHeight;
      var finish = function() { det.open = false; cleanup(); };
      running = body.animate(
        [{ height: h + "px", opacity: 1 }, { height: "0px", opacity: 0 }],
        { duration: dur, easing: ease, fill: "forwards" }
      );
      running.onfinish = finish;
      fallback = setTimeout(finish, dur + 60);
    } else {
      det.open = true;
      var h2 = body.scrollHeight;
      var finish2 = function() { cleanup(); };
      running = body.animate(
        [{ height: "0px", opacity: 0 }, { height: h2 + "px", opacity: 1 }],
        { duration: dur, easing: ease, fill: "forwards" }
      );
      running.onfinish = finish2;
      fallback = setTimeout(finish2, dur + 60);
    }
  });
}

function onStatus() {
  var entry = el("div", { class: "entry" });
  entry.append(makeLabel("Verification"));
  verifyEl = el("div", { class: "verify" },
    el("span", { class: "dots" }, el("i"), el("i"), el("i")),
    el("span", { text: "Checking each claim against the cited record…" }),
  );
  entry.append(verifyEl);
  add(entry);
}

function onToken(t) {
  /* §12.3: answer area only created after sources have arrived (onSources runs
     first in the SSE event order; answerEl is null until this first onToken). */
  if (!answerEl) {
    if (verifyEl) {
      var row = verifyEl.closest(".entry");
      if (row) row.remove();
      verifyEl = null;
    }
    var entry = el("div", { class: "entry" });
    entry.append(makeLabel("Answer"));
    answerBody = el("div", { class: "body" });
    answerEl = el("div", { class: "answer" }, answerBody, el("span", { class: "cursor" }));
    entry.append(answerEl);
    add(entry);
  }
  /* §12.4: token text appended as TextNode (never innerHTML) */
  answerBody.append(document.createTextNode(t.text));
  stream.scrollTop = stream.scrollHeight;
}

function onDone(d) {
  /* d shape (PRD #116): { grounding: { passed, reason }, filed, stack } */
  var cur = answerEl ? answerEl.querySelector(".cursor") : null;
  if (cur) cur.remove();
  if (!answerEl) return;

  var pass = d.grounding.passed;
  if (!pass) answerEl.classList.add("cannot");

  var foot = el("div", { class: "foot" });
  foot.append(el("span", { class: "chip " + (pass ? "pass" : "fail") },
    el("span", { class: "dot" }),
    el("span", { class: "label-txt", text: pass ? "Grounded" : "Cannot confirm" }),
  ));
  /* §12.4: reason text via textContent */
  var reasonStr = REASON_TEXT[d.grounding.reason] || d.grounding.reason;
  foot.append(el("span", { class: "reason", text: reasonStr }));
  /* filed is Wiki-only (done.filed=null for RAG and CC paths) — §12.5 */
  if (d.filed) {
    foot.append(el("span", { class: "filed" },
      "Filed → ",
      el("b", { text: d.filed.slug }),
    ));
  }
  answerEl.append(foot);
  stream.scrollTo({ top: stream.scrollHeight, behavior: "smooth" });
}

function onError(e) {
  if (verifyEl) {
    var row = verifyEl.closest(".entry");
    if (row) row.remove();
    verifyEl = null;
  }
  var entry = el("div", { class: "entry" });
  entry.append(makeLabel("Error"));
  /* §12.4: error detail via textContent */
  var msg = e.detail || e.message || "An unexpected error occurred.";
  entry.append(el("div", { class: "err" },
    el("div", { class: "h", text: "Service interrupted" }),
    el("div", { class: "m", text: msg }),
    el("button", { type: "button", text: "Try again", onclick: function() {
      resetStreamState();
      stream.replaceChildren();
      startRequest(currentQuery);
    }}),
  ));
  add(entry);
}

/* ── DISPATCH ────────────────────────────────────────────────────────────── */
function dispatch(ev, data) {
  /* §12.2: unknown event types are ignored (forward-compat) */
  if (ev === "sources") onSources(data.sources);
  else if (ev === "status") onStatus();
  else if (ev === "token") onToken(data);
  else if (ev === "done") onDone(data);
  else if (ev === "error") onError(data);
  /* else: ignore unknown types */
}

/* ── REAL SSE REQUEST (fetch + ReadableStream, §12.2) ────────────────────── */
function startRequest(query) {
  var parser = createSSEParser();
  var url = "/chat/stream?stack=" + encodeURIComponent(stack);

  fetch(url, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ query: query }),
  }).then(function(resp) {
    if (!resp.ok) {
      /* Pre-stream HTTP error (e.g. 400 unknown stack) — cannot arrive as SSE */
      onError({ detail: "HTTP " + resp.status + ": " + resp.statusText });
      return;
    }

    var reader = resp.body.getReader();
    var decoder = new TextDecoder();

    function pump() {
      reader.read().then(function(result) {
        if (result.done) return;
        var chunk = decoder.decode(result.value, { stream: true });
        var events = parser(chunk);
        for (var i = 0; i < events.length; i++) {
          dispatch(events[i].event, events[i].data);
        }
        pump();
      }).catch(function(err) {
        onError({ detail: "Stream read error: " + (err.message || String(err)) });
      });
    }
    pump();
  }).catch(function(err) {
    onError({ detail: "Network error: " + (err.message || String(err)) });
  });
}

/* ── SUBMIT ──────────────────────────────────────────────────────────────── */
function submit() {
  var query = input.value.trim();
  if (!query) return;
  currentQuery = query;
  resetStreamState();
  stream.replaceChildren();
  onQuery(query);
  startRequest(query);
}

/* ── INIT ────────────────────────────────────────────────────────────────── */
build();
syncSeg();
</script>
</body>
</html>
