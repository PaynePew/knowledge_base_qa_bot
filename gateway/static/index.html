<!--
  KB Gateway browser UI — Phase 9 Slice 6 (#122) + Phase 11 Slice 4 (#162).
  Single vanilla HTML/CSS/JS file. NO framework, NO build step (CODING_STANDARD §12.1).
  SSE client: fetch() + ReadableStream — EventSource is GET-only (§12.2).
  XSS: all server/LLM-derived content inserted via textContent, never innerHTML (§12.4).
  Sources render before any answer token (§12.3 sources-first invariant).
  Cannot Confirm is uniform: token(s) of fixed phrase + done{passed:false} (§12.3).
  No business logic: grounding/filing/citation decisions consumed from server events (§12.5).
  Phase 11 Slice 4 (#162): session id captured from done.session, echoed via ?session= on
  subsequent requests; stack toggle keeps the same session; status:rewriting renders
  "understanding your question…" indicator (textContent-only, §12.4).
-->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<!-- Shared design tokens (Phase 15 S1 / issue #169) -->
<link rel="stylesheet" href="/static/shared.css">

<style>

  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  #stage { height: 100%; display: block; }
  button { font: inherit; cursor: pointer; }
  ::selection { background: var(--selection); color: var(--ink); }

  @keyframes pulse-dot { 0%, 100% { opacity: .25; } 50% { opacity: 1; } }
  @keyframes blink     { 50% { opacity: 0; } }
  @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation: none !important; transition: none !important; } }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: "IBM Plex Sans", system-ui, sans-serif;
    font-size: 15px;
    line-height: 1.5;
    height: 100vh;
    height: 100dvh;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  .page {
    max-width: 680px;
    margin: 0 auto;
    height: 100%;
    display: flex; flex-direction: column;
    padding: 0 32px;
  }

  /* ── Masthead ────────────────────────────────────────── */
  .masthead {
    flex: none;
    padding: 22px 0 16px;
    display: flex; align-items: center; gap: 16px;
    border-bottom: 1px solid var(--rule);
  }
  .mast-logo {
    font-family: "IBM Plex Sans", sans-serif;
    font-weight: 500; font-size: 15px;
    letter-spacing: -.005em; color: var(--ink);
  }
  .mast-logo .dot { color: var(--ink-4); margin: 0 1px; }
  .mast-logo .amp { color: var(--ink-4); margin: 0 1px; font-weight: 400; }
  .mast-toggle {
    margin-left: auto;
    display: inline-flex;
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    background: var(--surface);
    border: 1px solid var(--rule);
    border-radius: 4px;
    padding: 2px;
    gap: 1px;
  }
  .mast-toggle button {
    border: 0; background: transparent;
    padding: 5px 12px;
    color: var(--ink-3);
    border-radius: 3px;
    letter-spacing: .02em;
  }
  .mast-toggle button[aria-pressed="true"] { background: var(--ink); color: var(--surface); }

  /* ── Stream ──────────────────────────────────────────── */
  .stream {
    flex: 1;
    min-height: 0;
    display: flex; flex-direction: column;
    padding: 4px 14px 24px 0;
    overflow-y: auto;
    overscroll-behavior: contain;
    /* No CSS scroll-behavior:smooth — programmatic scroll is animated by a JS
       easing tween (scrollTurnIntoView) so it works reliably inside this flex
       container and stays interruptible per turn. */
    scrollbar-width: thin;
    scrollbar-color: var(--rule) transparent;
  }
  .stream::-webkit-scrollbar { width: 8px; }
  .stream::-webkit-scrollbar-track { background: transparent; }
  .stream::-webkit-scrollbar-thumb {
    background: transparent;
    border-radius: 4px;
    border: 2px solid transparent;
    background-clip: padding-box;
    transition: background-color .2s ease;
  }
  .stream:hover::-webkit-scrollbar-thumb { background-color: var(--rule); }
  .stream::-webkit-scrollbar-thumb:hover { background-color: var(--ink-4); }
  .entry { display: flex; flex-direction: column; }

  .label {
    font-family: "IBM Plex Mono", monospace;
    font-size: 10.5px; letter-spacing: .08em; text-transform: uppercase;
    color: var(--ink-3);
    margin: 28px 0 12px;
    display: flex; align-items: center; gap: 8px;
  }
  .label .count {
    font-variant-numeric: tabular-nums;
    color: var(--ink-2);
  }

  /* QUERY */
  .query {
    font-size: 19px; line-height: 1.4; font-weight: 400;
    color: var(--ink);
    padding-bottom: 4px;
  }

  /* RECORDS */
  .records summary { list-style: none; cursor: pointer; outline: none; }
  .records summary::-webkit-details-marker { display: none; }
  .records[open] .chev { transform: rotate(180deg); }
  .recs-body { overflow: hidden; }
  .recs-toggle {
    display: inline-flex; align-items: center; gap: 6px;
    font-family: "IBM Plex Mono", monospace; font-size: 11px;
    color: var(--ink-3);
    padding: 0 0 12px;
    user-select: none;
    transition: color .15s ease;
  }
  .recs-toggle:hover { color: var(--ink-2); }
  .recs-toggle .chev {
    display: inline-block; font-size: 9px;
    transition: transform .25s cubic-bezier(.22,.61,.36,1);
  }
  /* A record is a single condensed row — num · citation-id · meta(heading ·
     provenance). NO inline content snippet: the full source opens on demand in the
     #266 viewer (the single content surface), so the same body text is never
     printed twice. When the server supplied a resolvable path the row is a real
     <button> (native focus + Enter/Space); the whole row is the click target. */
  .rec {
    display: grid;
    grid-template-columns: 22px 1fr auto;
    column-gap: 12px;
    align-items: baseline;
    width: 100%;
    padding: 13px 8px 13px 4px;
    border: 0;
    border-top: 1px solid var(--rule);
    background: transparent;
    text-align: left;
    font: inherit;
    color: inherit;
    border-radius: 5px;
  }
  .rec:last-child { border-bottom: 1px solid var(--rule); }
  button.rec { cursor: pointer; transition: background-color .15s ease; }
  button.rec:hover, button.rec:focus-visible {
    background: var(--selection); outline: none;
  }
  .rec .num {
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px; color: var(--ink-3);
    font-variant-numeric: tabular-nums;
  }
  .rec .body { min-width: 0; }
  .rec .id {
    display: block;
    font-family: "IBM Plex Mono", monospace;
    font-size: 12.5px; color: var(--ink); font-weight: 500;
    letter-spacing: -.005em;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  button.rec:hover .id, button.rec:focus-visible .id {
    text-decoration: underline;
    text-decoration-color: var(--ink-3);
    text-underline-offset: 3px; text-decoration-thickness: 1px;
  }
  .rec .meta {
    display: block; margin-top: 3px;
    font-size: 12px; line-height: 1.4; color: var(--ink-3);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .rec .meta .from,
  .rec .meta .score-inline {
    font-family: "IBM Plex Mono", monospace;
    font-size: 10.5px; color: var(--ink-4);
    font-variant-numeric: tabular-nums;
  }
  .rec .open {
    align-self: center;
    font-family: "IBM Plex Mono", monospace;
    font-size: 13px; color: var(--ink-4);
    transition: transform .2s cubic-bezier(.22,.61,.36,1), color .15s ease;
  }
  button.rec:hover .open, button.rec:focus-visible .open {
    color: var(--ink-2); transform: translate(2px, -2px);
  }

  .recs-empty {
    padding: 22px 0;
    border-top: 1px solid var(--rule);
    border-bottom: 1px solid var(--rule);
    font-size: 13.5px;
    color: var(--ink-3);
    text-align: center;
  }

  /* VERIFY */
  .verify {
    display: inline-flex; align-items: center; gap: 10px;
    font-family: "IBM Plex Mono", monospace; font-size: 11.5px;
    color: var(--ink-2);
    padding: 2px 0 4px;
  }
  .verify .dots { display: inline-flex; gap: 3px; }
  .verify .dots i {
    width: 4px; height: 4px; background: var(--ink-2);
    border-radius: 50%;
    animation: pulse-dot 1.1s infinite ease-in-out;
  }
  .verify .dots i:nth-child(2) { animation-delay: .15s; }
  .verify .dots i:nth-child(3) { animation-delay: .30s; }

  /* ANSWER */
  .answer .body {
    font-size: 16px; line-height: 1.65; color: var(--ink);
    white-space: pre-wrap;
    text-wrap: pretty;
  }
  .answer.cannot .body { color: var(--ink-2); }
  /* Wikilink linkify (issue #410, ADR-0030 decision 5) — reader surface:
     resolved -> navigable link; unresolved degrades to plain text with NO
     styling (a reader can fix nothing, so red would only be noise). */
  .wikilink {
    color: var(--accent);
    text-decoration: underline;
    cursor: pointer;
  }
  .cursor {
    display: inline-block;
    width: 7px; height: 1em;
    background: var(--ink);
    margin-left: 2px;
    transform: translateY(2px);
    animation: blink 1s steps(1) infinite;
  }

  .foot {
    display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
    margin-top: 20px; padding-top: 14px;
    border-top: 1px solid var(--rule);
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
  }
  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    color: var(--ink-2);
    letter-spacing: .02em;
  }
  .chip.pass .dot { background: var(--pass); }
  .chip.fail .dot { background: var(--fail); }
  .chip .dot {
    width: 7px; height: 7px; border-radius: 50%;
    display: inline-block;
  }
  .chip .label-txt {
    font-weight: 500; text-transform: uppercase; letter-spacing: .06em;
  }
  .chip.pass .label-txt { color: var(--pass); }
  .chip.fail .label-txt { color: var(--fail); }
  .reason {
    font-family: "IBM Plex Sans", sans-serif;
    font-size: 12.5px;
    color: var(--ink-3);
  }
  .filed {
    margin-left: auto;
    color: var(--ink-3);
  }
  .filed b { color: var(--ink); font-weight: 500; }

  /* Curator note — the guided-teaching annotation under the grounding footer.
     Editorial marginalia in the human (sans) voice, led by the mono lint-code
     coordinate that also appears in the console. Faint by default; never louder
     than the answer above it. */
  .cnote {
    display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap;
    margin-top: 12px;
    font-family: "IBM Plex Sans", sans-serif;
    font-size: 12.5px; line-height: 1.55;
    color: var(--ink-3);
  }
  .cnote .ccode {
    flex: none;
    font-family: "IBM Plex Mono", monospace;
    font-size: 10px; font-weight: 500; letter-spacing: .06em;
    color: var(--ink-2);
    border: 1px solid var(--rule); border-radius: 3px;
    padding: 1px 5px; transform: translateY(-1px);
  }
  .cnote .ctext { flex: 1 1 240px; min-width: 0; }
  .cnote .go {
    flex: none; margin-left: auto;
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px; color: var(--accent);
    text-decoration: none; white-space: nowrap;
  }
  .cnote .go:hover, .cnote .go:focus-visible { text-decoration: underline; }

  /* Follow-up chips — the "ask next" guidance under a completed answer, so a first
     question opens onto a topic instead of a dead end. Quiet, inline, echoing the
     empty-state starters but compact so they never rival the answer above them. */
  .followups {
    display: flex; align-items: center; flex-wrap: wrap; gap: 8px;
    margin-top: 16px;
  }
  .followups .fu-label {
    font-family: "IBM Plex Mono", monospace;
    font-size: 10px; letter-spacing: .1em; text-transform: uppercase;
    color: var(--ink-4); margin-right: 2px;
  }
  .fu-chip {
    display: inline-flex; align-items: center; gap: 7px;
    background: transparent;
    border: 1px solid var(--rule); border-radius: 999px;
    padding: 5px 12px;
    font-family: "IBM Plex Sans", sans-serif;
    font-size: 12.5px; color: var(--ink-2); cursor: pointer;
    transition: color .15s ease, border-color .15s ease;
  }
  .fu-chip:hover, .fu-chip:focus-visible {
    color: var(--ink); border-color: var(--ink-3); outline: none;
  }
  .fu-chip .fu-arrow {
    font-family: "IBM Plex Mono", monospace;
    font-size: 12px; color: var(--ink-4);
    transition: transform .2s cubic-bezier(.22,.61,.36,1), color .15s ease;
  }
  .fu-chip:hover .fu-arrow { color: var(--ink-2); transform: translateX(2px); }

  /* Empty-state curation-loop framing (the thesis binding reader + console). */
  .loop-note {
    margin-top: 30px; padding-top: 20px;
    border-top: 1px solid var(--rule);
    max-width: 54ch;
  }
  .loop-title {
    font-family: "IBM Plex Mono", monospace;
    font-size: 10.5px; letter-spacing: .12em; text-transform: uppercase;
    color: var(--ink-4);
    margin-bottom: 8px;
  }
  .loop-body {
    font-family: "IBM Plex Sans", sans-serif;
    font-size: 12.5px; line-height: 1.55; color: var(--ink-3);
    margin-bottom: 3px;
  }
  .loop-axes {
    margin-top: 12px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 10.5px; letter-spacing: .04em; color: var(--ink-4);
  }

  /* Record-level lint coordinate (C10 …) on a flagged source; hover for the fix. */
  .rec-lint {
    display: inline-block; margin-top: 5px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 9.5px; font-weight: 500; letter-spacing: .06em;
    color: var(--ink-3);
    border: 1px solid var(--rule); border-radius: 3px;
    padding: 0 4px;
    cursor: help;
  }

  /* ERROR */
  .err {
    padding: 16px 18px;
    border: 1px solid var(--rule);
    background: var(--surface);
    border-radius: 4px;
  }
  .err .h {
    font-family: "IBM Plex Mono", monospace;
    font-size: 10.5px;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--fail);
    margin-bottom: 6px;
  }
  .err .m {
    font-size: 14.5px;
    color: var(--ink);
    line-height: 1.5;
  }
  .err button {
    margin-top: 14px;
    background: var(--ink); color: var(--surface);
    border: 0;
    padding: 7px 14px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    letter-spacing: .04em;
    border-radius: 3px;
  }
  .err button:hover { background: #000; }

  /* COMPOSER */
  .composer {
    flex: none;
    background: var(--bg);
    padding: 14px 0 20px;
    border-top: 1px solid var(--rule);
  }
  .composer .box {
    display: flex; align-items: center; gap: 8px;
    background: var(--surface);
    border: 1px solid var(--rule);
    border-radius: 6px;
    padding: 6px 6px 6px 14px;
  }
  .composer .box:focus-within {
    border-color: var(--ink-3);
  }
  .composer input {
    flex: 1; border: 0; outline: none; background: transparent;
    font-family: inherit; font-size: 14.5px; color: var(--ink);
    padding: 8px 0;
  }
  .composer input::placeholder { color: var(--ink-3); }
  .composer .send {
    background: var(--ink); color: var(--surface);
    border: 0;
    padding: 8px 14px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    letter-spacing: .04em;
    border-radius: 4px;
  }
  .composer .send:hover { background: #000; }
  .composer .hint {
    margin-top: 8px;
    text-align: right;
    font-family: "IBM Plex Mono", monospace;
    font-size: 10px;
    color: var(--ink-4);
    letter-spacing: .04em;
  }
  .composer .hint kbd {
    border: 1px solid var(--rule);
    background: var(--surface);
    padding: 1px 5px;
    border-radius: 2px;
    font-family: inherit;
    font-size: 9.5px;
    color: var(--ink-3);
  }

  /* ── Empty state ─────────────────────────────────────────── */
  .empty {
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 8px 0 40px;
  }
  .empty-inner { max-width: 520px; }
  .empty-eyebrow {
    font-family: "IBM Plex Mono", monospace;
    font-size: 10.5px; letter-spacing: .14em; text-transform: uppercase;
    color: var(--ink-3);
    margin-bottom: 18px;
  }
  .empty-title {
    margin: 0;
    font-family: "IBM Plex Sans", sans-serif;
    font-weight: 300;
    font-size: 32px;
    line-height: 1.12;
    letter-spacing: -.02em;
    color: var(--ink);
  }
  .empty-sub {
    margin: 16px 0 0;
    font-size: 14.5px;
    line-height: 1.65;
    color: var(--ink-2);
    max-width: 46ch;
  }
  .empty-prompts { margin-top: 34px; }
  .empty-prompts-label {
    font-family: "IBM Plex Mono", monospace;
    font-size: 10.5px; letter-spacing: .08em; text-transform: uppercase;
    color: var(--ink-3);
    margin-bottom: 4px;
  }
  .empty-q {
    display: flex; align-items: center; justify-content: space-between; gap: 16px;
    width: 100%;
    background: transparent; border: 0;
    border-top: 1px solid var(--rule);
    padding: 14px 2px;
    text-align: left;
    font-family: "IBM Plex Sans", sans-serif;
    font-size: 15px;
    color: var(--ink-2);
    transition: color .15s ease, padding-left .2s cubic-bezier(.22,.61,.36,1);
  }
  .empty-q:last-child { border-bottom: 1px solid var(--rule); }
  .empty-q:hover { color: var(--ink); padding-left: 8px; }
  .empty-q .arrow {
    font-family: "IBM Plex Mono", monospace;
    font-size: 13px;
    color: var(--ink-4);
    flex: none;
    transition: transform .2s cubic-bezier(.22,.61,.36,1), color .15s ease;
  }
  .empty-q:hover .arrow { color: var(--ink-2); transform: translateX(3px); }

  /* ── Console nav link ───────────────────────────────────── */
  .mast-console {
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    letter-spacing: .04em;
    color: var(--ink-3);
    text-decoration: none;
    border: 1px solid var(--rule);
    border-radius: 4px;
    padding: 5px 10px;
    transition: color .15s ease, border-color .15s ease;
  }
  .mast-console:hover {
    color: var(--ink);
    border-color: var(--ink-3);
  }

  /* zh/en chrome toggle — same pill as the console link; the label names the
     language a click switches TO (matches the Console's mast-lang-toggle). */
  .mast-lang {
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px; letter-spacing: .04em;
    color: var(--ink-3);
    background: transparent;
    border: 1px solid var(--rule); border-radius: 4px;
    padding: 5px 10px; cursor: pointer;
    transition: color .15s ease, border-color .15s ease;
  }
  .mast-lang:hover, .mast-lang:focus-visible {
    color: var(--ink); border-color: var(--ink-3); outline: none;
  }

  /* ── Citation source viewer (issue #266) ─────────────────────────────────
     A record's citation is clickable: it opens the grounding source in-page.
     /read/file returns JSON, so the viewer fetches + strips + renders here
     (never navigates away). Desktop: an inline card in the reading column.
     Mobile (≤540px): a bottom sheet (see the @media block below).            */
  /* .cite-link is the marker class the citation contract keys on (#266). The
     clickable affordance now lives on the whole record row (button.rec, in the
     RECORDS block above) rather than an inline underlined id, so no extra
     inline-link styling is needed here. */
  .cite-viewer {
    margin: 14px 0 4px;
    border: 1px solid var(--rule);
    border-radius: 6px;
    background: var(--surface);
    overflow: hidden;
  }
  .cite-viewer-head {
    position: sticky; top: 0; z-index: 1;
    display: flex; align-items: center; gap: 8px;
    padding: 10px 14px; border-bottom: 1px solid var(--rule);
    background: var(--surface);
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px; letter-spacing: .04em; color: var(--ink-3);
  }
  .cite-viewer-head .file-name {
    color: var(--ink-2);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .cite-viewer-close {
    margin-left: auto; min-height: 32px;
    background: none; border: 1px solid var(--rule); border-radius: 3px;
    padding: 4px 10px;
    font-family: "IBM Plex Mono", monospace; font-size: 10.5px; color: var(--ink-3);
  }
  .cite-viewer-close:hover, .cite-viewer-close:focus-visible {
    color: var(--ink); border-color: var(--ink-3); outline: none;
  }
  .cite-content {
    margin: 0; padding: 14px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 12px; line-height: 1.6; color: var(--ink);
    white-space: pre-wrap; word-break: break-word;
    overflow: auto; max-height: min(58dvh, 560px);
    scrollbar-width: thin; scrollbar-color: var(--rule) transparent;
  }
  .cite-scrim { display: none; }

  /* ── Chat | source split (pin a cited source beside the chat) ─────────────
     A clicked citation opens the source in a right-hand drawer. The drawer is a
     FIXED overlay (out of flow), NOT a flex sibling — so the chat column keeps
     the exact width and centering it had when closed and never shifts sideways
     when a source opens. On a wide screen the drawer settles into the
     right-hand whitespace next to the centered chat (the "source beside chat"
     view); on a laptop it slides over the right margin. The chat stays put
     either way. Below 760px the source is a bottom sheet instead (media block). */
  .chat-shell { height: 100%; display: flex; }
  .chat-shell .page { flex: 1 1 auto; min-width: 0; }
  /* The drawer slides with a TRANSFORM transition, not a width tween: this
     engine drops a width/flex-basis tween to a clamp()/var() target, but a
     transform:translateX transition is reliable here (and is disabled by the
     global reduced-motion rule, which then snaps it open instantly). Keeping the
     drawer full-width and translating it off-screen when closed means the chat
     layout never reflows — only the drawer moves. */
  .source-rail {
    position: fixed; top: 0; right: 0; z-index: 30;
    height: 100%; width: 560px; max-width: 92vw;
    transform: translateX(100%);
    transition: transform .34s cubic-bezier(.22, .61, .36, 1);
    border-left: 1px solid var(--rule);
    background: var(--bg);
    pointer-events: none;
  }
  /* Shadow only in the open state — on a closed (off-screen) drawer its 44px
     blur would bleed a faint sliver back onto the viewport's right edge. It
     still slides in cleanly because transform moves the painted shadow too. */
  .chat-shell.source-open .source-rail {
    transform: translateX(0); pointer-events: auto;
    box-shadow: -18px 0 44px -26px rgba(17, 17, 17, .3);
  }
  @media (max-width: 1180px) { .source-rail { width: 460px; } }
  @media (max-width: 980px)  { .source-rail { width: 400px; } }
  .source-rail #cite-host { width: 100%; height: 100%; }
  .chat-shell.source-open .source-rail #cite-host {
    animation: source-reveal .34s .06s cubic-bezier(.4, 0, .2, 1) both;
  }
  @keyframes source-reveal {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  .source-rail .cite-viewer {
    margin: 0; border: 0; border-radius: 0;
    height: 100%; display: flex; flex-direction: column;
  }
  .source-rail .cite-content { max-height: none; flex: 1; }
  .source-rail .cite-scrim { display: none; }

  @media (max-width: 759px) {
    /* Narrow screens: the source is a bottom sheet, not a side rail. The chat
       is a locked app-shell (body overflow:hidden), so an inline card would
       bury the answer; a sheet keeps the answer visible behind the scrim. */
    .source-rail { display: none; }
    .cite-scrim {
      display: block; position: fixed; inset: 0; z-index: 40;
      background: rgba(17, 17, 17, .34);
      touch-action: none;                 /* the stream behind stays inert */
      animation: cite-fade .18s ease both;
    }
    .cite-viewer {
      position: fixed; z-index: 50; left: 0; right: 0; bottom: 0;
      /* FIXED height, not max-height: the source content loads async (loading… →
         fetched body), and cite-slide's translateY(100%) is height-relative. A
         content-driven height changes mid-slide, so the percentage translate is
         recomputed against a growing box — the sheet stutters partway, pauses on
         the fetch, then snaps to full. A fixed height means the whole sheet is
         sized before it moves: one smooth slide, and the body just fills the
         internal scroll area (.cite-content flex:1) when it arrives. 40dvh keeps
         the sheet compact (a full 88dvh felt oversized for short sources); long
         sources scroll inside. */
      margin: 0; height: 40dvh;
      display: flex; flex-direction: column;
      border-radius: 14px 14px 0 0; border-bottom: 0;
      box-shadow: 0 -8px 28px rgba(17, 17, 17, .18);
      padding-bottom: env(safe-area-inset-bottom);   /* iOS home indicator */
      animation: cite-slide .24s cubic-bezier(.22, .61, .36, 1) both;
    }
    .cite-viewer::before {              /* grab handle */
      content: ""; flex: none;
      width: 36px; height: 4px; border-radius: 2px;
      background: var(--ink-4); margin: 8px auto 2px;
    }
    .cite-content { max-height: none; flex: 1; font-size: 12.5px; }
    .cite-viewer-close { min-height: 40px; padding: 6px 14px; }
  }

  @media (max-width: 540px) {
    .page { padding: 0 20px; }
    .query { font-size: 17px; }
    .answer .body { font-size: 15px; }
    .empty-title { font-size: 26px; }
  }
  @keyframes cite-slide { from { transform: translateY(100%); } to { transform: translateY(0); } }
  @keyframes cite-fade  { from { opacity: 0; } to { opacity: 1; } }
</style>

function createSSEParser() {

function toggleLang() {
  uiLang = (uiLang === "zh") ? "en" : "zh";
  try { localStorage.setItem(LANG_STORAGE_KEY, uiLang); } catch (e) { /* private mode */ }
  applyReaderLang();
}

function applyReaderLang() {
  document.documentElement.setAttribute("lang", uiLang);
  if (langBtn) { langBtn.textContent = t("langToggle"); langBtn.setAttribute("aria-label", t("langToggleAria")); }
  if (sendBtn) sendBtn.textContent = t("ask");
  if (input) input.setAttribute("placeholder", t("placeholder"));
  if (hintEl) hintEl.replaceChildren(el("span", { text: t("hintPre") }), el("kbd", { text: "↵" }), el("span", { text: t("hintPost") }));
  var consoleBtn = document.querySelector(".mast-console");
  if (consoleBtn) consoleBtn.setAttribute("aria-label", t("consoleAria"));
  /* Content chrome: the empty state, or the current answer's verdict + note +
     follow-ups (the transcript's past turns keep the language they were asked in). */
  if (stream && stream.querySelector(".empty")) {
    renderEmptyState();
  } else if (lastDone && answerEl && answerEl.querySelector(".foot")) {
    /* Only a COMPLETED answer (one that already has a verdict foot) is relocalized;
       an answer still streaming gets the new language when its onDone fires. */
    renderAnswerFoot(lastDone);
  }
}

/* ── HELPERS ─────────────────────────────────────────────────────────────── */
function makeLabel(text, opts) {
  var lbl = el("div", { class: "label" }, el("span", { text: text }));
  if (opts && opts.tag) lbl.append(el("span", { class: "count", text: "· " + opts.tag }));
  if (opts && opts.count != null) lbl.append(el("span", { class: "count", text: "· " + opts.count }));
  return lbl;
}

function add(node) {
  stream.append(node);
  if (!matchMedia("(prefers-reduced-motion: reduce)").matches) {
    node.animate(
      [{ opacity: 0, transform: "translateY(4px)" }, { opacity: 1, transform: "none" }],
      { duration: 320, easing: "cubic-bezier(.22,.61,.36,1)", fill: "backwards" }
    );
  }
  /* No scroll in add() itself — each handler owns its scroll: onQuery anchors the
     new question to the top, while the answer-phase handlers glide to the bottom
     (scrollStreamToBottom) so the reader follows records → generating → answer. */
}

/* Smoothly scroll the .stream so `top` (a position within its scroll content)
   leads the viewport, via a JS easing tween. Native smooth scrolling inside this
   flex/overflow container proved unreliable, so we drive scrollTop ourselves
   (each assignment is instant — CSS scroll-behavior is not smooth). A new tween
   supersedes the previous one (token guard) so rapid turns stay snappy. */
var scrollTweenId = 0;
function smoothScrollStreamTo(top) {
  var max = stream.scrollHeight - stream.clientHeight;
  var target = Math.max(0, Math.min(top, max));
  var start = stream.scrollTop;
  var dist = target - start;
  if (Math.abs(dist) < 1) { stream.scrollTop = target; return; }
  if (matchMedia("(prefers-reduced-motion: reduce)").matches) { stream.scrollTop = target; return; }
  var myId = ++scrollTweenId;
  var dur = 380, t0 = null;
  function step(ts) {
    if (myId !== scrollTweenId) return;          /* superseded by a newer scroll */
    if (t0 === null) t0 = ts;
    var p = Math.min(1, (ts - t0) / dur);
    var e = 1 - Math.pow(1 - p, 3);              /* easeOutCubic */
    stream.scrollTop = start + dist * e;
    if (p < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

/* Scroll a turn's Query to the top of the viewport ("scroll to the newest
   question"). The .stream is the scroll container; the page itself never scrolls
   (body is overflow:hidden, exactly one viewport tall). */
function scrollTurnIntoView(entry) {
  var top = entry.getBoundingClientRect().top - stream.getBoundingClientRect().top + stream.scrollTop;
  smoothScrollStreamTo(top);
}

/* Glide the stream to its bottom so the freshest streamed content leads the
   viewport. Two beats only (NOT per token — that yanks the view): (1) as the
   answer phase begins — records arrive, the "generating" indicator shows, the
   answer's first tokens land — so the reader watches the response take shape
   (the whole point of streaming); (2) on done, so the answer's end + grounding
   verdict are brought fully into view. smoothScrollStreamTo clamps to the real
   max, so passing scrollHeight resolves to the bottom. */
function scrollStreamToBottom() {
  smoothScrollStreamTo(stream.scrollHeight);
}

/* Remove the empty-state placeholder once a conversation begins. */
function clearEmptyState() {
  var e = stream.querySelector(".empty");
  if (e) e.remove();
}

/* Remove blinking cursors left on a turn that was abandoned mid-stream (e.g. the
   user asked a new question or toggled stacks before the answer finished). */
function removeCursors() {
  var cs = stream.querySelectorAll(".cursor");
  for (var i = 0; i < cs.length; i++) cs[i].remove();
}

function setStack(s) {
  if (s === stack) return;
  stack = s;
  syncSeg();
  /* Switching stacks is a fresh request (§12.3), but the transcript is
     append-only: re-ask the current question on the new stack as a NEW turn
     below the existing ones (so the prior Query/answer stay visible — the whole
     point is comparing Wiki vs RAG), then scroll to it. With no conversation
     yet, just refresh the empty state so its copy reflects the active stack. */
  if (currentQuery) {
    onQuery(currentQuery);
    resetStreamState();
    startRequest(currentQuery);
  } else {
    renderEmptyState();
  }
}

/* ── EMPTY STATE ─────────────────────────────────────────────────────────────
   Shown before any question (and after a stack toggle with no conversation).
   Stack-aware greeting + clickable preset questions. All copy is static UI text
   built via the textContent-only el() helper (§12.4); clicking a chip just fills
   the composer and submits — no client business logic (§12.5). */
function ask(query) {
  input.value = query;
  submit();
}

function renderEmptyState() {
  resetStreamState();
  var meta = STACK_META[stack] || STACK_META.wiki;

  var eyebrow = el("div", { class: "empty-eyebrow",
    text: t("emptyEyebrow") + meta.label });
  var title = el("h1", { class: "empty-title", text: t("emptyTitle") });
  var sub = el("p", { class: "empty-sub", text: meta.sub[uiLang] || meta.sub.en });

  /* Render a per-language preset group: a small label + its clickable questions.
     Each click routes through the existing ask() helper (fill composer + submit)
     — no new client business logic (§12.5). Both groups are shown so a visitor
     in either language has a usable starter without client-side language
     detection (#289). */
  function renderPresetGroup(label, questions) {
    var group = el("div", { class: "empty-prompts" },
      el("div", { class: "empty-prompts-label", text: label }));
    questions.forEach(function(q) {
      group.append(el("button", { class: "empty-q", type: "button",
        onclick: function() { ask(q); } },
        el("span", { class: "empty-q-text", text: q }),
        el("span", { class: "arrow", text: "→" }),
      ));
    });
    return group;
  }

  /* One group in the active chrome language (the header toggle governs it) — a
     visitor asks in their language and the starter matches without a second set. */
  var prompts = renderPresetGroup(t("presetLabel"), PRESET_QUESTIONS[uiLang] || PRESET_QUESTIONS.en);

  /* Curation-loop framing (ADR-0039): the thesis that binds reader + console —
     grounded answers, honest gaps, and a fix path. Quiet, placed below the
     starters so it frames the demo without competing with them; follows uiLang. */
  var loopNote = el("div", { class: "loop-note" },
    el("div", { class: "loop-title", text: t("loopTitle") }),
    el("div", { class: "loop-body", text: t("loopBody") }),
    el("div", { class: "loop-axes", text: t("loopAxes") }),
  );

  var wrap = el("div", { class: "empty" },
    el("div", { class: "empty-inner" }, eyebrow, title, sub, prompts, loopNote));
  stream.replaceChildren(wrap);

  /* Staggered reveal on load (skipped under reduced-motion). */
  if (!matchMedia("(prefers-reduced-motion: reduce)").matches) {
    [eyebrow, title, sub, prompts, loopNote].forEach(function(node, i) {
      node.animate(
        [{ opacity: 0, transform: "translateY(6px)" }, { opacity: 1, transform: "none" }],
        { duration: 460, delay: 80 + i * 90, easing: "cubic-bezier(.22,.61,.36,1)", fill: "backwards" }
      );
    });
  }
}

function resetStreamState() {
  answerEl = null;
  answerBody = null;
  verifyEl = null;
}

/* Remove the current liveness indicator row (rewriting / verifying), if any.
   A fresh status, the sources event, the first token, and errors all supersede
   the previous indicator — so each clears it before rendering. Without this the
   "rewriting" row was orphaned when "verifying" reassigned verifyEl, leaving
   "Understanding your question…" pulsing forever (§12.9: the rewriting indicator
   clears when the next event arrives). */
function clearIndicator() {
  if (verifyEl) {
    var row = verifyEl.closest(".entry");
    if (row) row.remove();
    verifyEl = null;
  }
}

/* ── EVENT RENDER FUNCTIONS ──────────────────────────────────────────────── */
function onQuery(text) {
  /* Begin a new turn in the append-only transcript: tidy any turn abandoned
     mid-stream, drop the empty state on the first question, then append the
     Query and glide to it. The stack tag (· WIKI / · RAG) makes the Wiki-vs-RAG
     comparison legible when the same question is re-asked via the toggle. */
  clearEmptyState();
  clearIndicator();
  removeCursors();
  var entry = el("div", { class: "entry" },
    makeLabel(t("queryLabel"), { tag: stack }),
    el("div", { class: "query", text: text }),
  );
  add(entry);
  scrollTurnIntoView(entry);
}

/* ── CITATION SOURCE VIEWER (issue #266) ──────────────────────────────────────
   A record's citation is clickable: it opens the grounding source IN-PAGE. The
   resolvable path is server-supplied (source.path — §12.5, the client never
   builds docs/wiki paths from a bare slug). /read/file returns JSON
   {relpath, content}; we fetch it, strip the YAML frontmatter, and render the
   raw Markdown body via textContent (§12.4 — never innerHTML). Presentation is
   RWD: an inline card on desktop, a bottom sheet at ≤540px (the .cite-viewer
   @media block). One viewer is open at a time.                                 */
var citeReturnFocus = null;

function stripFrontmatter(text) {
  /* Drop an optional leading HTML comment + the first --- … --- YAML block and
     return the Markdown body. Mirrors the Operator Console's draft reader. */
  var lines = String(text).split("\n");
  var dashes = [];
  for (var i = 0; i < lines.length; i++) {
    if (lines[i].trim() === "---") { dashes.push(i); if (dashes.length === 2) break; }
  }
  if (dashes.length === 2) return lines.slice(dashes[1] + 1).join("\n").replace(/^\n+/, "");
  return text;
}

/* ── Wikilink linkify (issue #410, ADR-0030 decision 5) ──────────────────
   parseWikilinks is a PURE function (text -> segments), kept separable from
   DOM rendering (mirrors the SSE-parser convention, §12.7 — hermetically
   unit-tested via a Python mirror, no browser needed). "[[slug|display]]"
   shows the display text; resolution always uses the slug part. Rendering
   is READER-scoped: resolved (via the ONE shared GET /wiki/pages/
   resolution-map — ADR-0030 Invariant) -> a link that opens the page view
   (reusing openCitation, the SAME in-page viewer citations already use);
   unresolved -> PLAIN TEXT, zero red styling — a reader can fix nothing. */
function parseWikilinks(text) {
  var re = /\[\[([^\]|]+)(?:\|([^\]]+))?\]\]/g;
  var segments = [];
  var lastIndex = 0;
  var m;
  while ((m = re.exec(text)) !== null) {
    if (m.index > lastIndex) segments.push({ type: "text", value: text.slice(lastIndex, m.index) });
    var slug = m[1].trim();
    var display = m[2] !== undefined ? m[2].trim() : slug;
    segments.push({ type: "link", slug: slug, display: display });
    lastIndex = re.lastIndex;
  }
  if (lastIndex < text.length) segments.push({ type: "text", value: text.slice(lastIndex) });
  return segments;
}

/* Looks up `slug` in the shared resolution map; returns the target's
   server-supplied wiki-relative path, or null if unresolvable. The client
   never constructs a wiki path from a bare slug itself (§12.5). */
function resolveWikilinkPath(slug, resolutionMap) {
  var slugs = (resolutionMap && resolutionMap.slugs) || {};
  var aliases = (resolutionMap && resolutionMap.aliases) || {};
  if (Object.prototype.hasOwnProperty.call(slugs, slug)) return slugs[slug];
  if (Object.prototype.hasOwnProperty.call(aliases, slug)) {
    var canonical = aliases[slug];
    return Object.prototype.hasOwnProperty.call(slugs, canonical) ? slugs[canonical] : null;
  }
  return null;
}

/* Fetches the shared ADR-0030 resolution map fresh on every call (cheap,
   cache-friendly, no client cache to invalidate). Degrades to "nothing
   resolves" on failure so a transient fetch error falls back to plain text
   rather than throwing — the reader-surface-safe failure mode. */
function fetchResolutionMap() {
  return fetch("/wiki/pages/resolution-map")
    .then(function(r) { if (!r.ok) throw new Error("HTTP " + r.status); return r.json(); })
    .catch(function() { return { slugs: {}, aliases: {} }; });
}

/* Builds reader-surface DOM nodes (Text nodes + .wikilink <a> per resolved
   link) for one block of raw content. Unresolved segments render as a plain
   Text node — no wrapper element, no styling (ADR-0030 decision 5). */
function renderWikilinkNodes(content, resolutionMap) {
  return parseWikilinks(content).map(function(seg) {
    if (seg.type === "text") return document.createTextNode(seg.value);
    var relpath = resolveWikilinkPath(seg.slug, resolutionMap);
    if (!relpath) return document.createTextNode(seg.display);
    var a = el("a", { class: "wikilink", href: "#", text: seg.display });
    a.addEventListener("click", function(e) { e.preventDefault(); openCitation(relpath, seg.display, a); });
    return a;
  });
}

function citeOnKeydown(e) { if (e.key === "Escape") closeCitation(); }

function closeCitation() {
  var host = document.getElementById("cite-host");
  if (host) host.remove();
  var rail = document.getElementById("source-rail");
  if (rail) rail.replaceChildren();
  var shell = document.querySelector(".chat-shell");
  if (shell) shell.classList.remove("source-open");
  document.removeEventListener("keydown", citeOnKeydown);
  if (citeReturnFocus && citeReturnFocus.focus) { try { citeReturnFocus.focus(); } catch (_) {} }
  citeReturnFocus = null;
}

/* Issue #527: openCitation picks its mount (right drawer vs. bottom sheet) once,
   from isNarrow at open time — so crossing the 760px breakpoint WHILE a source
   is open (a desktop window resize, or a phone rotating portrait↔landscape) left
   the source in the wrong mode and hidden. The host node (#cite-host = scrim +
   viewer) is structurally identical in both modes; only its mount point and the
   media-query CSS differ. So a breakpoint change just MOVES the existing node to
   the correct parent (no refetch — the loaded body is preserved) and toggles
   source-open. Re-inserting the node cleanly re-runs the slide/reveal animation.
   matchMedia's change fires once per crossing, so no debounce is needed. */
var citeBreakpoint = matchMedia("(max-width: 759px)");
function reflowCitation() {
  var host = document.getElementById("cite-host");
  if (!host) return;                                  /* nothing open */
  var shell = document.querySelector(".chat-shell");
  var viewer = host.querySelector(".cite-viewer");
  var isNarrow = citeBreakpoint.matches;
  if (isNarrow) {
    document.body.appendChild(host);                  /* → bottom sheet */
    if (shell) shell.classList.remove("source-open");
  } else {
    var rail = document.getElementById("source-rail");
    if (rail) rail.replaceChildren(host);             /* → right drawer */
    if (shell) shell.classList.add("source-open");
  }
  /* Reconcile ARIA modality with the new mount, matching openCitation's
     open-time choice: a modal dialog as the bottom sheet, a non-modal region
     as the side drawer. Otherwise a breakpoint cross leaves the role stale. */
  if (viewer) {
    viewer.setAttribute("role", isNarrow ? "dialog" : "region");
    if (isNarrow) viewer.setAttribute("aria-modal", "true");
    else viewer.removeAttribute("aria-modal");
  }
}

function openCitation(path, label, triggerEl) {
  closeCitation();  /* only one viewer at a time; reopening replaces it */
  citeReturnFocus = triggerEl || null;

  /* Narrow (<760px): bottom sheet (modal dialog). Wide: pinned side rail
     (a non-modal region beside the chat). Shared matchMedia so a later
     breakpoint cross reflows the same way (issue #527). */
  var isNarrow = citeBreakpoint.matches;
  var scrim = el("div", { class: "cite-scrim", onclick: closeCitation });
  var closeBtn = el("button", {
    class: "cite-viewer-close", type: "button", text: "close", onclick: closeCitation,
  });
  var pre = el("pre", { class: "cite-content", text: "loading…" });
  var viewer = el("div", {
    class: "cite-viewer",
    role: isNarrow ? "dialog" : "region",
    "aria-modal": isNarrow ? "true" : null,
    "aria-label": "Cited source: " + (label || path),
  },
    el("div", { class: "cite-viewer-head" },
      el("span", { text: "source" }),
      el("span", { text: "·" }),
      el("span", { class: "file-name", text: label || path }),
      closeBtn,
    ),
    pre,
  );
  var host = el("div", { id: "cite-host" }, scrim, viewer);
  if (isNarrow) {
    /* Bottom sheet: mount on <body>, NOT into .stream via add(). add() runs a
       320ms translateY entrance on the host, and a transformed ancestor makes
       the sheet's position:fixed resolve against the host (partway down the
       stream) instead of the viewport — so the sheet flashed mid-screen, then
       snapped to the bottom when that transform cleared. On <body> there is no
       transformed ancestor, so the sheet's own cite-slide keyframe carries it
       straight up from the bottom edge. */
    document.body.appendChild(host);
  } else {
    var rail = document.getElementById("source-rail");
    if (rail) rail.replaceChildren(host);   /* pin into the right rail */
    var shell = document.querySelector(".chat-shell");
    if (shell) shell.classList.add("source-open");
  }
  document.addEventListener("keydown", citeOnKeydown);
  try { closeBtn.focus(); } catch (_) {}

  /* /read/file → JSON {relpath, content}. On error the viewer shows the message
     in place (it never silently closes). A stale fetch (viewer already replaced)
     writes to a detached <pre>, which is harmless. The resolution map is fetched
     alongside so wikilinks in the body linkify (issue #410, ADR-0030 decision 5). */
  Promise.all([
    fetch("/read/file?" + new URLSearchParams({ path: path }))
      .then(function(r) {
        if (!r.ok) return r.json().then(function(j) { throw new Error(j.detail || ("HTTP " + r.status)); });
        return r.json();
      }),
    fetchResolutionMap(),
  ])
    .then(function(results) {
      var body = stripFrontmatter(results[0].content || "");
      pre.replaceChildren.apply(pre, renderWikilinkNodes(body, results[1]));
    })
    .catch(function(err) { pre.textContent = "Failed to load source: " + (err.message || String(err)); });
}

function onSources(sources) {
  /* §12.3 sources-first: this function is called before any answer area is
     created. The answer entry is only created in onToken, which runs after.
     §12.9: clear the turn-2+ "rewriting" indicator now that sources have arrived. */
  clearIndicator();
  var entry = el("div", { class: "entry" });
  entry.append(makeLabel(t("recordsLabel"), { count: sources.length }));

  if (!sources.length) {
    entry.append(el("div", { class: "recs-empty", text: t("recsEmpty") }));
    add(entry);
    scrollStreamToBottom();
    return;
  }

  var det = el("details", { class: "records", open: "" });
  var toggle = el("summary", { class: "recs-toggle" },
    el("span", { text: t("showRecords") + sources.length + " " + (sources.length === 1 ? t("recordWord") : t("recordsWord")) }),
    el("span", { class: "chev", text: "▾" }),
  );
  det.append(toggle);

  var recsBody = el("div", { class: "recs-body" });
  sources.forEach(function(s, i) {
    /* Condensed record (#266 follow-up): a single compact reference row —
       num · citation-id · meta(heading · provenance). The retrieved section body
       is deliberately NOT rendered here; the full source opens on demand in the
       in-page citation viewer (openCitation), which is the single content surface
       — so the same text is never shown twice (before the answer AND on click).
       §12.4: every server-derived string via textContent. */
    var num = el("span", { class: "num", text: String(i + 1).padStart(2, "0") });
    /* Collapse a self-referential citation id: a concept Wiki Page is 1:1 with one
       Section, so its id reads {slug}#{heading} where the heading-slug repeats the
       slug (e.g. "信用卡#信用卡"). Show the slug once. Presentation-only — same
       category as padStart/toFixed, no server semantics (§12.4/§12.5). */
    var displayId = s.source;
    var hashAt = displayId.lastIndexOf("#");
    if (hashAt > 0) {
      var slugPart = displayId.slice(0, hashAt);
      var headPart = displayId.slice(hashAt + 1);
      if (headPart === slugPart || headPart === slugPart.replace(/\.md$/, "")) {
        displayId = slugPart;
      }
    }
    var idNode = el("span", { class: "id", text: displayId });

    var meta = el("span", { class: "meta" });
    /* Drop the heading crumb when it merely repeats the (collapsed) id — the same
       1:1 concept-page redundancy surfacing on the meta line. */
    var headingShown = false;
    if (s.heading && s.heading !== displayId && s.heading !== displayId.replace(/\.md$/, "")) {
      meta.append(document.createTextNode(s.heading));
      headingShown = true;
    }
    if (s.derived_from && s.derived_from.length) {
      /* derived_from is an array of {source, heading} objects — join source ids */
      var fromText = s.derived_from.map(function(x) { return x.source; }).join(", ");
      meta.append(el("span", { class: "from", text: (headingShown ? "  ·  " : "") + "from " + fromText }));
    }
    /* §12.3: BM25 score hidden by default (dev-only) and Wiki-only; RAG: never. */
    if (DEV && stack === "wiki" && typeof s.score === "number") {
      meta.append(el("span", { class: "score-inline", text: (meta.childNodes.length ? "  ·  " : "") + s.score.toFixed(2) }));
    }
    var body = el("span", { class: "body" }, idNode, meta);

    /* C10 teaching tag: a schema-invalid Filed Answer (e.g. a deliberately planted
       count:0 fixture) surfacing as a source — the same coordinate the console lint
       uses. Lives INSIDE the body column so it never disturbs the 3-column .rec grid;
       the explanation is a hover title so the row stays compact. */
    if (s.lint) {
      body.append(el("span", {
        class: "rec-lint",
        text: s.lint,
        title: uiLang === "zh"
          ? "刻意植入的 schema 違規紀錄(" + s.lint + ")。console 的 lint 會抓到它,一鍵 demote 即可移出語料。"
          : "A planted, schema-invalid record (" + s.lint + "). The console's lint catches it and a one-click demote removes it from the corpus.",
      }));
    }

    /* Issue #266 + this follow-up: when the server supplies a resolvable path the
       WHOLE ROW is the click target (a native <button> for focus + Enter/Space)
       that opens the grounding source in-page (§12.5 — the path is a server
       decision, not built on the client). Without a path (RAG sources) it stays a
       static row. .cite-link is kept as the affordance marker the contract keys on. */
    var rec;
    if (s.path) {
      rec = el("button", {
        class: "rec cite-link", type: "button",
        "aria-label": "Open cited source: " + s.source,
      }, num, body, el("span", { class: "open", "aria-hidden": "true", text: "↗" }));
      rec.addEventListener("click", function() { openCitation(s.path, s.source, rec); });
    } else {
      rec = el("div", { class: "rec" }, num, body, el("span", {}));
    }
    recsBody.append(rec);
  });
  det.append(recsBody);
  animateDetails(det);

  entry.append(det);
  add(entry);
  /* Beat 1: records have arrived — glide down so the reader sees them (and the
     "generating" indicator that follows) instead of leaving them below the fold. */
  scrollStreamToBottom();
}

function animateDetails(det) {
  var summary = det.querySelector("summary");
  var body = det.querySelector(".recs-body");
  if (!summary || !body) return;
  var running = null, fallback = null;

  function cleanup() {
    if (running) { try { running.cancel(); } catch (_) {} running = null; }
    if (fallback) { clearTimeout(fallback); fallback = null; }
    body.style.height = "";
    body.style.opacity = "";
  }

  summary.addEventListener("click", function(e) {
    if (matchMedia("(prefers-reduced-motion: reduce)").matches) return;
    e.preventDefault();
    cleanup();

    var dur = 260;
    var ease = "cubic-bezier(.22,.61,.36,1)";

    if (det.open) {
      var h = body.offsetHeight;
      var finish = function() { det.open = false; cleanup(); };
      running = body.animate(
        [{ height: h + "px", opacity: 1 }, { height: "0px", opacity: 0 }],
        { duration: dur, easing: ease, fill: "forwards" }
      );
      running.onfinish = finish;
      fallback = setTimeout(finish, dur + 60);
    } else {
      det.open = true;
      var h2 = body.scrollHeight;
      var finish2 = function() { cleanup(); };
      running = body.animate(
        [{ height: "0px", opacity: 0 }, { height: h2 + "px", opacity: 1 }],
        { duration: dur, easing: ease, fill: "forwards" }
      );
      running.onfinish = finish2;
      fallback = setTimeout(finish2, dur + 60);
    }
  });
}

function onStatus(d) {
  /* Phase 11 Slice 4: status event is phase-aware.
     phase="rewriting"  → "understanding your question…" (turn 2+ pre-retrieval)
     phase="verifying"  → "Checking each claim against the cited record…" (post-sources)
     Unknown phases → use "verifying" text as a safe fallback. */
  var isRewriting = d && d.phase === "rewriting";
  var labelText = isRewriting ? t("rewritingLabel") : t("verifyingLabel");
  var statusText = isRewriting ? t("understanding") : t("checking");

  /* Supersede any prior indicator so two never stack (e.g. rewriting → verifying). */
  clearIndicator();
  var entry = el("div", { class: "entry" });
  entry.append(makeLabel(labelText));
  verifyEl = el("div", { class: "verify" },
    el("span", { class: "dots" }, el("i"), el("i"), el("i")),
    el("span", { text: statusText }),
  );
  entry.append(verifyEl);
  add(entry);
  /* Beat 1 (cont.): keep the live "understanding…/checking…" indicator in view so
     the reader can see the answer is being generated. */
  scrollStreamToBottom();
}

function onToken(tok) {
  /* §12.3: answer area only created after sources have arrived (onSources runs
     first in the SSE event order; answerEl is null until this first onToken). */
  if (!answerEl) {
    clearIndicator();
    var entry = el("div", { class: "entry" });
    entry.append(makeLabel(t("answerLabel")));
    answerBody = el("div", { class: "body" });
    answerEl = el("div", { class: "answer" }, answerBody, el("span", { class: "cursor" }));
    entry.append(answerEl);
    add(entry);
    answerRawText = "";
    /* Beat 1 (cont.): the answer area just appeared — glide to it once so the
       reader sees generation start. Deliberately NOT repeated per token below
       (that yanks the viewport); the next glide is onDone. */
    scrollStreamToBottom();
  }
  /* §12.4: token text appended as TextNode (never innerHTML). No per-token
     scroll — the answer fills in place; the viewport settles to it on done.
     answerRawText accumulates the plain text so onDone can linkify the
     complete answer in one pass (issue #410) — a [[wikilink]] can split
     across token boundaries, so linkify never runs mid-stream. */
  answerBody.append(document.createTextNode(tok.text));
  answerRawText += tok.text;
}

/* Re-renders one completed answer's full text as linkified nodes (issue #410).
   Runs once, at onDone — never mid-stream, so a [[wikilink]] split across
   token boundaries is never a concern. `targetBody` and `rawText` are
   captured by the CALLER at onDone time, not read from the shared
   answerBody/answerRawText variables inside this function, so a stale fetch
   can never overwrite a LATER turn's answer if the user asks a fast
   follow-up before this resolves. */
function linkifyAnswerBody(targetBody, rawText) {
  if (!targetBody) return;
  fetchResolutionMap().then(function(resolutionMap) {
    targetBody.replaceChildren.apply(targetBody, renderWikilinkNodes(rawText, resolutionMap));
  });
}

/* One-shot fade-in used by the note + follow-ups (skipped under reduced-motion). */
function reveal(node, delay) {
  if (matchMedia("(prefers-reduced-motion: reduce)").matches) return;
  node.animate(
    [{ opacity: 0, transform: "translateY(4px)" }, { opacity: 1, transform: "none" }],
    { duration: 420, delay: delay || 0, easing: "cubic-bezier(.22,.61,.36,1)", fill: "backwards" }
  );
}

/* Choose the follow-up set for a query: the first topic whose pattern matches,
   else the remaining presets (the starter test pins those as answerable, so a
   fallback click is still a grounded win). Topic match is language-agnostic; the
   returned questions are in the active chrome language. */
function followupsFor(query) {
  for (var i = 0; i < FOLLOWUPS.length; i++) {
    if (FOLLOWUPS[i].match.test(query || "")) return FOLLOWUPS[i][uiLang] || FOLLOWUPS[i].en;
  }
  var presets = PRESET_QUESTIONS[uiLang] || PRESET_QUESTIONS.en;
  return presets.filter(function(q) { return q !== query; }).slice(0, 3);
}

/* Render (or re-render) the verdict foot + curator note + follow-ups for the
   current answer. Idempotent: drops any prior copies first, so a language toggle
   can rebuild them in the new language without re-running the request. All copy
   follows uiLang; the answer BODY (streamed) stays in the asked language. */
function renderAnswerFoot(d) {
  if (!answerEl) return;
  var old = answerEl.querySelectorAll(".foot, .cnote, .followups");
  for (var i = 0; i < old.length; i++) old[i].remove();

  var pass = d.grounding.passed;
  answerEl.classList.toggle("cannot", !pass);

  var foot = el("div", { class: "foot" });
  foot.append(el("span", { class: "chip " + (pass ? "pass" : "fail") },
    el("span", { class: "dot" }),
    el("span", { class: "label-txt", text: pass ? t("grounded") : t("cannot") }),
  ));
  /* §12.4: reason text via textContent */
  var reason = REASON_TEXT[d.grounding.reason];
  foot.append(el("span", { class: "reason", text: reason ? (reason[uiLang] || reason.en) : d.grounding.reason }));
  /* filed is Wiki-only (done.filed=null for RAG and CC paths) — §12.5 */
  if (d.filed) {
    foot.append(el("span", { class: "filed" }, t("filed"), el("b", { text: d.filed.slug })));
  }
  answerEl.append(foot);

  /* Guided-teaching curator note (demo-scoped, ADR-0039): pair the outcome with
     the next curatorial step, keyed on the same grounding.reason as the chip. A
     clean grounded answer with nothing to fix gets no note — don't nag the good
     path. Follows uiLang now that the reader carries its own zh/en toggle. */
  var noteKey = pass ? (d.filed ? "grounded_filed" : null) : d.grounding.reason;
  var note = noteKey ? TEACHING[noteKey] : null;
  if (note) {
    var cnote = el("div", { class: "cnote" });
    if (note.code) cnote.append(el("span", { class: "ccode", text: note.code }));
    cnote.append(el("span", { class: "ctext", text: note[uiLang] }));
    cnote.append(el("a", { class: "go", href: "/console", text: t("openConsole") }));
    answerEl.append(cnote);
    reveal(cnote, 200);
  }

  /* Follow-up chips: after any answer, offer the next question so the reader is a
     guided tour, not a dead end (the user's "no follow-up guidance" gap). */
  var chips = followupsFor(lastQuery);
  if (chips.length) {
    var fu = el("div", { class: "followups" }, el("span", { class: "fu-label", text: t("askNext") }));
    chips.forEach(function(q) {
      fu.append(el("button", { class: "fu-chip", type: "button", onclick: function() { ask(q); } },
        el("span", { text: q }), el("span", { class: "fu-arrow", text: "→" })));
    });
    answerEl.append(fu);
    reveal(fu, 280);
  }
}

function onDone(d) {
  /* d shape (PRD #116 + Phase 11): { grounding: { passed, reason }, filed, stack, session } */
  /* Phase 11 Slice 4: capture session id for subsequent requests (§12.5 — no client logic).
     textContent-only rendering; the session id is used only as a query param, never rendered. */
  if (d.session) sessionId = d.session;

  var cur = answerEl ? answerEl.querySelector(".cursor") : null;
  if (cur) cur.remove();
  if (!answerEl) return;

  /* Stash the payload + its query so a later language toggle can relocalize this
     answer's verdict/note/follow-ups in place. */
  lastDone = d;
  lastQuery = currentQuery;
  renderAnswerFoot(d);

  linkifyAnswerBody(answerBody, answerRawText);
  /* Beat 2: the answer is complete — glide to the bottom so its end and the
     grounding verdict (Grounded / Cannot confirm) are fully in view. */
  scrollStreamToBottom();
}

function onError(e) {
  clearIndicator();
  removeCursors();
  var entry = el("div", { class: "entry" });
  entry.append(makeLabel(t("errorLabel")));
  /* §12.4: error detail via textContent */
  var msg = e.detail || e.message || t("errDefault");
  entry.append(el("div", { class: "err" },
    el("div", { class: "h", text: t("errTitle") }),
    el("div", { class: "m", text: msg }),
    /* Retry the same turn: drop this error block, keep the Query above it, and
       re-run the request (sources/answer append where the error was). */
    el("button", { type: "button", text: t("tryAgain"), onclick: function() {
      entry.remove();
      resetStreamState();
      startRequest(currentQuery);
    }}),
  ));
  add(entry);
  scrollStreamToBottom();
}

/* ── DISPATCH ────────────────────────────────────────────────────────────── */
function dispatch(ev, data) {
  /* §12.2: unknown event types are ignored (forward-compat) */
  if (ev === "sources") onSources(data.sources);
  else if (ev === "status") onStatus(data);  /* Phase 11 Slice 4: pass data for phase-awareness */
  else if (ev === "token") onToken(data);
  else if (ev === "done") onDone(data);
  else if (ev === "error") onError(data);
  /* else: ignore unknown types */
}

/* ── REAL SSE REQUEST (fetch + ReadableStream, §12.2) ────────────────────── */
function startRequest(query) {
  /* Claim the latest sequence and abort any in-flight request. Aborting stops
     the previous server stream and, together with the mySeq guard below, ensures
     a superseded stream can never render into the shared state (no interleaved
     tokens, no duplicate grounding badge). */
  var mySeq = ++reqSeq;
  if (currentController) { try { currentController.abort(); } catch (_) {} }
  var controller = new AbortController();
  currentController = controller;

  var parser = createSSEParser();
  /* Phase 11 Slice 4: echo session id on turn 2+ so the gateway continues the
     conversation.  Stack toggle is a fresh request but keeps the same sessionId
     (history preserved across Wiki↔RAG — PRD #158 decision E). */
  var url = "/chat/stream?stack=" + encodeURIComponent(stack);
  if (sessionId) url += "&session=" + encodeURIComponent(sessionId);

  fetch(url, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ query: query }),
    signal: controller.signal,
  }).then(function(resp) {
    if (mySeq !== reqSeq) return;   /* superseded before headers arrived */
    if (!resp.ok) {
      /* Pre-stream HTTP error (e.g. 400 unknown stack) — cannot arrive as SSE */
      onError({ detail: "HTTP " + resp.status + ": " + resp.statusText });
      return;
    }

    var reader = resp.body.getReader();
    var decoder = new TextDecoder();

    function pump() {
      reader.read().then(function(result) {
        if (mySeq !== reqSeq) return;   /* a newer request took over — stop rendering */
        if (result.done) return;
        var chunk = decoder.decode(result.value, { stream: true });
        var events = parser(chunk);
        for (var i = 0; i < events.length; i++) {
          dispatch(events[i].event, events[i].data);
        }
        pump();
      }).catch(function(err) {
        if (err && err.name === "AbortError") return;   /* intentional supersede */
        if (mySeq !== reqSeq) return;
        onError({ detail: "Stream read error: " + (err.message || String(err)) });
      });
    }
    pump();
  }).catch(function(err) {
    if (err && err.name === "AbortError") return;   /* intentional supersede */
    if (mySeq !== reqSeq) return;
    onError({ detail: "Network error: " + (err.message || String(err)) });
  });
}

/* ── SUBMIT ──────────────────────────────────────────────────────────────── */
function submit() {
  var query = input.value.trim();
  if (!query) return;
  input.value = "";   /* clear the composer once the question is sent */
  currentQuery = query;
  /* Append-only: onQuery tidies any abandoned turn + drops the empty state, then
     adds the new Query and scrolls to it. resetStreamState runs AFTER so the new
     turn's streaming pointers start fresh (onQuery still sees the prior turn's
     verifyEl/cursor to clean them up). */
  onQuery(query);
  resetStreamState();
  startRequest(query);
}

/* ── INIT ────────────────────────────────────────────────────────────────── */
document.documentElement.setAttribute("lang", uiLang);
build();
syncSeg();
renderEmptyState();
/* Keep an open source in the right mode when the viewport crosses 760px (#527). */
citeBreakpoint.addEventListener("change", reflowCitation);
</script>
</body>
</html>
