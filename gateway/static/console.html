<!--
  KB Gateway Operator Console — Phase 15 (S1–S6).
  Single vanilla HTML/CSS/JS file. NO framework, NO build step (CODING_STANDARD §12.1).
  XSS: all server-derived content inserted via textContent, never innerHTML (§12.4).
  No business logic: validation and routing decisions are server-derived (§12.5).

  Phase 15 S1 (#169): Drag-drop Upload drop zone: POST /upload (multipart) → renders result card.
  Phase 15 S2 (#170): Guided pipeline stepper: Upload → Import → Ingest → Index → Lint.
    - Each step has its own Run button (single-step re-run).
    - Controls are disabled while the step's request is in flight.
    - Import step calls POST /wiki/import → renders ImportResponse per-file result card.
    - Generic step renderer + per-step card renderer pattern for Ingest/Index/Lint reuse.
  Phase 15 S3 (#172): Ingest step wired with batch chunker + per-page grounding cards.
    - Single POST /wiki/ingest call per batch of ≤5 named sources (§12.8 single-batch rule).
    - >5 sources → sequential single-batch calls with "Batch k/N" indicator (client-owned).
    - Indeterminate spinner within each batch (NO fake percentage — §12.8).
    - Per-page grounding pass/fail badge + hash-skip (unchanged) status from IngestResponse.
      (Red-link counts are NOT an ingest concern: they are a cross-page Lint C2 finding —
      IngestResponse carries no red-link field — surfaced on the Lint card. AC #14 amended
      accordingly; see #172/#168.)
    - Sources tracked from Import step results; falls back to all-docs if not available.
  Phase 15 S4 (#173): Index + Lint full result cards, RAG rebuild action, staleness guard.
    - Index step calls POST /wiki/index → renders IndexResponse: files/sections counts +
      wiki_index_written confirmation. Indeterminate spinner only (§12.8 — no fake %).
    - Lint step calls POST /wiki/lint → renders LintResponse findings grouped by check
      (orphan / stale / contradiction / coverage gap / promotion candidates / stale-qa /
      invalid-qa / failed-grounding / slug-collision / red-links). Indeterminate only.
    - RAG rebuild action: POST /rag/index → parallel track (independent of Wiki chain).
    - Staleness guard: module-level indexStale flag set by Ingest run, cleared by Index run.
      Integration point: slice #172 Ingest run() calls markIngestDone() on resolve;
      markIndexDone() is called in the Index run.finally block.
  Phase 15 S6 (#174): Curation Queue — Promote + Discard (DELETE /qa inert-only).
    - Rendered after Lint runs (driven by the stored LintResponse).
    - C8 promotion candidates: each card shows question, answer (fetched via GET /read/file),
      and cited Sources. Promote button → POST /wiki/qa/{slug}/promote (draft→live).
      Discard button → DELETE /wiki/qa/{slug} (inert only; live refused by server → 409).
    - C9 stale filed answers: read-only flag with "re-ingest the source" hint. No
      destructive action (live pages are never deleted — ADR-0012).
    - C10 invalid qa schema: read-only flag with "fix frontmatter or discard" hint.
      Discard button offered (inert; server decides eligibility — §12.5).
    - All server-derived text via textContent (§12.4).
    - Re-runs lint on "Refresh" to pick up queue changes.
  Shared design tokens: linked from shared.css (Phase 15 S1).
-->

<!-- Shared design tokens (Phase 15 S1 / issue #169) -->
<link rel="stylesheet" href="/static/shared.css">

<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  button { font: inherit; cursor: pointer; }
  a { color: inherit; }
  ::selection { background: var(--selection); color: var(--ink); }

  @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation: none !important; transition: none !important; } }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: "IBM Plex Sans", system-ui, sans-serif;
    font-size: 15px;
    line-height: 1.5;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .page {
    max-width: 680px;
    margin: 0 auto;
    padding: 0 32px 64px;
  }

  /* ── Masthead (shared with reader, §12.1) ────────────────── */
  .masthead {
    flex: none;
    padding: 22px 0 16px;
    display: flex; align-items: center; gap: 16px;
    border-bottom: 1px solid var(--rule);
  }
  .mast-logo {
    font-family: "IBM Plex Sans", sans-serif;
    font-weight: 500; font-size: 15px;
    letter-spacing: -.005em; color: var(--ink);
    text-decoration: none;
  }
  .mast-logo .dot { color: var(--ink-4); margin: 0 1px; }
  .mast-logo .amp { color: var(--ink-4); margin: 0 1px; font-weight: 400; }

  /* Breadcrumb separator */
  .mast-sep {
    color: var(--ink-4);
    font-family: "IBM Plex Mono", monospace;
    font-size: 12px;
  }
  .mast-page {
    font-family: "IBM Plex Mono", monospace;
    font-size: 12px;
    letter-spacing: .04em;
    color: var(--ink-2);
    text-transform: uppercase;
  }

  /* Reader link — navigates back */
  .mast-reader {
    margin-left: auto;
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    letter-spacing: .04em;
    color: var(--ink-3);
    text-decoration: none;
    border: 1px solid var(--rule);
    border-radius: 4px;
    padding: 5px 10px;
    transition: color .15s ease, border-color .15s ease;
  }
  .mast-reader:hover {
    color: var(--ink);
    border-color: var(--ink-3);
  }

  /* ── Pipeline stepper ────────────────────────────────────── */
  .pipeline {
    margin-top: 32px;
  }

  .pipeline-header {
    font-family: "IBM Plex Mono", monospace;
    font-size: 10.5px; letter-spacing: .08em; text-transform: uppercase;
    color: var(--ink-3);
    margin-bottom: 20px;
    display: flex; align-items: center; gap: 8px;
  }

  /* Step track */
  .step-track {
    display: flex;
    align-items: center;
    gap: 0;
    margin-bottom: 24px;
    overflow-x: auto;
    padding-bottom: 2px;
  }

  .step-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    letter-spacing: .04em;
    color: var(--ink-4);
    white-space: nowrap;
    padding: 5px 0;
    transition: color .15s ease;
  }
  .step-pill.active { color: var(--ink); }
  .step-pill.done   { color: var(--pass); }

  .step-num {
    width: 20px; height: 20px;
    border-radius: 50%;
    border: 1.5px solid currentColor;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px;
    flex-shrink: 0;
  }
  .step-pill.done .step-num {
    background: var(--pass);
    border-color: var(--pass);
    color: #fff;
  }
  .step-pill.active .step-num {
    background: var(--ink);
    border-color: var(--ink);
    color: var(--surface);
  }

  .step-arrow {
    color: var(--ink-4);
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    padding: 0 8px;
    flex-shrink: 0;
    user-select: none;
  }

  /* Individual step panel */
  .step-panel {
    border: 1px solid var(--rule);
    border-radius: 6px;
    background: var(--surface);
    overflow: hidden;
    margin-bottom: 16px;
  }

  .step-panel-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    border-bottom: 1px solid var(--rule);
    gap: 12px;
  }

  .step-panel-title {
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    letter-spacing: .06em;
    text-transform: uppercase;
    color: var(--ink-2);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .step-panel-desc {
    font-size: 12px;
    color: var(--ink-3);
    flex: 1;
    min-width: 0;
  }

  /* Run button */
  .run-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--ink);
    color: var(--surface);
    border: 0;
    padding: 6px 14px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    letter-spacing: .04em;
    border-radius: 4px;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
    transition: background .15s ease, opacity .15s ease;
  }
  .run-btn:hover:not(:disabled) { background: #000; }
  .run-btn:disabled {
    opacity: .45;
    cursor: not-allowed;
  }

  /* Step result area */
  .step-result {
    /* populated by JS — empty by default */
  }

  /* ── Upload drop zone ────────────────────────────────────── */
  .drop-zone {
    border: 1.5px dashed var(--rule);
    border-radius: 0 0 5px 5px; /* fits inside panel */
    padding: 28px 20px;
    text-align: center;
    cursor: pointer;
    transition: border-color .2s ease, background .2s ease;
    background: var(--bg);
  }
  .drop-zone.drag-over {
    border-color: var(--ink-3);
    background: var(--rule-2);
  }
  .drop-zone.busy {
    opacity: .65;
    cursor: not-allowed;
    pointer-events: none;
  }
  .drop-hint {
    font-size: 14px;
    color: var(--ink-3);
    line-height: 1.6;
  }
  .drop-hint strong {
    color: var(--ink-2);
    font-weight: 500;
  }
  .drop-ext {
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    color: var(--ink-4);
    margin-top: 8px;
    letter-spacing: .03em;
  }
  .drop-btn {
    display: inline-block;
    margin-top: 14px;
    background: var(--ink);
    color: var(--surface);
    border: 0;
    padding: 7px 14px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    letter-spacing: .04em;
    border-radius: 4px;
    cursor: pointer;
    transition: background .15s ease;
  }
  .drop-btn:hover { background: #000; }
  .drop-btn:disabled {
    opacity: .45;
    cursor: not-allowed;
  }

  /* ── Result card ─────────────────────────────────────────── */
  .result-card {
    border-top: 1px solid var(--rule);
    background: var(--surface);
    overflow: hidden;
  }
  .result-card-head {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 16px;
    border-bottom: 1px solid var(--rule);
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    letter-spacing: .06em;
    text-transform: uppercase;
    color: var(--ink-3);
  }
  .result-card-head .badge {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 10.5px;
    letter-spacing: .04em;
  }
  .result-card-head .badge .dot {
    width: 6px; height: 6px; border-radius: 50%;
  }
  .badge-ok .dot    { background: var(--pass); }
  .badge-ok         { color: var(--pass); }
  .badge-warn .dot  { background: #c47f17; }
  .badge-warn       { color: #c47f17; }
  .badge-fail .dot  { background: var(--fail); }
  .badge-fail       { color: var(--fail); }

  /* File rows inside result card — reuse .rec layout from the reader */
  .rec {
    display: grid;
    grid-template-columns: 24px 1fr auto;
    column-gap: 12px;
    padding: 10px 16px;
    border-top: 1px solid var(--rule-2);
  }
  .rec:first-child { border-top: none; }
  .rec .num {
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px; color: var(--ink-3);
    font-variant-numeric: tabular-nums;
    padding-top: 2px;
  }
  .rec .body { min-width: 0; }
  .rec .id {
    font-family: "IBM Plex Mono", monospace;
    font-size: 12px; color: var(--ink); font-weight: 500;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .rec .crumb {
    font-size: 12px; color: var(--ink-3); margin-top: 2px;
  }
  .rec .label {
    font-family: "IBM Plex Mono", monospace;
    font-size: 10.5px;
    padding-top: 2px;
    text-align: right;
    min-width: 60px;
  }
  .label-created  { color: var(--pass); }
  .label-updated  { color: #c47f17; }
  .label-skipped  { color: var(--ink-3); }
  .label-failed   { color: var(--fail); }
  /* Upload result labels */
  .label-written  { color: var(--pass); }
  .label-rejected { color: var(--fail); }
  .label-error    { color: var(--fail); }
  /* Ingest grounding labels */
  .label-grounded   { color: var(--pass); }
  .label-failed-grounding { color: var(--fail); }
  .label-skipped-hash { color: var(--ink-3); }

  /* ── Spinner (busy state) ────────────────────────────────── */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid var(--rule);
    border-top-color: var(--ink-3);
    border-radius: 50%;
    animation: spin .7s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
    flex-shrink: 0;
  }
  .busy-row {
    padding: 12px 16px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    color: var(--ink-3);
    letter-spacing: .04em;
    display: flex; align-items: center;
    border-top: 1px solid var(--rule);
  }

  /* ── Resource Browser (Phase 15 S5, issue #171) ─────────── */
  .section-label {
    font-family: "IBM Plex Mono", monospace;
    font-size: 10.5px; letter-spacing: .08em; text-transform: uppercase;
    color: var(--ink-3);
    margin: 40px 0 16px;
    display: flex; align-items: center; gap: 8px;
  }
  .browser-breadcrumb {
    display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
    font-family: "IBM Plex Mono", monospace;
    font-size: 11.5px; letter-spacing: .02em;
    color: var(--ink-3);
    margin-bottom: 14px;
  }
  .browser-breadcrumb .crumb-btn {
    background: none; border: none;
    color: var(--ink-2); cursor: pointer; padding: 0;
    font: inherit; font-size: 11.5px;
    text-decoration: underline;
    text-underline-offset: 2px;
  }
  .browser-breadcrumb .crumb-btn:hover { color: var(--ink); }
  .browser-breadcrumb .crumb-sep { color: var(--ink-4); user-select: none; }
  .browser-breadcrumb .crumb-current { color: var(--ink-3); }

  .browser-entries {
    border: 1px solid var(--rule);
    border-radius: 6px;
    background: var(--surface);
    overflow: hidden;
    transition: opacity .15s ease;
  }
  /* Dim the listing in place while the next folder loads instead of collapsing it
     to a spinner — the box keeps its height, so switching folders no longer jolts
     the page. Contents swap with a height morph + staggered reveal on resolve. */
  .browser-entries.is-loading { opacity: .4; pointer-events: none; }
  .browser-empty {
    padding: 20px 16px;
    font-size: 13px;
    color: var(--ink-3);
    text-align: center;
  }

  /* Entry rows */
  .entry-row {
    display: grid;
    grid-template-columns: 20px 1fr auto;
    column-gap: 10px;
    padding: 11px 16px;
    border-top: 1px solid var(--rule-2);
    cursor: pointer;
    transition: background .12s ease;
  }
  .entry-row:first-child { border-top: none; }
  .entry-row:hover { background: var(--rule-2); }
  .entry-icon {
    font-size: 13px;
    color: var(--ink-3);
    padding-top: 1px;
    user-select: none;
    transition: transform .18s cubic-bezier(.22,.61,.36,1), color .15s ease;
  }
  .entry-row.is-dir:hover .entry-icon { transform: translateX(2px); color: var(--ink-2); }
  .entry-name {
    font-family: "IBM Plex Mono", monospace;
    font-size: 12.5px;
    color: var(--ink);
    font-weight: 500;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .entry-row.is-dir .entry-name { color: var(--ink-2); }
  .entry-meta {
    font-family: "IBM Plex Mono", monospace;
    font-size: 10.5px;
    color: var(--ink-4);
    padding-top: 2px;
    text-align: right;
  }

  /* File content viewer */
  .file-viewer {
    margin-top: 20px;
    border: 1px solid var(--rule);
    border-radius: 6px;
    background: var(--surface);
    overflow: hidden;
  }
  .file-viewer-head {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 16px;
    border-bottom: 1px solid var(--rule);
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px; letter-spacing: .04em;
    color: var(--ink-3);
  }
  .file-viewer-head .file-name { color: var(--ink-2); }
  .file-viewer-close {
    margin-left: auto;
    background: none; border: 1px solid var(--rule);
    border-radius: 3px; padding: 2px 8px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 10.5px; color: var(--ink-3); cursor: pointer;
  }
  .file-viewer-close:hover { color: var(--ink); border-color: var(--ink-3); }
  .file-content {
    padding: 16px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 12px;
    line-height: 1.6;
    color: var(--ink);
    white-space: pre-wrap;
    overflow-x: auto;
    max-height: 600px;
    overflow-y: auto;
    word-break: break-word;
  }

  /* ── Staleness guard banner ──────────────────────────────── */
  .staleness-banner {
    display: none; /* shown via JS when indexStale=true */
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    background: #fff8eb;
    border: 1px solid #e8c66a;
    border-radius: 6px;
    margin-bottom: 16px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    letter-spacing: .03em;
    color: #7a5a00;
  }
  .staleness-banner.visible { display: flex; }
  .staleness-banner .stale-icon { font-size: 13px; flex-shrink: 0; }
  .staleness-banner .stale-msg { flex: 1; }

  /* ── RAG rebuild panel ───────────────────────────────────── */
  .rag-track {
    margin-top: 32px;
  }
  .rag-track-header {
    font-family: "IBM Plex Mono", monospace;
    font-size: 10.5px; letter-spacing: .08em; text-transform: uppercase;
    color: var(--ink-3);
    margin-bottom: 16px;
    display: flex; align-items: center; gap: 8px;
  }
  .rag-track-note {
    font-size: 12px;
    color: var(--ink-3);
    font-family: "IBM Plex Sans", sans-serif;
    text-transform: none;
    letter-spacing: 0;
    font-weight: 400;
  }

  /* Lint check group heading inside result card */
  .lint-group-head {
    padding: 8px 16px 4px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 10px;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--ink-3);
    border-top: 1px solid var(--rule);
    background: var(--bg);
  }
  .lint-group-head:first-child { border-top: none; }

  /* Lint finding rows — extend .rec with a note subrow */
  .rec .note {
    grid-column: 2 / -1;
    font-size: 11.5px;
    color: var(--ink-3);
    margin-top: 2px;
    white-space: pre-wrap;
    word-break: break-word;
  }

  /* ── Curation Queue (Phase 15 S6, issue #174) ───────────── */
  .curation-queue {
    margin-top: 40px;
  }

  .queue-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }

  .queue-header-label {
    font-family: "IBM Plex Mono", monospace;
    font-size: 10.5px; letter-spacing: .08em; text-transform: uppercase;
    color: var(--ink-3);
  }

  .queue-refresh-btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: none;
    color: var(--ink-3);
    border: 1px solid var(--rule);
    padding: 4px 10px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 10.5px;
    letter-spacing: .04em;
    border-radius: 4px;
    cursor: pointer;
    margin-left: auto;
    transition: color .15s ease, border-color .15s ease;
  }
  .queue-refresh-btn:hover:not(:disabled) {
    color: var(--ink);
    border-color: var(--ink-3);
  }
  .queue-refresh-btn:disabled { opacity: .45; cursor: not-allowed; }

  .queue-section {
    margin-bottom: 24px;
  }

  .queue-section-head {
    font-family: "IBM Plex Mono", monospace;
    font-size: 10px; letter-spacing: .08em; text-transform: uppercase;
    color: var(--ink-3);
    padding: 8px 0 8px;
    border-bottom: 1px solid var(--rule);
    margin-bottom: 10px;
    display: flex; align-items: center; gap: 8px;
  }

  .queue-empty {
    padding: 14px 0;
    font-size: 13px;
    color: var(--ink-3);
    font-style: italic;
  }

  /* Draft card: bordered, full-width, body preview */
  .draft-card {
    border: 1px solid var(--rule);
    border-radius: 6px;
    background: var(--surface);
    overflow: hidden;
    margin-bottom: 10px;
  }

  .draft-card-head {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 12px 16px 10px;
    border-bottom: 1px solid var(--rule-2);
  }

  .draft-card-question {
    font-size: 13.5px;
    font-weight: 500;
    color: var(--ink);
    flex: 1;
    min-width: 0;
    line-height: 1.4;
  }

  .draft-card-meta {
    font-family: "IBM Plex Mono", monospace;
    font-size: 10.5px;
    color: var(--ink-4);
    flex-shrink: 0;
    padding-top: 2px;
    white-space: nowrap;
  }

  .draft-card-body {
    padding: 10px 16px;
    font-size: 13px;
    color: var(--ink-2);
    line-height: 1.55;
    white-space: pre-wrap;
    word-break: break-word;
    max-height: 160px;
    overflow-y: auto;
    border-bottom: 1px solid var(--rule-2);
  }

  .draft-card-sources {
    padding: 6px 16px 8px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    color: var(--ink-4);
    border-bottom: 1px solid var(--rule-2);
