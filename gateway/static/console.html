<title>Operator Console — KB Gateway</title>

<!--
  KB Gateway Operator Console — Phase 15 (S1–S6).
  Single vanilla HTML/CSS/JS file. NO framework, NO build step (CODING_STANDARD §12.1).
  XSS: all server-derived content inserted via textContent, never innerHTML (§12.4).
  No business logic: validation and routing decisions are server-derived (§12.5).

  Phase 15 S1 (#169): Drag-drop Upload drop zone: POST /upload (multipart) → renders result card.
  Phase 15 S2 (#170): Guided pipeline stepper: Upload → Import → Ingest → Index → Lint.
    - Each step has its own Run button (single-step re-run).
    - Controls are disabled while the step's request is in flight.
    - Import step calls POST /wiki/import → renders ImportResponse per-file result card.
    - Generic step renderer + per-step card renderer pattern for Ingest/Index/Lint reuse.
  Phase 15 S3 (#172): Ingest step wired with batch chunker + per-page grounding cards.
    - Single POST /wiki/ingest call per batch of ≤5 named sources (§12.8 single-batch rule).
    - >5 sources → sequential single-batch calls with "Batch k/N" indicator (client-owned).
    - Indeterminate spinner within each batch (NO fake percentage — §12.8).
    - Per-page grounding pass/fail badge + hash-skip (unchanged) status from IngestResponse.
      (Red-link counts are NOT an ingest concern: they are a cross-page Lint C2 finding —
      IngestResponse carries no red-link field — surfaced on the Lint card. AC #14 amended
      accordingly; see #172/#168.)
    - Sources tracked from Import step results; falls back to all-docs if not available.
  Phase 15 S4 (#173): Index + Lint full result cards, RAG rebuild action, staleness guard.
    - Index step calls POST /wiki/index → renders IndexResponse: files/sections counts +
      wiki_index_written confirmation. Indeterminate spinner only (§12.8 — no fake %).
    - Lint step calls POST /wiki/lint → renders LintResponse findings grouped by check
      (orphan / stale / contradiction / coverage gap / promotion candidates / stale-qa /
      invalid-qa / failed-grounding / slug-collision / red-links). Indeterminate only.
    - RAG rebuild action: POST /rag/index → parallel track (independent of Wiki chain).
    - Staleness guard: module-level indexStale flag set by Ingest run, cleared by Index run.
      Integration point: slice #172 Ingest run() calls markIngestDone() on resolve;
      markIndexDone() is called in the Index run.finally block.
  Phase 15 S6 (#174): Curation Queue — Promote + Discard (DELETE /qa inert-only).
    - Rendered after Lint runs (driven by the stored LintResponse).
    - C8 promotion candidates: each card shows question, answer (fetched via GET /read/file),
      and cited Sources. Promote button → POST /wiki/qa/{slug}/promote (draft→live).
      Discard button → DELETE /wiki/qa/{slug} (inert only; live refused by server → 409).
    - C9 stale filed answers: read-only flag with "re-ingest the source" hint. No
      destructive action (live pages are never deleted — ADR-0012).
    - C10 invalid qa schema: read-only flag with "fix frontmatter or discard" hint.
      Discard button offered (inert; server decides eligibility — §12.5).
    - All server-derived text via textContent (§12.4).
    - Re-runs lint on "Refresh" to pick up queue changes.
  Shared design tokens: linked from shared.css (Phase 15 S1).
-->

<!-- Shared design tokens (Phase 15 S1 / issue #169) -->
<link rel="stylesheet" href="/static/shared.css">

<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  button { font: inherit; cursor: pointer; }
  a { color: inherit; }
  ::selection { background: var(--selection); color: var(--ink); }

  @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation: none !important; transition: none !important; } }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: "IBM Plex Sans", system-ui, sans-serif;
    font-size: 15px;
    line-height: 1.5;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .page {
    max-width: 680px;
    margin: 0 auto;
    padding: 0 32px 64px;
  }

  /* ── Masthead (shared with reader, §12.1) ────────────────── */
  .masthead {
    flex: none;
    padding: 22px 0 16px;
    display: flex; align-items: center; gap: 16px;
    border-bottom: 1px solid var(--rule);
  }
  .mast-logo {
    font-family: "IBM Plex Sans", sans-serif;
    font-weight: 500; font-size: 15px;
    letter-spacing: -.005em; color: var(--ink);
    text-decoration: none;
  }
  .mast-logo .dot { color: var(--ink-4); margin: 0 1px; }
  .mast-logo .amp { color: var(--ink-4); margin: 0 1px; font-weight: 400; }

  /* Breadcrumb separator */
  .mast-sep {
    color: var(--ink-4);
    font-family: "IBM Plex Mono", monospace;
    font-size: 12px;
  }
  .mast-page {
    font-family: "IBM Plex Mono", monospace;
    font-size: 12px;
    letter-spacing: .04em;
    color: var(--ink-2);
    text-transform: uppercase;
  }

  /* zh/en Lint chrome toggle (issue #365) — sits flush right of the
     breadcrumb, immediately left of the reader link (its margin-left:auto
     absorbs the row's free space; .mast-reader's own auto margin is then a
     no-op since no space remains, keeping both flush right together). */
  .mast-lang-toggle {
    margin-left: auto;
    background: none;
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    letter-spacing: .04em;
    color: var(--ink-3);
    border: 1px solid var(--rule);
    border-radius: 4px;
    padding: 5px 10px;
    transition: color .15s ease, border-color .15s ease;
  }
  .mast-lang-toggle:hover {
    color: var(--ink);
    border-color: var(--ink-3);
  }

  /* Reader link — navigates back */
  .mast-reader {
    margin-left: auto;
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    letter-spacing: .04em;
    color: var(--ink-3);
    text-decoration: none;
    border: 1px solid var(--rule);
    border-radius: 4px;
    padding: 5px 10px;
    transition: color .15s ease, border-color .15s ease;
  }
  .mast-reader:hover {
    color: var(--ink);
    border-color: var(--ink-3);
  }

  /* ── Pipeline stepper ────────────────────────────────────── */
  .pipeline {
    margin-top: 32px;
  }

  .pipeline-header {
    font-family: "IBM Plex Mono", monospace;
    font-size: 10.5px; letter-spacing: .08em; text-transform: uppercase;
    color: var(--ink-3);
    margin-bottom: 20px;
    display: flex; align-items: center; gap: 8px;
  }

  /* Step track */
  .step-track {
    display: flex;
    align-items: center;
    gap: 0;
    margin-bottom: 24px;
    overflow-x: auto;
    padding-bottom: 2px;
  }

  .step-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    letter-spacing: .04em;
    color: var(--ink-4);
    white-space: nowrap;
    padding: 5px 0;
    transition: color .15s ease;
  }
  .step-pill.active { color: var(--ink); }
  .step-pill.done   { color: var(--pass); }

  .step-num {
    width: 20px; height: 20px;
    border-radius: 50%;
    border: 1.5px solid currentColor;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px;
    flex-shrink: 0;
  }
  .step-pill.done .step-num {
    background: var(--pass);
    border-color: var(--pass);
    color: #fff;
  }
  .step-pill.active .step-num {
    background: var(--ink);
    border-color: var(--ink);
    color: var(--surface);
  }

  .step-arrow {
    color: var(--ink-4);
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    padding: 0 8px;
    flex-shrink: 0;
    user-select: none;
  }

  /* Individual step panel */
  .step-panel {
    border: 1px solid var(--rule);
    border-radius: 6px;
    background: var(--surface);
    overflow: hidden;
    margin-bottom: 16px;
  }

  .step-panel-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    border-bottom: 1px solid var(--rule);
    gap: 12px;
  }

  .step-panel-title {
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    letter-spacing: .06em;
    text-transform: uppercase;
    color: var(--ink-2);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .step-panel-desc {
    font-size: 12px;
    color: var(--ink-3);
    flex: 1;
    min-width: 0;
  }

  /* Run button */
  .run-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--ink);
    color: var(--surface);
    border: 0;
    padding: 6px 14px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    letter-spacing: .04em;
    border-radius: 4px;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
    transition: background .15s ease, opacity .15s ease;
  }
  .run-btn:hover:not(:disabled) { background: #000; }
  .run-btn:disabled {
    opacity: .45;
    cursor: not-allowed;
  }

  /* Step result area */
  .step-result {
    /* populated by JS — empty by default */
  }

  /* ── Upload drop zone ────────────────────────────────────── */
  .drop-zone {
    border: 1.5px dashed var(--rule);
    border-radius: 0 0 5px 5px; /* fits inside panel */
    padding: 28px 20px;
    text-align: center;
    cursor: pointer;
    transition: border-color .2s ease, background .2s ease;
    background: var(--bg);
  }
  .drop-zone.drag-over {
    border-color: var(--ink-3);
    background: var(--rule-2);
  }
  .drop-zone.busy {
    opacity: .65;
    cursor: not-allowed;
    pointer-events: none;
  }
  .drop-hint {
    font-size: 14px;
    color: var(--ink-3);
    line-height: 1.6;
  }
  .drop-hint strong {
    color: var(--ink-2);
    font-weight: 500;
  }
  .drop-ext {
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    color: var(--ink-4);
    margin-top: 8px;
    letter-spacing: .03em;
  }
  .drop-btn {
    display: inline-block;
    margin-top: 14px;
    background: var(--ink);
    color: var(--surface);
    border: 0;
    padding: 7px 14px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    letter-spacing: .04em;
    border-radius: 4px;
    cursor: pointer;
    transition: background .15s ease;
  }
  .drop-btn:hover { background: #000; }
  .drop-btn:disabled {
    opacity: .45;
    cursor: not-allowed;
  }

  /* ── Result card ─────────────────────────────────────────── */
  .result-card {
    border-top: 1px solid var(--rule);
    background: var(--surface);
    overflow: hidden;
  }
  .result-card-head {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 16px;
    border-bottom: 1px solid var(--rule);
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    letter-spacing: .06em;
    text-transform: uppercase;
    color: var(--ink-3);
  }
  .result-card-head .badge {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 10.5px;
    letter-spacing: .04em;
  }
  .result-card-head .badge .dot {
    width: 6px; height: 6px; border-radius: 50%;
  }
  .badge-ok .dot    { background: var(--pass); }
  .badge-ok         { color: var(--pass); }
  .badge-warn .dot  { background: #c47f17; }
  .badge-warn       { color: #c47f17; }
  .badge-fail .dot  { background: var(--fail); }
  .badge-fail       { color: var(--fail); }

  /* File rows inside result card — reuse .rec layout from the reader */
  .rec {
    display: grid;
    grid-template-columns: 24px 1fr auto;
    column-gap: 12px;
    padding: 10px 16px;
    border-top: 1px solid var(--rule-2);
  }
  .rec:first-child { border-top: none; }
  .rec .num {
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px; color: var(--ink-3);
    font-variant-numeric: tabular-nums;
    padding-top: 2px;
  }
  .rec .body { min-width: 0; }
  .rec .id {
    font-family: "IBM Plex Mono", monospace;
    font-size: 12px; color: var(--ink); font-weight: 500;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .rec .crumb {
    font-size: 12px; color: var(--ink-3); margin-top: 2px;
  }
  .rec .label {
    font-family: "IBM Plex Mono", monospace;
    font-size: 10.5px;
    padding-top: 2px;
    text-align: right;
    min-width: 60px;
  }
  .label-created  { color: var(--pass); }
  .label-updated  { color: #c47f17; }
  .label-skipped  { color: var(--ink-3); }
  .label-failed   { color: var(--fail); }
  /* Upload result labels */
  .label-written  { color: var(--pass); }
  .label-rejected { color: var(--fail); }
  .label-error    { color: var(--fail); }
  /* Ingest grounding labels */
  .label-grounded   { color: var(--pass); }
  .label-failed-grounding { color: var(--fail); }
  .label-skipped-hash { color: var(--ink-3); }

  /* ── Spinner (busy state) ────────────────────────────────── */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid var(--rule);
    border-top-color: var(--ink-3);
    border-radius: 50%;
    animation: spin .7s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
    flex-shrink: 0;
  }
  .busy-row {
    padding: 12px 16px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    color: var(--ink-3);
    letter-spacing: .04em;
    display: flex; align-items: center;
    border-top: 1px solid var(--rule);
  }

  /* ── Resource Browser (Phase 15 S5, issue #171) ─────────── */
  .section-label {
    font-family: "IBM Plex Mono", monospace;
    font-size: 10.5px; letter-spacing: .08em; text-transform: uppercase;
    color: var(--ink-3);
    margin: 40px 0 16px;
    display: flex; align-items: center; gap: 8px;
  }
  .browser-breadcrumb {
    display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
    font-family: "IBM Plex Mono", monospace;
    font-size: 11.5px; letter-spacing: .02em;
    color: var(--ink-3);
    margin-bottom: 14px;
  }
  .browser-breadcrumb .crumb-btn {
    background: none; border: none;
    color: var(--ink-2); cursor: pointer; padding: 0;
    font: inherit; font-size: 11.5px;
    text-decoration: underline;
    text-underline-offset: 2px;
  }
  .browser-breadcrumb .crumb-btn:hover { color: var(--ink); }
  .browser-breadcrumb .crumb-sep { color: var(--ink-4); user-select: none; }
  .browser-breadcrumb .crumb-current { color: var(--ink-3); }

  .browser-entries {
    border: 1px solid var(--rule);
    border-radius: 6px;
    background: var(--surface);
    overflow: hidden;
    transition: opacity .15s ease;
  }
  /* Dim the listing in place while the next folder loads instead of collapsing it
     to a spinner — the box keeps its height, so switching folders no longer jolts
     the page. Contents swap with a height morph + staggered reveal on resolve. */
  .browser-entries.is-loading { opacity: .4; pointer-events: none; }
  .browser-empty {
    padding: 20px 16px;
    font-size: 13px;
    color: var(--ink-3);
    text-align: center;
  }

  /* Entry rows */
  .entry-row {
    display: grid;
    grid-template-columns: 20px 1fr auto;
    column-gap: 10px;
    padding: 11px 16px;
    border-top: 1px solid var(--rule-2);
    cursor: pointer;
    transition: background .12s ease;
  }
  .entry-row:first-child { border-top: none; }
  .entry-row:hover { background: var(--rule-2); }
  .entry-icon {
    font-size: 13px;
    color: var(--ink-3);
    padding-top: 1px;
    user-select: none;
    transition: transform .18s cubic-bezier(.22,.61,.36,1), color .15s ease;
  }
  .entry-row.is-dir:hover .entry-icon { transform: translateX(2px); color: var(--ink-2); }
  .entry-name {
    font-family: "IBM Plex Mono", monospace;
    font-size: 12.5px;
    color: var(--ink);
    font-weight: 500;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .entry-row.is-dir .entry-name { color: var(--ink-2); }
  .entry-meta {
    font-family: "IBM Plex Mono", monospace;
    font-size: 10.5px;
    color: var(--ink-4);
    padding-top: 2px;
    text-align: right;
  }

  /* File content viewer */
  .file-viewer {
    margin-top: 20px;
    border: 1px solid var(--rule);
    border-radius: 6px;
    background: var(--surface);
    overflow: hidden;
  }
  .file-viewer-head {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 16px;
    border-bottom: 1px solid var(--rule);
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px; letter-spacing: .04em;
    color: var(--ink-3);
  }
  .file-viewer-head .file-name { color: var(--ink-2); }
  .file-viewer-close {
    margin-left: auto;
    background: none; border: 1px solid var(--rule);
    border-radius: 3px; padding: 2px 8px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 10.5px; color: var(--ink-3); cursor: pointer;
  }
  .file-viewer-close:hover { color: var(--ink); border-color: var(--ink-3); }
  .file-content {
    padding: 16px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 12px;
    line-height: 1.6;
    color: var(--ink);
    white-space: pre-wrap;
    overflow-x: auto;
    max-height: 600px;
    overflow-y: auto;
    word-break: break-word;
  }

  /* ── Staleness guard banner ──────────────────────────────── */
  .staleness-banner {
    display: none; /* shown via JS when indexStale=true */
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    background: #fff8eb;
    border: 1px solid #e8c66a;
    border-radius: 6px;
    margin-bottom: 16px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    letter-spacing: .03em;
    color: #7a5a00;
  }
  .staleness-banner.visible { display: flex; }
  .staleness-banner .stale-icon { font-size: 13px; flex-shrink: 0; }
  .staleness-banner .stale-msg { flex: 1; }

  /* ── RAG rebuild panel ───────────────────────────────────── */
  .rag-track {
    margin-top: 32px;
  }
  .rag-track-header {
    font-family: "IBM Plex Mono", monospace;
    font-size: 10.5px; letter-spacing: .08em; text-transform: uppercase;
    color: var(--ink-3);
    margin-bottom: 16px;
    display: flex; align-items: center; gap: 8px;
  }
  .rag-track-note {
    font-size: 12px;
    color: var(--ink-3);
    font-family: "IBM Plex Sans", sans-serif;
    text-transform: none;
    letter-spacing: 0;
    font-weight: 400;
  }

  /* ── Hybrid dense rebuild panel (ADR-0022, issue #348) ──── */
  .hybrid-track {
    margin-top: 32px;
  }
  .hybrid-track-header {
    font-family: "IBM Plex Mono", monospace;
    font-size: 10.5px; letter-spacing: .08em; text-transform: uppercase;
    color: var(--ink-3);
    margin-bottom: 16px;
    display: flex; align-items: center; gap: 8px;
  }
  .hybrid-track-note {
    font-size: 12px;
    color: var(--ink-3);
    font-family: "IBM Plex Sans", sans-serif;
    text-transform: none;
    letter-spacing: 0;
    font-weight: 400;
  }

  /* Lint Axis section heading (issue #363 — reuses S1's LINT_AXIS_ORDER:
     Freshness -> Coherence -> Coverage -> Lifecycle). display:flex so an
     optional axis-level batch button (issue #364 — Freshness only) sits
     flush right of the label. */
  .lint-axis-head {
    padding: 14px 16px 2px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: .06em;
    text-transform: uppercase;
    color: var(--ink);
    border-top: 2px solid var(--rule);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .lint-axis-head:first-child { border-top: none; padding-top: 0; }

  /* Lint check group heading inside result card. display:flex so an
     optional check-level batch button (issue #364 — C6 "Re-ingest all",
     C10 "Discard all") sits flush right of the label. */
  .lint-group-head {
    padding: 8px 16px 4px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 10px;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--ink-3);
    border-top: 1px solid var(--rule);
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .lint-axis-head + .lint-group-head { border-top: none; }

  /* Batch-remediation summary banner (issue #364) — a one-shot notice
     ("re-ingested 5: 4 ok, 1 still failing") shown at the top of the
     re-rendered Lint card right after a batch completes. */
  .lint-batch-summary {
    padding: 8px 16px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    letter-spacing: .03em;
    color: var(--ink-2);
    background: var(--bg);
    border-bottom: 1px solid var(--rule);
  }

  /* Per-row Remediation actions (issue #363 — Direct Remediation buttons +
     the disabled Authored/tier-B affordance). Sits inside the .rec "body"
     cell (below the id/crumb text) so the existing 3-column .rec grid used
     by every other result card is untouched. */
  .lint-row-actions {
    margin-top: 6px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .reingest-btn {
    display: inline-flex; align-items: center; gap: 5px;
    background: var(--accent);
    color: #fff;
    border: 0;
    padding: 4px 10px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 10.5px;

<body>
  <div class="page">
    <header class="masthead">

      <a class="mast-logo" href="/">
        <span>ask</span><span class="dot">.</span><span>Wiki</span><span class="amp">&amp;</span><span>RAG</span>
      </a>
      <span class="mast-sep">/</span>
      <span class="mast-page">console</span>
      <!-- zh/en Lint chrome toggle (issue #365) — label is set/updated by
           applyConsoleLang() below; this static "中文" is the pre-JS/no-JS

<script>
"use strict";

/* ============================================================
   §12.4: textContent-only DOM helper — innerHTML is banned.
   Accepts: el(tag, props?, ...children)
   - props.class   → className
   - props.text    → textContent
   - props.html    → THROWS (banned)
   - props.on*     → addEventListener
   - other props   → setAttribute
   Children may be DOM nodes, strings, null/false (skipped).
   ============================================================ */
function el(tag, props) {
  var kids = Array.prototype.slice.call(arguments, 2);
  var n = document.createElement(tag);
  if (props) {
    var entries = Object.entries(props);
    for (var i = 0; i < entries.length; i++) {
      var k = entries[i][0], v = entries[i][1];
      if (v == null) continue;
      if (k === "class") n.className = v;
      else if (k === "text") n.textContent = v;
      else if (k === "html") throw new Error("innerHTML banned (CODING_STANDARD §12.4)");
      else if (k.startsWith("on") && typeof v === "function") n.addEventListener(k.slice(2).toLowerCase(), v);
      else n.setAttribute(k, v);
    }
  }
  for (var j = 0; j < kids.length; j++) {
    var kid = kids[j];
    if (kid == null || kid === false) continue;
    n.append(kid.nodeType ? kid : document.createTextNode(String(kid)));
  }
  return n;
}

/* ============================================================
   Pipeline step descriptors.

   Each step has:
     id      — machine key, used for CSS and state
     label   — display name in the stepper track
     desc    — one-line description shown in the step panel header
     run     — async function(setState) → fires the request + renders result
               setState(busy) enables/disables the button

   Steps declared in pipeline order. Later slices (Ingest #172, Index/Lint #173)
   replace the stub run() functions here with real implementations.
   ============================================================ */

/* ── Per-step result-card renderers ───────────────────────── */

/* Upload result card — matches Phase 15 S1 logic, now inside the stepper panel */
function renderUploadCard(results) {
  var written  = results.filter(function(r) { return r.status === "written";  }).length;
  var rejected = results.filter(function(r) { return r.status === "rejected"; }).length;
  var errors   = results.filter(function(r) { return r.status === "error";    }).length;

  var parts = [];
  if (written > 0)  parts.push(written  + " written");
  if (rejected > 0) parts.push(rejected + " rejected");
  if (errors > 0)   parts.push(errors   + " error" + (errors !== 1 ? "s" : ""));
  var summaryText = parts.join(" · ") || "0 files";

  var badgeClass = errors > 0 ? "badge badge-fail"
                 : rejected > 0 ? "badge badge-warn"
                 : "badge badge-ok";

  var head = el("div", { class: "result-card-head" },
    el("span", { text: "Upload" }),
    el("span", { text: "·" }),
    el("span", { class: badgeClass },
      el("span", { class: "dot" }),
      el("span", { text: summaryText })
    )
  );

  var rows = el("div");
  results.forEach(function(r, i) {
    var labelClass = "label label-" + r.status;
    var labelText  = r.status;
    var subtitle   = "";

    if (r.status === "written") {
      /* .md routes straight to docs/ (final Source — it SKIPS the Import step);
         .html/.txt land in raw/ and still need Import to convert. Make that
         distinction explicit so a user who uploaded a .md sees it succeeded
         here, instead of looking for it (in vain) on the Import card. */
      var lastSeg = r.target_dir ? r.target_dir.split(/[/\\]/).filter(Boolean).pop() : "";
      if (lastSeg === "docs") {
        labelText = "in docs";
        subtitle  = "→ docs/ · saved, no Import needed";
      } else {
        labelText = "staged";
        subtitle  = "→ raw/ · run Import to convert";
      }
    } else if ((r.status === "rejected" || r.status === "error") && r.reason) {
      subtitle = r.reason;
    }

    var bodyEl = el("div", { class: "body" },
      el("div", { class: "id", text: r.filename })
    );
    if (subtitle) bodyEl.append(el("div", { class: "crumb", text: subtitle }));

    rows.append(el("div", { class: "rec" },
      el("div", { class: "num", text: String(i + 1).padStart(2, "0") }),
      bodyEl,
      el("div", { class: labelClass, text: labelText })
    ));
  });

  return el("div", { class: "result-card" }, head, rows);
}

/* Import result card — renders ImportResponse (imported_sources + skipped_sources + failed_sources) */
function renderImportCard(data) {
  var imported = data.imported_sources || [];
  var skipped  = data.skipped_sources  || [];
  var failed   = data.failed_sources   || [];

  /* Summary line */
  var parts = [];
  if (imported.length > 0) parts.push(imported.length + " imported");
  if (skipped.length > 0)  parts.push(skipped.length  + " skipped");
  if (failed.length > 0)   parts.push(failed.length   + " failed");
  var summaryText = parts.join(" · ") || "0 files";

  var badgeClass = failed.length > 0  ? "badge badge-fail"
                 : skipped.length > 0 ? "badge badge-warn"
                 : "badge badge-ok";

  var head = el("div", { class: "result-card-head" },
    el("span", { text: "Import" }),
    el("span", { text: "·" }),
    el("span", { class: badgeClass },
      el("span", { class: "dot" }),
      el("span", { text: summaryText })
    )
  );

  var rows = el("div");
  var rowIndex = 0;

  /* Helper: build a row from ImportSourceResultSchema (imported / skipped) */
  function makeSourceRow(r) {
    rowIndex++;
    /* raw_path → docs_path breadcrumb */
    var rawName  = r.raw_path  ? r.raw_path.split(/[/\\]/).pop()  : "";
    var docsName = r.docs_path ? r.docs_path.split(/[/\\]/).pop() : "";
    var subtitle = rawName && docsName ? rawName + " → " + docsName : rawName || docsName;

    var bodyEl = el("div", { class: "body" },
      el("div", { class: "id", text: rawName || r.raw_path })
    );
    if (r.original_format) {
      bodyEl.append(el("div", { class: "crumb", text: subtitle + " · " + r.original_format }));
    } else if (subtitle) {
      bodyEl.append(el("div", { class: "crumb", text: subtitle }));
    }

    var labelClass = "label label-" + r.status; /* created | updated | skipped */
    rows.append(el("div", { class: "rec" },
      el("div", { class: "num", text: String(rowIndex).padStart(2, "0") }),
      bodyEl,
      el("div", { class: labelClass, text: r.status })
    ));
  }

  /* Helper: build a row from ImportFailureSchema */
  function makeFailureRow(f) {
    rowIndex++;
    var rawName = f.raw_path ? f.raw_path.split(/[/\\]/).pop() : f.raw_path;
    var bodyEl  = el("div", { class: "body" },
      el("div", { class: "id",   text: rawName || f.raw_path }),
      el("div", { class: "crumb", text: f.error_message || f.error_type })
    );
    rows.append(el("div", { class: "rec" },
      el("div", { class: "num", text: String(rowIndex).padStart(2, "0") }),
      bodyEl,
      el("div", { class: "label label-failed", text: "failed" })
    ));
  }

  imported.forEach(makeSourceRow);
  skipped.forEach(makeSourceRow);
  failed.forEach(makeFailureRow);

  return el("div", { class: "result-card" }, head, rows);
}

/* Ingest result card — renders IngestResponse (results + skipped_sources + failed_sources).
   Per-page grounding pass/fail badge + hash-skip status. (Red-link counts live on the Lint
   card — they are a cross-page Lint C2 finding, not present in IngestResponse; AC amended.)
   §12.4: all server-derived text via textContent. */
function renderIngestCard(data, batchLabel) {
  var results  = data.results          || [];
  var skipped  = data.skipped_sources  || [];
  var failed   = data.failed_sources   || [];
  var grounding_failed = data.pages_with_failed_grounding || [];

  /* Summary line */
  var parts = [];
  if (results.length > 0) {
    var liveCount   = results.filter(function(r) { return r.status !== "skipped"; }).length;
    var skippedCount = skipped.length;
    if (liveCount > 0)   parts.push(liveCount + " ingested");
    if (skippedCount > 0) parts.push(skippedCount + " unchanged");
  }
  if (failed.length > 0) parts.push(failed.length + " failed");
  var summaryText = parts.join(" · ") || "0 sources";
  if (batchLabel) summaryText = batchLabel + " · " + summaryText;

  var hasFailures = failed.length > 0 || grounding_failed.length > 0;
  var badgeClass  = hasFailures ? "badge badge-fail"
                  : skipped.length > 0 ? "badge badge-warn"
                  : "badge badge-ok";

  var head = el("div", { class: "result-card-head" },
    el("span", { text: "Ingest" }),
    el("span", { text: "·" }),
    el("span", { class: badgeClass },
      el("span", { class: "dot" }),
      el("span", { text: summaryText })
    )
  );

  var rows = el("div");
  var rowIndex = 0;

  /* Helper: grounding label for a page slug */
  function groundingLabel(slug) {
    if (grounding_failed.indexOf(slug) !== -1) return "failed grounding";
    return "grounded";
  }
  function groundingLabelClass(slug) {
    if (grounding_failed.indexOf(slug) !== -1) return "label label-failed-grounding";
    return "label label-grounded";
  }

  /* Render IngestSourceResult rows (created / updated) */
  results.forEach(function(r) {
    var pages = r.pages_written || [];
    if (pages.length === 0) {
      /* Source had no pages (should not happen for non-skipped, but be defensive) */
      rowIndex++;
      rows.append(el("div", { class: "rec" },
        el("div", { class: "num", text: String(rowIndex).padStart(2, "0") }),
        el("div", { class: "body" },
          el("div", { class: "id",   text: r.source }),
          el("div", { class: "crumb", text: "no pages written" })
        ),
        el("div", { class: "label label-failed-grounding", text: r.status || "?" })
      ));
      return;
    }

    pages.forEach(function(pageRelPath) {
      rowIndex++;
      var pageName = pageRelPath.split("/").pop().replace(/\.md$/, "");
      var slug = pageName;

      /* Per-page status badge comes from the grounding outcome. Red-link counts are a
         cross-page Lint C2 finding (not in IngestResponse) — shown on the Lint card. */
      var lbl      = groundingLabel(slug);
      var lblClass = groundingLabelClass(slug);

      var crumbParts = [r.source];
      if (r.status === "updated") crumbParts.push("updated");
      else if (r.status === "created") crumbParts.push("created");

      var bodyEl = el("div", { class: "body" },
        el("div", { class: "id",   text: pageName }),
        el("div", { class: "crumb", text: crumbParts.join(" · ") })
      );
      rows.append(el("div", { class: "rec" },
        el("div", { class: "num", text: String(rowIndex).padStart(2, "0") }),
        bodyEl,
        el("div", { class: lblClass, text: lbl })
      ));
    });
  });

  /* Skipped (hash-match, unchanged) rows */
  skipped.forEach(function(r) {
    rowIndex++;
    rows.append(el("div", { class: "rec" },
      el("div", { class: "num", text: String(rowIndex).padStart(2, "0") }),
      el("div", { class: "body" },
        el("div", { class: "id",   text: r.source }),
        el("div", { class: "crumb", text: "unchanged (hash match)" })
      ),
      el("div", { class: "label label-skipped-hash", text: "skipped" })
    ));
  });

  /* Failed source rows */
  failed.forEach(function(sourceName) {
    rowIndex++;
    rows.append(el("div", { class: "rec" },
      el("div", { class: "num", text: String(rowIndex).padStart(2, "0") }),
      el("div", { class: "body" },
        el("div", { class: "id",   text: sourceName })
      ),
      el("div", { class: "label label-failed-grounding", text: "failed" })
    ));
  });

  return el("div", { class: "result-card" }, head, rows);
}

/* ── Batch chunker helpers (§12.8: client owns the batch count) ──────────── */

/* Split array into chunks of at most `size` items. */
function chunkArray(arr, size) {
  var chunks = [];
  for (var i = 0; i < arr.length; i += size) {
    chunks.push(arr.slice(i, i + size));
  }
  return chunks;
}

/* Run sequential ingest batches with "Batch k/N" indicator.
   §12.8: NO fake percentage. "Batch k/N" is the only determinate progress
   (client owns the counter). Within each batch an indeterminate spinner runs.

   sourceNames: array of bare filenames (e.g. ["a.md", "b.md"]).
                null/empty → POST /ingest with no sources (all-docs batch).
   resultEl:    DOM element to update with progress + result cards.
   setStepBusy: function(bool) — disables/enables the Run button.
*/
function runIngestBatches(sourceNames, resultEl, setStepBusy) {
  var BATCH_SIZE = 5;

  /* Normalise: null / empty → all-docs (single call, no sources field) */
  var useAllDocs = !sourceNames || sourceNames.length === 0;
  var batches    = useAllDocs ? [null] : chunkArray(sourceNames, BATCH_SIZE);
  var totalBatches = batches.length;

  /* Accumulate results across batches for the final combined card */
  var accumulatedResults  = [];
  var accumulatedSkipped  = [];
  var accumulatedFailed   = [];
  var accumulatedGrFailed = [];

  function runBatch(batchIndex) {
    if (batchIndex >= batches.length) {
      /* All batches done — render combined result card */
      setStepBusy(false);
      var combined = {
        results:                    accumulatedResults,
        skipped_sources:            accumulatedSkipped,
        failed_sources:             accumulatedFailed,
        pages_with_failed_grounding: accumulatedGrFailed,
      };
      resultEl.replaceChildren(renderIngestCard(combined, null));
      return;
    }

    var batchSources = batches[batchIndex];
    var batchLabel   = totalBatches > 1
      ? "Batch " + (batchIndex + 1) + "/" + totalBatches
      : null;
    var spinnerLabel = batchLabel ? batchLabel + "…" : "Running Ingest…";

    /* Show indeterminate spinner with honest batch label (no fake %) */
    resultEl.replaceChildren(makeBusyCard(spinnerLabel));

    var body = batchSources ? JSON.stringify({ sources: batchSources }) : null;
    var fetchOpts = {
      method: "POST",
      headers: body ? { "Content-Type": "application/json" } : {},
    };
    if (body) fetchOpts.body = body;

    fetch("/wiki/ingest", fetchOpts)
      .then(function(resp) {
        if (!resp.ok) return resp.text().then(function(t) { throw new Error("HTTP " + resp.status + ": " + t); });
        return resp.json();
      })
      .then(function(data) {
        /* Accumulate across batches */
        accumulatedResults  = accumulatedResults.concat(data.results          || []);
        accumulatedSkipped  = accumulatedSkipped.concat(data.skipped_sources  || []);
        accumulatedFailed   = accumulatedFailed.concat(data.failed_sources    || []);
        accumulatedGrFailed = accumulatedGrFailed.concat(data.pages_with_failed_grounding || []);

        /* Show intermediate partial card if multiple batches remain */
        if (totalBatches > 1 && batchIndex < batches.length - 1) {
          var partial = {
            results:                    accumulatedResults,
            skipped_sources:            accumulatedSkipped,
            failed_sources:             accumulatedFailed,
            pages_with_failed_grounding: accumulatedGrFailed,
          };
          resultEl.replaceChildren(renderIngestCard(partial, batchLabel + " done"));
        }
        runBatch(batchIndex + 1);
      })
      .catch(function(err) {
        setStepBusy(false);
        resultEl.replaceChildren(renderErrorCard("Ingest", err.message || String(err)));
      });
  }

  runBatch(0);
}

/* Index result card — renders IndexResponse (files_indexed / sections_indexed / wiki_index_written) */
function renderIndexCard(data) {
  var filesIndexed    = data.files_indexed    != null ? data.files_indexed    : "?";
  var sectionsIndexed = data.sections_indexed != null ? data.sections_indexed : "?";
  var written         = data.wiki_index_written === true;
  var wikiPath        = data.wiki_index_path   || null;
  var wikiError       = data.wiki_index_error  || null;

  var summaryText = filesIndexed + " file" + (filesIndexed !== 1 ? "s" : "") +
                    " · " + sectionsIndexed + " section" + (sectionsIndexed !== 1 ? "s" : "");
  var badgeClass = wikiError ? "badge badge-warn" : "badge badge-ok";
  var badgeLabel = wikiError ? "index partial" : "index rebuilt";

  var head = el("div", { class: "result-card-head" },
    el("span", { text: "Index" }),
    el("span", { text: "·" }),
    el("span", { class: badgeClass },
      el("span", { class: "dot" }),
      el("span", { text: badgeLabel })
    )
  );

  /* Counts row */
  var bodyEl = el("div");
  bodyEl.append(el("div", { class: "rec" },
    el("div", { class: "num", text: "01" }),
    el("div", { class: "body" },
      el("div", { class: "id",   text: "Files indexed" }),
      el("div", { class: "crumb", text: "wiki/ Markdown files parsed" })
    ),
    el("div", { class: "label label-created", text: String(filesIndexed) })
  ));
  bodyEl.append(el("div", { class: "rec" },
    el("div", { class: "num", text: "02" }),
    el("div", { class: "body" },
      el("div", { class: "id",   text: "Sections indexed" }),
      el("div", { class: "crumb", text: "searchable BM25 units" })
    ),
    el("div", { class: "label label-created", text: String(sectionsIndexed) })
  ));
  /* Wiki index write confirmation */
  if (written && wikiPath) {
    bodyEl.append(el("div", { class: "rec" },
      el("div", { class: "num", text: "03" }),
      el("div", { class: "body" },
        el("div", { class: "id",   text: "Wiki Index written" }),
        el("div", { class: "crumb", text: wikiPath })
      ),
      el("div", { class: "label label-created", text: "ok" })
    ));
  } else if (wikiError) {
    bodyEl.append(el("div", { class: "rec" },
      el("div", { class: "num", text: "03" }),
      el("div", { class: "body" },
        el("div", { class: "id",   text: "Wiki Index write failed" }),
        el("div", { class: "crumb", text: wikiError })
      ),
      el("div", { class: "label label-error", text: "warn" })
    ));
  }

  return el("div", { class: "result-card" }, head, bodyEl);
}

/* ============================================================
   Lint Axis + Remediation taxonomy (issue #363, ADR-0023 tier-A S3)

   The Console has no Python runtime, so this is the client's copy of
   markdown_kb/app/lint.py's LINT_CHECK_TAXONOMY + remediation_for — the
   SAME ten codes, axes, and Direct/Authored/deferred tiers (kept honest by
   the Python remediation_for unit tests plus this file's structural test,
   gateway/tests/test_ui_console_lint_remediation.py). The client does not
   decide *eligibility* here (that stays server-side, e.g. C10 discard is
   refused server-side for a live page) — it only decides which button to
   show for which check, mirroring the existing C9/C10 split already used
   by the Curation Queue below (§12.5).
   ============================================================ */
var LINT_AXIS_ORDER = ["Freshness", "Coherence", "Coverage", "Lifecycle"];

/* axis -> ordered check codes, matching LINT_CHECK_TAXONOMY's per-axis order */
var AXIS_CHECK_CODES = {
  Freshness: ["C6", "C3", "C11"],
  Coherence: ["C5", "C4"],
  Coverage:  ["C1", "C2"],
  Lifecycle: ["C8", "C10", "C9"],
};

/* code -> {label, tier, findingsKey}. tier drives the per-row affordance:
   "direct"   — C6/C3/C10 get a Remediation button; C8 gets none here (its
                Promote/Discard controls live in the dedicated Curation
                Queue block, unchanged per issue #363 AC).
   "authored" — disabled tier-B affordance (visible, never actionable).
   "deferred" — no control yet (C9/C11 need a lifecycle endpoint that does
                not exist — ADR-0023 Consequences). */
var LINT_CHECK_META = {
  C6:  { label: "stale",            tier: "direct",   findingsKey: "stale_pages" },
  C3:  { label: "failed-grounding", tier: "direct",   findingsKey: "failed_grounding" },
  C11: { label: "orphan",           tier: "deferred", findingsKey: "orphans" },
  C5:  { label: "contradiction",    tier: "authored", findingsKey: "page_pairs" },
  C4:  { label: "collision",        tier: "authored", findingsKey: "slug_collisions" },
  C1:  { label: "coverage-gap",     tier: "authored", findingsKey: "coverage_gaps" },
  C2:  { label: "red-link",         tier: "authored", findingsKey: "red_links" },
  C8:  { label: "promotion",        tier: "direct",   findingsKey: "promotion_candidates" },
  C10: { label: "invalid-schema",   tier: "direct",   findingsKey: "invalid_qa_schemas" },
  C9:  { label: "stale-qa",         tier: "deferred", findingsKey: "stale_filed_answers" },
};

/* ============================================================
   zh/en Console header language toggle (issue #365, ADR-0023 tier-A S5)

   Switches the Lint card's STRUCTURAL CHROME only — axis headers, check
   labels, remediation button verbs, section chrome, empty states — between
   en and zh, persisted in localStorage so the choice survives a reload
   (issue #365 AC). The dynamic per-finding text (e.g. f.reason, f.source —
   values that come straight off the LintResponse) is untouched; only
   literal chrome strings owned by this file are bilingual (issue #365 AC:
   "the dynamic suggested_action long text is unchanged").

var LANG_STORAGE_KEY = "kb-console-lang";

var LINT_CHROME = {

    checkErrors:     "檢查錯誤",
    noFindings:      "沒有發現問題 — 知識庫狀態良好。",
