<title>Operator Console — KB Gateway</title>

<!--
  KB Gateway Operator Console — Phase 15 (S1–S6).
  Single vanilla HTML/CSS/JS file. NO framework, NO build step (CODING_STANDARD §12.1).
  XSS: all server-derived content inserted via textContent, never innerHTML (§12.4).
  No business logic: validation and routing decisions are server-derived (§12.5).

  Phase 15 S1 (#169): Drag-drop Upload drop zone: POST /upload (multipart) → renders result card.
  Phase 15 S2 (#170): Guided pipeline stepper: Upload → Import → Ingest → Index → Lint.
    - Each step has its own Run button (single-step re-run).
    - Controls are disabled while the step's request is in flight.
    - Import step calls POST /wiki/import → renders ImportResponse per-file result card.
    - Generic step renderer + per-step card renderer pattern for Ingest/Index/Lint reuse.
  Phase 15 S3 (#172): Ingest step wired with batch chunker + per-page grounding cards.
    - Single POST /wiki/ingest call per batch of ≤5 named sources (§12.8 single-batch rule).
    - >5 sources → sequential single-batch calls with "Batch k/N" indicator (client-owned).
    - Indeterminate spinner within each batch (NO fake percentage — §12.8).
    - Per-page grounding pass/fail badge + hash-skip (unchanged) status from IngestResponse.
      (Red-link counts are NOT an ingest concern: they are a cross-page Lint C2 finding —
      IngestResponse carries no red-link field — surfaced on the Lint card. AC #14 amended
      accordingly; see #172/#168.)
    - Sources tracked from Import step results; falls back to all-docs if not available.
  Phase 15 S4 (#173): Index + Lint full result cards, RAG rebuild action, staleness guard.
    - Index step calls POST /wiki/index → renders IndexResponse: files/sections counts +
      wiki_index_written confirmation. Indeterminate spinner only (§12.8 — no fake %).
    - Lint step calls POST /wiki/lint → renders LintResponse findings grouped by check
      (orphan / stale / contradiction / coverage gap / promotion candidates / stale-qa /
      invalid-qa / failed-grounding / slug-collision / red-links). Indeterminate only.
    - RAG rebuild action: POST /rag/index → parallel track (independent of Wiki chain).
    - Staleness guard: module-level indexStale flag set by Ingest run, cleared by Index run.
      Integration point: slice #172 Ingest run() calls markIngestDone() on resolve;
      markIndexDone() is called in the Index run.finally block.
  Phase 15 S6 (#174): Curation Queue — Promote + Discard (DELETE /qa inert-only).
    - Rendered after Lint runs (driven by the stored LintResponse).
    - C8 promotion candidates: each card shows question, answer (fetched via GET /read/file),
      and cited Sources. Promote button → POST /wiki/qa/{slug}/promote (draft→live).
      Discard button → DELETE /wiki/qa/{slug} (inert only; live refused by server → 409).
    - C9 stale filed answers: read-only flag with "re-ingest the source" hint. No
      destructive action (live pages are never deleted — ADR-0012).
    - C10 invalid qa schema: read-only flag with "fix frontmatter or discard" hint.
      Discard button offered (inert; server decides eligibility — §12.5).
    - All server-derived text via textContent (§12.4).
    - Re-runs lint on "Refresh" to pick up queue changes.
  Shared design tokens: linked from shared.css (Phase 15 S1).
-->

<!-- Shared design tokens (Phase 15 S1 / issue #169) -->
<link rel="stylesheet" href="/static/shared.css">

<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  button { font: inherit; cursor: pointer; }
  a { color: inherit; }
  ::selection { background: var(--selection); color: var(--ink); }

  @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation: none !important; transition: none !important; } }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: "IBM Plex Sans", system-ui, sans-serif;
    font-size: 15px;
    line-height: 1.5;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .page {
    max-width: 680px;
    margin: 0 auto;
    padding: 0 32px 64px;
  }

  /* ── Masthead (shared with reader, §12.1) ────────────────── */
  .masthead {
    flex: none;
    padding: 22px 0 16px;
    display: flex; align-items: center; gap: 16px;
    border-bottom: 1px solid var(--rule);
  }
  .mast-logo {
    font-family: "IBM Plex Sans", sans-serif;
    font-weight: 500; font-size: 15px;
    letter-spacing: -.005em; color: var(--ink);
    text-decoration: none;
  }
  .mast-logo .dot { color: var(--ink-4); margin: 0 1px; }
  .mast-logo .amp { color: var(--ink-4); margin: 0 1px; font-weight: 400; }

  /* Breadcrumb separator */
  .mast-sep {
    color: var(--ink-4);
    font-family: "IBM Plex Mono", monospace;
    font-size: 12px;
  }
  .mast-page {
    font-family: "IBM Plex Mono", monospace;
    font-size: 12px;
    letter-spacing: .04em;
    color: var(--ink-2);
    text-transform: uppercase;
  }

  /* zh/en Lint chrome toggle (issue #365) — sits flush right of the
     breadcrumb, immediately left of the reader link (its margin-left:auto
     absorbs the row's free space; .mast-reader's own auto margin is then a
     no-op since no space remains, keeping both flush right together). */
  .mast-lang-toggle {
    margin-left: auto;
    background: none;
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    letter-spacing: .04em;
    color: var(--ink-3);
    border: 1px solid var(--rule);
    border-radius: 4px;
    padding: 5px 10px;
    transition: color .15s ease, border-color .15s ease;
  }
  .mast-lang-toggle:hover {
    color: var(--ink);
    border-color: var(--ink-3);
  }

  /* Reader link — navigates back */
  .mast-reader {
    margin-left: auto;
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    letter-spacing: .04em;
    color: var(--ink-3);
    text-decoration: none;
    border: 1px solid var(--rule);
    border-radius: 4px;
    padding: 5px 10px;
    transition: color .15s ease, border-color .15s ease;
  }
  .mast-reader:hover {
    color: var(--ink);
    border-color: var(--ink-3);
  }

  /* ── Pipeline stepper ────────────────────────────────────── */
  .pipeline {
    margin-top: 32px;
  }

  .pipeline-header {
    font-family: "IBM Plex Mono", monospace;
    font-size: 10.5px; letter-spacing: .08em; text-transform: uppercase;
    color: var(--ink-3);
    margin-bottom: 20px;
    display: flex; align-items: center; gap: 8px;
  }

  /* Step track */
  .step-track {
    display: flex;
    align-items: center;
    gap: 0;
    margin-bottom: 24px;
    overflow-x: auto;
    padding-bottom: 2px;
  }

  .step-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    letter-spacing: .04em;
    color: var(--ink-4);
    white-space: nowrap;
    padding: 5px 0;
    transition: color .15s ease;
  }
  .step-pill.active { color: var(--ink); }
  .step-pill.done   { color: var(--pass); }

  .step-num {
    width: 20px; height: 20px;
    border-radius: 50%;
    border: 1.5px solid currentColor;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px;
    flex-shrink: 0;
  }
  .step-pill.done .step-num {
    background: var(--pass);
    border-color: var(--pass);
    color: #fff;
  }
  .step-pill.active .step-num {
    background: var(--ink);
    border-color: var(--ink);
    color: var(--surface);
  }

  .step-arrow {
    color: var(--ink-4);
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    padding: 0 8px;
    flex-shrink: 0;
    user-select: none;
  }

  /* Individual step panel */
  .step-panel {
    border: 1px solid var(--rule);
    border-radius: 6px;
    background: var(--surface);
    overflow: hidden;
    margin-bottom: 16px;
  }

  .step-panel-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    border-bottom: 1px solid var(--rule);
    gap: 12px;
  }

  .step-panel-title {
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    letter-spacing: .06em;
    text-transform: uppercase;
    color: var(--ink-2);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .step-panel-desc {
    font-size: 12px;
    color: var(--ink-3);
    flex: 1;
    min-width: 0;
  }

  /* Run button */
  .run-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--ink);
    color: var(--surface);
    border: 0;
    padding: 6px 14px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    letter-spacing: .04em;
    border-radius: 4px;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
    transition: background .15s ease, opacity .15s ease;
  }
  .run-btn:hover:not(:disabled) { background: #000; }
  .run-btn:disabled {
    opacity: .45;
    cursor: not-allowed;
  }

  /* Groups the Run button with the Lint step's extra Deep audit control
     (issue #441) so .step-panel-head's space-between still sees exactly
     two flex children (headLeft, actions) regardless of button count. */
  .step-panel-actions {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }

  /* Deep audit (C5) — secondary/outline styling to read as "on-demand,
     heavier" next to the primary filled Run button (issue #441). */
  .deep-audit-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: transparent;
    color: var(--ink);
    border: 1px solid var(--rule);
    padding: 6px 14px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    letter-spacing: .04em;
    border-radius: 4px;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
    transition: background .15s ease, opacity .15s ease;
  }
  .deep-audit-btn:hover:not(:disabled) { background: var(--rule-2); }
  .deep-audit-btn:disabled {
    opacity: .45;
    cursor: not-allowed;
  }

  /* Step result area */
  .step-result {
    /* populated by JS — empty by default */
  }

  /* ── Upload drop zone ────────────────────────────────────── */
  .drop-zone {
    border: 1.5px dashed var(--rule);
    border-radius: 0 0 5px 5px; /* fits inside panel */
    padding: 28px 20px;
    text-align: center;
    cursor: pointer;
    transition: border-color .2s ease, background .2s ease;
    background: var(--bg);
  }
  .drop-zone.drag-over {
    border-color: var(--ink-3);
    background: var(--rule-2);
  }
  .drop-zone.busy {
    opacity: .65;
    cursor: not-allowed;
    pointer-events: none;
  }
  .drop-hint {
    font-size: 14px;
    color: var(--ink-3);
    line-height: 1.6;
  }
  .drop-hint strong {
    color: var(--ink-2);
    font-weight: 500;
  }
  .drop-ext {
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    color: var(--ink-4);
    margin-top: 8px;
    letter-spacing: .03em;
  }
  .drop-btn {
    display: inline-block;
    margin-top: 14px;
    background: var(--ink);
    color: var(--surface);
    border: 0;
    padding: 7px 14px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    letter-spacing: .04em;
    border-radius: 4px;
    cursor: pointer;
    transition: background .15s ease;
  }
  .drop-btn:hover { background: #000; }
  .drop-btn:disabled {
    opacity: .45;
    cursor: not-allowed;
  }

  /* ── Result card ─────────────────────────────────────────── */
  .result-card {
    border-top: 1px solid var(--rule);
    background: var(--surface);
    overflow: hidden;
  }
  .result-card-head {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 16px;
    border-bottom: 1px solid var(--rule);
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    letter-spacing: .06em;
    text-transform: uppercase;
    color: var(--ink-3);
  }
  .result-card-head .badge {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 10.5px;
    letter-spacing: .04em;
  }
  .result-card-head .badge .dot {
    width: 6px; height: 6px; border-radius: 50%;
  }
  .badge-ok .dot    { background: var(--pass); }
  .badge-ok         { color: var(--pass); }
  .badge-warn .dot  { background: #c47f17; }
  .badge-warn       { color: #c47f17; }
  .badge-fail .dot  { background: var(--fail); }
  .badge-fail       { color: var(--fail); }

  /* File rows inside result card — reuse .rec layout from the reader */
  .rec {
    display: grid;
    grid-template-columns: 24px 1fr auto;
    column-gap: 12px;
    padding: 10px 16px;
    border-top: 1px solid var(--rule-2);
  }
  .rec:first-child { border-top: none; }
  .rec .num {
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px; color: var(--ink-3);
    font-variant-numeric: tabular-nums;
    padding-top: 2px;
  }
  .rec .body { min-width: 0; }
  .rec .id {
    font-family: "IBM Plex Mono", monospace;
    font-size: 12px; color: var(--ink); font-weight: 500;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .rec .crumb {
    font-size: 12px; color: var(--ink-3); margin-top: 2px;
  }
  .rec .label {
    font-family: "IBM Plex Mono", monospace;
    font-size: 10.5px;
    padding-top: 2px;
    text-align: right;
    min-width: 60px;
  }
  .label-created  { color: var(--pass); }
  .label-updated  { color: #c47f17; }
  .label-skipped  { color: var(--ink-3); }
  .label-failed   { color: var(--fail); }
  /* Upload result labels */
  .label-written  { color: var(--pass); }
  .label-rejected { color: var(--fail); }
  .label-error    { color: var(--fail); }
  /* Ingest grounding labels */
  .label-grounded   { color: var(--pass); }
  .label-failed-grounding { color: var(--fail); }
  .label-skipped-hash { color: var(--ink-3); }

  /* ── Prominent Import failure row (issue #447) ──────────────
     Failures used to be a plain .rec row identical to a success row except
     for the .label-failed text colour — easy to miss inside a busy Import
     card. Failed rows now render FIRST (see renderImportCard) with a tinted
     background + left accent bar, and show BOTH the error_type (small mono
     badge) and the full error_message (not one or the other). */
  .rec-failed {
    background: #fdf1ef;
    border-left: 3px solid var(--fail);
  }
  .rec-failed .crumb { color: var(--ink); }
  .rec-failed .error-type {
    display: inline-block;
    font-family: "IBM Plex Mono", monospace;
    font-size: 10px;
    letter-spacing: .04em;
    color: var(--fail);
    text-transform: uppercase;
    margin-right: 6px;
  }

  /* Transcribe action (issue #447, ADR-0032) — offered on a NoTextLayer (and
     Transcribe-family) Import failure row. Same filled-accent "this
     executes" treatment as .assign-alias-btn / .reconcile-btn. */
  .transcribe-btn {
    display: inline-flex; align-items: center; gap: 5px;
    background: var(--accent);
    color: #fff;
    border: 0;
    padding: 4px 10px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 10.5px;
    letter-spacing: .04em;
    border-radius: 4px;
    cursor: pointer;
    transition: opacity .15s ease;
  }
  .transcribe-btn:hover:not(:disabled) { opacity: .82; }
  .transcribe-btn:disabled { opacity: .45; cursor: not-allowed; }

  /* Transcribe progress bar (issue #447/#459) — a REAL determinate bar
     driven by GET /wiki/transcribe/jobs/{job_id}'s pages_done/pages_total
     (the server-owned page-completion count, issue #459 AC4), not a
     client-guessed percentage — CODING_STANDARD §12.8 bans the latter, not
     a real server-reported count (the same "client owns the count"
     exception that already authorises the pipeline's own "Batch k/N"). */
  .transcribe-progress-track {
    width: 100%;
    height: 8px;
    background: var(--rule-2);
    border-radius: 4px;
    overflow: hidden;
    margin-top: 8px;
  }
  .transcribe-progress-fill {
    height: 100%;
    background: var(--accent);
    transition: width .2s ease;
  }
  .transcribe-progress-label {
    font-family: "IBM Plex Mono", monospace;
    font-size: 10.5px;
    color: var(--ink-3);
    margin-top: 4px;
  }

  /* ── Spinner (busy state) ────────────────────────────────── */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid var(--rule);
    border-top-color: var(--ink-3);
    border-radius: 50%;
    animation: spin .7s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
    flex-shrink: 0;
  }
  .busy-row {
    padding: 12px 16px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    color: var(--ink-3);
    letter-spacing: .04em;
    display: flex; align-items: center;
    border-top: 1px solid var(--rule);
  }

  /* ── Resource Browser (Phase 15 S5, issue #171) ─────────── */
  .section-label {
    font-family: "IBM Plex Mono", monospace;
    font-size: 10.5px; letter-spacing: .08em; text-transform: uppercase;
    color: var(--ink-3);
    margin: 40px 0 16px;
    display: flex; align-items: center; gap: 8px;
  }
  .browser-breadcrumb {
    display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
    font-family: "IBM Plex Mono", monospace;
    font-size: 11.5px; letter-spacing: .02em;
    color: var(--ink-3);
    margin-bottom: 14px;
  }
  .browser-breadcrumb .crumb-btn {
    background: none; border: none;
    color: var(--ink-2); cursor: pointer; padding: 0;
    font: inherit; font-size: 11.5px;
    text-decoration: underline;
    text-underline-offset: 2px;
  }
  .browser-breadcrumb .crumb-btn:hover { color: var(--ink); }
  .browser-breadcrumb .crumb-sep { color: var(--ink-4); user-select: none; }
  .browser-breadcrumb .crumb-current { color: var(--ink-3); }

  .browser-entries {
    border: 1px solid var(--rule);
    border-radius: 6px;
    background: var(--surface);
    overflow: hidden;
    transition: opacity .15s ease;
  }
  /* Dim the listing in place while the next folder loads instead of collapsing it
     to a spinner — the box keeps its height, so switching folders no longer jolts
     the page. Contents swap with a height morph + staggered reveal on resolve. */
  .browser-entries.is-loading { opacity: .4; pointer-events: none; }
  .browser-empty {
    padding: 20px 16px;
    font-size: 13px;
    color: var(--ink-3);
    text-align: center;
  }

  /* Entry rows */
  .entry-row {
    display: grid;
    grid-template-columns: 20px 1fr auto;
    column-gap: 10px;
    padding: 11px 16px;
    border-top: 1px solid var(--rule-2);
    cursor: pointer;
    transition: background .12s ease;
  }
  .entry-row:first-child { border-top: none; }
  .entry-row:hover { background: var(--rule-2); }
  .entry-icon {
    font-size: 13px;
    color: var(--ink-3);
    padding-top: 1px;
    user-select: none;
    transition: transform .18s cubic-bezier(.22,.61,.36,1), color .15s ease;
  }
  .entry-row.is-dir:hover .entry-icon { transform: translateX(2px); color: var(--ink-2); }
  .entry-name {
    font-family: "IBM Plex Mono", monospace;
    font-size: 12.5px;
    color: var(--ink);
    font-weight: 500;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .entry-row.is-dir .entry-name { color: var(--ink-2); }
  .entry-meta {
    font-family: "IBM Plex Mono", monospace;
    font-size: 10.5px;
    color: var(--ink-4);
    padding-top: 2px;
    text-align: right;
  }

  /* Per-row failure notice (issue #444) — sits directly under the entry row
     that was clicked, so a failing open is visible at the point of action
     instead of only in the file viewer further down the page. Hidden by
     default; toggled with .visible when openFile's error callback fires. */
  .entry-row-notice {
    display: none;
    padding: 0 16px 10px 46px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    color: var(--fail);
  }
  .entry-row-notice.visible { display: block; }

  /* File content viewer */
  .file-viewer {
    margin-top: 20px;
    border: 1px solid var(--rule);
    border-radius: 6px;
    background: var(--surface);
    overflow: hidden;
  }
  .file-viewer-head {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 16px;
    border-bottom: 1px solid var(--rule);
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px; letter-spacing: .04em;
    color: var(--ink-3);
  }
  .file-viewer-head .file-name { color: var(--ink-2); }
  .file-viewer-close {
    margin-left: auto;
    background: none; border: 1px solid var(--rule);
    border-radius: 3px; padding: 2px 8px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 10.5px; color: var(--ink-3); cursor: pointer;
  }
  .file-viewer-close:hover { color: var(--ink); border-color: var(--ink-3); }
  .file-content {
    padding: 16px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 12px;
    line-height: 1.6;
    color: var(--ink);
    white-space: pre-wrap;
    overflow-x: auto;
    max-height: 600px;
    overflow-y: auto;
    word-break: break-word;
  }
  /* Wikilink linkify (issue #410, ADR-0030 decision 5) — curator surface:
     resolved -> navigable link; unresolved -> red-link styling (the SAME
     judgment C2 reports for the same corpus), non-navigating. */
  .wikilink {
    color: var(--accent);
    text-decoration: underline;
    cursor: pointer;
  }
  .wikilink-unresolved {
    color: var(--fail);
    text-decoration: none;
    cursor: default;
  }

  /* Busy feedback across every file-open trigger (issue #444) — navigateTo()
     and openFile() share one browserBusy flag, so a click on ANY of these
     while either is in flight must visibly refuse rather than silently
     no-op. pointer-events:none means the click never reaches the handler at
     all, so this "disabled" look is real, not just cosmetic; mirrors the
     existing .browser-entries.is-loading dim treatment above. */
  body.file-open-busy .entry-row,
  body.file-open-busy .view-source-btn,
  body.file-open-busy .wikilink {
    pointer-events: none;
    opacity: .5;
    cursor: wait;
  }

  /* ── Staleness guard banner ──────────────────────────────── */
  .staleness-banner {
    display: none; /* shown via JS when indexStale=true */
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    background: #fff8eb;
    border: 1px solid #e8c66a;
    border-radius: 6px;
    margin-bottom: 16px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    letter-spacing: .03em;
    color: #7a5a00;
  }
  .staleness-banner.visible { display: flex; }
  .staleness-banner .stale-icon { font-size: 13px; flex-shrink: 0; }
  .staleness-banner .stale-msg { flex: 1; }

  /* ── RAG rebuild panel ───────────────────────────────────── */
  .rag-track {
    margin-top: 32px;
  }
  .rag-track-header {
    font-family: "IBM Plex Mono", monospace;
    font-size: 10.5px; letter-spacing: .08em; text-transform: uppercase;
    color: var(--ink-3);
    margin-bottom: 16px;
    display: flex; align-items: center; gap: 8px;
  }
  .rag-track-note {
    font-size: 12px;
    color: var(--ink-3);
    font-family: "IBM Plex Sans", sans-serif;
    text-transform: none;
    letter-spacing: 0;
    font-weight: 400;
  }

  /* ── Hybrid dense rebuild panel (ADR-0022, issue #348) ──── */
  .hybrid-track {
    margin-top: 32px;
  }
  .hybrid-track-header {
    font-family: "IBM Plex Mono", monospace;
    font-size: 10.5px; letter-spacing: .08em; text-transform: uppercase;
    color: var(--ink-3);
    margin-bottom: 16px;
    display: flex; align-items: center; gap: 8px;
  }
  .hybrid-track-note {
    font-size: 12px;
    color: var(--ink-3);
    font-family: "IBM Plex Sans", sans-serif;
    text-transform: none;
    letter-spacing: 0;
    font-weight: 400;
  }

  /* Lint Axis section heading (issue #363 — reuses S1's LINT_AXIS_ORDER:
     Freshness -> Coherence -> Coverage -> Lifecycle). display:flex so an
     optional axis-level batch button (issue #364 — Freshness only) sits
     flush right of the label. */
  .lint-axis-head {
    padding: 14px 16px 2px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: .06em;
    text-transform: uppercase;
    color: var(--ink);
    border-top: 2px solid var(--rule);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .lint-axis-head:first-child { border-top: none; padding-top: 0; }

  /* Lint check group heading inside result card. display:flex so an
     optional check-level batch button (issue #364 — C6 "Re-ingest all",
     C10 "Discard all") sits flush right of the label. */
  .lint-group-head {
    padding: 8px 16px 4px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 10px;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--ink-3);
    border-top: 1px solid var(--rule);
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .lint-axis-head + .lint-group-head { border-top: none; }

  /* Batch-remediation summary banner (issue #364) — a one-shot notice
     ("re-ingested 5: 4 ok, 1 still failing") shown at the top of the
     re-rendered Lint card right after a batch completes. */
  .lint-batch-summary {
    padding: 8px 16px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    letter-spacing: .03em;
    color: var(--ink-2);
    background: var(--bg);
    border-bottom: 1px solid var(--rule);
  }

  /* Per-row Remediation actions (issue #363 — Direct Remediation buttons +
     the disabled Authored/tier-B affordance). Sits inside the .rec "body"
     cell (below the id/crumb text) so the existing 3-column .rec grid used
     by every other result card is untouched. */
  .lint-row-actions {
    margin-top: 6px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .reingest-btn {
    display: inline-flex; align-items: center; gap: 5px;
    background: var(--accent);
    color: #fff;
    border: 0;
    padding: 4px 10px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 10.5px;
    letter-spacing: .04em;
    border-radius: 4px;
    cursor: pointer;
    transition: opacity .15s ease;
  }
  .reingest-btn:hover:not(:disabled) { opacity: .82; }
  .reingest-btn:disabled { opacity: .45; cursor: not-allowed; }

  /* Authored-tier ("tier B") affordance — visible, never actionable
     (ADR-0023: Authored Remediation is out of tier-A scope). */
  .tier-b-btn {
    display: inline-flex; align-items: center; gap: 5px;
    background: none;
    color: var(--ink-4);
    border: 1px dashed var(--ink-4);
    padding: 4px 10px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 10.5px;
    letter-spacing: .04em;
    border-radius: 4px;
    cursor: not-allowed;
  }

  /* ── C1/C2 Routed Coverage Fill (tier-B S7, issue #383, ADR-0027) ──────
     Replaces the disabled .tier-b-btn above for C1/C2 only: a Routed
     remediation is a navigation, not an execution, so this is a REAL
     clickable button (solid border, not dashed/disabled) — but its click
     handler never fetches anything (ADR-0027 Invariant). The outline style
     (no filled background) visually distinguishes "this navigates" from the
     filled-accent execute buttons (.reingest-btn / .reconcile-btn /
     .discard-btn) elsewhere on this card. */
  .fill-import-btn {
    display: inline-flex; align-items: center; gap: 5px;
    background: none;
    color: var(--accent);
    border: 1px solid var(--accent);
    padding: 4px 10px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 10.5px;
    letter-spacing: .04em;
    border-radius: 4px;
    cursor: pointer;
    transition: opacity .15s ease;
  }
  .fill-import-btn:hover { opacity: .7; }

  /* ── C1 Verify: re-ask (tier-B S8, issue #384, ADR-0027 decision 2) ────
     Unlike .fill-import-btn above (a navigation that never fetches —
     ADR-0027 Invariant), this control DOES issue a request (the existing
     POST /wiki/chat) and re-lints on completion, so it gets the same
     filled-accent "this executes" treatment as .reingest-btn /
     .reconcile-btn / .discard-btn rather than the outline navigation
     style. */
  .verify-reask-btn {
    display: inline-flex; align-items: center; gap: 5px;
    background: var(--accent);
    color: #fff;
    border: 0;
    padding: 4px 10px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 10.5px;
    letter-spacing: .04em;
    border-radius: 4px;
    cursor: pointer;
    transition: opacity .15s ease;
  }
  .verify-reask-btn:hover:not(:disabled) { opacity: .82; }
  .verify-reask-btn:disabled { opacity: .45; cursor: not-allowed; }

  /* Persistent context banner shown above the pipeline stepper once a
     "Fill via Import" control is clicked — carries the finding's fields
     (AC: C2 slug + referenced_by + sample_context; C1 sample_raw_queries +
     hit_count) into the existing Upload -> Import -> Ingest flow. Same
     info-banner palette as .demo-reset-banner; toggled via .visible like
     .staleness-banner (hidden until JS shows it). */
  .coverage-fill-banner {
    display: none;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 16px;
    background: #f0f4ff;
    border: 1px solid #93b3e6;
    border-radius: 6px;
    margin-bottom: 16px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    letter-spacing: .03em;
    color: #2a4080;
    line-height: 1.5;
  }
  .coverage-fill-banner.visible { display: flex; }

  /* ── C3 Routed fix-the-Source (issue #408, ADR-0029) ───────────────────
     C3 is the first finding carrying two remediation classes at once: the
     existing .reingest-btn (Direct "Re-ingest (retry)") stays wired
     unchanged, and this adds a Routed navigation control alongside it —
     same visual language as .fill-import-btn above (outline, never fetches
     — the click handler only carries context into the existing Upload ->
     Re-ingest -> Lint flow, ADR-0029 Invariant: commits nothing itself). */
  .fix-source-btn {
    display: inline-flex; align-items: center; gap: 5px;
    background: none;
    color: var(--accent);
    border: 1px solid var(--accent);
    padding: 4px 10px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 10.5px;
    letter-spacing: .04em;
    border-radius: 4px;
    cursor: pointer;
    transition: opacity .15s ease;
  }
  .fix-source-btn:hover { opacity: .7; }

  /* Read-only "view the current Source" control inside the fix-source
     banner — reuses the existing openFile() resource-browser viewer
     (GET /read/file), so this is a second navigation control, never a
     mutation. Same outline visual language as .fix-source-btn. */
  .view-source-btn {
    display: inline-flex; align-items: center; gap: 5px;
    background: none;
    color: var(--accent);
    border: 1px solid var(--accent);
    padding: 4px 10px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 10.5px;
    letter-spacing: .04em;
    border-radius: 4px;
    cursor: pointer;
    transition: opacity .15s ease;
  }
  .view-source-btn:hover { opacity: .7; }

  /* Give-up path advisory (issue #408, ADR-0029 decision 4) — always
     visible under a C3 row, no button: naming the C11 full-orphan path is
     "card copy", not an affordance (ADR-0029 Invariant — no delete
     affordance on a C3 finding). Mirrors .card-status-msg's quiet tone. */
  .c3-give-up-note {
    display: block;
    margin-top: 4px;
    color: var(--ink-4);
    font-size: 10.5px;
  }

  /* Persistent context banner shown above the pipeline stepper once "Fix
     Source" is clicked — carries the finding's context (Source filename +
     unsupported_claims + a view-the-file control) into the existing
     Upload -> Re-ingest -> Lint flow. Same info-banner palette as
     .coverage-fill-banner above. */
  .fix-source-banner {
    display: none;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    background: #f0f4ff;
    border: 1px solid #93b3e6;
    border-radius: 6px;
    margin-bottom: 16px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    letter-spacing: .03em;
    color: #2a4080;
    line-height: 1.5;
  }
  .fix-source-banner.visible { display: flex; }

  /* ── C2 Assign-Alias picker (issue #409, ADR-0030 decision 3) ──────────
     The red link's SECOND exit alongside .fill-import-btn (a picker +
     execute button, not just navigation — this one DOES fetch, so the
     Assign button gets the same filled-accent "this executes" treatment as
     .verify-reask-btn / .reingest-btn). First <select> in this file — kept
     visually consistent with the existing monospace form-control language
     (.draft-card-edit-form input/textarea) rather than a bare native
     control. */
  .assign-alias-select {
    font-family: "IBM Plex Mono", monospace;
    font-size: 10.5px;
    color: var(--ink);
    background: var(--bg);
    border: 1px solid var(--rule);
    border-radius: 4px;
    padding: 4px 6px;
    max-width: 220px;
  }
  .assign-alias-btn {
    display: inline-flex; align-items: center; gap: 5px;
    background: var(--accent);
    color: #fff;
    border: 0;
    padding: 4px 10px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 10.5px;
    letter-spacing: .04em;
    border-radius: 4px;
    cursor: pointer;
    transition: opacity .15s ease;
  }
  .assign-alias-btn:hover:not(:disabled) { opacity: .82; }
  .assign-alias-btn:disabled { opacity: .45; cursor: not-allowed; }

  /* Honest-miss offer buttons (issue #409, ADR-0030 decision 3) — rendered
     inside the existing .lint-batch-summary post-fill banner (ADR-0027
     decision 3), one per page the triggering Ingest run actually created.
     Same filled-accent "this executes" treatment as .assign-alias-btn. */
  .assign-alias-offer-btn {
    display: inline-flex; align-items: center; gap: 5px;
    background: var(--accent);
    color: #fff;
    border: 0;
    padding: 4px 10px;
    margin-top: 6px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 10.5px;
    letter-spacing: .04em;
    border-radius: 4px;
    cursor: pointer;
    transition: opacity .15s ease;
  }
  .assign-alias-offer-btn:hover:not(:disabled) { opacity: .82; }
  .assign-alias-offer-btn:disabled { opacity: .45; cursor: not-allowed; }

  /* ── C5 Reconcile (tier-B S1, issue #376, ADR-0028) ─────────────
     The one Authored-tier check with a real Gated affordance this slice —
     C4 keeps the disabled .tier-b-btn above until its own slice. */
  .reconcile-btn {
    display: inline-flex; align-items: center; gap: 5px;
    background: var(--accent);
    color: #fff;
    border: 0;
    padding: 4px 10px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 10.5px;
    letter-spacing: .04em;
    border-radius: 4px;
    cursor: pointer;
    transition: opacity .15s ease;
  }
  .reconcile-btn:hover:not(:disabled) { opacity: .82; }
  .reconcile-btn:disabled { opacity: .45; cursor: not-allowed; }

  .reconcile-overlay {
    position: fixed; inset: 0;
    background: rgba(17,17,17,.45);
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
    z-index: 1000;
  }
  .reconcile-modal {
    background: var(--surface);
    border: 1px solid var(--rule);
    border-radius: 8px;
    max-width: 920px;
    width: 100%;
    max-height: 90vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .reconcile-modal-head {
    padding: 12px 16px;
    border-bottom: 1px solid var(--rule);
    font-family: "IBM Plex Mono", monospace;
    font-size: 12px;
    letter-spacing: .03em;
    color: var(--ink);
  }
  .reconcile-modal-body {
    padding: 16px;
    overflow-y: auto;
    font-size: 12.5px;
  }
  .reconcile-grounding { margin-bottom: 14px; }
  .reconcile-claims {
    margin: 6px 0 0;
    padding-left: 18px;
    color: var(--fail);
    font-size: 12px;
  }
  .reconcile-columns {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  .reconcile-col-head {
    font-family: "IBM Plex Mono", monospace;
    font-size: 10.5px;
    letter-spacing: .04em;
    text-transform: uppercase;
    color: var(--ink-3);
    margin: 10px 0 4px;
  }
  .reconcile-col-head:first-child { margin-top: 0; }
  .reconcile-old {
    white-space: pre-wrap;
    word-break: break-word;
    background: var(--bg);
    border: 1px solid var(--rule);
    border-radius: 4px;
    padding: 8px 10px;
    font-size: 12px;
    color: var(--ink-2);
    max-height: 160px;
    overflow-y: auto;
    margin: 0;
  }
  .reconcile-textarea {
    width: 100%;
    box-sizing: border-box;
    font-family: "IBM Plex Mono", monospace;
    font-size: 12px;
    line-height: 1.5;
    padding: 8px 10px;
    border: 1px solid var(--rule);
    border-radius: 4px;
    resize: vertical;
  }
  .reconcile-actions {
    padding: 12px 16px;
    border-top: 1px solid var(--rule);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .reconcile-apply-btn {
    background: var(--pass);
    color: #fff;
    border: 0;
    padding: 6px 14px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    letter-spacing: .04em;
    border-radius: 4px;
    cursor: pointer;
  }
  .reconcile-apply-btn:hover:not(:disabled) { opacity: .85; }
  .reconcile-apply-btn:disabled { opacity: .45; cursor: not-allowed; }
  .reconcile-cancel-btn {
    background: none;
    color: var(--ink-2);
    border: 1px solid var(--rule);
    padding: 6px 14px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    letter-spacing: .04em;
    border-radius: 4px;
    cursor: pointer;
  }
  .reconcile-cancel-btn:hover:not(:disabled) { border-color: var(--ink-3); }
  .reconcile-error { color: var(--fail); }

  /* ── C5 conflict panel (issue #443) — surfaces the LLM's own evidence
     (page_a_claim / page_b_claim / summary / suggested_action) wherever a
     C5 finding appears: the finding row AND the Reconcile modal, above the
     editable drafts. Shared by both via c5ConflictPanel(). */
  .c5-conflict-panel {
    margin: 8px 0 14px;
    padding: 10px 12px;
    background: var(--bg);
    border: 1px solid var(--rule);
    border-radius: 4px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .c5-conflict-row { font-size: 12.5px; color: var(--ink-2); line-height: 1.5; }
  .c5-conflict-label {
    font-family: "IBM Plex Mono", monospace;
    font-size: 10.5px;
    letter-spacing: .03em;
    color: var(--ink-3);
    margin-right: 5px;
  }
  .c5-expand-btn {
    background: none;
    border: none;
    padding: 0;
    margin-left: 4px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 10.5px;
    color: var(--accent);
    text-decoration: underline;
    text-underline-offset: 2px;
    cursor: pointer;
  }

  /* ── C4 collision dual resolution (tier-B S2, issue #378, ADR-0028) ──
     Both real Gated affordances. Reuses every .reconcile-* modal/column
     class above (the shape is identical: old-vs-editable preview + apply). */
  .collision-merge-btn, .collision-differentiate-btn {
    display: inline-flex; align-items: center; gap: 5px;
    background: var(--accent);
    color: #fff;
    border: 0;
    padding: 4px 10px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 10.5px;
    letter-spacing: .04em;
    border-radius: 4px;
    cursor: pointer;
    transition: opacity .15s ease;
  }
  .collision-merge-btn:hover:not(:disabled), .collision-differentiate-btn:hover:not(:disabled) { opacity: .82; }
  .collision-merge-btn:disabled, .collision-differentiate-btn:disabled { opacity: .45; cursor: not-allowed; }

  .collision-guard-failed {
    color: var(--fail);
    margin: 0 0 10px;
    font-size: 12.5px;
  }
  .collision-referrers {
    margin: 6px 0 0;
    padding-left: 18px;
    color: var(--fail);
    font-size: 12px;
  }

  /* Lint finding rows — extend .rec with a note subrow */
  .rec .note {
    grid-column: 2 / -1;
    font-size: 11.5px;
    color: var(--ink-3);
    margin-top: 2px;
    white-space: pre-wrap;
    word-break: break-word;
  }

  /* ── Curation Queue (Phase 15 S6, issue #174) ───────────── */
  .curation-queue {
    margin-top: 40px;
  }

  .queue-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }

  .queue-header-label {
    font-family: "IBM Plex Mono", monospace;
    font-size: 10.5px; letter-spacing: .08em; text-transform: uppercase;
    color: var(--ink-3);
  }

  .queue-refresh-btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: none;
    color: var(--ink-3);
    border: 1px solid var(--rule);
    padding: 4px 10px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 10.5px;
    letter-spacing: .04em;
    border-radius: 4px;
    cursor: pointer;
    margin-left: auto;
    transition: color .15s ease, border-color .15s ease;
  }
  .queue-refresh-btn:hover:not(:disabled) {
    color: var(--ink);
    border-color: var(--ink-3);
  }
  .queue-refresh-btn:disabled { opacity: .45; cursor: not-allowed; }

  .queue-section {
    margin-bottom: 24px;
  }

  .queue-section-head {
    font-family: "IBM Plex Mono", monospace;
    font-size: 10px; letter-spacing: .08em; text-transform: uppercase;
    color: var(--ink-3);
    padding: 8px 0 8px;
    border-bottom: 1px solid var(--rule);
    margin-bottom: 10px;
    display: flex; align-items: center; gap: 8px;
  }

  .queue-empty {
    padding: 14px 0;
    font-size: 13px;
    color: var(--ink-3);
    font-style: italic;
  }

  /* Per-section what-it-does one-liner (ADR-0021 legibility) */
  .queue-section-desc {
    font-size: 12px;
    color: var(--ink-3);
    margin: 0 0 10px;
    line-height: 1.45;
  }

  /* Promote-all batch action (tier-B S6, issue #382) — sits flush right of
     the C8 section-head label/count, same margin-left:auto technique as
     .queue-refresh-btn in .queue-header. */
  .queue-batch-action {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* One-shot Promote-all result banner (issue #382 AC — per-item skipped
     list). Cleared after a single render, mirrors .lint-batch-summary. */
  .promote-batch-summary {
    padding: 8px 0;
    font-size: 12px;
  }
  .promote-batch-skipped {
    margin: 6px 0 0;
    padding-left: 18px;
    color: var(--ink-3);
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    line-height: 1.6;
  }

  /* Draft card: bordered, full-width, body preview */
  .draft-card {
    border: 1px solid var(--rule);
    border-radius: 6px;
    background: var(--surface);
    overflow: hidden;
    margin-bottom: 10px;
  }

  .draft-card-head {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 12px 16px 10px;
    border-bottom: 1px solid var(--rule-2);
  }

  .draft-card-question {
    font-size: 13.5px;
    font-weight: 500;
    color: var(--ink);
    flex: 1;
    min-width: 0;
    line-height: 1.4;
  }

  .draft-card-meta {
    font-family: "IBM Plex Mono", monospace;
    font-size: 10.5px;
    color: var(--ink-4);
    flex-shrink: 0;
    padding-top: 2px;
    white-space: nowrap;
  }

  .draft-card-body {
    padding: 10px 16px;
    font-size: 13px;
    color: var(--ink-2);
    line-height: 1.55;
    white-space: pre-wrap;
    word-break: break-word;
    max-height: 160px;

    border-bottom: 1px solid var(--rule-2);
  }

  .draft-card-sources {
    padding: 6px 16px 8px;
    font-family: "IBM Plex Mono", monospace;

  .draft-card-actions {
    display: flex;

  .promote-btn {
    display: inline-flex; align-items: center; gap: 5px;

    border: 0;
    padding: 5px 12px;
    font-family: "IBM Plex Mono", monospace;

  .discard-btn {

    border: 1px solid var(--fail);

    font-size: 11px;
    letter-spacing: .04em;
    border-radius: 4px;

  .edit-btn {
    display: inline-flex; align-items: center; gap: 5px;
    background: none;
    color: var(--ink-3);
    border: 1px solid var(--rule);
    padding: 5px 12px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    letter-spacing: .04em;
    border-radius: 4px;

  }
  .edit-btn:hover:not(:disabled) { color: var(--ink); border-color: var(--ink-3); }
  .edit-btn:disabled { opacity: .45; cursor: not-allowed; }

  /* Gate legibility (issue #379 / ADR-0026): operator-language "what this
     button does" line, distinct from the section-level ADR-referencing
     description above the card list. */
  .draft-card-what-it-means {
    padding: 0 16px 8px;

  .draft-card-edit-form {

    color: var(--ink-3);

  .draft-card-edit-form input[type="text"],
  .draft-card-edit-form textarea {

    box-sizing: border-box;
    font-family: inherit;
    font-size: 13px;
    color: var(--ink);

  .edit-validation-errors {
    margin: 0;
    padding: 8px 10px;
    background: #fff0f0;
    border: 1px solid var(--fail);
    border-radius: 4px;

    color: var(--fail);
    line-height: 1.5;

  .edit-form-actions { display: flex; align-items: center; gap: 8px; }

  .card-status-msg {
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    letter-spacing: .03em;
    margin-left: 8px;
    flex: 1;

  .card-status-msg.ok   { color: var(--pass); }
  .card-status-msg.err  { color: var(--fail); }

  /* Flag card (C9 stale / C10 invalid). C9 offers Re-file (tier-B S4,
     issue #380) — never destructive: a failed re-ground writes nothing and
     the live page keeps serving; C10 offers Discard (inert only). */
  .flag-card {
    border: 1px solid var(--rule);
    border-radius: 6px;
    background: var(--surface);
    overflow: hidden;
    margin-bottom: 8px;
    padding: 10px 16px;

    grid-template-columns: 24px 1fr auto;

  .flag-slug {
    font-family: "IBM Plex Mono", monospace;

    line-height: 1.4;
  }

  .flag-actions { display: flex; align-items: flex-start; padding-top: 1px; }

  /* Full-width status row (issue #496): a long Re-file/Discard outcome
     message inside .flag-actions inflates the auto grid column's
     max-content, collapsing the 1fr body column to one word per line.
     The message lives on its own grid row spanning the whole card; the
     span keeps churning its own card-status-msg ok/err classes freely.
     :empty keeps the row invisible until there is something to say. */
  .flag-status-row { grid-column: 1 / -1; min-width: 0; }
  .flag-status-row .card-status-msg {
    display: block;
    flex: none;
    margin: 6px 0 0 36px; /* aligns under .flag-body: 24px icon col + 12px gap */
  }
  .flag-status-row .card-status-msg:empty { display: none; }

  @media (max-width: 540px) {
    .page { padding: 0 20px 48px; }
  }

  /* ── Demo environment reset banner (ADR-0021) ───────── */
  /* Always visible — no display:none, no JS .visible toggle.
     Explains that the public demo is ephemeral and resets to
