<body>
  <div class="page">
    <header class="masthead">
      <!-- §12.4: all text via textContent; no innerHTML -->
      <a class="mast-logo" href="/">
        <span>ask</span><span class="dot">.</span><span>Wiki</span><span class="amp">&amp;</span><span>RAG</span>
      </a>
      <span class="mast-sep">/</span>
      <span class="mast-page">console</span>
      <!-- zh/en Lint chrome toggle (issue #365) — label is set/updated by
           applyConsoleLang() below; this static "中文" is the pre-JS/no-JS
           fallback (default language is English). -->
      <button id="lang-toggle" class="mast-lang-toggle" type="button" aria-label="Toggle console language">中文</button>
      <a class="mast-reader" href="/">reader</a>
    </header>

    <!-- Demo environment reset banner (ADR-0021) — always visible, static HTML, no JS toggle.
         Changes made here are real (the endpoints are live) but ephemeral: the console
         resets to the committed seed on every deploy and on the ~2-day cron reset. -->
    <div class="demo-reset-banner" role="status" aria-label="Demo environment notice">
      <span class="demo-reset-icon">&#9432;</span>
      <span class="demo-reset-text"><strong>Demo environment</strong> — changes are real but ephemeral. This console resets to the seeded knowledge base periodically (~2 days) and on each deploy.</span>
    </div>

    <!-- Staleness guard: warns when Ingest ran but Index hasn't been rebuilt (#173) -->
    <div id="staleness-banner" class="staleness-banner" role="alert" aria-live="polite">
      <span class="stale-icon">&#9888;</span>
      <span class="stale-msg">Section Index may be stale — Ingest has run since the last Index build. Run the Index step to rebuild.</span>
    </div>

    <!-- Routed Coverage Fill context banner (tier-B S7, issue #383, ADR-0027):
         shown when a C1/C2 "Fill via Import" control is clicked, carrying the
         finding's context into the pipeline below. Text is set by JS
         (showCoverageFillBanner); this element is a pure navigation aid — it
         never triggers a request itself. -->
    <div id="coverage-fill-banner" class="coverage-fill-banner" role="status" aria-live="polite"></div>

    <!-- C3 Routed fix-the-Source context banner (issue #408, ADR-0029):
         shown when a C3 "Fix Source" control is clicked, carrying the
         finding's Source filename + unsupported_claims + a view-the-file
         control into the pipeline below. Populated by JS
         (showFixSourceBanner); this element is a pure navigation aid — it
         never triggers a request itself (ADR-0029 Invariant). -->
    <div id="fix-source-banner" class="fix-source-banner" role="status" aria-live="polite"></div>

    <div id="pipeline-root"></div>

    <!-- RAG rebuild track: parallel to Wiki chain (#173) -->
    <div id="rag-track-root"></div>

    <!-- Hybrid dense rebuild track: operator-triggered full re-embed (ADR-0022, issue #348) -->
    <div id="hybrid-track-root"></div>

    <!-- Curation Queue: built by JS after Lint runs (Phase 15 S6, issue #174) -->
    <div id="curation-queue-root"></div>

    <div id="browser-section">
      <!-- Resource browser built by JS below (Phase 15 S5, issue #171) -->
    </div>
  </div>

<script>
"use strict";

/* ============================================================
   §12.4: textContent-only DOM helper — innerHTML is banned.
   Accepts: el(tag, props?, ...children)
   - props.class   → className
   - props.text    → textContent
   - props.html    → THROWS (banned)
   - props.on*     → addEventListener
   - other props   → setAttribute
   Children may be DOM nodes, strings, null/false (skipped).
   ============================================================ */
function el(tag, props) {
  var kids = Array.prototype.slice.call(arguments, 2);
  var n = document.createElement(tag);
  if (props) {
    var entries = Object.entries(props);
    for (var i = 0; i < entries.length; i++) {
      var k = entries[i][0], v = entries[i][1];
      if (v == null) continue;
      if (k === "class") n.className = v;
      else if (k === "text") n.textContent = v;
      else if (k === "html") throw new Error("innerHTML banned (CODING_STANDARD §12.4)");
      else if (k.startsWith("on") && typeof v === "function") n.addEventListener(k.slice(2).toLowerCase(), v);
      else n.setAttribute(k, v);
    }
  }
  for (var j = 0; j < kids.length; j++) {
    var kid = kids[j];
    if (kid == null || kid === false) continue;
    n.append(kid.nodeType ? kid : document.createTextNode(String(kid)));
  }
  return n;
}

/* ============================================================
   Pipeline step descriptors.

   Each step has:
     id      — machine key, used for CSS and state
     label   — display name in the stepper track
     desc    — one-line description shown in the step panel header
     run     — async function(setState) → fires the request + renders result
               setState(busy) enables/disables the button

   Steps declared in pipeline order. Later slices (Ingest #172, Index/Lint #173)
   replace the stub run() functions here with real implementations.
   ============================================================ */

/* ── Per-step result-card renderers ───────────────────────── */

/* Upload result card — matches Phase 15 S1 logic, now inside the stepper panel */
function renderUploadCard(results) {
  var written  = results.filter(function(r) { return r.status === "written";  }).length;
  var rejected = results.filter(function(r) { return r.status === "rejected"; }).length;
  var errors   = results.filter(function(r) { return r.status === "error";    }).length;

  var parts = [];
  if (written > 0)  parts.push(written  + " written");
  if (rejected > 0) parts.push(rejected + " rejected");
  if (errors > 0)   parts.push(errors   + " error" + (errors !== 1 ? "s" : ""));
  var summaryText = parts.join(" · ") || "0 files";

  var badgeClass = errors > 0 ? "badge badge-fail"
                 : rejected > 0 ? "badge badge-warn"
                 : "badge badge-ok";

  var head = el("div", { class: "result-card-head" },
    el("span", { text: "Upload" }),
    el("span", { text: "·" }),
    el("span", { class: badgeClass },
      el("span", { class: "dot" }),
      el("span", { text: summaryText })
    )
  );

  var rows = el("div");
  results.forEach(function(r, i) {
    var labelClass = "label label-" + r.status;
    var labelText  = r.status;
    var subtitle   = "";

    if (r.status === "written") {
      /* .md routes straight to docs/ (final Source — it SKIPS the Import step);
         .html/.txt/.pdf land in raw/ and still need Import to convert. Make
         that distinction explicit so a user who uploaded a .md sees it
         succeeded here, instead of looking for it (in vain) on the Import card. */
      var lastSeg = r.target_dir ? r.target_dir.split(/[/\\]/).filter(Boolean).pop() : "";
      if (lastSeg === "docs") {
        labelText = "in docs";
        subtitle  = "→ docs/ · saved, no Import needed";
      } else {
        labelText = "staged";
        subtitle  = "→ raw/ · run Import to convert";
      }
    } else if ((r.status === "rejected" || r.status === "error") && r.reason) {
      subtitle = r.reason;
    }

    var bodyEl = el("div", { class: "body" },
      el("div", { class: "id", text: r.filename })
    );
    if (subtitle) bodyEl.append(el("div", { class: "crumb", text: subtitle }));

    rows.append(el("div", { class: "rec" },
      el("div", { class: "num", text: String(i + 1).padStart(2, "0") }),
      bodyEl,
      el("div", { class: labelClass, text: labelText })
    ));
  });

  return el("div", { class: "result-card" }, head, rows);
}

/* Import result card — renders ImportResponse (imported_sources + skipped_sources
   + failed_sources). issue #447: failures render FIRST (not buried after every
   success row) with a prominent tinted/accented treatment, and a NoTextLayer
   failure offers a guarded Transcribe action that turns its OWN row into a
   normal success row in place on completion — no full card re-fetch, since
   ImportResponse is a one-shot batch result with nothing to re-GET. */
function renderImportCard(data) {
  var imported = data.imported_sources || [];
  var skipped  = data.skipped_sources  || [];
  var failed   = data.failed_sources   || [];

  var badgeTextEl = el("span", { text: "" });
  var badgeEl = el("span", { class: "badge" }, el("span", { class: "dot" }), badgeTextEl);

  /* Recomputed on load AND after a Transcribe success turns a failure into a
     success — keeps the head badge/counts honest without a full re-render. */
  function updateSummary() {
    var parts = [];
    if (imported.length > 0) parts.push(imported.length + " imported");
    if (skipped.length > 0)  parts.push(skipped.length  + " skipped");
    if (failed.length > 0)   parts.push(failed.length   + " failed");
    badgeTextEl.textContent = parts.join(" · ") || "0 files";
    badgeEl.className = failed.length > 0  ? "badge badge-fail"
                      : skipped.length > 0 ? "badge badge-warn"
                      : "badge badge-ok";
  }
  updateSummary();

  var head = el("div", { class: "result-card-head" },
    el("span", { text: "Import" }),
    el("span", { text: "·" }),
    badgeEl
  );

  var rows = el("div");
  var rowIndex = 0;

  /* Helper: build a row from ImportSourceResultSchema (imported / skipped) */
  function makeSourceRow(r) {
    rowIndex++;
    /* raw_path → docs_path breadcrumb */
    var rawName  = r.raw_path  ? r.raw_path.split(/[/\\]/).pop()  : "";
    var docsName = r.docs_path ? r.docs_path.split(/[/\\]/).pop() : "";
    var subtitle = rawName && docsName ? rawName + " → " + docsName : rawName || docsName;

    var bodyEl = el("div", { class: "body" },
      el("div", { class: "id", text: rawName || r.raw_path })
    );
    if (r.original_format) {
      bodyEl.append(el("div", { class: "crumb", text: subtitle + " · " + r.original_format }));
    } else if (subtitle) {
      bodyEl.append(el("div", { class: "crumb", text: subtitle }));
    }

    var labelClass = "label label-" + r.status; /* created | updated | skipped */
    rows.append(el("div", { class: "rec" },
      el("div", { class: "num", text: String(rowIndex).padStart(2, "0") }),
      bodyEl,
      el("div", { class: labelClass, text: r.status })
    ));
  }

  /* Helper: build a row from ImportFailureSchema — prominent treatment
     (issue #447): the row itself carries .rec-failed (tinted background +
     accent bar), and shows the error_type as a small badge ALONGSIDE the
     full error_message, never one in place of the other. A NoTextLayer
     failure additionally offers a guarded Transcribe action; on success the
     row mutates itself into a normal success row in place (label, id, crumb)
     and the new doc feeds lastImportedDocFilenames so Ingest picks it up,
     exactly like a normal Import success would. */
  function makeFailureRow(f) {
    rowIndex++;
    var rawName = f.raw_path ? f.raw_path.split(/[/\\]/).pop() : f.raw_path;
    var idEl    = el("div", { class: "id", text: rawName || f.raw_path });
    var crumbEl = el("div", { class: "crumb" },
      el("span", { class: "error-type", text: f.error_type }),
      document.createTextNode(f.error_message || "")
    );
    var bodyEl  = el("div", { class: "body" }, idEl, crumbEl);
    var labelEl = el("div", { class: "label label-failed", text: "failed" });
    var rowEl   = el("div", { class: "rec rec-failed" },
      el("div", { class: "num", text: String(rowIndex).padStart(2, "0") }),
      bodyEl,
      labelEl
    );

    if (f.error_type === "NoTextLayer" && rawName) {
      var actionsEl = transcribeAction(rawName, function(result) {
        /* Turn THIS row into a normal success row in place, and drop the
           now-irrelevant Transcribe action (issue #447: a leftover disabled
           button under a success row would be dead, confusing chrome). */
        var docsName = result.docs_path ? result.docs_path.split(/[/\\]/).pop() : "";
        rowEl.classList.remove("rec-failed");
        idEl.textContent = docsName || rawName;
        crumbEl.replaceChildren(document.createTextNode(
          rawName + " → " + docsName + " · " + LINT_CHROME[consoleLang].transcribeSuccess
        ));
        labelEl.className = "label label-" + result.status; /* created | updated | skipped */
        labelEl.textContent = result.status;
        actionsEl.remove();

        failed.splice(failed.indexOf(f), 1);
        imported.push({ raw_path: f.raw_path, docs_path: result.docs_path, status: result.status });
        updateSummary();

        if (docsName) {
          if (!lastImportedDocFilenames) lastImportedDocFilenames = [];
          if (lastImportedDocFilenames.indexOf(docsName) === -1) {
            lastImportedDocFilenames.push(docsName);
          }
        }
      });
      bodyEl.append(actionsEl);
    }

    rows.append(rowEl);
  }

  failed.forEach(makeFailureRow);
  imported.forEach(makeSourceRow);
  skipped.forEach(makeSourceRow);

  return el("div", { class: "result-card" }, head, rows);
}

/* ── Transcribe action (issue #447, ADR-0032) ─────────────────────────────
   Offered on a NoTextLayer Import failure row. Uses the SAME async
   batch+poll job #459 built (POST /wiki/transcribe/batch + GET
   .../jobs/{job_id}) rather than the synchronous POST /wiki/transcribe,
   because only the job status exposes pages_done/pages_total — the real,
   server-owned progress data the confirm modal's progress bar renders
   (CODING_STANDARD §12.8 bans a CLIENT-GUESSED percentage, not a real
   server-reported count — the same exception that already authorises the
   pipeline's own "Batch k/N" indicator). Only one Transcribe run at a time
   (mirrors the Lint card's remediationInFlight guard). */
var transcribeInFlight = false;
/* True while ANY row's confirm modal is on screen (pre-confirm included,
   when transcribeInFlight is still false) — a sibling row's Transcribe click
   during that window used to stack a second confirm modal (issue #476 L1). */
var transcribeModalOpen = false;

function transcribeAction(source, onSuccess) {
  var btn = el("button", { class: "transcribe-btn", type: "button",
    text: LINT_CHROME[consoleLang].transcribe });
  var statusMsgEl = el("span", { class: "card-status-msg" });

  btn.addEventListener("click", function() {
    if (btn.disabled || transcribeInFlight) return;
    if (transcribeModalOpen) {
      statusMsgEl.textContent = LINT_CHROME[consoleLang].transcribeDialogOpen;
      statusMsgEl.className = "card-status-msg err";
      return;
    }
    btn.disabled = true;
    statusMsgEl.textContent = LINT_CHROME[consoleLang].transcribeChecking;
    statusMsgEl.className = "card-status-msg";

    /* Mechanical preflight (no model call, issue #447) — names the REAL page
       count + configured cap in the confirm step rather than guessing one
       client-side (§12.5). */
    fetch("/wiki/transcribe/page-count?source=" + encodeURIComponent(source))
      .then(function(resp) {
        if (!resp.ok) return resp.text().then(function(t) { throw new Error("HTTP " + resp.status + ": " + t); });
        return resp.json();
      })
      .then(function(data) {
        statusMsgEl.textContent = "";
        /* btn stays disabled for as long as the confirm dialog is open or a
           job is running for THIS row — openTranscribeConfirm re-enables it
           on cancel/failure; on success the whole row (button included) is
           discarded (see the onSuccess callback above), so nothing to
           re-enable there. Without this, a second click while the dialog is
           still open (pre-confirm) would fetch a second preflight and stack
           a second confirm modal for the SAME source. */
        openTranscribeConfirm(source, data.page_count, data.max_pages, btn, onSuccess);
      })
      .catch(function(err) {
        btn.disabled = false;
        statusMsgEl.textContent = "Error: " + (err.message || String(err));
        statusMsgEl.className = "card-status-msg err";
      });
  });

  return el("div", { class: "lint-row-actions" }, btn, statusMsgEl);
}

/* Confirmed-operation dialog (mirrors openDeleteOrphanConfirm's shape) —
   names the operation, the real page count, and the page cap BEFORE it
   runs. On Confirm: submits the batch job, then polls it, updating a real
   determinate progress bar for the whole (tens-of-seconds) duration so the
   operator never faces a blank spinner (issue #447 first-class requirement).
   onSuccess(result) receives the completed TranscribeJobResultSchema entry;
   the caller (renderImportCard) turns its own failure row into a success row.
   triggerBtn is the row's own Transcribe button (kept disabled by
   transcribeAction while this dialog is open) — re-enabled here on any exit
   that did NOT actually submit a job, so cancelling never leaves the button
   stuck disabled forever. */
function openTranscribeConfirm(source, pageCount, maxPages, triggerBtn, onSuccess) {
  var chrome = LINT_CHROME[consoleLang];
  var overlay = el("div", { class: "reconcile-overlay" });
  var statusMsgEl = el("span", { class: "card-status-msg" });
  var progressFillEl = el("div", { class: "transcribe-progress-fill", style: "width:0%" });
  var progressTrackEl = el("div", { class: "transcribe-progress-track" }, progressFillEl);
  progressTrackEl.style.display = "none";
  var progressLabelEl = el("span", { class: "transcribe-progress-label" });
  progressLabelEl.style.display = "none";
  var cancelBtn = el("button", { class: "reconcile-cancel-btn", type: "button", text: chrome.transcribeCancel });
  var confirmBtn = el("button", { class: "transcribe-btn", type: "button", text: chrome.transcribeConfirm });

  /* True once the batch job has actually been submitted (POST fired) — a
     cancel/backdrop-click BEFORE that point re-enables triggerBtn (nothing
     is running yet); AFTER that point the job keeps running in the
     background regardless of the modal (issue #459 design). */
  var jobSubmitted = false;
  /* null while nothing terminal has happened; "failed" once a terminal
     failure is rendered (server said failed, or the submit itself never
     created a job); "abandoned" when polling gave up on a job that may STILL
     be running server-side (issue #476 M2). Only cancelAndClose reads it —
     re-enabling the trigger is the modal exit's job, never fail()'s
     (issue #476 M1: fail() re-enabling mid-modal let a re-click stack a
     second confirm modal for the same source). */
  var jobOutcome = null;

  transcribeModalOpen = true;
  function closeModal() { transcribeModalOpen = false; overlay.remove(); }
  function cancelAndClose() {
    /* Re-enable the trigger only when nothing can still be running: never
       submitted, or a server-terminal failure. An abandoned poll keeps it
       disabled — re-clicking would start a SECOND paid transcription of a
       source whose job may still be running (issue #476 M2). */
    if (!jobSubmitted || jobOutcome === "failed") triggerBtn.disabled = false;
    closeModal();
  }
  overlay.addEventListener("click", function(e) {
    /* Backdrop-dismiss is inert while the job is in flight (issue #476 M3)
       — the Cancel button already is; otherwise fail() would render into a
       detached modal and the terminal failure would surface nowhere. */
    if (e.target === overlay && !transcribeInFlight) cancelAndClose();
  });
  cancelBtn.addEventListener("click", function() {
    if (cancelBtn.disabled) return;
    cancelAndClose();
  });

  function setProgress(pagesDone, pagesTotal) {
    var denominator = pagesTotal > 0 ? pagesTotal : pageCount;
    var pct = denominator > 0 ? Math.round((pagesDone / denominator) * 100) : 0;
    progressFillEl.style.width = pct + "%";
    progressLabelEl.textContent = chrome.transcribeProgress
      .replace("{done}", String(pagesDone)).replace("{total}", String(denominator));
  }

  confirmBtn.addEventListener("click", function() {
    if (confirmBtn.disabled || transcribeInFlight) return;
    jobSubmitted = true;
    jobOutcome = null;
    transcribeInFlight = true;
    confirmBtn.disabled = true;
    cancelBtn.disabled = true;
    cancelBtn.textContent = chrome.transcribeCancel;
    statusMsgEl.replaceChildren(el("span", { class: "spinner" }),
      document.createTextNode(" " + chrome.transcribeWorking));
    statusMsgEl.className = "card-status-msg";
    progressTrackEl.style.display = "block";
    progressLabelEl.style.display = "block";
    setProgress(0, 0);

    /* Renders the terminal failure INSIDE the modal and hands control back
       to its Close button. Deliberately never touches triggerBtn
       (issue #476 M1) — cancelAndClose owns that, gated on jobOutcome.
       abandoned=true marks a poll give-up on a possibly-still-running job. */
    function fail(message, abandoned) {
      transcribeInFlight = false;
      jobOutcome = abandoned ? "abandoned" : "failed";
      /* A frozen progress bar behind an error reads as "still working" or
         "finished" (issue #476 L4). */
      progressTrackEl.style.display = "none";
      progressLabelEl.style.display = "none";
      statusMsgEl.textContent = "Error: " + message;
      statusMsgEl.className = "card-status-msg err";
      cancelBtn.disabled = false;
      cancelBtn.textContent = chrome.transcribeClose;
    }

    fetch("/wiki/transcribe/batch", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ sources: [source] }),
    })
      .then(function(resp) {
        if (!resp.ok) return resp.text().then(function(t) { throw new Error("HTTP " + resp.status + ": " + t); });
        return resp.json();
      })
      .then(function(data) {
        pollTranscribeJob(
          data.job_id,
          setProgress,
          function(job) {
            var result = (job.results || [])[0];
            if (job.status === "completed" && result && result.status !== "failed") {
              transcribeInFlight = false;
              closeModal();
              onSuccess(result);
            } else {
              var reason = job.error ||
                (result && (result.error_message || result.error_type)) ||
                "unknown error";
              fail(reason);
            }
          },
          function(err) {
            /* Bounded retries exhausted (issue #476 M2): the job may still
               be running server-side — say so, and mark the outcome
               abandoned so closing the modal does NOT hand the trigger back
               (a re-click would double-charge the vision budget). */
            fail((err.message || String(err)) + " — " + chrome.transcribePollLost, true);
          }
        );
      })
      .catch(function(err) {
        /* The submit itself failed — no job exists server-side, so an
           in-modal Confirm retry is safe. */
        jobSubmitted = false;
        confirmBtn.disabled = false;
        fail(err.message || String(err));
      });
  });

  var modal = el("div", { class: "reconcile-modal" },
    el("div", { class: "reconcile-modal-head" },
      el("span", { text: chrome.transcribeConfirmTitle + ": " + source })),
    el("div", { class: "reconcile-modal-body" },
      el("p", { text: chrome.transcribeConfirmBody
        .replace("{filename}", source)
        .replace("{pageCount}", String(pageCount))
        .replace("{maxPages}", String(maxPages)) }),
      progressTrackEl, progressLabelEl
    ),
    el("div", { class: "reconcile-actions" }, confirmBtn, cancelBtn, statusMsgEl)
  );
  overlay.append(modal);
  document.body.append(overlay);
}

/* Generic poller for GET /wiki/transcribe/jobs/{job_id} (issue #459 AC5).
   Recursive setTimeout (never setInterval) so a slow response can never
   overlap the next poll. onProgress(pagesDone, pagesTotal) fires on every
   tick — real, server-reported numbers, never a client-guessed percentage
   (CODING_STANDARD §12.8). onDone(job) fires exactly once, when status is
   "completed" or "failed"; onError(err) fires only after BOUNDED retries are
   exhausted (issue #476 M2): a 63-page scan is 40-75 polls at 800 ms, so a
   single proxy 502 is not exotic — one blip must not abandon a still-running
   PAID job (the pre-#476 first-blip abandon re-enabled the trigger and
   invited a duplicate batch of the same PDF). Retries poll the SAME job_id;
   an unrecognised status is also bounded (issue #476 L5) rather than polled
   forever. */
function pollTranscribeJob(jobId, onProgress, onDone, onError) {
  var consecutiveFailures = 0;
  var unknownStatusTicks = 0;
  function tick() {
    fetch("/wiki/transcribe/jobs/" + encodeURIComponent(jobId))
      .then(function(resp) {
        if (!resp.ok) return resp.text().then(function(t) { throw new Error("HTTP " + resp.status + ": " + t); });
        return resp.json();
      })
      .then(function(job) {
        consecutiveFailures = 0;
        onProgress(job.pages_done, job.pages_total);
        if (job.status === "completed" || job.status === "failed") {
          onDone(job);
          return;
        }
        if (job.status === "submitted" || job.status === "working") {
          unknownStatusTicks = 0;
        } else {
          unknownStatusTicks += 1;
          if (unknownStatusTicks >= 5) {
            onError(new Error("unknown transcribe job status: " + String(job.status)));
            return;
          }
        }
        setTimeout(tick, 800);
      })
      .catch(function(err) {
        consecutiveFailures += 1;
        if (consecutiveFailures >= 3) { onError(err); return; }
        setTimeout(tick, 1600);
      });
  }
  tick();
}

/* Ingest result card — renders IngestResponse (results + skipped_sources + failed_sources).
   Per-page grounding pass/fail badge + hash-skip status. (Red-link counts live on the Lint
   card — they are a cross-page Lint C2 finding, not present in IngestResponse; AC amended.)
   §12.4: all server-derived text via textContent. */
function renderIngestCard(data, batchLabel) {
  var results  = data.results          || [];
  var skipped  = data.skipped_sources  || [];
  var failed   = data.failed_sources   || [];
  var grounding_failed = data.pages_with_failed_grounding || [];

  /* Summary line */
  var parts = [];
  if (results.length > 0) {
    var liveCount   = results.filter(function(r) { return r.status !== "skipped"; }).length;
    var skippedCount = skipped.length;
    if (liveCount > 0)   parts.push(liveCount + " ingested");
    if (skippedCount > 0) parts.push(skippedCount + " unchanged");
  }
  if (failed.length > 0) parts.push(failed.length + " failed");
  var summaryText = parts.join(" · ") || "0 sources";
  if (batchLabel) summaryText = batchLabel + " · " + summaryText;

  var hasFailures = failed.length > 0 || grounding_failed.length > 0;
  var badgeClass  = hasFailures ? "badge badge-fail"
                  : skipped.length > 0 ? "badge badge-warn"
                  : "badge badge-ok";

  var head = el("div", { class: "result-card-head" },
    el("span", { text: "Ingest" }),
    el("span", { text: "·" }),
    el("span", { class: badgeClass },
      el("span", { class: "dot" }),
      el("span", { text: summaryText })
    )
  );

  var rows = el("div");
  var rowIndex = 0;

  /* Helper: grounding label for a page slug */
  function groundingLabel(slug) {
    if (grounding_failed.indexOf(slug) !== -1) return "failed grounding";
    return "grounded";
  }
  function groundingLabelClass(slug) {
    if (grounding_failed.indexOf(slug) !== -1) return "label label-failed-grounding";
    return "label label-grounded";
  }

  /* Render IngestSourceResult rows (created / updated) */
  results.forEach(function(r) {
    var pages = r.pages_written || [];
    if (pages.length === 0) {
      /* Source had no pages (should not happen for non-skipped, but be defensive) */
      rowIndex++;
      rows.append(el("div", { class: "rec" },
        el("div", { class: "num", text: String(rowIndex).padStart(2, "0") }),
        el("div", { class: "body" },
          el("div", { class: "id",   text: r.source }),
          el("div", { class: "crumb", text: "no pages written" })
        ),
        el("div", { class: "label label-failed-grounding", text: r.status || "?" })
      ));
      return;
    }

    pages.forEach(function(pageRelPath) {
      rowIndex++;
      var pageName = pageRelPath.split("/").pop().replace(/\.md$/, "");
      var slug = pageName;

      /* Per-page status badge comes from the grounding outcome. Red-link counts are a
         cross-page Lint C2 finding (not in IngestResponse) — shown on the Lint card. */
      var lbl      = groundingLabel(slug);
      var lblClass = groundingLabelClass(slug);

      var crumbParts = [r.source];
      if (r.status === "updated") crumbParts.push("updated");
      else if (r.status === "created") crumbParts.push("created");

      var bodyEl = el("div", { class: "body" },
        el("div", { class: "id",   text: pageName }),
        el("div", { class: "crumb", text: crumbParts.join(" · ") })
      );
      rows.append(el("div", { class: "rec" },
        el("div", { class: "num", text: String(rowIndex).padStart(2, "0") }),
        bodyEl,
        el("div", { class: lblClass, text: lbl })
      ));
    });
  });

  /* Skipped (hash-match, unchanged) rows */
  skipped.forEach(function(r) {
    rowIndex++;
    rows.append(el("div", { class: "rec" },
      el("div", { class: "num", text: String(rowIndex).padStart(2, "0") }),
      el("div", { class: "body" },
        el("div", { class: "id",   text: r.source }),
        el("div", { class: "crumb", text: "unchanged (hash match)" })
      ),
      el("div", { class: "label label-skipped-hash", text: "skipped" })
    ));
  });

  /* Failed source rows */
  failed.forEach(function(sourceName) {
    rowIndex++;
    rows.append(el("div", { class: "rec" },
      el("div", { class: "num", text: String(rowIndex).padStart(2, "0") }),
      el("div", { class: "body" },
        el("div", { class: "id",   text: sourceName })
      ),
      el("div", { class: "label label-failed-grounding", text: "failed" })
    ));
  });

  return el("div", { class: "result-card" }, head, rows);
}

/* ── Batch chunker helpers (§12.8: client owns the batch count) ──────────── */

/* Split array into chunks of at most `size` items. */
function chunkArray(arr, size) {
  var chunks = [];
  for (var i = 0; i < arr.length; i += size) {
    chunks.push(arr.slice(i, i + size));
  }
  return chunks;
}

/* Run sequential ingest batches with "Batch k/N" indicator.
   §12.8: NO fake percentage. "Batch k/N" is the only determinate progress
   (client owns the counter). Within each batch an indeterminate spinner runs.

   sourceNames: array of bare filenames (e.g. ["a.md", "b.md"]).
                null/empty → POST /ingest with no sources (all-docs batch).
   resultEl:    DOM element to update with progress + result cards.
   setStepBusy: function(bool) — disables/enables the Run button.
*/
function runIngestBatches(sourceNames, resultEl, setStepBusy) {
  var BATCH_SIZE = 5;

  /* Normalise: null / empty → all-docs (single call, no sources field) */
  var useAllDocs = !sourceNames || sourceNames.length === 0;
  var batches    = useAllDocs ? [null] : chunkArray(sourceNames, BATCH_SIZE);
  var totalBatches = batches.length;

  /* Accumulate results across batches for the final combined card */
  var accumulatedResults  = [];
  var accumulatedSkipped  = [];
  var accumulatedFailed   = [];
  var accumulatedGrFailed = [];

  function runBatch(batchIndex) {
    if (batchIndex >= batches.length) {
      /* All batches done — render combined result card */
      setStepBusy(false);
      var combined = {
        results:                    accumulatedResults,
        skipped_sources:            accumulatedSkipped,
        failed_sources:             accumulatedFailed,
        pages_with_failed_grounding: accumulatedGrFailed,
      };
      /* Record the pages THIS run wrote (tier-B S7, issue #383, ADR-0027) —
         feeds the Routed Coverage Fill honest-miss report: "imported and
         ingested — new pages A, B — but [[slug]] is still unresolved." Pure
         extraction (basename, no dir, no .md), same convention the Import
         step already uses for lastImportedDocFilenames below. */
      lastIngestedPageSlugs = [];
      accumulatedResults.forEach(function(r) {
        (r.pages_written || []).forEach(function(p) {
          lastIngestedPageSlugs.push(p.split(/[/\\]/).pop().replace(/\.md$/, ""));
        });
      });
      ingestRunCounter += 1;
      resultEl.replaceChildren(renderIngestCard(combined, null));
      return;
    }

    var batchSources = batches[batchIndex];
    var batchLabel   = totalBatches > 1
      ? "Batch " + (batchIndex + 1) + "/" + totalBatches
      : null;
    var spinnerLabel = batchLabel ? batchLabel + "…" : "Running Ingest…";

    /* Show indeterminate spinner with honest batch label (no fake %) */
    resultEl.replaceChildren(makeBusyCard(spinnerLabel));

    var body = batchSources ? JSON.stringify({ sources: batchSources }) : null;
    var fetchOpts = {
      method: "POST",
      headers: body ? { "Content-Type": "application/json" } : {},
    };
    if (body) fetchOpts.body = body;

    fetch("/wiki/ingest", fetchOpts)
      .then(function(resp) {
        if (!resp.ok) return resp.text().then(function(t) { throw new Error("HTTP " + resp.status + ": " + t); });
        return resp.json();
      })
      .then(function(data) {
        /* Accumulate across batches */
        accumulatedResults  = accumulatedResults.concat(data.results          || []);
        accumulatedSkipped  = accumulatedSkipped.concat(data.skipped_sources  || []);
        accumulatedFailed   = accumulatedFailed.concat(data.failed_sources    || []);
        accumulatedGrFailed = accumulatedGrFailed.concat(data.pages_with_failed_grounding || []);

        /* Show intermediate partial card if multiple batches remain */
        if (totalBatches > 1 && batchIndex < batches.length - 1) {
          var partial = {
            results:                    accumulatedResults,
            skipped_sources:            accumulatedSkipped,
            failed_sources:             accumulatedFailed,
            pages_with_failed_grounding: accumulatedGrFailed,
          };
          resultEl.replaceChildren(renderIngestCard(partial, batchLabel + " done"));
        }
        runBatch(batchIndex + 1);
      })
      .catch(function(err) {
        setStepBusy(false);
        resultEl.replaceChildren(renderErrorCard("Ingest", err.message || String(err)));
      });
  }

  runBatch(0);
}

/* Index result card — renders IndexResponse (files_indexed / sections_indexed / wiki_index_written) */
function renderIndexCard(data) {
  var filesIndexed    = data.files_indexed    != null ? data.files_indexed    : "?";
  var sectionsIndexed = data.sections_indexed != null ? data.sections_indexed : "?";
  var written         = data.wiki_index_written === true;
  var wikiPath        = data.wiki_index_path   || null;
  var wikiError       = data.wiki_index_error  || null;

  var summaryText = filesIndexed + " file" + (filesIndexed !== 1 ? "s" : "") +
                    " · " + sectionsIndexed + " section" + (sectionsIndexed !== 1 ? "s" : "");
  var badgeClass = wikiError ? "badge badge-warn" : "badge badge-ok";
  var badgeLabel = wikiError ? "index partial" : "index rebuilt";

  var head = el("div", { class: "result-card-head" },
    el("span", { text: "Index" }),
    el("span", { text: "·" }),
    el("span", { class: badgeClass },
      el("span", { class: "dot" }),
      el("span", { text: badgeLabel })
    )
  );

  /* Counts row */
  var bodyEl = el("div");
  bodyEl.append(el("div", { class: "rec" },
    el("div", { class: "num", text: "01" }),
    el("div", { class: "body" },
      el("div", { class: "id",   text: "Files indexed" }),
      el("div", { class: "crumb", text: "wiki/ Markdown files parsed" })
    ),
    el("div", { class: "label label-created", text: String(filesIndexed) })
  ));
  bodyEl.append(el("div", { class: "rec" },
    el("div", { class: "num", text: "02" }),
    el("div", { class: "body" },
      el("div", { class: "id",   text: "Sections indexed" }),
      el("div", { class: "crumb", text: "searchable BM25 units" })
    ),
    el("div", { class: "label label-created", text: String(sectionsIndexed) })
  ));
  /* Wiki index write confirmation */
  if (written && wikiPath) {
    bodyEl.append(el("div", { class: "rec" },
      el("div", { class: "num", text: "03" }),
      el("div", { class: "body" },
        el("div", { class: "id",   text: "Wiki Index written" }),
        el("div", { class: "crumb", text: wikiPath })
      ),
      el("div", { class: "label label-created", text: "ok" })
    ));
  } else if (wikiError) {
    bodyEl.append(el("div", { class: "rec" },
      el("div", { class: "num", text: "03" }),
      el("div", { class: "body" },
        el("div", { class: "id",   text: "Wiki Index write failed" }),
        el("div", { class: "crumb", text: wikiError })
      ),
      el("div", { class: "label label-error", text: "warn" })
    ));
  }

  return el("div", { class: "result-card" }, head, bodyEl);
}

/* ============================================================
   Lint Axis + Remediation taxonomy (issue #363, ADR-0023 tier-A S3)

   The Console has no Python runtime, so this is the client's copy of
   markdown_kb/app/lint.py's LINT_CHECK_TAXONOMY + remediation_for — the
   SAME eleven codes, axes, and Direct/Authored/deferred tiers (kept honest
   by the Python remediation_for unit tests plus this file's structural
   test, gateway/tests/test_ui_console_lint_remediation.py). The client does
   not decide *eligibility* here (that stays server-side, e.g. C10 discard
   is refused server-side for a live page) — it only decides which button to
   show for which check, mirroring the existing C9/C10 split already used
   by the Curation Queue below (§12.5).
   ============================================================ */
var LINT_AXIS_ORDER = ["Freshness", "Coherence", "Coverage", "Lifecycle"];

/* axis -> ordered check codes, matching LINT_CHECK_TAXONOMY's per-axis order */
var AXIS_CHECK_CODES = {
  Freshness: ["C6", "C3", "C11"],
  Coherence: ["C5", "C4", "C12"],
  Coverage:  ["C1", "C2"],
  Lifecycle: ["C8", "C10", "C9"],
};

/* code -> {label, tier, findingsKey}. tier mirrors markdown_kb/app/lint.py's
   _REMEDIATION_TAXONOMY (the single source of truth, ADR-0026 § Consequences)
   and drives the per-row affordance:
   "direct"   — C6/C3/C10 get a Remediation button; C8 gets none here (its
                Promote/Discard controls live in the dedicated Curation
                Queue block, unchanged per issue #363 AC).
   "authored" — disabled tier-B affordance (visible, never actionable) for
                C5/C4. C9 is the one Authored exception (tier-B S4,
                issue #380): its Re-file button lives in the Curation Queue
                block instead of a per-row lint action, the same split C8
                already uses — its own human gate is the downstream Promote,
                not a preview step here.
   "confirmed" — C11 (tier-B S5, issue #381, ADR-0024/0025): a full orphan
                (``f.full === true``) gets a real Delete button that opens a
                confirmation dialog naming the operation + target before it
                runs (no draft to review — Confirmed confirms an operation,
                Authored approves content); a partial orphan renders
                advisory text only, never a delete affordance.
   "routed"    — C1/C2 (tier-B S7, issue #383, ADR-0027): a real "Fill via
                Import" navigation control (fillViaImportAction) — never an
                execute button, since there is no draft to approve and no
                operation to confirm, only an existing workflow to carry the
                finding's context into.
   C12 alias-collision (Coherence axis, issue #406/#409 foundation, wired to
                the Console by issue #488) renders a real "direct" Remove
                control since issue #491: the existing assign-alias endpoint
                is add-only and can never resolve a collision (same-page add
                is an idempotent no-op, any other page 409s), so the honest
                fix is DELETE /pages/{slug}/aliases/{alias} — one call per
                claimant a curator wants cleared (removeAliasAction below). */
var LINT_CHECK_META = {
  C6:  { label: "stale",            tier: "direct",    findingsKey: "stale_pages" },
  C3:  { label: "failed-grounding", tier: "direct",    findingsKey: "failed_grounding" },
  C11: { label: "orphan",           tier: "confirmed", findingsKey: "orphans" },
  C5:  { label: "contradiction",    tier: "authored",  findingsKey: "page_pairs" },
  C4:  { label: "collision",        tier: "authored",  findingsKey: "slug_collisions" },
  C12: { label: "alias-collision",  tier: "direct",    findingsKey: "alias_collisions" },
  C1:  { label: "coverage-gap",     tier: "routed",    findingsKey: "coverage_gaps" },
  C2:  { label: "red-link",         tier: "routed",    findingsKey: "red_links" },
  C8:  { label: "promotion",        tier: "direct",    findingsKey: "promotion_candidates" },
  C10: { label: "invalid-schema",   tier: "direct",    findingsKey: "invalid_qa_schemas" },
  C9:  { label: "stale-qa",         tier: "authored",  findingsKey: "stale_filed_answers" },
};

/* issue #438: C8/C9/C10 already had their real Promote/Discard/Re-file
   controls living exclusively in the dedicated Curation Queue block (see
   the LINT_CHECK_META comment above). Before this slice the Lint card's
   Lifecycle axis ALSO rendered a button-less row per finding for these
   three checks — pure duplication of the same finding shown twice on one
   page. This set drives the axis-loop branch (renderLintCard below) that
   replaces those per-item rows with a single count + pointer line
   (queueCountLine). Their ROW_RENDERERS entries stay defined unchanged —
   existing structural tests (test_ui_console_lint_remediation.py) pin
   their exact no-action shape — they are simply never invoked for these
   three codes now. */
var QUEUE_OWNED_LIFECYCLE_CHECKS = { C8: true, C9: true, C10: true };

/* ============================================================
   zh/en Console header language toggle (issue #365, ADR-0023 tier-A S5)

   Switches the Lint card's STRUCTURAL CHROME only — axis headers, check
   labels, remediation button verbs, section chrome, empty states — between
   en and zh, persisted in localStorage so the choice survives a reload
   (issue #365 AC). The dynamic per-finding text (e.g. f.reason, f.source —
   values that come straight off the LintResponse) is untouched; only
   literal chrome strings owned by this file are bilingual (issue #365 AC:
   "the dynamic suggested_action long text is unchanged").

   LINT_AXIS_LABEL_ZH / LINT_CHECK_LABEL_ZH mirror the single source of
   truth in markdown_kb/app/lint.py (LINT_AXIS_LABEL_ZH / LintCheckMeta.
   label_zh, issue #365 S5 part 1) — the Console has no Python runtime
   (see the taxonomy comment above), so this is the same "kept honest via
   structural tests" mirror pattern S3 already established for
   LINT_CHECK_META itself.
   ============================================================ */
var LANG_STORAGE_KEY = "kb-console-lang";
var consoleLang = "en";
try {

  if (_storedLang === "zh" || _storedLang === "en") consoleLang = _storedLang;

/* ============================================================
   C1/C2 Routed Coverage Fill (tier-B S7, issue #383, ADR-0027)

   A Routed remediation navigates an existing workflow instead of executing
   anything — fill has no draft to approve (the LLM synthesis, if any,
   happens *inside* Import/Ingest, Direct-class machinery the operator
   already drives by hand). This block is therefore pure navigation state:
   which finding is "pending" a fill, the context banner shown while the
   operator works the pipeline, and the one-shot honest-miss check run on
   the next re-lint (ADR-0027 decision 3 — C1's own closure signal is a
   separate slice, tier-B S8 issue #384; a pending C1 fill just clears here).

   INVARIANT (ADR-0027): none of this ever issues a request of its own —
   every write happens inside the existing Import/Ingest machinery under its
   own rules, triggered by the operator's own clicks on those steps.
   ============================================================ */

/* {code, target, ingestRunsAtFill} of the C1/C2 finding a "Fill via
   Import" click is currently tracking, or null. target is the red-link
   slug (C2) or the canonical query (C1) — the identity
   checkCoverageFillOutcome re-checks for on the next lint.
   ingestRunsAtFill snapshots ingestRunCounter at click time so the
   outcome check can tell whether an Ingest actually completed after the
   click. One pending fill at a time (matches the pipeline stepper itself
   being a single shared flow, not per-finding). */
var pendingCoverageFill = null;

/* Bare page slugs (no dir, no .md) written by the MOST RECENT Ingest run —
   feeds the honest-miss report ("imported and ingested — new pages A, B —
   but [[slug]] is still unresolved."). Populated by runIngestBatches. */
var lastIngestedPageSlugs = [];

/* Counts completed Ingest runs. The honest-miss report may only say
   "imported and ingested" when this moved past the pending fill's
   ingestRunsAtFill snapshot — i.e. an Ingest genuinely completed after
   the Fill click, so lastIngestedPageSlugs holds THAT fill's pages, not
   a prior run's (or nothing at all). */
var ingestRunCounter = 0;

/* One-shot outcome for the NEXT renderLintCard, mirroring lastBatchSummary's
   pattern (set here, read-and-cleared there). Either null, or
   {target, newPages} (issue #409 — ADR-0030 decision 3's honest-miss offer;
   see checkCoverageFillOutcome below and coverageFillOutcomeBanner in
   renderLintCard). */
var lastCoverageFillOutcome = null;

/* Context text carrying the finding's own fields into the banner (AC: C2
   needs slug + referenced_by + sample_context; C1 needs sample_raw_queries +
   hit_count). Leads with the import instruction (issue #400) — the missing
   page name is supporting detail for the honest-miss check, not the
   headline; the operator's actionable brief is what to import. Dynamic
   per-finding text stays English, mirroring lint.py's suggested_action
   convention — only structural chrome (button labels) is bilingual via
   LINT_CHROME. Pure string shaping over server-computed fields (§12.5). */
function coverageFillContextText(code, finding) {
  if (code === "C2") {
    var refs = (finding.referenced_by || []).join(", ") || "(none)";
    var ctx = finding.sample_context || "(no captured context)";
    return "Import a Source document that covers “" + ctx + "” (mentioned by " +
      refs + " as [[" + finding.slug + "]])";
  }
  // C1
  var samples = (finding.sample_raw_queries || []).join("; ") || "(none)";
  var hits = finding.hit_count != null ? finding.hit_count : 0;
  return "Import a Source that answers: \"" + finding.query_canonical + "\" (" +
    hits + " failed ask" + (hits !== 1 ? "s" : "") + "; samples: " + samples + ")";
}

/* Shows the persistent context banner above the pipeline and scrolls it
   into view — the operator still has to click Import then Ingest by hand;
   this only carries context, it does not start anything. */
function showCoverageFillBanner(code, finding) {
  var banner = document.getElementById("coverage-fill-banner");
  if (banner) {
    banner.textContent = coverageFillContextText(code, finding);
    banner.classList.add("visible");
  }
  var pipelineRoot = document.getElementById("pipeline-root");
  if (pipelineRoot) scrollSoftIntoView(pipelineRoot, "start");
}

function hideCoverageFillBanner() {
  var banner = document.getElementById("coverage-fill-banner");
  if (banner) banner.classList.remove("visible");
}

/* The C1/C2 per-row action (ROW_RENDERERS below) — replaces the disabled
   tierBAffordance() placeholder those two checks used before this slice.
   INVARIANT: no fetch call anywhere in this function or its click handler —
   commits nothing itself (ADR-0027). Not added to allButtons: it is not a
   remediation execution subject to the remediationInFlight disable guard,
   and clicking it more than once is harmless (it only resets which finding
   the pending banner tracks). */
function fillViaImportAction(code, finding) {
  var btn = el("button", { class: "fill-import-btn", type: "button",
    text: LINT_CHROME[consoleLang].fillViaImport });
  btn.addEventListener("click", function() {
    pendingCoverageFill = {
      code: code,
      target: code === "C2" ? finding.slug : finding.query_canonical,
      ingestRunsAtFill: ingestRunCounter,
    };
    showCoverageFillBanner(code, finding);
  });
  return el("div", { class: "lint-row-actions" }, btn);
}

/* Runs on every post-fill re-lint (both the Lint step's own Run and the
   Direct-remediation auto-relint call this before renderLintCard) — checks
   whether a pending C2 fill actually resolved its red link. One-shot once
   there IS an outcome: consumed on a silent resolve (the finding
   disappearing IS the story — PRD #373 story 28), on the honest-miss
   message below (ADR-0027 decision 3), or on C1's quiet clear (its
   closure signal ships in tier-B S8, issue #384: latest-outcome +
   Verify: re-ask). A re-lint with NO Ingest completed since the Fill
   click has no outcome to report — the fill stays pending and the banner
   stays up, so the miss message can never claim an import that never
   happened nor name a prior run's pages. */
function checkCoverageFillOutcome(lintData) {
  if (!pendingCoverageFill) return;
  var fill = pendingCoverageFill;

  if (fill.code !== "C2") {
    pendingCoverageFill = null;
    hideCoverageFillBanner();
    return;
  }

  var redLinks = (lintData.findings && lintData.findings.red_links) || [];
  var stillPresent = redLinks.some(function(f) { return f.slug === fill.target; });
  if (!stillPresent) {
    pendingCoverageFill = null;
    hideCoverageFillBanner();
    return; // resolved — the finding disappearing IS the story
  }

  /* Still unresolved — but only an Ingest that completed AFTER the Fill
     click makes this a fill outcome; otherwise keep waiting. */
  if (ingestRunCounter === fill.ingestRunsAtFill) return;

  pendingCoverageFill = null;
  hideCoverageFillBanner();
  var newPages = lastIngestedPageSlugs.length > 0 ? lastIngestedPageSlugs.join(", ") : "none";
  /* issue #409 (ADR-0030 decision 3): carries {text, target, newPages}
     rather than a plain string — text is the same honest-miss message this
     always built (still unresolved, new pages named), and target/newPages
     additionally let renderLintCard upgrade the report into an executable
     "make [[target]] an alias of <newPage>?" offer per newly-minted page. */
  lastCoverageFillOutcome = {
    text: "Fill via Import: imported and ingested — new pages: " + newPages +
      " — but [[" + fill.target + "]] is still unresolved.",
    target: fill.target,
    newPages: lastIngestedPageSlugs.slice(),
  };
}

/* ============================================================
   C3 Routed fix-the-Source (issue #408, ADR-0029)

   C3 is the first finding carrying TWO remediation classes at once: the
   existing Direct "Re-ingest (retry)" button (reingestAction) stays wired
   unchanged, and this adds a SECOND, Routed navigation control — fixing what
   a claim_unsupported Source says is knowledge only the human can supply, so
   there is nothing here to execute, only to carry into the existing
   Upload -> Re-ingest -> Lint flow (the operator edits the file locally,
   re-uploads over the same filename — existing Upload behavior — then
   clicks the SAME row's Re-ingest (retry), which already sends force:true
   per the ADR-0023 Invariant, so this control invents no new write path).

   INVARIANT (ADR-0029): fixSourceAction never fetches anything of its own —
   every write happens inside the existing Upload / Re-ingest machinery,
   triggered by the operator's own clicks on those controls. */

/* {pageSlug} of the C3 finding a "Fix Source" click is currently tracking,
   or null. One pending fix at a time (mirrors pendingCoverageFill above —
   the pipeline stepper is a single shared flow, not per-finding). */
var pendingFixSource = null;

/* Bare Source filename a C3 finding cites, stripped of any #section anchor
   (FailedGroundingFinding.source may carry one, e.g. "policy.md#refunds") —
   used only for display fallbacks (missing/ambiguous). The real repo-relative
   path to open is finding.source_path (see c3SourceLabel below), never a
   client-built "docs/<filename>" guess (issue #445 — that guess 404'd for
   Sources nested under a docs/ subdirectory). */
function c3SourceFilename(finding) {
  return (finding.source || "").split("#")[0];
}

/* Renders the finding's resolved Source location for display, honoring the
   three distinct source_resolution states the backend computes at lint time
   (issue #445): "resolved" shows the real repo-relative source_path;
   "missing"/"ambiguous" show a distinct, bilingual explanation instead of a
   guessed path — the client never reconstructs "docs/" + basename itself
   (§12.5, no business logic in the client). */
function c3SourceLabel(finding) {
  if (finding.source_resolution === "resolved" && finding.source_path) {
    return finding.source_path;
  }
  var chrome = LINT_CHROME[consoleLang];
  var template = finding.source_resolution === "ambiguous"
    ? chrome.c3SourceAmbiguous
    : chrome.c3SourceMissing;
  return template.replace("{basename}", c3SourceFilename(finding));
}

/* Banner text carrying the finding's context (AC: Source filename +
   unsupported_claims) into the existing Upload -> Re-ingest -> Lint flow.
   Dynamic per-finding text stays English (mirrors coverageFillContextText's
   convention above) — only the "not recorded" fallback and the
   missing/ambiguous source labels are bilingual via LINT_CHROME. Pure string
   shaping over server-computed fields (§12.5). Inlines the same two-line
   claims-join c3ClaimsSummary (inside renderLintCard's closure) computes,
   rather than reaching across function scope — this function is called from
   a top-level click handler (fixSourceAction, via ROW_RENDERERS.C3), not from
   inside renderLintCard itself, so it cannot see renderLintCard's local
   helpers. */
function fixSourceBannerText(finding) {
  var claims = finding.unsupported_claims || [];
  var claimsText = claims.length > 0 ? claims.join("; ") : LINT_CHROME[consoleLang].claimsNotRecorded;
  return "Fix the Source: " + c3SourceLabel(finding) +
    " — unsupported claims: " + claimsText;
}

/* Shows the persistent context banner above the pipeline and scrolls it
   into view — the operator still has to edit the file, re-upload, and
   click Re-ingest (retry) by hand; this only carries context and offers a
   read-only view of the current Source (AC: a /read/file view link), it
   does not start anything itself. View Source is wired to the finding's own
   resolved source_path (never a client-built "docs/" + basename guess —
   issue #445) and disabled outright when resolution is missing/ambiguous:
   there is no real path to open, so offering the button would be a false
   affordance (§12.5 "honest, not alarmist"). */
function showFixSourceBanner(finding) {
  var banner = document.getElementById("fix-source-banner");
  if (banner) {
    var viewBtn = el("button", { class: "view-source-btn", type: "button",
      text: LINT_CHROME[consoleLang].viewSource });
    /* Notice slot next to the button (issue #444) — a failing open is
       visible right where the operator clicked, not only in the resource
       browser's file viewer further down the page. */
    var viewStatusEl = el("span", { class: "card-status-msg" });
    if (finding.source_resolution === "resolved" && finding.source_path) {
      viewBtn.addEventListener("click", function() {
        viewStatusEl.textContent = "";
        viewStatusEl.className = "card-status-msg";
        openFile(finding.source_path, c3SourceFilename(finding), {
          onError: function(message) {
            viewStatusEl.textContent = "Failed: " + message;
            viewStatusEl.className = "card-status-msg err";
          }
        });
      });
    } else {
      viewBtn.disabled = true;
    }
    banner.replaceChildren(
      el("span", { text: fixSourceBannerText(finding) }),
      viewBtn,
      viewStatusEl
    );
    banner.classList.add("visible");
  }
  var pipelineRoot = document.getElementById("pipeline-root");
  if (pipelineRoot) scrollSoftIntoView(pipelineRoot, "start");
}

function hideFixSourceBanner() {
  var banner = document.getElementById("fix-source-banner");
  if (banner) banner.classList.remove("visible");
}

/* The C3 per-row Routed action (ROW_RENDERERS below) — rendered ALONGSIDE
   reingestAction(f.source, true), never replacing it (C3 keeps both its
   Direct and Routed remediation classes visible at once).
   INVARIANT: no fetch call anywhere in this function or its click handler —
   commits nothing itself (ADR-0029). Not added to allButtons: it is not a
   remediation execution subject to the remediationInFlight disable guard. */
function fixSourceAction(finding) {
  var btn = el("button", { class: "fix-source-btn", type: "button",
    text: LINT_CHROME[consoleLang].fixSource });
  // A finding can carry no source (lint.py records source="" defensively —
  // mirrors reingestAction's noSource guard above): there is no docs/<file>
  // to navigate to, so disable rather than open a banner naming an empty
  // filename (§12.5 "honest, not alarmist" — no false affordance).
  if (!finding.source) {
    btn.disabled = true;
    return el("div", { class: "lint-row-actions" }, btn);
  }
  btn.addEventListener("click", function() {
    pendingFixSource = { pageSlug: finding.page_slug };
    showFixSourceBanner(finding);
  });
  return el("div", { class: "lint-row-actions" }, btn);
}

/* Give-up path advisory (ADR-0029 decision 4) — always rendered under a C3
   row, no button: naming the C11 full-orphan path is card copy, never an
   affordance (ADR-0029 Invariant — no delete affordance on a C3 finding).
   Structural chrome (prefix/suffix) is bilingual via LINT_CHROME; the
   Source filename in between is the one dynamic, server-computed field.
   Omitted entirely (returns null — el() skips null children) when there is
   no source to name, mirroring fixSourceAction's guard above. */
function c3GiveUpNote(finding) {
  if (!finding.source) return null;
  var chrome = LINT_CHROME[consoleLang];
  var text = chrome.c3GiveUpPrefix + c3SourceFilename(finding) + chrome.c3GiveUpSuffix;
  return el("span", { class: "card-status-msg c3-give-up-note", text: text });
}

/* Runs on every post-fix-source re-lint (both the Lint step's own Run and
   Direct-remediation auto-relint call this before renderLintCard, mirroring
   checkCoverageFillOutcome above) — hides the pending banner once the
   finding it was tracking is no longer present: the corrected Source passed
   grounding on the operator's own Re-ingest (retry) click, or the finding
   was resolved another way. Unlike checkCoverageFillOutcome there is no
   honest-miss report to build — C3's own suggested_action already names the
   fix, and the finding simply disappearing IS the story (mirrors the
   resolved branch of checkCoverageFillOutcome). */
function checkFixSourceOutcome(lintData) {
  if (!pendingFixSource) return;
  var stillFailing = (lintData.findings && lintData.findings.failed_grounding) || [];
  var stillPresent = stillFailing.some(function(f) { return f.page_slug === pendingFixSource.pageSlug; });
  if (!stillPresent) {
    pendingFixSource = null;
    hideFixSourceBanner();
  }
}

/* Applies consoleLang to <html lang> (accessibility) and the header toggle
   button's own label. Looked up fresh by id each call rather than a cached
   reference — it is called once at boot and again on every toggle click, so
   there is no hot-path cost to avoiding a second module-level DOM handle. */
function applyConsoleLang() {
  document.documentElement.lang = consoleLang === "zh" ? "zh-Hant" : "en";
  var btn = document.getElementById("lang-toggle");
  if (btn) btn.textContent = LINT_CHROME[consoleLang].langToggleLabel;
}

/* ── In-flight guard + durability notice (issue #364) ──────────────
   remediationInFlight is true while ANY Direct Remediation request (single
   row or batch) is running. It drives two things: (1) every remediation
   button on the Lint card disables its siblings while one is in flight —
   no double-submit (re-clicking mid-flight would just repeat a forced
   re-ingest at redundant LLM cost, since /ingest is idempotent by
   hash-skip and _index_lock serialises writes server-side; the guard saves
   cost/confusion, it is not what guarantees correctness — ADR-0023);
   (2) a native beforeunload confirm while the flag is true. POST /ingest
   is synchronous and completes server-side under _index_lock regardless of
   whether the client stays connected (ADR-0023 "durable across
   disconnect") — so this is a SOFT accidental-navigation guard, never a
   "you'll corrupt data" warning; browsers render their own generic prompt
   text (custom beforeunload messages have been ignored since ~2016), and
   nothing else in this file frames a refresh as destructive. */
var remediationInFlight = false;
var lastBatchSummary = null;

window.addEventListener("beforeunload", function(e) {
  if (!remediationInFlight) return;
  e.preventDefault();
  e.returnValue = "";
});

/* ── Remediation requests — thin wrappers around the *existing* endpoints
   (ADR-0023: zero new endpoints). Each resolves/rejects with the parsed
   JSON body (or null for a 204), never re-implementing server eligibility
   decisions (§12.5) — a 409 from Discard still surfaces as a rejection the
   caller renders verbatim. */
function ingestRemediationRequest(source, force) {
  var payload = { source: source };
  if (force) payload.force = true;
  return fetch("/wiki/ingest", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload),
  }).then(function(resp) {
    if (!resp.ok) return resp.text().then(function(t) { throw new Error("HTTP " + resp.status + ": " + t); });
    return resp.json();
  }).then(function(data) {
    /* /wiki/ingest answers HTTP 200 even when the Source failed (routes.py
       returns a batch-shaped body in all cases), and this wrapper sends
       exactly ONE source — so any failed_sources entry IS this row's source.
       Rejecting routes the failure through runLintRemediation's err-status
       rendering instead of letting the row look successful while the finding
       silently stays (issue #475). This surfaces the server's own verdict,
       never re-derives eligibility (§12.5). */
    if (data && data.failed_sources && data.failed_sources.length > 0) {
      throw new Error("Re-ingest failed for " + data.failed_sources.join(", ") +
        " (source not found, ambiguous, or unparseable)");
    }
    return data;
  });
}

function discardRemediationRequest(slug) {
  return fetch("/wiki/qa/" + encodeURIComponent(slug), { method: "DELETE" })
    .then(function(resp) {
      if (resp.status === 409) {
        throw new Error("Cannot discard: page is live (status=live). Use Re-ingest to refresh it instead.");
      }
      if (!resp.ok) {
        return resp.text().then(function(t) { throw new Error("HTTP " + resp.status + ": " + t); });
      }
      return null;
    });
}

/* Assign-Alias write (issue #409, ADR-0030 decision 3) — the ONE new
   endpoint this slice adds (every other remediation on this card reuses an
   existing one, ADR-0023/ADR-0027 convention). Direct-class: no batch, no
   LLM. A 409 collision (alias already resolves to a different page) or a
   422 blank alias surfaces verbatim through runLintRemediation's existing
   err-status rendering (§12.5) — this wrapper never re-derives eligibility
   itself. */
function assignAliasRequest(pageSlug, alias) {
  return fetch("/wiki/pages/" + encodeURIComponent(pageSlug) + "/aliases", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ alias: alias }),
  }).then(function(resp) {
    if (!resp.ok) return resp.text().then(function(t) { throw new Error("HTTP " + resp.status + ": " + t); });
    return null;
  });
}

/* Remove-Alias write (issue #491, ADR-0030 extension) — the mirror-image of
   assignAliasRequest above: the executable fix the C12 alias-collision
   Remediation names (lint.py's _REMEDIATION_TAXONOMY["C12"]). Direct-class:
   no LLM, one call clears one page's claim on one alias. A 404 (alias not
   currently assigned to this page — AliasNotFound, e.g. a stale row after a
   concurrent removal) surfaces verbatim through runLintRemediation's
   existing err-status rendering (§12.5) — this wrapper never re-derives
   eligibility itself. */
function removeAliasRequest(pageSlug, alias) {
  return fetch(
    "/wiki/pages/" + encodeURIComponent(pageSlug) + "/aliases/" + encodeURIComponent(alias),
    { method: "DELETE" }
  ).then(function(resp) {
    if (!resp.ok) return resp.text().then(function(t) { throw new Error("HTTP " + resp.status + ": " + t); });
    return null;
  });
}

/* Sequential composite over removeAliasRequest — a C12 alias_vs_alias row
   clears the alias from every claimant EXCEPT the curator-picked keeper in
   one gesture, but the endpoint itself still takes one page at a time
   (ADR-0030 "never batch" Invariant applied to remove-alias): chained, not
   Promise.all, so a mid-sequence 404 surfaces through the SAME
   runLintRemediation error path instead of a partial silent success. */
function removeAliasFromClaimantsRequest(alias, claimants) {
  return claimants.reduce(function(chain, pageSlug) {
    return chain.then(function() { return removeAliasRequest(pageSlug, alias); });
  }, Promise.resolve());
}

/* Candidate page list for the Assign-Alias picker — sourced from the
   EXISTING GET /read/tree resource browser (entities/ + concepts/), not a
   new listing endpoint invented for this picker (ADR-0030 adds exactly one
   new endpoint: the write above). Directory entries only, ".md" suffix
   stripped to a bare slug, merged + sorted across both subdirs. Failures in
   either fetch degrade to an empty list for that subdir rather than
   rejecting the whole picker. */
function fetchAliasPickerPages() {
  function listSlugs(subdir) {
    return fetch("/read/tree?" + new URLSearchParams({ path: "wiki/" + subdir }))
      .then(function(resp) { return resp.ok ? resp.json() : { entries: [] }; })
      .then(function(data) {
        return (data.entries || [])
          .filter(function(entry) { return !entry.is_dir && /\.md$/.test(entry.name); })
          .map(function(entry) { return entry.name.replace(/\.md$/, ""); });
      })
      .catch(function() { return []; });
  }
  return Promise.all([listSlugs("entities"), listSlugs("concepts")]).then(function(lists) {
    return lists[0].concat(lists[1]).sort();
  });
}

/* C1 Verify: re-ask (tier-B S8, issue #384, ADR-0027 decision 2) — the
   existing POST /wiki/chat, the SAME path a real user asking the same
   question would hit. Nothing new server-side: a successful answer both
   proves closure to the human and writes the ``chat`` log entry the
   server's C1 latest-outcome check reads on the next lint; a re-ask that
   still fails writes a fresh fallback entry instead, so the client never
   has to (and does not) decide the outcome itself (§12.5) — it only
   triggers the call and re-lints, exactly like every other remediation
   here. */
function chatVerifyRequest(queryText) {
  return fetch("/wiki/chat", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ query: queryText }),
  }).then(function(resp) {
    if (!resp.ok) return resp.text().then(function(t) { throw new Error("HTTP " + resp.status + ": " + t); });
    return resp.json();
  });
}

/* C11 Confirmed orphan-delete (tier-B S5, issue #381, ADR-0025). The 409
   case is the ADR-0025 Invariant surfacing at the client: the server
   re-verified the full-orphan predicate at delete time and it no longer
   holds (stale report, restored Source, or a partial orphan) — rendered
   honestly, never silently retried. */
function deleteOrphanRequest(slug) {
  return fetch("/wiki/pages/" + encodeURIComponent(slug), { method: "DELETE" })
    .then(function(resp) {
      if (resp.status === 409) {
        return resp.text().then(function(t) {
          throw new Error("Cannot delete: no longer a full orphan (" + t + ")");
        });
      }
      if (!resp.ok) {
        return resp.text().then(function(t) { throw new Error("HTTP " + resp.status + ": " + t); });
      }
      return null;
    });
}

/* Batch variant of ingestRemediationRequest — the Freshness axis-level and
   C6 check-level "Re-ingest all" buttons collapse N per-row calls into this
   ONE POST /ingest {sources:[...], force} call (issue #364 / ADR-0023's
   N -> 1 batch invariant; mirrors the existing drop-batch path's
   single-call rule, §12.8 / the #54 used_slugs guarantee). */
function batchIngestRemediationRequest(sources, force) {
  var payload = { sources: sources };
  if (force) payload.force = true;
  return fetch("/wiki/ingest", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload),
  }).then(function(resp) {
    if (!resp.ok) return resp.text().then(function(t) { throw new Error("HTTP " + resp.status + ": " + t); });
    return resp.json();
  });
}

/* De-duplicated source / slug lists for a batch call. A finding with no
   recorded source (lint.py's source="" case) is skipped — same honesty
   guard as the per-row reingestAction: no click that can only error
   (issue #364). */
function dedupeSourceList(items) {
  var seen = {};
  var out = [];
  items.forEach(function(item) {
    if (item.source && !seen[item.source]) { seen[item.source] = true; out.push(item.source); }
  });
  return out;
}

function dedupeSlugList(items) {
  var seen = {};
  var out = [];
  items.forEach(function(item) {
    if (item.page_slug && !seen[item.page_slug]) { seen[item.page_slug] = true; out.push(item.page_slug); }
  });
  return out;
}

/* Partial-failure summary for a completed C6/C3 batch — mirrors
   renderIngestCard's per-page grounding derivation (source -> pages_written
   -> slug -> pages_with_failed_grounding). failed_sources covers a harder
   failure (source not found/parseable); a source counts as "still failing"
   if either applies (issue #364 AC example: "re-ingested 5: 4 ok, 1 still
   failing"). */
function ingestPartialSummary(sources, data) {
  var results = data.results || [];
  var groundingFailedPages = data.pages_with_failed_grounding || [];
  var stillFailing = {};
  (data.failed_sources || []).forEach(function(s) { stillFailing[s] = true; });
  results.forEach(function(r) {
    var pages = r.pages_written || [];
    var anyFailed = pages.some(function(p) {
      var slug = p.split("/").pop().replace(/\.md$/, "");
      return groundingFailedPages.indexOf(slug) !== -1;
    });
    if (anyFailed) stillFailing[r.source] = true;
  });
  var failedCount = Object.keys(stillFailing).length;
  var okCount = Math.max(sources.length - failedCount, 0);
  return "re-ingested " + sources.length + ": " + okCount + " ok, " +
    failedCount + " still failing";
}

/* Shared batch-completion path — re-lints (fast, include_c5=false path)
   and re-renders both the Lint card and the Curation Queue (issue #363
   AC, unchanged), then stashes the partial-failure summary so the
   re-rendered Lint card can show it as a one-shot banner (the calling
   button's own status message node is destroyed by the replaceChildren
   re-render below — issue #364 AC "a partial-failure summary is shown").
   siblingButtons is re-enabled if the re-lint call itself fails (rare: the
   batch's own mutation already succeeded and is durable — only the
   read-back failed) so the card is not left permanently disabled with no
   way to retry short of a full page reload. */
function finishBatchRemediation(summaryText, resultEl, siblingButtons) {
  lastBatchSummary = summaryText;
  // Keep remediationInFlight true until the re-lint read-back resolves —
  // matching the per-row runLintRemediation path — so the beforeunload confirm
  // stays armed for the whole batch loop, including the re-lint window (issue
  // #364 verify finding: clearing it before the fetch left a request in flight
  // with the unload guard already disabled).
  fetch("/wiki/lint?include_c5=false", { method: "POST" })
    .then(function(resp) {
      if (!resp.ok) return resp.text().then(function(t) { throw new Error("HTTP " + resp.status + ": " + t); });
      return resp.json();
    })
    .then(function(data) {
      remediationInFlight = false;
      lastLintData = data;
      checkCoverageFillOutcome(data);
      checkFixSourceOutcome(data);
      if (resultEl) resultEl.replaceChildren(renderLintCard(data, resultEl));
      renderCurationQueue(document.getElementById("curation-queue-root"), data);
    })
    .catch(function(err) {
      remediationInFlight = false;
      lastBatchSummary = summaryText + " (re-lint failed: " + (err.message || String(err)) + " — re-run Lint to refresh)";
      (siblingButtons || []).forEach(function(b) { b.disabled = false; });
    });
}

/* ── Shared remediation runner ────────────────────────────────
   On success, re-runs the fast (include_c5=false) lint path and re-renders
   BOTH the Lint card and the Curation Queue, so the fixed finding
   disappears and a still-failing one reappears (issue #363 AC). In-flight
   guard: every remediation button on the card is disabled while this
   request runs, not just the one clicked (issue #364 — the shared
   remediationInFlight flag + allButtons list, which also drives the
   beforeunload confirm). The fix itself is durable server-side across a
   disconnect (sync /ingest under _index_lock, ADR-0023) — a network error
   here just means the status message failed to update, not that the fix
   was lost. */
function runLintRemediation(requestPromise, btn, statusMsgEl, resultEl, siblingButtons) {
  // siblingButtons (issue #364): every remediation button on the Lint card,
  // so an in-flight remediation — single-row or batch — disables the whole
  // card's buttons, not just the one clicked (no double-submit).
  var buttons = siblingButtons || [btn];
  remediationInFlight = true;
  buttons.forEach(function(b) { b.disabled = true; });
  statusMsgEl.replaceChildren(el("span", { class: "spinner" }), document.createTextNode("Working…"));
  statusMsgEl.className = "card-status-msg";

  requestPromise
    .then(function() {
      return fetch("/wiki/lint?include_c5=false", { method: "POST" });
    })
    .then(function(resp) {
      if (!resp.ok) return resp.text().then(function(t) { throw new Error("HTTP " + resp.status + ": " + t); });
      return resp.json();
    })
    .then(function(data) {
      remediationInFlight = false;
      lastLintData = data;
      checkCoverageFillOutcome(data);
      checkFixSourceOutcome(data);
      if (resultEl) resultEl.replaceChildren(renderLintCard(data, resultEl));
      renderCurationQueue(document.getElementById("curation-queue-root"), data);
    })
    .catch(function(err) {
      remediationInFlight = false;
      statusMsgEl.textContent = "Error: " + (err.message || String(err));
      statusMsgEl.className = "card-status-msg err";
      buttons.forEach(function(b) { b.disabled = false; });
    });
}

/* Lint result card — renders LintResponse findings grouped by Lint Axis
   (issue #363), each check labelled, with per-row Direct Remediation
   buttons (C6/C3 Re-ingest, C10 Discard), a disabled tier-B affordance on
   Authored-tier findings (C5/C4), and a "Fill via Import" navigation
   control on Routed-tier findings (C1/C2, ADR-0027). ``resultEl`` is the
   Lint step's own result container — passed through so a remediation
   button's success handler can re-render this same card in place. */

/* ── C5 conflict evidence (issue #443) ───────────────────────────────────
   The C5 judge (schemas.py PagePairFinding) already emits the exact
   evidence a curator needs: page_a_claim / page_b_claim (direct quotes),
   summary, and suggested_action. Before this slice the console only showed
   the two slugs + severity + summary.slice(0, 80) — silently dropping the
   claims and the suggested_action entirely. c5ConflictPanel() renders all
   four fields once, reused by BOTH the C5 finding row (ROW_RENDERERS.C5,
   nested inside renderLintCard below) and the Reconcile modal
   (renderReconcilePreview, a separate top-level function) so the operator
   sees the identical evidence in both places.

   Top-level (not nested in renderLintCard) because renderReconcilePreview
   needs it too and cannot see renderLintCard's closure locals. Passing the
   full finding from the row to the modal has to go through a lookup map
   (c5FindingByPair) rather than an extra function argument: the existing
   structural test (test_ui_console_reconcile.py) pins the literal call
   ``reconcileAction(f.page_a, f.page_b)`` inside ROW_RENDERERS.C5, so that
   call site's argument list cannot grow. */
var c5FindingByPair = {};

/* ── C5 stale-preservation across fast relints (issue #489) ──────────────
   Unlike c5FindingByPair above (rebuilt fresh on every renderLintCard call),
   this holds the last GENUINELY judged ``findings.page_pairs`` from an
   include_c5=true response — it must survive across the many
   include_c5=false fast relints every remediation triggers (runLintRemediation
   and friends), so renderLintCard can fall back to it instead of letting the
   whole Coherence/C5 section vanish just because the fast path never judged
   it (see pendingDeepC5Audit + the fallback logic inside renderLintCard).
   null until the first Deep audit run this session; [] is itself a genuine
   "judged and found nothing" result, distinct from "never judged". */
var lastDeepC5Pairs = null;

/* One-shot signal (mirrors lastBatchSummary/lastCoverageFillOutcome's
   existing pattern) — set true by the Deep audit control right before it
   calls renderLintCard, so that render (and only that render) knows its
   response's page_pairs is a genuine fresh judgment rather than a fast
   include_c5=false relint's untouched empty default. Not a renderLintCard
   parameter: test_ui_console_lint_fast_default.py pins the literal 2-arg
   ``renderLintCard(data, resultEl)`` call in both the Run and Deep audit
   STEP_DEFS bodies. */
var pendingDeepC5Audit = false;

// Long quotes/summaries collapse to a preview with an explicit toggle —
// never a silent slice(0, N) that just discards the rest of the string.
var C5_COLLAPSE_AT = 160;

function collapsibleSpan(fullText) {
  var text = fullText || "";
  if (text.length <= C5_COLLAPSE_AT) return el("span", { text: text });
  var expanded = false;
  var short = text.slice(0, C5_COLLAPSE_AT) + "…";
  var textEl = el("span", { text: short });
  var toggleBtn = el("button", { class: "c5-expand-btn", type: "button",
    text: LINT_CHROME[consoleLang].c5Expand });
  toggleBtn.addEventListener("click", function() {
    expanded = !expanded;
    textEl.textContent = expanded ? text : short;
    toggleBtn.textContent = expanded
      ? LINT_CHROME[consoleLang].c5Collapse
      : LINT_CHROME[consoleLang].c5Expand;
  });
  return el("span", { class: "c5-collapsible" }, textEl, toggleBtn);
}
