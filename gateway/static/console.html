  var fileInput = el("input", { type: "file", multiple: "", accept: ".html,.txt,.md,.pdf", style: "display:none" });
  var uploadBusy = false;

  function setUploadBusy(v) {
    uploadBusy = v;
    if (v) {
      dropZone.classList.add("busy");
      dropBtn.disabled = true;
    } else {
      dropZone.classList.remove("busy");
      dropBtn.disabled = false;
    }
  }

  function handleFiles(files) {
    if (uploadBusy) return;
    setUploadBusy(true);

    resultEl.replaceChildren(makeBusyCard(LINT_CHROME[consoleLang].genUploading + " " + files.length + " file" + (files.length !== 1 ? "s" : "")));

    var formData = new FormData();
    for (var i = 0; i < files.length; i++) {
      formData.append("files", files[i], files[i].name);
    }

    fetch("/upload", { method: "POST", body: formData })
      .then(function(resp) {
        if (!resp.ok) return resp.text().then(function(t) { throw new Error("HTTP " + resp.status + ": " + t); });
        return resp.json();
      })
      .then(function(data) { resultEl.replaceChildren(renderUploadCard(data.results || [])); })
      .catch(function(err)  { resultEl.replaceChildren(renderErrorCard(LINT_CHROME[consoleLang].stepUploadLabel, err.message || String(err))); })
      .finally(function()   { setUploadBusy(false); });
  }

  fileInput.addEventListener("change", function() {
    if (fileInput.files && fileInput.files.length > 0) handleFiles(Array.from(fileInput.files));
  });

  var dropBtn = bindText(el("button", { class: "drop-btn", type: "button",
    onclick: function() { if (!uploadBusy) fileInput.click(); }
  }), "uploadChooseFiles");

  var dropZone = el("div", { class: "drop-zone" },
    el("div", { class: "drop-hint" },
      bindText(el("strong"), "uploadDragDrop"),
      el("br"),
      bindText(el("span"), "uploadOrClickToSelect")
    ),
    bindText(el("div", { class: "drop-ext" }), "uploadAcceptLine"),
    dropBtn,
    fileInput
  );

  dropZone.addEventListener("dragover", function(e) {
    e.preventDefault();
    if (!uploadBusy) dropZone.classList.add("drag-over");
  });
  dropZone.addEventListener("dragleave", function() { dropZone.classList.remove("drag-over"); });
  dropZone.addEventListener("drop", function(e) {
    e.preventDefault();
    dropZone.classList.remove("drag-over");
    if (uploadBusy) return;
    var files = e.dataTransfer.files;
    if (files && files.length > 0) handleFiles(Array.from(files));
  });

  return dropZone;
}

/* ── Pipeline state ────────────────────────────────────────── */
/* Tracks the bare doc filenames from the last Import run so the Ingest step
   can send exactly those sources in the batch call (§12.8 single-batch rule).
   null = no import has been run this session → Ingest falls back to all-docs. */
var lastImportedDocFilenames = null;

/* ── Step definitions ─────────────────────────────────────── */
/* §12.8 / §12.5: No fake progress percentages. Use indeterminate spinner only.
   Index/Lint (#173) run-functions will be wired in their slice. */

/* ── Per-step what-it-does one-liners (ADR-0021 §12 legibility) ───────────
   Always-visible text beside each action: what it does + its principle.
   Rendered via textContent (el() helper, §12.4); strings are static literals
   so the test_ui_console_legibility suite can assert them via plain text search. */

var STEP_DEFS = [
  {
    id: "upload",
    labelKey: "stepUploadLabel",
    descKey: "stepUploadDesc",
    buildBody: function(resultEl) {
      return buildUploadBody(resultEl);
    },
    /* Upload step has its own inline controls — no top-level Run button */
    noRunBtn: true,
  },
  {
    id: "import",
    labelKey: "stepImportLabel",
    descKey: "stepImportDesc",
    buildBody: null,
    run: function(resultEl, setStepBusy) {
      /* issue #497: Import runs as a background job (POST /wiki/import/jobs
         + poll) instead of one synchronous request. The ADR-0032 auto-route
         transcribes a text-less PDF INSIDE the sync request — one vision
         call per page, minutes for a real scan, long past the edge proxy's
         window: the proxy then answered 502 with an empty body while the
         server kept working. The job poll also carries the real
         pages_done/pages_total, so the operator gets a determinate bar
         instead of a minutes-long blank spinner. */
      setStepBusy(true);
      var progress = makeImportProgressCard();
      resultEl.replaceChildren(progress.card);

      function finishWithResult(data) {
        resultEl.replaceChildren(renderImportCard(data));
        /* Capture imported filenames for the Ingest step.
           Extract the bare filename from docs_path (e.g. "docs/x.md" → "x.md").
           imported_sources + skipped_sources both represent available docs/ files.
           §12.5: extraction logic is trivial (basename), not business logic. */
        var allImported = (data.imported_sources || []).concat(data.skipped_sources || []);
        if (allImported.length > 0) {
          lastImportedDocFilenames = allImported.map(function(r) {
            var p = r.docs_path || "";
            return p.split(/[/\\]/).pop();
          }).filter(Boolean);
        }
        setStepBusy(false);
      }
      function fail(err) {
        resultEl.replaceChildren(renderErrorCard("Import", err.message || String(err)));
        setStepBusy(false);
      }

      fetch("/wiki/import/jobs", { method: "POST" })
        .then(function(resp) {
          if (!resp.ok) return resp.text().then(function(t) { throw httpError(resp, t); });
          return resp.json();
        })
        .then(function(data) {
          pollJobStatus(
            "/wiki/import/jobs/" + encodeURIComponent(data.job_id), "import",
            progress.update,
            function(job) {
              if (job.status === "failed") {
                fail(new Error(job.error || "import job failed"));
                return;
              }
              finishWithResult(job.result || {});
            },
            fail
          );
        })
        .catch(fail);
    },
  },
  {
    id: "ingest",
    labelKey: "stepIngestLabel",
    descKey: "stepIngestDesc",
    buildBody: null,
    run: function(resultEl, setStepBusy) {
      /* Phase 15 S3 (#172): single-batch-call rule (§12.8 / ADR-0011).
         Sources come from the last Import run (lastImportedDocFilenames);
         falls back to all-docs if no Import has been run this session.
         >5 sources → sequential single-batch calls with "Batch k/N" indicator
         (client owns the counter; no fake % — §12.8); within each batch an
         indeterminate spinner only.

         #173 staleness-guard integration: markIngestDone() must fire when the
         batch sequence finishes (success OR error) so the stale banner appears
         regardless of ingest outcome. runIngestBatches calls setStepBusy(false)
         exactly once at completion, so we wrap that callback to also set the
         stale signal then — keeping runIngestBatches free of guard coupling. */
      setStepBusy(true);
      var onIngestStepDone = function(b) {
        setStepBusy(b);
        if (b === false) markIngestDone();
      };
      runIngestBatches(lastImportedDocFilenames, resultEl, onIngestStepDone);
    },
  },
  {
    id: "index",
    labelKey: "stepIndexLabel",
    descKey: "stepIndexDesc",
    buildBody: null,
    run: function(resultEl, setStepBusy) {
      /* Phase 15 S4 (#173): real IndexResponse card + staleness guard clear */
      setStepBusy(true);
      resultEl.replaceChildren(makeBusyCard(LINT_CHROME[consoleLang].genRebuildingIndex));

      fetch("/wiki/index", { method: "POST" })
        .then(function(resp) {
          if (!resp.ok) return resp.text().then(function(t) { throw new Error("HTTP " + resp.status + ": " + t); });
          return resp.json();
        })
        .then(function(data) { resultEl.replaceChildren(renderIndexCard(data)); })
        .catch(function(err)  { resultEl.replaceChildren(renderErrorCard(LINT_CHROME[consoleLang].indexCardWord, err.message || String(err))); })
        .finally(function()   {
          setStepBusy(false);
          markIndexDone(); /* staleness guard: clear stale signal after Index run */
        });
    },
  },
  {
    id: "lint",
    labelKey: "stepLintLabel",
    descKey: "stepLintDesc",
    buildBody: null,
    run: function(resultEl, setStepBusy) {
      /* Phase 15 S4 (#173): real LintResponse card with per-check grouped findings */
      /* Phase 15 S6 (#174): store lint data + trigger Curation Queue render */
      /* issue #441: fast, LLM-free by default — include_c5=false skips the
         C5 contradiction audit (up to 30 gpt-4o-mini page-pair calls); that
         check now runs only on demand via the Deep audit control below.
         The completion chain below is deliberately kept inline (not
         factored into a shared helper with deepAudit) — existing structural
         tests (test_ui_console_routed_coverage_fill.py,
         test_ui_console_c3_routed_fix_source.py) pin the exact ordering of
         checkCoverageFillOutcome / checkFixSourceOutcome / renderLintCard
         inside THIS function's own body. */
      setStepBusy(true);
      resultEl.replaceChildren(makeBusyCard(LINT_CHROME[consoleLang].genRunningLint));

      fetch("/wiki/lint?include_c5=false", { method: "POST" })
        .then(function(resp) {
          if (!resp.ok) return resp.text().then(function(t) { throw new Error("HTTP " + resp.status + ": " + t); });
          return resp.json();
        })
        .then(function(data) {
          /* tier-B S7 (issue #383, ADR-0027): resolve any pending Routed
             Coverage Fill BEFORE rendering, so a one-shot outcome banner is
             already queued (mirrors the lastBatchSummary ordering above). */
          checkCoverageFillOutcome(data);
          /* issue #408 (ADR-0029): same ordering for a pending C3 Fix Source. */
          checkFixSourceOutcome(data);
          resultEl.replaceChildren(renderLintCard(data, resultEl));
          /* Phase 15 S6: store latest lint data and render the Curation Queue */
          lastLintData = data;
          renderCurationQueue(document.getElementById("curation-queue-root"), data);
        })
        .catch(function(err)  { resultEl.replaceChildren(renderErrorCard(LINT_CHROME[consoleLang].stepLintLabel, err.message || String(err))); })
        .finally(function()   { setStepBusy(false); });
    },
    deepAudit: function(resultEl, setStepBusy) {
      /* issue #441: on-demand C5 contradiction audit. Mirrors run() above
         exactly (same completion chain — outcome banners -> renderLintCard
         -> lastLintData -> Curation Queue) so C5 findings render exactly as
         they do today, in the same card (AC "same card, same downstream
         flows"); only include_c5 and the busy label differ. */
      setStepBusy(true);
      resultEl.replaceChildren(makeBusyCard(LINT_CHROME[consoleLang].genRunningDeepAudit));

      fetch("/wiki/lint?include_c5=true", { method: "POST" })
        .then(function(resp) {
          if (!resp.ok) return resp.text().then(function(t) { throw new Error("HTTP " + resp.status + ": " + t); });
          return resp.json();
        })
        .then(function(data) {
          checkCoverageFillOutcome(data);
          checkFixSourceOutcome(data);
          // issue #489 (updated #538: the C5 fix-source batch panel's
          // runC5FixSourceBatch is the second call site that requests
          // include_c5=true) — a one-shot signal (mirrors
          // lastBatchSummary/lastCoverageFillOutcome's pattern) telling the
          // upcoming renderLintCard this response's page_pairs is a genuine
          // fresh judgment, the baseline every later fast (include_c5=false)
          // relint falls back to. Not passed as a 3rd renderLintCard
          // argument: test_ui_console_lint_fast_default.py pins the literal
          // 2-arg call in both run() and deepAudit() bodies.
          pendingDeepC5Audit = true;
          resultEl.replaceChildren(renderLintCard(data, resultEl));
          lastLintData = data;
          renderCurationQueue(document.getElementById("curation-queue-root"), data);
        })
        .catch(function(err)  { resultEl.replaceChildren(renderErrorCard(LINT_CHROME[consoleLang].stepLintLabel, err.message || String(err))); })
        .finally(function()   { setStepBusy(false); });
    },
  },
];

/* ============================================================
   Build the pipeline DOM
   ============================================================ */
function buildPipeline(rootEl) {
  /* ── Step track (breadcrumb row) ─────────────────────── */
  var trackItems = [];
  STEP_DEFS.forEach(function(step, i) {
    if (i > 0) trackItems.push(el("span", { class: "step-arrow", text: "→" }));
    trackItems.push(
      el("span", { class: "step-pill" + (i === 0 ? " active" : ""), id: "track-" + step.id },
        el("span", { class: "step-num", text: String(i + 1) }),
        bindText(el("span"), step.labelKey)
      )
    );
  });

  var track = el.apply(null, ["div", { class: "step-track" }].concat(trackItems));

  /* ── Step panels ─────────────────────────────────────── */
  var panels = el("div", { class: "step-panels" });

  STEP_DEFS.forEach(function(step) {
    var resultEl = el("div", { class: "step-result" });
    // Stash the Lint step's own result container (issue #365) so the
    // header language toggle can re-render an already-visible Lint card
    // in place, without waiting for another Run click.
    if (step.id === "lint") lintResultEl = resultEl;

    /* Per-step busy state + button toggle */
    var runBtn, deepAuditBtn;
    function setStepBusy(busy) {
      if (runBtn) runBtn.disabled = busy;
      /* issue #441: the Lint step's Run and Deep audit both hit
         POST /wiki/lint — disable each other while either is in flight so
         they never race the same underlying lint pass. */
      if (deepAuditBtn) deepAuditBtn.disabled = busy;
      /* Update track pill */
      var pill = document.getElementById("track-" + step.id);
      if (pill) {
        if (busy) {
          pill.classList.add("active");
          pill.classList.remove("done");
        }
      }
    }

    /* Header */
    var headLeft = el("div", { style: "display:flex; align-items:center; gap:12px; min-width:0; flex:1;" },
      bindText(el("span", { class: "step-panel-title" }), step.labelKey),
      bindText(el("span", { class: "step-panel-desc" }), step.descKey)
    );

    var headEl;
    if (step.noRunBtn) {
      /* Upload: no Run button in the header — controlled inside the drop zone */
      headEl = el("div", { class: "step-panel-head" }, headLeft);
    } else {
      runBtn = bindText(el("button", { class: "run-btn", type: "button",
        onclick: function() { step.run(resultEl, setStepBusy); }
      }), "stepRun");
      var headActions = [runBtn];
      if (step.deepAudit) {
        /* issue #441: Lint-only second control — the on-demand C5
           contradiction audit, kept out of the now-fast default Run path.
           Wrapped together with runBtn in .step-panel-actions below so
           .step-panel-head's space-between layout still sees exactly two
           flex children regardless of how many action buttons a step has. */
        /* issue #498: keeps the pinned literal `text: LINT_CHROME[consoleLang].
           deepAudit,` prop (test_ui_console_lint_fast_default.py::
           test_deep_audit_button_wired_only_when_step_defines_it asserts it
           verbatim) — registered into I18N_BOUND directly (rather than via
           the bindText() helper, which would drop the literal prop) so the
           toggle still retro-switches this button's label. */
        deepAuditBtn = el("button", { class: "deep-audit-btn", type: "button",
          text: LINT_CHROME[consoleLang].deepAudit,
          onclick: function() { step.deepAudit(resultEl, setStepBusy); }
        });
        I18N_BOUND.push({ el: deepAuditBtn, key: "deepAudit" });
        headActions.push(deepAuditBtn);
      }
      headEl = el("div", { class: "step-panel-head" }, headLeft,
        el.apply(null, ["div", { class: "step-panel-actions" }].concat(headActions)));
    }

    /* Body */
    var bodyChildren = [];
    if (step.buildBody) {
      bodyChildren.push(step.buildBody(resultEl));
    }
    bodyChildren.push(resultEl);

    var panel = el.apply(null, ["div", { class: "step-panel" }, headEl].concat(bodyChildren));
    panels.append(panel);
  });

  rootEl.append(
    el("div", { class: "pipeline" },
      bindText(el("div", { class: "pipeline-header" }), "stepPipelineHeader"),
      track,
      panels
    )
  );
}

/* ============================================================
   Phase 15 S6 (#174) — Curation Queue
   Driven by the latest LintResponse stored in lastLintData.
   Sections:
     - C8 Promotion candidates (draft Filed Answers, ranked) — Promote + Discard
     - C9 Stale filed answers — Re-file (tier-B S4, issue #380, ADR-0026):
       chained re-synthesize + grounding-check + demote-in-place; a failed
       re-ground changes nothing, so the button just re-enables with an
       honest message
     - C10 Invalid qa schema — read-only flag + optional Discard (inert only)
   §12.4: all server-derived text via textContent.
   §12.5: server decides inert/live eligibility; the client just calls and shows.
   ============================================================ */

/* Module-level store for the latest LintResponse */
var lastLintData = null;

/* Module-level store for the latest POST /wiki/qa/promote-batch result
   (tier-B S6, issue #382) — a one-shot banner shown at the top of the C8
   section on the NEXT renderCurationQueue call (the batch's own success
   handler re-lints and re-renders the queue, which would otherwise destroy
   the button's own status message before the operator can read it; mirrors
   the ``lastBatchSummary`` pattern the Lint card's batch actions already use). */
var lastPromoteBatchResult = null;

/* Module-level handle to the Lint step's own result container, set by
   buildPipeline (issue #365) so the header language toggle can re-render an
   already-visible Lint card in place. */
var lintResultEl = null;

/* ── Curation Queue renderer ──────────────────────────────── */
function renderCurationQueue(rootEl, lintData) {
  if (!rootEl) return;
  var chrome = LINT_CHROME[consoleLang];
  if (!lintData || !lintData.findings) {
    /* No data yet — clear the queue section */
    rootEl.replaceChildren();
    return;
  }

  var findings     = lintData.findings;
  var candidates   = findings.promotion_candidates  || [];   /* C8 */
  var staleQa      = findings.stale_filed_answers   || [];   /* C9 */
  var invalidQa    = findings.invalid_qa_schemas    || [];   /* C10 */

  /* If all categories are empty, render a clean-slate message */
  if (candidates.length === 0 && staleQa.length === 0 && invalidQa.length === 0) {
    rootEl.replaceChildren(
      el("div", { class: "curation-queue" },
        el("div", { class: "queue-header" },
          el("span", { class: "queue-header-label", text: chrome.queueHeaderLabel }),
          makeRefreshBtn()
        ),
        el("div", { class: "queue-empty", text: chrome.queueEmpty })
      )
    );
    return;
  }

  /* Sections fold under the queue header (collapsible) so a processed queue can
     be tucked away instead of forcing a long scroll past it. */
  var queueSections = [];

  /* ── C8: Promotion candidates ───────────────────────────── */
  if (candidates.length > 0) {
    /* ADR-0021 per-action one-liner for Promote and Discard (§12.4: textContent only).
       Promote: the human gate of ADR-0020's validated write-back loop.
       Discard: inert-only server decision; refused for live answers.
       issue #498: the English literal stays at creation (test_ui_console_
       lint_bilingual.py::test_console_promote_line_operator_copy pins the
       exact `class: "queue-section-desc",\n  text: "..."` shape via regex),
       overwritten via .textContent for zh right after — same convention as
       discardAllAction (issue #365). */
    var c8DescEl = el("p", { class: "queue-section-desc",
      text: "Promote: a curator approves a draft Filed Answer so it becomes retrievable — the bot starts answering matching questions with it. Discard: remove an inert (draft) entry from the queue — refused for live answers (server decides eligibility)." });
    if (consoleLang === "zh") c8DescEl.textContent = LINT_CHROME.zh.queueC8Desc;
    var c8Section = el("div", { class: "queue-section" },
      el("div", { class: "queue-section-head" },
        el("span", { text: chrome.queueC8Header }),
        el("span", { class: "label label-created", text: String(candidates.length) }),
        promoteAllAction(candidates.map(function(f) { return f.slug; }))
      ),
      c8DescEl
    );
    if (lastPromoteBatchResult) {
      c8Section.append(renderPromoteBatchSummary(lastPromoteBatchResult));
      lastPromoteBatchResult = null;
    }
    candidates.forEach(function(f) {
      c8Section.append(buildDraftCard(f));
    });
    queueSections.push(c8Section);
  }

  /* ── C9: Stale filed answers ────────────────────────────── */
  if (staleQa.length > 0) {
    /* Deduplicate by page_slug — C10 may overlap, show each slug once */
    var staleMap = {};
    staleQa.forEach(function(f) { staleMap[f.page_slug] = f; });
    var staleSlugs = Object.keys(staleMap);

    var c9Section = el("div", { class: "queue-section" },
      el("div", { class: "queue-section-head" },
        el("span", { text: chrome.queueC9Header }),
        el("span", { class: "label label-updated", text: String(staleSlugs.length) })
      )
    );
    staleSlugs.forEach(function(slug) {
      var f = staleMap[slug];
      var driftUnit = consoleLang === "zh" ? "天" : "d drift";
      var drift = f.max_drift_days != null ? f.max_drift_days.toFixed(1) + driftUnit : "";
      var hint = consoleLang === "zh"
        ? "重新歸檔:根據目前的實體/概念重新推導此回答,並暫存為新草稿供審核 — 舊回答將離開知識庫。"
        : "Re-file: re-derive this answer from the current entities/concepts and " +
          "stage it as a fresh draft for review — the old answer leaves the corpus.";
      c9Section.append(buildRefileFlagCard(
        /* slug */ f.page_slug,
        /* subtitle */ drift + (drift ? " — " : "") + hint
      ));
    });
    queueSections.push(c9Section);
  }

  /* ── C10: Invalid qa schema ─────────────────────────────── */
  if (invalidQa.length > 0) {
    /* Group by slug — multiple findings per slug are possible */
    var invalidMap = {};
    invalidQa.forEach(function(f) {
      if (!invalidMap[f.page_slug]) invalidMap[f.page_slug] = [];
      invalidMap[f.page_slug].push(f);
    });
    var invalidSlugs = Object.keys(invalidMap);

    var c10Section = el("div", { class: "queue-section" },
      el("div", { class: "queue-section-head" },
        el("span", { text: chrome.queueC10Header }),
        el("span", { class: "label label-failed", text: String(invalidSlugs.length) })
      )
    );
    invalidSlugs.forEach(function(slug) {
      var items = invalidMap[slug];
      var propSummary = items.map(function(i) {
        return i.property_name + "=" + i.offending_value;
      }).join("; ");
      /* issue #535 (ADR-0037): a status:live page can never be discarded
         (ADR-0012 refuses it with 409, which used to dead-end the row) —
         demote-to-draft is its remediation instead. Every finding for a
         given slug carries the same page-level status, so items[0] is
         representative. Everything else (draft, unparseable frontmatter,
         an out-of-range status value) keeps the existing one-click discard. */
      var isLive = items[0].status === "live";
      if (isLive) {
        var liveHint = consoleLang === "zh"
          ? "此頁面已生效但格式錯誤 — 退回草稿以修正或捨棄。"
          : "This page is live but schema-invalid — demote to draft to fix or discard it.";
        c10Section.append(buildDemoteFlagCard(slug, propSummary + " — " + liveHint));
        return;
      }
      var hint = consoleLang === "zh"
        ? "請修正 frontmatter 屬性,或按捨棄以清除這筆無效項目。"
        : "Fix the frontmatter property or Discard to clear this invalid entry.";
      c10Section.append(buildFlagCard(
        /* icon */ "!",
        /* slug */ slug,
        /* subtitle */ propSummary + " — " + hint,
        /* discardBtn? */ true,
        /* onDiscard — issue #505: thread the card's own status element
           through so doDiscard renders the outcome ("Discarded." / the 409
           live-page refusal / HTTP errors) instead of silently skipping it. */
        function(cardEl, statusMsgEl) { doDiscard(slug, cardEl, statusMsgEl, null); }
      ));
    });
    queueSections.push(c10Section);
  }

  rootEl.replaceChildren(
    el("div", { class: "curation-queue" },
      makeCollapse({
        key: "queue",
        wrapClass: "curation-collapse",
        headClass: "queue-header",
        labelNodes: [el("span", { class: "queue-header-label", text: chrome.queueHeaderLabel })],
        asideEl: makeRefreshBtn(),
        bodyNodes: queueSections,
      })
    )
  );
}

/* ── Shared fast-path queue refresh ───────────────────────────
   Re-runs lint (include_c5=false: the queue only needs the local
   C8/C9/C10 checks, never the slow C5 LLM contradiction audit) and
   re-renders the Curation Queue in place. Shared by the Refresh button,
   the initial page-load fetch, and the stale-draft self-heal (issue #442)
   so all three go through one fetch+render path. Rejects (network error
   or non-2xx) so each caller can decide its own fallback UI. */
function refreshCurationQueueFast() {
  return fetch("/wiki/lint?include_c5=false", { method: "POST" })
    .then(function(resp) {
      if (!resp.ok) return resp.text().then(function(t) { throw new Error("HTTP " + resp.status + ": " + t); });
      return resp.json();
    })
    .then(function(data) {
      lastLintData = data;
      renderCurationQueue(document.getElementById("curation-queue-root"), data);
    });
}

/* ── Stale-draft self-heal (issue #442) ───────────────────────
   Save/Promote/Discard against a wiki/qa/{slug}.md draft return 404
   ("wiki/qa/<slug>.md not found") once the demo environment's periodic
   reset (or another tab's own action) has already removed the file —
   the card on screen is a stale snapshot, not a real error. Rather than
   surface the raw HTTP string, mark the card as gone, show a bilingual
   explanatory notice, and refresh the queue so the card's own removal
   (the finding is gone from the next lint response) is what actually
   drops it — no separate client-side "remove this node" logic to keep
   in sync with the server's findings (§12.5). statusMsgEl may be null
   (the C10 flag-card Discard path does not thread one through). */
function handleStaleDraftGone(cardEl, statusMsgEl) {
  if (statusMsgEl) {
    statusMsgEl.textContent = LINT_CHROME[consoleLang].staleDraftGone;
    statusMsgEl.className = "card-status-msg";
  }
  cardEl.style.opacity = "0.5";
  refreshCurationQueueFast().catch(function() {
    /* non-fatal: the card stays marked gone; the operator's own Refresh
       click will retry the queue fetch. */
  });
}

/* ── Refresh button ─────────────────────────────────────────
   Re-runs lint and refreshes the queue without opening the
   full pipeline stepper — keeps the queue self-contained.    */
function makeRefreshBtn() {
  var chrome = LINT_CHROME[consoleLang];
  var btn = el("button", {
    class: "queue-refresh-btn",
    type: "button",
    text: chrome.queueRefresh
  });
  btn.addEventListener("click", function() {
    btn.disabled = true;
    btn.textContent = chrome.queueRefreshing;

    refreshCurationQueueFast()
      .catch(function() {
        btn.disabled = false;
        btn.textContent = chrome.queueRefresh;
      });
  });
  return btn;
}

/* ── Promote-all batch action (tier-B S6, issue #382, ADR-0023) ────────
   Direct-tier's one pre-authorized batch endpoint: POST /wiki/qa/promote-batch
   with the EXACT slugs currently rendered as candidates — never re-resolved
   as "all drafts" client- or server-side, so a draft filed after this queue
   rendered is never approved sight-unseen. Shares the same remediationInFlight
   guard + beforeunload confirm the Lint card's batch actions use (issue #364)
   so a promote-all in flight also blocks a concurrent Lint-card batch, and
   vice versa — one guard, one durability story, across both cards. */
function promoteAllAction(slugs) {
  var chrome = LINT_CHROME[consoleLang];
  var btn = el("button", { class: "promote-btn queue-batch-btn", type: "button",
    text: chrome.queuePromoteAll + " (" + slugs.length + ")" });
  var statusMsgEl = el("span", { class: "card-status-msg" });

  btn.addEventListener("click", function() {
    if (btn.disabled || remediationInFlight) return;
    remediationInFlight = true;
    btn.disabled = true;
    statusMsgEl.replaceChildren(
      el("span", { class: "spinner" }),
      document.createTextNode(
        consoleLang === "zh"
          ? "正在升等 " + slugs.length + " 則草稿…"
          : "Promoting " + slugs.length + " draft" + (slugs.length !== 1 ? "s" : "") + "…"
      )
    );
    statusMsgEl.className = "card-status-msg";

    fetch("/wiki/qa/promote-batch", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ slugs: slugs })
    })
      .then(function(resp) {
        if (!resp.ok) return resp.text().then(function(t) { throw new Error("HTTP " + resp.status + ": " + t); });
        return resp.json();
      })
      .then(function(data) {
        lastPromoteBatchResult = data;
        var summary = "promoted " + data.promoted.length + " of " + slugs.length +
          (data.skipped.length ? ": " + data.skipped.length + " skipped" : "");
        /* Reuses the Lint card's shared batch-completion path (re-lint once,
           re-render the Lint card AND the Curation Queue, honest re-lint-
           failure fallback) — a promote-all is just another Direct-tier
           batch from that path's point of view. */
        finishBatchRemediation(summary, lintResultEl, [btn]);
      })
      .catch(function(err) {
        remediationInFlight = false;
        btn.disabled = false;
        statusMsgEl.textContent = "Error: " + (err.message || String(err));
        statusMsgEl.className = "card-status-msg err";
      });
  });

  return el("div", { class: "queue-batch-action" }, btn, statusMsgEl);
}

/* Renders the one-shot Promote-all result banner: how many promoted, and
   every skipped slug with its reason (issue #382 AC: "skipped list rendered
   per-item in the Console"). */
function renderPromoteBatchSummary(result) {
  var promotedCount = result.promoted.length;
  var summaryEl = el("div", { class: "promote-batch-summary" },
    el("span", { class: "card-status-msg ok",
      text: LINT_CHROME[consoleLang].queuePromoteBatchPrefix + promotedCount + (promotedCount ? ": " + result.promoted.join(", ") : "") })
  );
  if (result.skipped.length > 0) {
    var skipList = el("ul", { class: "promote-batch-skipped" });
    result.skipped.forEach(function(s) {
      skipList.append(el("li", { text: s.slug + " — " + s.reason }));
    });
    summaryEl.append(skipList);
  }
  return summaryEl;
}

/* Extract a wiki/qa/<slug>.md file's answer body (everything after the
   second frontmatter fence) from the raw content the S5 read API returns.
   Shared by the initial card render and the Edit form's pre-fill fetch
   (issue #379) so the dash-fence parsing lives in exactly one place. */
function extractQaBodyFromFileContent(content) {
  var lines = content.split("\n");
  var dashIdxs = [];
  for (var i = 0; i < lines.length; i++) {
    if (lines[i].trim() === "---") dashIdxs.push(i);
    if (dashIdxs.length === 2) break;
  }
  var bodyText = dashIdxs.length >= 2
    ? lines.slice(dashIdxs[1] + 1).join("\n").replace(/^\n+/, "")
    : content;
  return bodyText.trim();
}

/* ── Draft card builder (C8) ────────────────────────────────
   Fetches the draft body via GET /read/file?path=wiki/qa/<slug>.md
   (the S5 read API, issue #171). Shows question, answer, sources.
   Promote  → POST /wiki/qa/{slug}/promote
   Discard  → DELETE /wiki/qa/{slug}
   Edit     → PUT /wiki/qa/{slug} (tier-B S3, issue #379, ADR-0026)
              draft-only; a failing grounding re-check returns 422 with
              a per-item failure list, rendered inline; nothing else on
              the card changes when an edit is rejected.               */
function buildDraftCard(f) {
  var chrome = LINT_CHROME[consoleLang];
  /* slug, question, count, age_days, cited_count come from PromotionCandidateFinding */
  var slug = f.slug;
  var currentQuestion = f.question || "";
  var currentBodyText = null; /* populated once the initial fetch resolves */
  var metaText = "asked " + f.count + "×";
  if (f.age_days != null) metaText += " · " + f.age_days.toFixed(0) + "d ago";

  /* Action state */
  var actionBusy = false;
  var editing = false;
  var statusMsgEl = el("span", { class: "card-status-msg" });

  /* Buttons */
  var promoteBtn = el("button", {
    class: "promote-btn",
    type: "button",
    text: chrome.draftPromote
  });
  var discardBtn = el("button", {
    class: "discard-btn",
    type: "button",
    text: chrome.draftDiscard
  });
  /* issue #498: "Edit" stays a pinned English literal at creation
     (test_ui_console_qa_edit.py::test_edit_button_present_in_draft_card
     asserts `text: "Edit"` verbatim) — overwritten via .textContent for
     zh right after, same convention as discardAllAction (issue #365). */
  var editBtn = el("button", {
    class: "edit-btn",
    type: "button",
    text: "Edit"
  });
  if (consoleLang === "zh") editBtn.textContent = LINT_CHROME.zh.draftEdit;

  function setActionBusy(v) {
    actionBusy = v;
    promoteBtn.disabled = v || editing;
    discardBtn.disabled = v || editing;
    editBtn.disabled = v || editing;
  }

  promoteBtn.addEventListener("click", function() {
    if (actionBusy || editing) return;
    setActionBusy(true);
    statusMsgEl.textContent = chrome.draftPromoting;
    statusMsgEl.className = "card-status-msg";

    fetch("/wiki/qa/" + encodeURIComponent(slug) + "/promote", { method: "POST" })
      .then(function(resp) {
        /* Stale card (issue #442): the demo environment already wiped this
           draft (periodic reset, or acted on from another tab). Self-heal
           instead of surfacing the raw "wiki/qa/<slug>.md not found" 404. */
        if (resp.status === 404) { handleStaleDraftGone(cardEl, statusMsgEl); return null; }
        if (!resp.ok) return resp.text().then(function(t) { throw new Error("HTTP " + resp.status + ": " + t); });
        return resp.json();
      })
      .then(function(data) {
        if (data === null) return; /* stale-draft branch already handled above */
        /* Gate legibility (issue #379 / ADR-0026): close the loop with the
           observable consequence instead of a bare "now live" confirmation.
           issue #498: the English literal stays (test_ui_console_qa_edit.py::
           test_post_promote_message_closes_the_loop_with_observable_consequence
           pins "in chat" / "it now cites this page" / currentQuestion in this
           function's body) — the zh branch carries the same consequence via
           the {question} template instead of overwriting after the fact. */
        statusMsgEl.textContent = consoleLang === "zh"
          ? LINT_CHROME.zh.draftPromoteSuccess.replace("{question}", currentQuestion)
          : 'Promoted — ask "' + currentQuestion + '" in chat, it now cites this page.';
        statusMsgEl.className = "card-status-msg ok";
        promoteBtn.disabled = true;
        discardBtn.disabled = true;
        editBtn.disabled = true;
        /* Mark the card as promoted visually */
        cardEl.style.opacity = "0.6";
      })
      .catch(function(err) {
        statusMsgEl.textContent = "Error: " + (err.message || String(err));
        statusMsgEl.className = "card-status-msg err";
        setActionBusy(false);
      });
  });

  discardBtn.addEventListener("click", function() {
    if (actionBusy || editing) return;
    setActionBusy(true);
    statusMsgEl.textContent = chrome.draftDiscarding;
    statusMsgEl.className = "card-status-msg";
    doDiscard(slug, cardEl, statusMsgEl, setActionBusy);
  });

  /* Answer body + sources: fetch asynchronously from the S5 read API */
  var bodyPlaceholder = el("div", { class: "draft-card-body" });
  bodyPlaceholder.textContent = chrome.draftLoading;

  var sourcesEl = el("div", { class: "draft-card-sources" },
    el("span", { class: "src-label", text: chrome.draftSrcLabel })
  );
  /* cited_count from PromotionCandidateFinding — we can't list the IDs from
     the finding alone; the actual IDs live in the file frontmatter which the
     read API gives us. Populate from the file once fetched. */

  fetch("/read/file?" + new URLSearchParams({ path: "wiki/qa/" + slug + ".md" }))
    .then(function(r) {
      if (!r.ok) return r.json().then(function(j) { throw new Error(j.detail || ("HTTP " + r.status)); });
      return r.json();
    })
    .then(function(data) {
      var content = data.content || "";
      currentBodyText = extractQaBodyFromFileContent(content) || "(no body)";
      bodyPlaceholder.textContent = currentBodyText;

      /* Extract sources from frontmatter YAML text */
      var lines = content.split("\n");
      var dashIdxs = [];
      for (var i = 0; i < lines.length; i++) {
        if (lines[i].trim() === "---") dashIdxs.push(i);
        if (dashIdxs.length === 2) break;
      }
      if (dashIdxs.length >= 2) {
        var fmLines = lines.slice(dashIdxs[0] + 1, dashIdxs[1]);
        /* Find the sources: list — look for "sources:" then subsequent "- " items */
        var inSources = false;
        var srcs = [];
        for (var j = 0; j < fmLines.length; j++) {
          var ln = fmLines[j];
          if (/^sources\s*:/.test(ln)) { inSources = true; continue; }
          if (inSources) {
            /* List items are written at column 0 (`- slug#heading`) by the
               filing layer, so allow zero-or-more leading spaces (\s*), not
               one-or-more (\s+) — otherwise the sources never render. */
            var m = ln.match(/^\s*-\s+(.*)/);
            if (m) {
              srcs.push(m[1].trim());
            } else {
              inSources = false;
            }
          }
        }
        if (srcs.length > 0) {
          srcs.forEach(function(s) {
            sourcesEl.append(el("span", { text: s }));
          });
        } else {
          sourcesEl.append(el("span", { text: chrome.draftNoneListed }));
        }
      }
    })
    .catch(function() {
      bodyPlaceholder.textContent = chrome.draftBodyLoadFailed;
      currentBodyText = "";
      sourcesEl.append(el("span", { text: chrome.draftUnknown }));
    });

  /* ── Edit form (issue #379 / ADR-0026 decision 2) ──────────
     Hidden until Edit is clicked. Save → PUT /wiki/qa/{slug};
     a 422 grounding-re-check failure renders the per-item claim
     list inline and leaves the form open — nothing on disk changed,
     so Promote still works against the pre-edit draft. */
  var questionInput = el("input", { type: "text" });
  var bodyTextarea = el("textarea", {});
  var validationErrorsEl = el("div", { class: "edit-validation-errors" });
  validationErrorsEl.style.display = "none";
  var saveBtn = el("button", { class: "promote-btn", type: "button", text: chrome.editSave });
  var cancelBtn = el("button", { class: "discard-btn", type: "button", text: chrome.editCancel });

  var editFormEl = el("div", { class: "draft-card-edit-form" },
    el("label", { text: chrome.editQuestionLabel }),
    questionInput,
    el("label", { text: chrome.editAnswerLabel }),
    bodyTextarea,
    validationErrorsEl,
    el("div", { class: "edit-form-actions" }, saveBtn, cancelBtn)
  );
  editFormEl.style.display = "none";

  function closeEditForm() {
    editing = false;
    editFormEl.style.display = "none";
    validationErrorsEl.style.display = "none";
    validationErrorsEl.replaceChildren();
    setActionBusy(actionBusy); /* re-evaluate disabled state now editing=false */
  }

  editBtn.addEventListener("click", function() {
    if (actionBusy || editing) return;
    editing = true;
    promoteBtn.disabled = true;
    discardBtn.disabled = true;
    editBtn.disabled = true;
    questionInput.value = currentQuestion;
    bodyTextarea.value = currentBodyText || "";
    validationErrorsEl.style.display = "none";
    validationErrorsEl.replaceChildren();
    editFormEl.style.display = "flex";
  });

  cancelBtn.addEventListener("click", function() {
    closeEditForm();
  });

  saveBtn.addEventListener("click", function() {
    saveBtn.disabled = true;
    cancelBtn.disabled = true;
    statusMsgEl.textContent = chrome.editSaving;
    statusMsgEl.className = "card-status-msg";

    fetch("/wiki/qa/" + encodeURIComponent(slug), {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ question: questionInput.value, body: bodyTextarea.value })
    })
      .then(function(resp) {
        return resp.json().then(function(data) { return { ok: resp.ok, status: resp.status, data: data }; });
      })
      .then(function(result) {
        saveBtn.disabled = false;
        cancelBtn.disabled = false;
        if (result.ok) {
          currentQuestion = questionInput.value;
          currentBodyText = bodyTextarea.value;
          questionEl.textContent = currentQuestion;
          bodyPlaceholder.textContent = currentBodyText || "(no body)";
          statusMsgEl.textContent = chrome.editSaved;
          statusMsgEl.className = "card-status-msg ok";
          closeEditForm();
          return;
        }
        if (result.status === 422) {
          var failures = (result.data.detail && result.data.detail.failures) || [];
          validationErrorsEl.replaceChildren();
          validationErrorsEl.append(el("div", { text: chrome.editRejectedHead }));
          var ul = el("ul", {});
          if (failures.length > 0) {
            failures.forEach(function(c) { ul.append(el("li", { text: c })); });
          } else {
            ul.append(el("li", { text: chrome.editNoDetail }));
          }
          validationErrorsEl.append(ul);
          validationErrorsEl.style.display = "block";
          statusMsgEl.textContent = "";
          return;
        }
        if (result.status === 404) {
          /* Stale card (issue #442): the draft was already wiped (demo
             reset, or discarded from another tab) by the time Save fired.
             Self-heal instead of surfacing the raw 404 string. */
          closeEditForm();
          handleStaleDraftGone(cardEl, statusMsgEl);
          return;
        }
        statusMsgEl.textContent = "Error: HTTP " + result.status + " " + (result.data.detail || "");
        statusMsgEl.className = "card-status-msg err";
      })
      .catch(function(err) {
        saveBtn.disabled = false;
        cancelBtn.disabled = false;
        statusMsgEl.textContent = "Error: " + (err.message || String(err));
        statusMsgEl.className = "card-status-msg err";
      });
  });

  var questionEl = el("div", { class: "draft-card-question", text: currentQuestion });

  /* issue #498: English literal stays (test_ui_console_qa_edit.py::
     test_card_states_what_promoting_does_in_operator_language pins "the bot
     will answer similar questions with this approved answer" verbatim in
     buildDraftCard's body) — overwritten via .textContent for zh right
     after, same convention as discardAllAction (issue #365). */
  var whatItMeansEl = el("div", { class: "draft-card-what-it-means",
    text: "Promoting this answer means: the bot will answer similar questions with this approved answer." });
  if (consoleLang === "zh") whatItMeansEl.textContent = chrome.draftWhatItMeans;

  var cardEl = el("div", { class: "draft-card" },
    el("div", { class: "draft-card-head" },
      questionEl,
      el("div", { class: "draft-card-meta",     text: metaText })
    ),
    bodyPlaceholder,
    sourcesEl,
    whatItMeansEl,
    editFormEl,
    el("div", { class: "draft-card-actions" },
      promoteBtn,
      discardBtn,
      editBtn,
      statusMsgEl
    )
  );

  return cardEl;
}

/* ── Flag card builder (C10) ─────────────────────────────────
   Card with icon, slug, hint text, and optional Discard.
   C10 (invalid):    discardBtn=true — inert, safe to discard.
   (C9 stale used this with discardBtn=false until tier-B S4, issue #380 —
   it now renders via the dedicated buildRefileFlagCard below, which has
   its own POST /refile action instead of a discard toggle.)            */
function buildFlagCard(icon, slug, subtitle, showDiscard, onDiscard) {
  var chrome = LINT_CHROME[consoleLang];
  var actionBusy = false;
  var statusMsgEl = el("span", { class: "card-status-msg" });

  var dBtn = null;
  if (showDiscard) {
    dBtn = el("button", {
      class: "discard-btn",
      type: "button",
      text: chrome.draftDiscard
    });
    dBtn.addEventListener("click", function() {
      if (actionBusy) return;
      actionBusy = true;
      dBtn.disabled = true;
      statusMsgEl.textContent = chrome.draftDiscarding;
      statusMsgEl.className = "card-status-msg";
      /* issue #505: hand the card's own status element to the callback —
         without it doDiscard silently skips every outcome message and the
         row stays stuck on "Discarding…" forever. */
      if (onDiscard) onDiscard(cardEl, statusMsgEl);
    });
  }

  var bodyEl = el("div", { class: "flag-body" },
    el("div", { class: "flag-slug", text: slug }),
    el("div", { class: "flag-hint", text: subtitle })
  );

  var cardEl = el("div", { class: "flag-card" },
    el("div", { class: "flag-icon", text: icon }),
    bodyEl,
    el("div", { class: "flag-actions" }, dBtn),
    /* issue #496: same full-width status row as buildRefileFlagCard — a
       long Discard outcome inside .flag-actions squeezed the body column. */
    el("div", { class: "flag-status-row" }, statusMsgEl)
  );

  return cardEl;
}

/* ── C9 Re-file flag card (tier-B S4, issue #380, ADR-0026 decision 1) ───
   A live Filed Answer flagged stale by C9. Clicking Re-file POSTs
   /wiki/qa/{slug}/refile: the server re-derives the answer from the
   current entities/concepts (wiki/qa/ excluded from retrieval),
   grounding-checks it BEFORE any write, and — only on pass — demotes the
   page in place to status=draft, so it re-enters the C8 Promote/Edit/
   Discard loop on the next Refresh (issue #380 AC: "the re-filed draft
   appears in the Curation Queue"). A failed re-ground (422) writes
   nothing: the old live page keeps serving, this card stays exactly as
   it is, and the button re-enables so the curator can retry or wait for
   the underlying content to change. Does not auto-refresh the queue —
   mirrors C10's buildFlagCard/doDiscard convention of marking the card
   in place and leaving Refresh to the curator. */
function buildRefileFlagCard(slug, subtitle) {
  var chrome = LINT_CHROME[consoleLang];
  var actionBusy = false;
  var statusMsgEl = el("span", { class: "card-status-msg" });
  /* issue #498: "Re-file" stays a pinned English literal at creation
     (test_ui_console_qa_refile.py::test_refile_button_present_and_posts_to_
     refile_endpoint asserts `text: "Re-file"` verbatim) — overwritten via
     .textContent for zh right after (issue #365 convention). */
  var refileBtn = el("button", { class: "edit-btn", type: "button", text: "Re-file" });
  if (consoleLang === "zh") refileBtn.textContent = LINT_CHROME.zh.refileCardLabel;

  refileBtn.addEventListener("click", function() {
    if (actionBusy) return;
    actionBusy = true;
    refileBtn.disabled = true;
    statusMsgEl.textContent = chrome.refileCardRefiling;
    statusMsgEl.className = "card-status-msg";

    fetch("/wiki/qa/" + encodeURIComponent(slug) + "/refile", { method: "POST" })
      .then(function(resp) {
        return resp.json().then(function(data) { return { ok: resp.ok, status: resp.status, data: data }; });
      })
      .then(function(result) {
        if (result.ok) {
          /* issue #498: English literal stays (test_ui_console_qa_refile.py::
             test_success_marks_card_and_reports_observable_consequence pins
             "left the corpus" / "Promotion Candidates" verbatim in this
             function's success branch) — the zh case uses its own full
             sentence from the dict instead of overwriting after the fact,
             since the pinned substrings only need to be PRESENT somewhere
             in the source, which the English branch below still satisfies.
             ADR-0035: a content re-ground failure now returns 200 with
             ``retired: true`` (the stale answer was demoted, not freshly
             re-filed) — message it honestly rather than claiming a fresh draft. */
          statusMsgEl.textContent = result.data.retired
            ? (consoleLang === "zh"
                ? chrome.refileCardRetired
                : "Couldn't re-ground — the knowledge base no longer supports this answer, so it was retired to a draft; the old answer left the corpus. Click Refresh to review or discard it under Promotion Candidates (C8).")
            : (consoleLang === "zh"
                ? chrome.refileCardSuccess
                : "Re-filed as a draft — old answer left the corpus. Click Refresh to review it under Promotion Candidates (C8).");
          statusMsgEl.className = "card-status-msg ok";
          cardEl.style.opacity = "0.6";
          var slugEl = cardEl.querySelector(".flag-slug");
          if (slugEl) slugEl.style.textDecoration = "line-through";
          return; /* leave refileBtn disabled — the finding is now stale */
        }
        if (result.status === 422) {
          var reason = (result.data.detail && result.data.detail.reason) || "unknown";
          /* issue #498: English literal stays (test_ui_console_qa_refile.py::
             test_422_renders_honest_reground_failure_and_reenables_button
             pins "Cannot re-ground" / "nothing changed" verbatim). */
          statusMsgEl.textContent = consoleLang === "zh"
            ? chrome.refileCardFailurePrefix + reason + chrome.refileCardFailureSuffix
            : "Cannot re-ground (reason: " + reason + ") — nothing changed, this page keeps serving.";
          statusMsgEl.className = "card-status-msg err";
          actionBusy = false;
          refileBtn.disabled = false;
          return;
        }
        statusMsgEl.textContent = "Error: HTTP " + result.status + " " + (result.data.detail || "");
        statusMsgEl.className = "card-status-msg err";
        actionBusy = false;
        refileBtn.disabled = false;
      })
      .catch(function(err) {
        statusMsgEl.textContent = "Error: " + (err.message || String(err));
        statusMsgEl.className = "card-status-msg err";
        actionBusy = false;
        refileBtn.disabled = false;
      });
  });

  var bodyEl = el("div", { class: "flag-body" },
    el("div", { class: "flag-slug", text: slug }),
    el("div", { class: "flag-hint", text: subtitle })
  );

  var cardEl = el("div", { class: "flag-card" },
    el("div", { class: "flag-icon", text: "~" }),
    bodyEl,
    el("div", { class: "flag-actions" }, refileBtn),
    /* issue #496: the outcome message spans the whole card on its own grid
       row — inside .flag-actions its length collapsed the body column. */
    el("div", { class: "flag-status-row" }, statusMsgEl)
  );

  return cardEl;
}

/* ── C10 Demote flag card (issue #535, ADR-0037) ──────────────────────
   A status:live Filed Answer flagged schema-invalid by C10. Delete refuses
   any live page (ADR-0012), so this replaces the old dead-end Discard
   button for exactly this case: demote is the reversible inverse of
   promote — a lifecycle bit flip, no LLM, no synthesis. Clicking 退回草稿
   POSTs /wiki/qa/{slug}/demote: the server flips status: live -> draft in
   place, preserving the body, so the page leaves the BM25 corpus and
   re-enters the C8 Promote/Edit/Discard Curation Queue loop on the next
   Refresh. Does not auto-refresh the queue — mirrors buildRefileFlagCard's
   own "mark in place, leave Refresh to the curator" convention. */
function buildDemoteFlagCard(slug, subtitle) {
  var chrome = LINT_CHROME[consoleLang];
  var actionBusy = false;
  var statusMsgEl = el("span", { class: "card-status-msg" });
  var demoteBtn = el("button", { class: "edit-btn", type: "button", text: chrome.demoteCardLabel });

  demoteBtn.addEventListener("click", function() {
    if (actionBusy) return;
    actionBusy = true;
    demoteBtn.disabled = true;
    statusMsgEl.textContent = chrome.demoteCardDemoting;
    statusMsgEl.className = "card-status-msg";

    fetch("/wiki/qa/" + encodeURIComponent(slug) + "/demote", { method: "POST" })
      .then(function(resp) {
        /* Stale card (mirrors doDiscard/promoteBtn issue #442 self-heal):
           the demo environment already wiped this page (periodic reset, or
           acted on from another tab). */
        if (resp.status === 404) { handleStaleDraftGone(cardEl, statusMsgEl); return null; }
        return resp.text().then(function(t) { return { ok: resp.ok, status: resp.status, text: t }; });
      })
      .then(function(result) {
        if (result === null) return; /* stale-card branch already handled above */
        if (result.ok) {
          statusMsgEl.textContent = chrome.demoteCardSuccess;
          statusMsgEl.className = "card-status-msg ok";
          cardEl.style.opacity = "0.6";
          var slugEl = cardEl.querySelector(".flag-slug");
          if (slugEl) slugEl.style.textDecoration = "line-through";
          return; /* leave demoteBtn disabled — the finding is now stale */
        }
        statusMsgEl.textContent = "Error: HTTP " + result.status + " " + result.text;
        statusMsgEl.className = "card-status-msg err";
        actionBusy = false;
        demoteBtn.disabled = false;
      })
      .catch(function(err) {
        statusMsgEl.textContent = "Error: " + (err.message || String(err));
        statusMsgEl.className = "card-status-msg err";
        actionBusy = false;
        demoteBtn.disabled = false;
      });
  });

  var bodyEl = el("div", { class: "flag-body" },
    el("div", { class: "flag-slug", text: slug }),
    el("div", { class: "flag-hint", text: subtitle })
  );

  var cardEl = el("div", { class: "flag-card" },
    el("div", { class: "flag-icon", text: "!" }),
    bodyEl,
    el("div", { class: "flag-actions" }, demoteBtn),
    /* issue #496 convention: the outcome message spans the whole card on
       its own grid row — inside .flag-actions its length collapses the
       body column. */
    el("div", { class: "flag-status-row" }, statusMsgEl)
  );

  return cardEl;
}

/* ── Shared discard helper ─────────────────────────────────
   Calls DELETE /wiki/qa/{slug}. On 204 → mark card as discarded.
   On 409 → server decided this page is live; show message.
   On 404 → stale card (issue #442): self-heal instead of a raw error.
   statusMsgEl / setActionBusy may be null in the flag-card path.    */
function doDiscard(slug, cardEl, statusMsgEl, setActionBusy) {
  fetch("/wiki/qa/" + encodeURIComponent(slug), { method: "DELETE" })
    .then(function(resp) {
      if (resp.status === 409) {
        /* Server refused — this page is live (ADR-0012 §12.5 server decides).
           issue #498: English literal stays (test_ui_console_stale_draft_
           404.py::test_discard_self_heals_on_404 pins "Cannot discard: page
           is live" verbatim in this function's body) — overwritten via the
           zh dict right after, same convention as discardAllAction. */
        var msg = "Cannot discard: page is live (status=live). Use re-ingest to refresh.";
        if (consoleLang === "zh") msg = LINT_CHROME.zh.discardLiveRefused;
        if (statusMsgEl) {
          statusMsgEl.textContent = msg;
          statusMsgEl.className = "card-status-msg err";
        }
        if (setActionBusy) setActionBusy(false);
        return;
      }
      if (resp.status === 404) {
        /* The demo environment already wiped this draft (periodic reset,
           or discarded from another tab). Self-heal instead of surfacing
           the raw "wiki/qa/<slug>.md not found" 404. */
        handleStaleDraftGone(cardEl, statusMsgEl);
        return;
      }
      if (!resp.ok) {
        return resp.text().then(function(t) {
          var msg = "Error: HTTP " + resp.status + " " + t;
          if (statusMsgEl) {
            statusMsgEl.textContent = msg;
            statusMsgEl.className = "card-status-msg err";
          }
          if (setActionBusy) setActionBusy(false);
        });
      }
      /* 204 No Content — success */
      if (statusMsgEl) {
        statusMsgEl.textContent = LINT_CHROME[consoleLang].discardSuccess;
        statusMsgEl.className = "card-status-msg ok";
      }
      cardEl.style.opacity = "0.5";
      /* Visually strike out the card title if present */
      var slug_el = cardEl.querySelector(".flag-slug");
      if (slug_el) slug_el.style.textDecoration = "line-through";
    })
    .catch(function(err) {
      var msg = "Error: " + (err.message || String(err));
      if (statusMsgEl) {
        statusMsgEl.textContent = msg;
        statusMsgEl.className = "card-status-msg err";
      }
      if (setActionBusy) setActionBusy(false);
    });
}

/* ── Motion helpers (Phase 15 UI polish) ─────────────────────
   element.animate() (WAAPI) is NOT covered by the prefers-reduced-motion CSS
   block above — that only disables CSS animations/transitions — so guard every
   call here. scrollSoftIntoView falls back to an instant jump under reduced
   motion. */
var REDUCED_MOTION = matchMedia("(prefers-reduced-motion: reduce)");
function animateIn(node, dur, delay, dy) {
  if (REDUCED_MOTION.matches) return;
  node.animate(
    [{ opacity: 0, transform: "translateY(" + (dy == null ? 6 : dy) + "px)" }, { opacity: 1, transform: "none" }],
    { duration: dur || 320, delay: delay || 0, easing: "cubic-bezier(.22,.61,.36,1)", fill: "backwards" }
  );
}
function scrollSoftIntoView(node, block) {
  node.scrollIntoView({ behavior: REDUCED_MOTION.matches ? "auto" : "smooth", block: block || "nearest" });
}

/* Bring the whole Browse section into view after a folder switch. If it fits in
   the viewport, centre it so every folder is visible at once; if it's taller than
   the viewport, anchor its top — the "Browse" label — to the top of the screen so
   the listing reads from the start. Driven with window.scrollTo to a FIXED pixel
   target (not scrollIntoView) so a concurrent height morph can't make it
   re-measure a box that's still resizing. Measure AFTER the new entries are in the
   DOM and BEFORE the morph starts, so it reads the final layout. */
function scrollBrowserIntoView() {
  var rect = browserSection.getBoundingClientRect();
  var vh = window.innerHeight || document.documentElement.clientHeight;
  var maxScroll = Math.max(0, document.documentElement.scrollHeight - vh);
  var absTop = rect.top + window.scrollY;
  var target = rect.height <= vh ? absTop - (vh - rect.height) / 2 : absTop;
  target = Math.max(0, Math.min(target, maxScroll));
  if (REDUCED_MOTION.matches) window.scrollTo(0, target);
  else window.scrollTo({ top: target, behavior: "smooth" });
}

/* ── Resource-rail drawer (small screens) ─────────────────
   The rail is a permanent right column on desktop; below 900px the CSS turns
   it into an off-canvas drawer. This wires the masthead hamburger, the
   drawer's X, the grey scrim, and Escape to the body.rail-open toggle. The
   rail node itself is never moved or re-rendered, so the open folder / open
   file survive both the open/close and a resize across the breakpoint. */
(function initResourceRailDrawer() {
  var toggle = document.getElementById("rail-toggle");
  var closeBtn = document.getElementById("rail-close");
  var scrim = document.getElementById("rail-scrim");
  if (!toggle || !closeBtn || !scrim) return;
  function onKey(e) { if (e.key === "Escape") closeRail(); }
  function openRail() {
    document.body.classList.add("rail-open");
    toggle.setAttribute("aria-expanded", "true");
    document.addEventListener("keydown", onKey);
    try { closeBtn.focus(); } catch (_) {}
  }
  function closeRail() {
    document.body.classList.remove("rail-open");
    toggle.setAttribute("aria-expanded", "false");
    document.removeEventListener("keydown", onKey);
    try { toggle.focus(); } catch (_) {}
  }
  toggle.addEventListener("click", openRail);
  closeBtn.addEventListener("click", closeRail);
  scrim.addEventListener("click", closeRail);
})();

/* ── Breadcrumb builder ──────────────────────────────────── */
function renderBreadcrumb(relpath) {
  /* §12.4: all textContent */
  var parts = relpath ? relpath.split("/") : [];
  var kids = [];

  /* Root crumb — always a clickable button when inside a subpath */
  if (relpath === "") {
    kids.push(el("span", { class: "crumb-current", text: LINT_CHROME[consoleLang].browseRoot }));
  } else {
    kids.push(el("button", {
      class: "crumb-btn", type: "button", text: LINT_CHROME[consoleLang].browseRoot,
      onclick: function() { navigateTo(""); }
    }));
  }

  /* Intermediate segments */
  for (var i = 0; i < parts.length; i++) {
    kids.push(el("span", { class: "crumb-sep", text: "/" }));
    var segPath = parts.slice(0, i + 1).join("/");
    var segName = parts[i];
    if (i === parts.length - 1) {
      kids.push(el("span", { class: "crumb-current", text: segName }));
    } else {
      (function(p, n) {
        kids.push(el("button", {
          class: "crumb-btn", type: "button", text: n,
          onclick: function() { navigateTo(p); }
        }));
      })(segPath, segName);
    }
  }

  breadcrumbEl.replaceChildren.apply(breadcrumbEl, kids);
}

/* ── Format bytes helper ─────────────────────────────────── */
function fmtBytes(n) {
  if (n < 1024) return n + " B";
  if (n < 1024 * 1024) return (n / 1024).toFixed(1) + " KB";
  return (n / (1024 * 1024)).toFixed(1) + " MB";
}

/* ── Navigate to a directory ─────────────────────────────── */
function navigateTo(relpath) {
  if (browserBusy) return;
  setBrowserBusy(true);
  /* Close any open file viewer */
  fileViewerEl.replaceChildren();

  /* Loading affordance. If a listing is already showing, dim it in place (no
     collapse-to-spinner) so the box keeps its height and the page doesn't jolt.
     On the very first paint the box is empty, so fall back to the spinner. */
  var hadEntries = entriesEl.childElementCount > 0;
  if (hadEntries) {
    entriesEl.classList.add("is-loading");
  } else {
    entriesEl.replaceChildren(
      el("div", { class: "busy-row" },
        el("span", { class: "spinner" }),
        el("span", { text: relpath ? LINT_CHROME[consoleLang].browseLoadingPathPrefix + relpath + "…" : LINT_CHROME[consoleLang].browseLoadingRoots })
      )
    );
  }

  fetch("/read/tree?" + new URLSearchParams({ path: relpath }))
    .then(function(r) {
      if (!r.ok) return r.json().then(function(j) { throw new Error(j.detail || ("HTTP " + r.status)); });
      return r.json();
    })
    .then(function(data) {
      browserPath = relpath;
      var firstLoad = !browserBooted;
      browserBooted = true;
      renderBreadcrumb(relpath);

      /* Soft switch: measure the box, swap in the new entries, then glide the
         section into view and morph the box height from old → new so the listing
         resizes gently instead of snapping. Order matters — scrollBrowserIntoView
         must read the FINAL layout (entries rendered, morph not yet started). */
      entriesEl.classList.remove("is-loading");
      var oldH = entriesEl.getBoundingClientRect().height;
      renderEntries(data.entries || []);
      var newH = entriesEl.getBoundingClientRect().height;

      if (!firstLoad) {
        scrollBrowserIntoView();
        if (!REDUCED_MOTION.matches && Math.abs(newH - oldH) > 1) {
          entriesEl.animate(
            [{ height: oldH + "px" }, { height: newH + "px" }],
            { duration: 240, easing: "cubic-bezier(.22,.61,.36,1)" }
          );
        }
      }
    })
    .catch(function(err) {
      browserBooted = true;
      entriesEl.classList.remove("is-loading");
      entriesEl.replaceChildren(
        el("div", { class: "busy-row" },
          el("span", { style: "color:var(--fail);", text: LINT_CHROME[consoleLang].browseFailedToLoadPrefix + (err.message || String(err)) })
        )
      );
    })
    .finally(function() { setBrowserBusy(false); });
}

/* ── Render directory entries ────────────────────────────── */
function renderEntries(entries) {
  if (entries.length === 0) {
    entriesEl.replaceChildren(
      el("div", { class: "browser-empty", text: LINT_CHROME[consoleLang].browseEmptyDirectory })
    );
    return;
  }

  /* rows holds every DOM node appended to entriesEl (entry rows AND their
     paired notice slots below); toAnimate holds only the actual entry rows,
     so the staggered reveal below indexes by visual row position, not by
     DOM child position (a notice slot must never consume a stagger step). */
  var rows = [];
  var toAnimate = [];

  entries.forEach(function(entry) {
    /* §12.4: all textContent via el() */
    var icon = entry.is_dir ? "▸" : "·";
    var meta = entry.is_dir ? "" : fmtBytes(entry.size);
    var rowClass = "entry-row" + (entry.is_dir ? " is-dir" : "");

    /* Only files open a viewer that can fail (issue #444); a directory's
       failure already renders inline in entriesEl itself via navigateTo's
       own .catch, so only file rows get a paired notice slot. */
    var noticeEl = entry.is_dir ? null : el("div", { class: "entry-row-notice" });

    var row = el("div", { class: rowClass,
      onclick: function() {
        if (entry.is_dir) {
          navigateTo(entry.relpath);
        } else {
          if (noticeEl) { noticeEl.textContent = ""; noticeEl.classList.remove("visible"); }
          openFile(entry.relpath, entry.name, {
            onError: function(message) {
              if (!noticeEl) return;
              noticeEl.textContent = LINT_CHROME[consoleLang].viewerFailedPrefix + message;
              noticeEl.classList.add("visible");
            }
          });
        }
      }
    },
      el("span", { class: "entry-icon", text: icon }),
      el("span", { class: "entry-name", text: entry.name }),
      el("span", { class: "entry-meta", text: meta })
    );

    rows.push(row);
    toAnimate.push(row);
    if (noticeEl) rows.push(noticeEl);
  });

  entriesEl.replaceChildren.apply(entriesEl, rows);

  /* Soft staggered reveal as a folder's contents swap in — gives opening and
     closing (breadcrumb up) a gentle motion instead of an instant hard cut.
     Stagger is capped so a large directory still settles quickly. */
  if (!REDUCED_MOTION.matches) {
    toAnimate.forEach(function(row, i) {
      animateIn(row, 300, Math.min(i * 26, 260), 5);
    });
  }
}

/* ── Wikilink linkify (issue #410, ADR-0030 decision 5) ──────────────────
   parseWikilinks is a PURE function (text -> segments), kept separable from
   DOM rendering and hermetically unit-tested via a Python mirror (mirrors the
   SSE-parser convention, §12.7). "[[slug|display]]" shows the display text;
   resolution always uses the slug part. Rendering below is CURATOR-scoped:
   resolved (slug or alias, via the ONE shared GET /wiki/pages/resolution-map
   — ADR-0030 Invariant: no surface builds its own slug set) -> a navigable
   link; unresolved -> red-link styling (visually the SAME judgment C2
   reports for the same corpus), never navigating.                          */
function parseWikilinks(text) {
  var re = /\[\[([^\]|]+)(?:\|([^\]]+))?\]\]/g;
  var segments = [];
  var lastIndex = 0;
  var m;
  while ((m = re.exec(text)) !== null) {
    if (m.index > lastIndex) segments.push({ type: "text", value: text.slice(lastIndex, m.index) });
    var slug = m[1].trim();
    var display = m[2] !== undefined ? m[2].trim() : slug;
    segments.push({ type: "link", slug: slug, display: display });
    lastIndex = re.lastIndex;
  }
  if (lastIndex < text.length) segments.push({ type: "text", value: text.slice(lastIndex) });
  return segments;
}

/* Looks up `slug` in the shared resolution map; returns the target's
   server-supplied wiki-relative path, or null if unresolvable. The client
   never constructs a wiki path from a bare slug itself (CODING_STANDARD
   §12.5 — mirrors the reader UI's existing source.path convention). */
function resolveWikilinkPath(slug, resolutionMap) {
  var slugs = (resolutionMap && resolutionMap.slugs) || {};
  var aliases = (resolutionMap && resolutionMap.aliases) || {};
  if (Object.prototype.hasOwnProperty.call(slugs, slug)) return slugs[slug];
  if (Object.prototype.hasOwnProperty.call(aliases, slug)) {
    var canonical = aliases[slug];
    return Object.prototype.hasOwnProperty.call(slugs, canonical) ? slugs[canonical] : null;
  }
  return null;
}

/* Fetches the shared ADR-0030 resolution map fresh on every call (the map
   changes on assign-alias / ingest; this endpoint is cheap and cache-friendly
   — no client-side cache to invalidate). Degrades to "nothing resolves" on
   failure so a transient fetch error renders every wikilink red rather than
   throwing. */
function fetchResolutionMap() {
  return fetch("/wiki/pages/resolution-map")
    .then(function(r) { if (!r.ok) throw new Error("HTTP " + r.status); return r.json(); })
    .catch(function() { return { slugs: {}, aliases: {} }; });
}

/* Builds the curator-surface DOM nodes (Text nodes + .wikilink / a
   .wikilink-unresolved span per link) for one file's raw content. */
function renderWikilinkNodes(content, resolutionMap) {
  return parseWikilinks(content).map(function(seg) {
    if (seg.type === "text") return document.createTextNode(seg.value);
    var relpath = resolveWikilinkPath(seg.slug, resolutionMap);
    if (relpath) {
      return el("a", {
        class: "wikilink", href: "#",
        onclick: function(e) { e.preventDefault(); openFile(relpath, relpath.split("/").pop()); },
        text: seg.display,
      });
    }
    return el("span", { class: "wikilink-unresolved", text: seg.display });
  });
}

/* ── Open and display a file ─────────────────────────────── */
/* Third argument is OPTIONAL and deliberately not a named parameter — kept
   out of the declared signature so every existing exact-signature caller
   (openFile(relpath, name), no third arg) keeps working unchanged. Callers
   that render their own control near the click (the Fix Source banner's
   View Source button, a browse-tree row) pass { onError: fn(message) } to
   surface a failure at the point of action (issue #444); read via
   `arguments` rather than a declared `opts` parameter for the same reason. */
function openFile(relpath, name) {
  var opts = arguments.length > 2 ? arguments[2] : {};
  if (browserBusy) return;
  setBrowserBusy(true);

  /* Show loading in viewer area, then glide down to it so the user sees the
     article that just appeared at the bottom (otherwise it opens off-screen).
     The content replaces this node in place, so a single scroll here is enough. */
  var loadingViewer = el("div", { class: "file-viewer" },
    el("div", { class: "file-viewer-head" },
      el("span", { class: "file-name", text: relpath }),
      el("span", { text: LINT_CHROME[consoleLang].viewerLoading })
    )
  );
  fileViewerEl.replaceChildren(loadingViewer);
  animateIn(loadingViewer, 320, 0, 8);
  /* NB: the scroll-into-view happens AFTER the content renders (below), not here.
     During loading the viewer is only a thin placeholder, so the page is short
     and a scroll now would stop a few pixels down; once the full article swaps
     in the page grows but would not re-scroll. */

  Promise.all([
    fetch("/read/file?" + new URLSearchParams({ path: relpath }))
      .then(function(r) {
        if (!r.ok) return r.json().then(function(j) { throw new Error(j.detail || ("HTTP " + r.status)); });
        return r.json();
      }),
    fetchResolutionMap(),
  ])
    .then(function(results) {
      var data = results[0];
      var resolutionMap = results[1];
      /* §12.4: raw Markdown shown via textContent-built nodes (NOT innerHTML) —
         wikilinks are the ONE exception carved out by ADR-0030 decision 5:
         a [[wikilink]] becomes a safely-constructed <a>/<span>, never raw HTML. */
      var content = data.content;
      var closeBtn = el("button", {
        class: "file-viewer-close", type: "button", text: LINT_CHROME[consoleLang].viewerClose,
        onclick: function() { fileViewerEl.replaceChildren(); }
      });

      var pre = el("pre", { class: "file-content" });
      pre.append.apply(pre, renderWikilinkNodes(content, resolutionMap));

      var contentViewer = el("div", { class: "file-viewer" },
        el("div", { class: "file-viewer-head" },
          el("span", { text: LINT_CHROME[consoleLang].viewerRaw }),
          el("span", { text: "·" }),
          el("span", { class: "file-name", text: relpath }),
          closeBtn
        ),
        pre
      );
      fileViewerEl.replaceChildren(contentViewer);
      animateIn(contentViewer, 300, 0, 4);
      /* Glide down to the now full-height article so the user sees it appear at
         the bottom. Done after render (final layout) on the next frame. */
      requestAnimationFrame(function() { scrollSoftIntoView(contentViewer, "start"); });
    })
    .catch(function(err) {
      var message = err.message || String(err);
      var errorViewer = el("div", { class: "file-viewer" },
        el("div", { class: "file-viewer-head" },
          el("span", { style: "color:var(--fail);", text: LINT_CHROME[consoleLang].viewerFailedPrefix + message })
        )
      );
      fileViewerEl.replaceChildren(errorViewer);
      /* A failure must be exactly as visible as a success (issue #444) — the
         success path (above) glides down to the loaded article; without this
         an error rendered at the bottom of the page reads as a silent
         no-op until the operator manually scrolls down to find it. */
      requestAnimationFrame(function() { scrollSoftIntoView(errorViewer, "start"); });
      /* ALSO surface the failure right next to the control that was
         clicked, since the viewer can be far down the page from the trigger
         (e.g. the Fix Source banner lives up near the top) — the scroll
         above closes that gap, but a notice at the point of action means
         the operator doesn't have to wait for the scroll to land to know
         something went wrong. */
      if (typeof opts.onError === "function") opts.onError(message);
    })
    .finally(function() { setBrowserBusy(false); });
}

/* ── Boot the browser ────────────────────────────────────── */
navigateTo("");
</script>
</body>
</html>
