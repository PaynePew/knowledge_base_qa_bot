// One "label: quoted-or-plain text [toggle]" line. `quote` wraps the value
// in curly quotes for the two direct-quote claims (not the summary/action).
function c5ConflictLine(labelText, text, quote) {
  var row = el("div", { class: "c5-conflict-row" },
    el("span", { class: "c5-conflict-label", text: labelText })
  );
  if (quote) row.append(document.createTextNode("“"));
  row.append(collapsibleSpan(text));
  if (quote) row.append(document.createTextNode("”"));
  return row;
}

/* Both quoted claims (attributed to their own page slug), the full summary,
   and the suggested action — the AC-required evidence set, end to end.
   `actionsEl` (optional) is appended last, e.g. the row's real Reconcile
   button; the modal calls this with no second argument. */
function c5ConflictPanel(f, actionsEl) {
  var chrome = LINT_CHROME[consoleLang];
  var panel = el("div", { class: "c5-conflict-panel" },
    c5ConflictLine(f.page_a + ":", f.page_a_claim, true),
    c5ConflictLine(f.page_b + ":", f.page_b_claim, true),
    c5ConflictLine(chrome.c5Summary, f.summary, false),
    c5ConflictLine(chrome.c5SuggestedAction, f.suggested_action, false)
  );
  if (actionsEl) panel.append(actionsEl);
  return panel;
}

function renderLintCard(data, resultEl) {
  var summary  = data.summary  || {};
  var findings = data.findings || {};
  var checkErrors = data.check_errors || {};

  /* ── C5 stale-preservation (issue #489) ─────────────────────────────────
     Every remediation re-lints via POST /wiki/lint?include_c5=false (fast,
     LLM-free by design) and re-renders THIS card from that response, which
     always carries page_pairs: [] — C5 is simply never judged on that path.
     Naively rendering it away made a previously-populated C5 Contradiction
     section vanish, reading as "contradictions resolved" when nothing was
     re-judged. pendingDeepC5Audit (one-shot, set by the Deep audit control —
     the one call site that requests include_c5=true — right before it calls
     this function) tells THIS render whether its page_pairs is a genuine
     fresh judgment; consumed immediately below so a later render is never
     fooled by a stale flag. When true, this render's page_pairs (possibly
     empty) becomes the new baseline. Otherwise, if this render's page_pairs
     is empty AND a non-empty judged baseline already exists, fall back to
     that baseline and flag the section as stale rather than letting it
     disappear. A shallow copy avoids mutating data.findings — callers also
     stash that same object in lastLintData and hand it to
     renderCurationQueue. */
  var c5Deep = pendingDeepC5Audit;
  pendingDeepC5Audit = false;
  var c5Stale = false;
  if (c5Deep) {
    lastDeepC5Pairs = findings.page_pairs || [];
  } else if ((!findings.page_pairs || findings.page_pairs.length === 0) &&
             lastDeepC5Pairs && lastDeepC5Pairs.length > 0) {
    var findingsWithStaleC5 = {};
    for (var fKey in findings) { if (findings.hasOwnProperty(fKey)) findingsWithStaleC5[fKey] = findings[fKey]; }
    findingsWithStaleC5.page_pairs = lastDeepC5Pairs;
    findings = findingsWithStaleC5;
    c5Stale = true;
  }

  var total       = summary.total_findings != null ? summary.total_findings : "?";
  // The fast relint's own total_findings never counted the stale C5 pairs
  // (C5 was skipped, not judged-and-clean) — fold them back in so the badge
  // does not undercount against what the body actually renders below (the
  // exact illusion issue #489 reports: a count that reads as "resolved").
  if (c5Stale && typeof total === "number") total += lastDeepC5Pairs.length;
  var badgeClass  = total === 0 ? "badge badge-ok" : "badge badge-warn";
  var badgeLabel  = total === "?" ? "?" : (total + " finding" + (total !== 1 ? "s" : ""));

  var head = el("div", { class: "result-card-head" },
    el("span", { text: "Lint" }),
    el("span", { text: "·" }),
    el("span", { class: badgeClass },
      el("span", { class: "dot" }),
      el("span", { text: badgeLabel })
    )
  );

  var bodyEl = el("div");

  /* Every clickable remediation button this card renders (per-row AND
     batch) — the in-flight guard disables the whole set while any one of
     them is running (issue #364). Permanently-disabled affordances (the
     empty-source guard, the Authored tier-B button) are never pushed here
     since they must never become clickable. Declared before the two
     one-shot banners below so coverageFillOutcomeBanner's honest-miss
     offer buttons (issue #409) can push onto it too. */
  var allButtons = [];

  /* Repopulated below by ROW_RENDERERS.C5 for THIS render only (issue #443)
     — reconcileAction (nested here) looks a finding up by page-pair key so
     it can hand the full claim/summary/suggested_action evidence to the
     Reconcile modal without changing its own locked call signature. */
  c5FindingByPair = {};

  /* Batch-remediation summary banner (issue #364) — one-shot: cleared
     immediately after being shown so it does not linger across an
     unrelated later re-render (e.g. the Refresh button). */
  if (lastBatchSummary) {
    bodyEl.append(el("div", { class: "lint-batch-summary", text: lastBatchSummary }));
    lastBatchSummary = null;
  }

  /* Routed Coverage Fill honest-miss banner (tier-B S7, issue #383,
     ADR-0027 decision 3) — same one-shot pattern as lastBatchSummary above:
     checkCoverageFillOutcome (called by the caller before this function)
     sets it when a post-fill re-lint finds the red link still unresolved.
     issue #409 (ADR-0030 decision 3) upgrades this from a dead-end message
     into an executable offer — see coverageFillOutcomeBanner below. */
  if (lastCoverageFillOutcome) {
    bodyEl.append(coverageFillOutcomeBanner(lastCoverageFillOutcome));
    lastCoverageFillOutcome = null;
  }

  /* Helper: emit an axis section heading. batchBtnEl (optional) renders an
     axis-level batch action flush right (issue #364 — Freshness only).
     Display text is bilingual (issue #365) — LINT_AXIS_LABEL_ZH mirrors
     markdown_kb/app/lint.py's zh strings; the axis identifier itself
     (``axis``) stays English, only its rendered label switches. */
  function axisHead(axis, batchBtnEl) {
    var label = consoleLang === "zh" ? LINT_AXIS_LABEL_ZH[axis] : axis;
    return el("div", { class: "lint-axis-head" },
      el("span", { text: label }),
      batchBtnEl || null
    );
  }

  /* Helper: emit a check group heading, e.g. "C6 stale (2)". batchBtnEl
     (optional) renders a check-level batch action flush right (issue #364
     — C6 "Re-ingest all", C10 "Discard all"). Check label is bilingual
     (issue #365) — LINT_CHECK_LABEL_ZH mirrors LintCheckMeta.label_zh; the
     code itself (e.g. "C6") is never translated. noteText (optional, issue
     #489) appends an inline " — <note>" after the count, same shape as
     queueCountLine's trailing pointer sentence below — used for the C5
     stale-preservation marker. */
  function checkHead(code, count, batchBtnEl, noteText) {
    var meta = LINT_CHECK_META[code];
    var label = consoleLang === "zh" ? LINT_CHECK_LABEL_ZH[code] : meta.label;
    var headText = code + " " + label + " (" + count + ")" + (noteText ? " — " + noteText : "");
    return el("div", { class: "lint-group-head" },
      el("span", { text: headText }),
      batchBtnEl || null
    );
  }

  /* Helper: emit a check group heading for a Curation-Queue-owned check
     (C8/C9/C10, issue #438, QUEUE_OWNED_LIFECYCLE_CHECKS above) — same
     "CODE label (count)" shape as checkHead, plus a trailing pointer
     sentence naming the Curation Queue section, and (deliberately) NO
     per-item rows below it. batchBtnEl (optional) still renders flush
     right — C10's "Discard all" is a bulk action, not a per-finding
     duplicate, so it is unaffected by this slice. "Curation Queue" itself
     stays the literal English proper noun in both languages, matching
     renderCurationQueue's own header text (never localized, issue #365
     scope was chrome strings owned by THIS file only). */
  function queueCountLine(code, count, batchBtnEl) {
    var meta = LINT_CHECK_META[code];
    var label = consoleLang === "zh" ? LINT_CHECK_LABEL_ZH[code] : meta.label;
    var pointer = LINT_CHROME[consoleLang].seeCurationQueue;
    return el("div", { class: "lint-group-head" },
      el("span", { text: code + " " + label + " (" + count + ") — " + pointer }),
      batchBtnEl || null
    );
  }

  /* Helper: emit one finding row. actionsEl (optional) is appended inside
     the body cell, below the id/crumb text, so the existing 3-column .rec
     grid used by every other result card stays untouched. */
  function findingRow(idx, title, subtitle, labelText, labelClass, actionsEl) {
    var numStr = String(idx).padStart(2, "0");
    var rowBodyEl = el("div", { class: "body" },
      el("div", { class: "id", text: title })
    );
    if (subtitle) rowBodyEl.append(el("div", { class: "crumb", text: subtitle }));
    if (actionsEl) rowBodyEl.append(actionsEl);
    return el("div", { class: "rec" },
      el("div", { class: "num",    text: numStr }),
      rowBodyEl,
      el("div", { class: "label " + labelClass, text: labelText })
    );
  }

  /* Disabled "tier B" affordance for Authored-tier rows — visible, never
     actionable (ADR-0023: Authored Remediation is out of tier-A scope).
     Text is bilingual (issue #365) via LINT_CHROME. */
  function tierBAffordance() {
    return el("div", { class: "lint-row-actions" },
      el("button", { class: "tier-b-btn", type: "button", disabled: "", text: LINT_CHROME[consoleLang].tierB })
    );
  }

  /* ── C5 Reconcile — the flagship Gated (Authored) remediation (tier-B S1,
     issue #376, ADR-0028). Opens a stateless two-phase flow: generate a
     grounded draft (nothing written yet) → side-by-side old-vs-editable-
     draft preview → apply re-verifies grounding on the EXACT submitted
     content and refuses honestly (409 stale draft, 422 ungrounded) rather
     than silently retrying. C4 still renders tierBAffordance() above — C1/C2
     render fillViaImportAction() instead (Routed, not Authored — ADR-0027). */
  function reconcileAction(pageA, pageB) {
    var btn = el("button", { class: "reconcile-btn", type: "button",
      text: LINT_CHROME[consoleLang].reconcile });
    allButtons.push(btn);
    btn.addEventListener("click", function() {
      if (btn.disabled || remediationInFlight) return;
      // issue #443: hand the full C5 finding (claims/summary/suggested_action)
      // to the modal via the page-pair lookup — see c5FindingByPair above.
      openReconcileModal(pageA, pageB, resultEl, allButtons, c5FindingByPair[pageA + "::" + pageB]);
    });
    return el("div", { class: "lint-row-actions" }, btn);
  }

  /* ── C4 collision dual resolution (tier-B S2, issue #378, ADR-0028).
     The finding offers BOTH documented resolutions as separate buttons:
     Merge (base_slug must be a real page — the group's unsuffixed slug,
     variants = every other member) and Differentiate (every member in the
     group, base_slug included when present). Both open the shared
     generate -> preview/edit -> apply modal, parameterised by `mode`. */
  function collisionAction(baseSlug, pagesInGroup) {
    var variantSlugs = (pagesInGroup || []).filter(function(s) { return s !== baseSlug; });
    var mergeBtn = el("button", { class: "collision-merge-btn", type: "button",
      text: LINT_CHROME[consoleLang].collisionMerge });
    var diffBtn = el("button", { class: "collision-differentiate-btn", type: "button",
      text: LINT_CHROME[consoleLang].collisionDifferentiate });
    allButtons.push(mergeBtn, diffBtn);
    mergeBtn.addEventListener("click", function() {
      if (mergeBtn.disabled || remediationInFlight) return;
      openCollisionModal("merge", baseSlug, variantSlugs, resultEl, allButtons);
    });
    diffBtn.addEventListener("click", function() {
      if (diffBtn.disabled || remediationInFlight) return;
      openCollisionModal("differentiate", baseSlug, pagesInGroup || [], resultEl, allButtons);
    });
    return el("div", { class: "lint-row-actions" }, mergeBtn, diffBtn);
  }

  /* ── C11 orphan Confirmed delete (tier-B S5, issue #381, ADR-0024/0025).
     Full orphans (``full === true``) get a real Delete button that opens a
     confirmation dialog naming the operation + target before it runs — no
     draft to review (Confirmed confirms an OPERATION; Authored above
     approves CONTENT). Partial orphans render advisory text only, never a
     delete affordance — the server re-verifies the predicate at delete time
     regardless (ADR-0025 Invariant), but showing the wrong control here
     would still be dishonest UX. This mirrors §12.5: the client renders the
     eligibility the server already computed, it never re-derives it. */
  function deleteOrphanAction(slug, full) {
    if (!full) {
      return el("div", { class: "lint-row-actions" },
        el("span", { class: "card-status-msg", text: LINT_CHROME[consoleLang].partialOrphanAdvisory }));
    }
    var btn = el("button", { class: "discard-btn", type: "button",
      text: LINT_CHROME[consoleLang].deleteOrphan });
    allButtons.push(btn);
    btn.addEventListener("click", function() {
      if (btn.disabled || remediationInFlight) return;
      openDeleteOrphanConfirm(slug, resultEl, allButtons);
    });
    return el("div", { class: "lint-row-actions" }, btn);
  }

  /* Re-ingest / Re-ingest (retry) action for a C6/C3 finding.
     C3 MUST send force:true — omitting it lets hash-skip (#93) no-op the
     retry into a false fix (ADR-0023 Invariant / CODING_STANDARD §12.8).
     Button text + the empty-source note are bilingual (issue #365). */
  function reingestAction(source, retry) {
    var btn = el("button", { class: "reingest-btn", type: "button",
      text: retry ? LINT_CHROME[consoleLang].reingestRetry : LINT_CHROME[consoleLang].reingest });
    var statusMsgEl = el("span", { class: "card-status-msg" });
    // A finding can carry no source (e.g. a failed_grounding page whose
    // frontmatter.sources is empty — lint.py records source=""). There is
    // nothing to re-ingest, and POST /wiki/ingest of "" fails server-side, so
    // disable the button and say why rather than offering a click that can only
    // error (ADR-0023 "honest, not alarmist" — no false affordance).
    if (!source) {
      btn.disabled = true;
      statusMsgEl.textContent = LINT_CHROME[consoleLang].noSource;
      return el("div", { class: "lint-row-actions" }, btn, statusMsgEl);
    }
    allButtons.push(btn);
    btn.addEventListener("click", function() {
      if (btn.disabled) return;
      runLintRemediation(ingestRemediationRequest(source, retry === true), btn, statusMsgEl, resultEl, allButtons);
    });
    return el("div", { class: "lint-row-actions" }, btn, statusMsgEl);
  }

  /* Discard action for a C10 finding — DELETE /wiki/qa/{slug}, server-gated
     (refuses status:live with 409; §12.5). Button text is bilingual
     (issue #365). */
  function discardAction(slug) {
    var btn = el("button", { class: "discard-btn", type: "button", text: LINT_CHROME[consoleLang].discard });
    var statusMsgEl = el("span", { class: "card-status-msg" });
    allButtons.push(btn);
    btn.addEventListener("click", function() {
      if (btn.disabled) return;
      runLintRemediation(discardRemediationRequest(slug), btn, statusMsgEl, resultEl, allButtons);
    });
    return el("div", { class: "lint-row-actions" }, btn, statusMsgEl);
  }

  /* ── C2 Assign-Alias picker (issue #409, ADR-0030 decision 3) ──────────
     The red link's SECOND exit alongside fillViaImportAction (Routed Fill
     via Import): instead of importing new coverage, name the finding's
     ``[[slug]]`` as an alias of an EXISTING page. Unlike fillViaImportAction
     this DOES fetch — it reuses runLintRemediation, the SAME Direct-
     remediation re-lint + re-render path every other row action on this
     card uses, so a 409 collision (alias already resolves to a different
     page) surfaces through its existing err-status rendering verbatim
     (§12.5) — this function never re-derives eligibility itself.
     ADR-0030 Invariant: never batches — one picker, one slug, one POST. */
  var aliasPickerPagesPromise = null;
  function aliasPickerPages() {
    if (!aliasPickerPagesPromise) aliasPickerPagesPromise = fetchAliasPickerPages();
    return aliasPickerPagesPromise;
  }

  function assignAliasAction(finding) {
    var select = el("select", { class: "assign-alias-select" },
      el("option", { value: "", text: LINT_CHROME[consoleLang].assignAliasChoosePage }));
    var btn = el("button", { class: "assign-alias-btn", type: "button",
      text: LINT_CHROME[consoleLang].assignAlias, disabled: "" });
    var statusMsgEl = el("span", { class: "card-status-msg" });

    aliasPickerPages().then(function(slugs) {
      slugs.forEach(function(slug) {
        select.append(el("option", { value: slug, text: slug }));
      });
    }).catch(function() { /* picker stays empty; Assign remains disabled */ });

    select.addEventListener("change", function() {
      btn.disabled = !select.value;
    });

    allButtons.push(btn);
    btn.addEventListener("click", function() {
      if (btn.disabled || !select.value || remediationInFlight) return;
      runLintRemediation(
        assignAliasRequest(select.value, finding.slug), btn, statusMsgEl, resultEl, allButtons
      );
    });
    return el("div", { class: "lint-row-actions" }, select, btn, statusMsgEl);
  }

  /* Honest-miss offer (issue #409, ADR-0030 decision 3) — upgrades the
     post-fill honest-miss report (ADR-0027 decision 3) from a dead-end
     prose message into an executable one-click offer: "make [[target]] an
     alias of <just-minted page>?", one button per page the triggering
     Ingest run actually created (outcome.newPages — never guessed, only
     the pages that specific run wrote). Zero new pages renders the plain
     message with no offer. Each offer reuses runLintRemediation exactly
     like assignAliasAction above. */
  function coverageFillOutcomeBanner(outcome) {
    var container = el("div", { class: "lint-batch-summary" },
      el("div", { text: outcome.text })
    );

    outcome.newPages.forEach(function(pageSlug) {
      var btn = el("button", { class: "assign-alias-offer-btn", type: "button",
        text: "Make [[" + outcome.target + "]] an alias of " + pageSlug + "?" });
      var statusMsgEl = el("span", { class: "card-status-msg" });
      allButtons.push(btn);
      btn.addEventListener("click", function() {
        if (btn.disabled || remediationInFlight) return;
        runLintRemediation(
          assignAliasRequest(pageSlug, outcome.target), btn, statusMsgEl, resultEl, allButtons
        );
      });
      container.append(el("div", { class: "lint-row-actions" }, btn, statusMsgEl));
    });

    return container;
  }

  /* C1 Verify: re-ask (tier-B S8, issue #384, ADR-0027 decision 2) — a
     second per-row control alongside fillViaImportAction, but this one
     DOES issue a request: the existing POST /wiki/chat with a sample
     query from the finding. Always offered on every C1 row, not gated on
     a prior Fill click — closure can come from a fill, from organic
     content growth, or from nothing but this click, and the server's
     latest-outcome check (lint.py) is the only thing that decides whether
     the row survives the re-lint this triggers (§12.5: the client does
     not itself judge the outcome). */
  function verifyReaskAction(finding) {
    var sample = (finding.sample_raw_queries && finding.sample_raw_queries[0]) ||
      finding.query_canonical;
    var btn = el("button", { class: "verify-reask-btn", type: "button",
      text: LINT_CHROME[consoleLang].verifyReask });
    var statusMsgEl = el("span", { class: "card-status-msg" });
    if (!sample) {
      // Defensive — every real C1 finding has at least one raw query
      // (it required a hit to cluster in the first place; §12.5 honesty
      // guard mirrors reingestAction's no-source case).
      btn.disabled = true;
      return el("div", { class: "lint-row-actions" }, btn, statusMsgEl);
    }
    allButtons.push(btn);
    btn.addEventListener("click", function() {
      if (btn.disabled) return;
      runLintRemediation(chatVerifyRequest(sample), btn, statusMsgEl, resultEl, allButtons);
    });
    return el("div", { class: "lint-row-actions" }, btn, statusMsgEl);
  }

  /* "Re-ingest all" batch action — collapses N C6/C3 rows into a single
     POST /ingest {sources, force} call (issue #364; Direct-tier-only,
     ADR-0023 Invariant). Reused for both the C6 check-level button (force
     mirrors the per-row C6 action: false) and the Freshness axis-level
     button (C6∪C3, force:true — mandatory because C3 sources are mixed in;
     ADR-0023 Invariant). extraClass distinguishes the two call sites in the
     DOM (structural test anchor). Button text is bilingual (issue #365). */
  function reingestAllAction(sources, force, extraClass) {
    var btn = el("button", { class: "reingest-btn " + extraClass, type: "button",
      text: LINT_CHROME[consoleLang].reingestAll + " (" + sources.length + ")" });
    var statusMsgEl = el("span", { class: "card-status-msg" });
    allButtons.push(btn);
    btn.addEventListener("click", function() {
      if (btn.disabled || remediationInFlight) return;
      remediationInFlight = true;
      allButtons.forEach(function(b) { b.disabled = true; });
      statusMsgEl.replaceChildren(
        el("span", { class: "spinner" }),
        document.createTextNode(
          "Re-ingesting " + sources.length + " source" + (sources.length !== 1 ? "s" : "") +
          "… this may take a moment"
        )
      );
      statusMsgEl.className = "card-status-msg";

      batchIngestRemediationRequest(sources, force)
        .then(function(data) {
          finishBatchRemediation(ingestPartialSummary(sources, data), resultEl, allButtons);
        })
        .catch(function(err) {
          remediationInFlight = false;
          allButtons.forEach(function(b) { b.disabled = false; });
          statusMsgEl.textContent = "Error: " + (err.message || String(err));
          statusMsgEl.className = "card-status-msg err";
        });
    });
    return el("div", { class: "lint-row-actions" }, btn, statusMsgEl);
  }

  /* "Discard all" batch action (C10) — no batch-delete endpoint exists
     (ADR-0023 Consequences), so this fires the individual
     DELETE /wiki/qa/{slug} calls sequentially behind one click/button — an
     N -> 1 *click*, not an N -> 1 *call* (unlike the ingest batches above,
     which share cross-item used_slugs state that a client loop would
     break — DELETE /qa has no such shared state, so looping here is safe).
     Button text is bilingual (issue #365): built with the English string
     literally (kept verbatim so it stays a stable anchor for the existing
     S4 structural test), then overwritten via the same imperative
     .textContent pattern this file already uses elsewhere (e.g. the status
     message updates below) when the zh chrome is active. */
  function discardAllAction(slugs) {
    var btn = el("button", { class: "discard-btn check-batch-btn", type: "button",
      text: "Discard all (" + slugs.length + ")" });
    if (consoleLang === "zh") {
      btn.textContent = LINT_CHROME.zh.discardAll + " (" + slugs.length + ")";
    }
    var statusMsgEl = el("span", { class: "card-status-msg" });
    allButtons.push(btn);
    btn.addEventListener("click", function() {
      if (btn.disabled || remediationInFlight) return;
      remediationInFlight = true;
      allButtons.forEach(function(b) { b.disabled = true; });
      statusMsgEl.replaceChildren(
        el("span", { class: "spinner" }),
        document.createTextNode(
          "Discarding " + slugs.length + " page" + (slugs.length !== 1 ? "s" : "") +
          "… this may take a moment"
        )
      );
      statusMsgEl.className = "card-status-msg";

      var okCount = 0, failCount = 0;
      function next(i) {
        if (i >= slugs.length) {
          var summary = "discarded " + slugs.length + ": " + okCount + " ok, " + failCount + " still failing";
          finishBatchRemediation(summary, resultEl, allButtons);
          return;
        }
        discardRemediationRequest(slugs[i])
          .then(function() { okCount++; next(i + 1); })
          .catch(function() { failCount++; next(i + 1); });
      }
      next(0);
    });
    return el("div", { class: "lint-row-actions" }, btn, statusMsgEl);
  }

  /* C3's unsupported-claims cell (issue #407, ADR-0017 four-surface parity
     — the Markdown report already rendered this in Slice 5-2). Kept as a
     helper (not inlined in ROW_RENDERERS) so the bilingual "not recorded"
     note can live in the one shared LINT_CHROME home (mirrors
     reingestAction's noSource pattern above) without per-finding raw
     fields being wrapped in LINT_CHROME (issue #365 invariant — see
     ROW_RENDERERS below). Empty ``unsupported_claims`` degrades gracefully
     to an honest note instead of a blank cell (e.g. verifier_unavailable,
     which never carries claims, or a defensive/legacy page). */
  function c3ClaimsSummary(f) {
    var claims = f.unsupported_claims || [];
    return claims.length > 0 ? claims.join("; ") : LINT_CHROME[consoleLang].claimsNotRecorded;
  }

  /* Per-check row renderers, keyed by code — driven by the axis loop below.
     C8 and C9 render no actionsEl here: both checks' real actions live in
     the dedicated Curation Queue block instead — C8's Promote/Discard
     (issue #363 AC) and, since tier-B S4 (issue #380), C9's Re-file. */
  /* ── C12 alias-collision Remove control (issue #491) — chrome lookup lives
     OUTSIDE ROW_RENDERERS (the bilingual-parity test pins that renderer
     bodies never touch LINT_CHROME[consoleLang] directly), mirroring every
     other row action defined in this scope (reingestAction, discardAction,
     assignAliasAction above). Reuses runLintRemediation exactly like every
     sibling Direct action, so a 404 (alias already removed by a concurrent
     request — AliasNotFound) surfaces through its existing err-status
     rendering verbatim (§12.5) — this function never re-derives eligibility
     itself.

     Two shapes, both keyed on ``finding.alias``:
     - alias_vs_slug: the real page slug always wins resolution, so EVERY
       declaring page in ``claimed_by`` is dead weight — one button clears
       the alias from all of them (there is no valid "keeper").
     - alias_vs_alias: the curator picks which page KEEPS the alias; a
       second call removes it from every other claimant. Both branches issue
       one DELETE per claimant, sequentially (never a server-side batch —
       mirrors ADR-0030's "assign-alias never batches" Invariant applied to
       its mirror-image remove). */
  function removeAliasAction(finding) {
    var alias = finding.alias;
    var claimants = finding.claimed_by || [];
    var statusMsgEl = el("span", { class: "card-status-msg" });

    if (finding.kind === "alias_vs_slug") {
      var removeBtn = el("button", { class: "remove-alias-btn", type: "button",
        text: LINT_CHROME[consoleLang].c12Remove });
      allButtons.push(removeBtn);
      removeBtn.addEventListener("click", function() {
        if (removeBtn.disabled || remediationInFlight) return;
        runLintRemediation(
          removeAliasFromClaimantsRequest(alias, claimants), removeBtn, statusMsgEl, resultEl, allButtons
        );
      });
      return el("div", { class: "lint-row-actions" }, removeBtn, statusMsgEl);
    }

    // alias_vs_alias: curator picks which claimant KEEPS the alias.
    var select = el("select", { class: "remove-alias-select" },
      el("option", { value: "", text: LINT_CHROME[consoleLang].c12RemoveChooseKeeper }));
    claimants.forEach(function(pageSlug) {
      select.append(el("option", { value: pageSlug, text: pageSlug }));
    });
    var keepBtn = el("button", { class: "remove-alias-btn", type: "button",
      text: LINT_CHROME[consoleLang].c12RemoveKeepAndClear, disabled: "" });
    select.addEventListener("change", function() { keepBtn.disabled = !select.value; });
    allButtons.push(keepBtn);
    keepBtn.addEventListener("click", function() {
      if (keepBtn.disabled || !select.value || remediationInFlight) return;
      var rest = claimants.filter(function(pageSlug) { return pageSlug !== select.value; });
      runLintRemediation(
        removeAliasFromClaimantsRequest(alias, rest), keepBtn, statusMsgEl, resultEl, allButtons
      );
    });
    return el("div", { class: "lint-row-actions" }, select, keepBtn, statusMsgEl);
  }

  var ROW_RENDERERS = {
    C11: function(i, f) {
      return findingRow(i, f.page_slug,
        "missing: " + (f.missing_sources || []).join(", "),
        "orphan", "label-failed", deleteOrphanAction(f.page_slug, f.full));
    },
    C6: function(i, f) {
      var drift = f.drift_days != null ? f.drift_days.toFixed(1) + "d drift" : "";
      return findingRow(i, f.page_slug, f.source + (drift ? " · " + drift : ""),
        "stale", "label-updated", reingestAction(f.source, false));
    },
    C3: function(i, f) {
      /* issue #408 (ADR-0029): C3 is the first finding carrying TWO
         remediation classes at once — the existing Direct "Re-ingest
         (retry)" action stays wired, and fixSourceAction adds a Routed
         navigation control alongside it (never replacing it). c3GiveUpNote
         is always-visible card copy (no button — ADR-0029 Invariant: no
         delete affordance on a C3 finding). */
      return findingRow(i, f.page_slug, f.reason + " — " + c3ClaimsSummary(f),
        "grounding", "label-failed",
        el("div", {}, reingestAction(f.source, true), fixSourceAction(f), c3GiveUpNote(f)));
    },
    C5: function(i, f) {
      c5FindingByPair[f.page_a + "::" + f.page_b] = f;
      return findingRow(i, f.page_a + " / " + f.page_b,
        null,
        f.severity, f.severity === "direct" ? "label-failed" : "label-updated",
        c5ConflictPanel(f, reconcileAction(f.page_a, f.page_b)));
    },
    C4: function(i, f) {
      return findingRow(i, f.base_slug, (f.pages_in_group || []).join(", "),
        "collision", "label-updated", collisionAction(f.base_slug, f.pages_in_group));
    },
    /* ── C12 alias-collision (issue #491) — a real Remove control. Two
       ``kind`` shapes, both keyed on ``f.alias``: ``alias_vs_slug`` (the
       alias matches an existing page's real slug, named by
       ``f.slug_owner`` — the real page always wins, so EVERY declaring
       page's claim in ``f.claimed_by`` is dead weight) and ``alias_vs_alias``
       (two+ pages independently claim it, ``f.claimed_by`` lists them — the
       curator picks which one keeps it). removeAliasAction (below) renders
       the shape-appropriate control, wired to the real ``DELETE
       /pages/{slug}/aliases/{alias}`` endpoint (ADR-0030 extension) — the
       add-only assign-alias endpoint could never resolve a collision (adding
       to a page that already claims it is an idempotent no-op; adding to any
       other page 409s), so removal is the only honest fix. */
    C12: function(i, f) {
      var collidesWith = (f.claimed_by || []).join(", ") +
        (f.slug_owner ? " vs page slug " + f.slug_owner : "");
      return findingRow(i, f.alias,
        f.kind + " · claimed by: " + collidesWith + " · resolves to " + f.resolved_to,
        "alias-collision", "label-updated",
        removeAliasAction(f));
    },
    C1: function(i, f) {
      return findingRow(i, f.query_canonical,
        f.reason + " · " + f.hit_count + " hit" + (f.hit_count !== 1 ? "s" : ""),
        "gap", "label-skipped",
        el("div", {}, fillViaImportAction("C1", f), verifyReaskAction(f)));
    },
    C2: function(i, f) {
      /* issue #409 (ADR-0030 decision 3): two exits per red-link finding —
         the existing Routed fillViaImportAction stays wired unchanged, and
         assignAliasAction adds a second, Direct-class picker alongside it
         (never replacing it). */
      return findingRow(i, f.slug,
        f.mention_count + " mention" + (f.mention_count !== 1 ? "s" : "") +
        " · " + (f.referenced_by || []).slice(0, 3).join(", "),
        "red-link", "label-failed",
        el("div", {}, fillViaImportAction("C2", f), assignAliasAction(f)));
    },
    C8: function(i, f) {
      return findingRow(i, f.slug, f.question, "count:" + f.count, "label-created");
    },
    C10: function(i, f) {
      return findingRow(i, f.page_slug, f.property_name + " = " + f.offending_value,
        "invalid", "label-failed", discardAction(f.page_slug));
    },
    C9: function(i, f) {
      return findingRow(i, f.page_slug, f.max_drift_days.toFixed(1) + "d drift",
        "stale-qa", "label-updated");
    },
  };

  /* ── Axis-grouped rendering (issue #363 — reuses S1's LINT_AXIS_ORDER).
     An axis header (and its checks) is skipped entirely when every check
     under it has zero findings — matching this card's existing skip-empty
     convention (the written lint-report.md uses a placeholder-text
     convention instead; this is a UI-only difference, see S1).

     Batch buttons (issue #364) are Direct-tier-only (ADR-0023 Invariant):
     C6 gets a check-level "Re-ingest all"; Freshness gets an axis-level
     "Re-ingest all" over C6∪C3 (force:true, mandatory); C10 gets a
     check-level "Discard all". Lifecycle gets no axis-level button
     (promote/delete are different intents), and C8's Promote-all is
     explicitly deferred (no batch-promote endpoint — ADR-0023
     Consequences), so C10 is the only Lifecycle check-level batch shipped
     here. Coherence/Coverage (Authored tier) get no batch at all — nothing
     below wires one for those axes, so the omission is structural. */
  // Tracks real findings separately from bodyEl.children.length (issue #364
  // — the batch summary banner is also a bodyEl child, and must not by
  // itself suppress the "wiki is clean" message below when a batch just
  // fixed everything).
  var renderedAnyFindings = false;

  LINT_AXIS_ORDER.forEach(function(axis) {
    var axisBody = [];
    var freshnessSources = {}; // dedupe set for the Freshness axis-level batch

    AXIS_CHECK_CODES[axis].forEach(function(code) {
      var meta = LINT_CHECK_META[code];
      var items = findings[meta.findingsKey];
      if (!items || items.length === 0) return;

      var checkBatchBtnEl = null;
      if (code === "C6") {
        var c6Sources = dedupeSourceList(items);
        if (c6Sources.length > 0) checkBatchBtnEl = reingestAllAction(c6Sources, false, "check-batch-btn");
      } else if (code === "C10") {
        var c10Slugs = dedupeSlugList(items);
        if (c10Slugs.length > 0) checkBatchBtnEl = discardAllAction(c10Slugs);
      }

      /* issue #438: C8/C9/C10 findings render exactly once on the page —
         in the Curation Queue. Skip the per-item ROW_RENDERERS loop for
         these three and push a single count + pointer line instead
         (C10's "Discard all" batch button, if any, still rides along on
         that one line — a bulk action is not a per-finding duplicate). */
      if (QUEUE_OWNED_LIFECYCLE_CHECKS[code]) {
        axisBody.push(queueCountLine(code, items.length, checkBatchBtnEl));
        return;
      }

      // issue #489: C5's items came from the stale fallback above (findings
      // was shallow-copied with the last judged page_pairs) — flag it here,
      // the one place code-specific chrome is already threaded through.
      var noteText = (code === "C5" && c5Stale) ? LINT_CHROME[consoleLang].c5StaleNote : null;
      axisBody.push(checkHead(code, items.length, checkBatchBtnEl, noteText));
      items.forEach(function(item, i) { axisBody.push(ROW_RENDERERS[code](i + 1, item)); });

      if (axis === "Freshness" && (code === "C6" || code === "C3")) {
        items.forEach(function(item) { if (item.source) freshnessSources[item.source] = true; });
      }
    });
    if (axisBody.length === 0) return;

    var axisBatchBtnEl = null;
    if (axis === "Freshness") {
      var freshnessSourceList = Object.keys(freshnessSources);
      if (freshnessSourceList.length > 0) {
        axisBatchBtnEl = reingestAllAction(freshnessSourceList, true, "axis-batch-btn");
      }
    }
    renderedAnyFindings = true;
    bodyEl.append(axisHead(axis, axisBatchBtnEl));
    axisBody.forEach(function(node) { bodyEl.append(node); });
  });

  /* Check errors — not axis-scoped, surfaced after the axis groups.
     Header text is bilingual (issue #365). */
  var errKeys = Object.keys(checkErrors);
  if (errKeys.length > 0) {
    renderedAnyFindings = true;
    bodyEl.append(el("div", { class: "lint-group-head", text: LINT_CHROME[consoleLang].checkErrors + " (" + errKeys.length + ")" }));
    errKeys.forEach(function(k, i) {
      bodyEl.append(findingRow(i + 1, k, checkErrors[k], "error", "label-failed"));
    });
  }

  /* No findings at all — empty-state text is bilingual (issue #365) */
  if (!renderedAnyFindings) {
    bodyEl.append(el("div", { style: "padding:12px 16px; font-size:13px; color:var(--pass);",
      text: LINT_CHROME[consoleLang].noFindings }));
  }

  return el("div", { class: "result-card" }, head, bodyEl);
}

/* ── C11 orphan Confirmed-delete dialog (tier-B S5, issue #381, ADR-0024/
   0025) ──────────────────────────────────────────────────────────────
   Names the irreversible operation and its target BEFORE it runs (ADR-0024:
   a Confirmed dialog confirms an operation, it does not preview drafted
   content — there is none to preview). Reuses the .reconcile-overlay/
   .reconcile-modal/.reconcile-actions chrome (same modal shape, different
   body) rather than inventing a second modal system. On success, closes the
   modal and re-runs the SAME fast (include_c5=false) re-lint + re-render
   every other remediation on this card uses (the ``renderCollisionMerge/
   DifferentiatePreview`` apply-success shape) so the deleted page's finding
   drops out of the re-rendered Freshness section. */
function openDeleteOrphanConfirm(slug, resultEl, siblingButtons) {
  var overlay = el("div", { class: "reconcile-overlay" });
  var statusMsgEl = el("span", { class: "card-status-msg" });
  var cancelBtn = el("button", { class: "reconcile-cancel-btn", type: "button",
    text: LINT_CHROME[consoleLang].deleteCancel });
  var confirmBtn = el("button", { class: "discard-btn", type: "button",
    text: LINT_CHROME[consoleLang].deleteConfirm });

  function closeModal() { overlay.remove(); }
  overlay.addEventListener("click", function(e) { if (e.target === overlay) closeModal(); });
  cancelBtn.addEventListener("click", function() {
    if (cancelBtn.disabled) return;
    closeModal();
  });

  confirmBtn.addEventListener("click", function() {
    if (confirmBtn.disabled || remediationInFlight) return;
    remediationInFlight = true;
    confirmBtn.disabled = true;
    cancelBtn.disabled = true;
    (siblingButtons || []).forEach(function(b) { b.disabled = true; });
    statusMsgEl.replaceChildren(el("span", { class: "spinner" }),
      document.createTextNode(LINT_CHROME[consoleLang].deleteWorking));
    statusMsgEl.className = "card-status-msg";

    deleteOrphanRequest(slug)
      .then(function() {
        return fetch("/wiki/lint?include_c5=false", { method: "POST" });
      })
      .then(function(resp) {
        if (!resp.ok) return resp.text().then(function(t) { throw new Error("HTTP " + resp.status + ": " + t); });
        return resp.json();
      })
      .then(function(lintData) {
        remediationInFlight = false;
        closeModal();
        lastLintData = lintData;
        if (resultEl) resultEl.replaceChildren(renderLintCard(lintData, resultEl));
        renderCurationQueue(document.getElementById("curation-queue-root"), lintData);
      })
      .catch(function(err) {
        remediationInFlight = false;
        confirmBtn.disabled = false;
        cancelBtn.disabled = false;
        (siblingButtons || []).forEach(function(b) { b.disabled = false; });
        statusMsgEl.textContent = "Error: " + (err.message || String(err));
        statusMsgEl.className = "card-status-msg err";
      });
  });

  var modal = el("div", { class: "reconcile-modal" },
    el("div", { class: "reconcile-modal-head" },
      el("span", { text: LINT_CHROME[consoleLang].deleteConfirmTitle + ": " + slug })),
    el("div", { class: "reconcile-modal-body" },
      el("p", { text: LINT_CHROME[consoleLang].deleteConfirmBody.replace("{slug}", slug) })
    ),
    el("div", { class: "reconcile-actions" }, confirmBtn, cancelBtn, statusMsgEl)
  );
  overlay.append(modal);
  document.body.append(overlay);
}

/* ── C5 Reconcile modal (tier-B S1, issue #376, ADR-0028) ────────────────
   POST /wiki/pages/reconcile, then render the side-by-side + editable draft
   preview in a modal overlay appended to document.body (outside the Lint
   card so a later card re-render never disturbs an open modal). Closed via
   the Cancel/Close button or a backdrop click. */
function openReconcileModal(pageA, pageB, resultEl, siblingButtons, finding) {
  var overlay = el("div", { class: "reconcile-overlay" });
  var modal = el("div", { class: "reconcile-modal" },
    el("div", { class: "reconcile-modal-head" }, el("span", { text: "Reconcile: " + pageA + " / " + pageB })),
    el("div", { class: "reconcile-modal-body" },
      el("span", { class: "spinner" }),
      document.createTextNode(" Generating draft…")
    )
  );
  overlay.append(modal);
  document.body.append(overlay);

  function closeModal() { overlay.remove(); }
  overlay.addEventListener("click", function(e) { if (e.target === overlay) closeModal(); });

  fetch("/wiki/pages/reconcile", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ page_a: pageA, page_b: pageB }),
  })
    .then(function(resp) {
      if (!resp.ok) return resp.text().then(function(t) { throw new Error("HTTP " + resp.status + ": " + t); });
      return resp.json();
    })
    .then(function(data) { renderReconcilePreview(modal, data, resultEl, closeModal, siblingButtons, finding); })
    .catch(function(err) {
      modal.replaceChildren(
        el("div", { class: "reconcile-modal-head" }, el("span", { text: "Reconcile — error" })),
        el("div", { class: "reconcile-modal-body reconcile-error", text: err.message || String(err) }),
        el("div", { class: "reconcile-actions" },
          el("button", { class: "reconcile-cancel-btn", type: "button",
            text: LINT_CHROME[consoleLang].reconcileClose, onclick: closeModal })
        )
      );
    });
}

/* Renders the generate-time draft: a grounding report, then old-vs-editable
   columns per page, then Apply/Cancel. Apply sends the (possibly edited)
   textarea values back with the hash tokens captured verbatim from the
   generate response — never recomputed client-side (§12.5 no business
   logic in the client). On success, closes the modal and re-runs the SAME
   fast (include_c5=false) re-lint + re-render every other remediation uses,
   so the fixed finding (and every other still-unjudged C5 finding) drops
   out of the re-rendered Coherence section until the curator re-runs a
   full Lint. ``siblingButtons`` (issue #364's shared in-flight-guard list)
   is disabled for the duration of the apply request — same no-double-submit
   guarantee every other remediation on the card already gets. */
function renderReconcilePreview(modal, data, resultEl, closeModal, siblingButtons, finding) {
  // issue #443: the conflict panel (both quoted claims, full summary,
  // suggested_action) rendered above the editable drafts — same evidence,
  // same shared c5ConflictPanel() as the C5 finding row. `finding` is the
  // full C5 finding looked up by page-pair (reconcileAction, above); it is
  // never fetched from the server — reconcile/generate's own response
  // (`data`) carries no claim fields (schemas.py ReconcileGenerateResponse).
  var conflictPanelEl = finding ? c5ConflictPanel(finding) : null;

  var textareaA = el("textarea", { class: "reconcile-textarea", rows: "8" });
  textareaA.value = data.content_a;
  var textareaB = el("textarea", { class: "reconcile-textarea", rows: "8" });
  textareaB.value = data.content_b;

  var passed = !!(data.grounding && data.grounding.passed);
  var groundingEl = el("div", { class: "reconcile-grounding" },
    el("span", { class: passed ? "badge badge-ok" : "badge badge-fail" },
      el("span", { class: "dot" }),
      el("span", { text: passed ? "grounded" : "grounding failed" })
    )
  );
  var unsupported = (data.grounding && data.grounding.unsupported_claims) || [];
  if (unsupported.length > 0) {
    var claimsList = el("ul", { class: "reconcile-claims" });
    unsupported.forEach(function(c) { claimsList.append(el("li", { text: c })); });
    groundingEl.append(claimsList);
  }

  var statusMsgEl = el("span", { class: "card-status-msg" });
  var cancelBtn = el("button", { class: "reconcile-cancel-btn", type: "button",
    text: LINT_CHROME[consoleLang].reconcileCancel, onclick: closeModal });
  var applyBtn = el("button", { class: "reconcile-apply-btn", type: "button",
    text: LINT_CHROME[consoleLang].reconcileApply });

  applyBtn.addEventListener("click", function() {
    if (applyBtn.disabled || remediationInFlight) return;
    remediationInFlight = true;
    applyBtn.disabled = true;
    cancelBtn.disabled = true;
    (siblingButtons || []).forEach(function(b) { b.disabled = true; });
    statusMsgEl.replaceChildren(el("span", { class: "spinner" }),
      document.createTextNode(LINT_CHROME[consoleLang].reconcileWorking));
    statusMsgEl.className = "card-status-msg";

    fetch("/wiki/pages/reconcile/apply", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        page_a: data.page_a,
        page_b: data.page_b,
        content_a: textareaA.value,
        content_b: textareaB.value,
        hash_a: data.hash_a,
        hash_b: data.hash_b,
      }),
    })
      .then(function(resp) {
        if (resp.status === 409) {
          throw new Error(
            "Cannot apply: one or both pages changed since this draft was generated " +
            "(the contradiction may no longer hold). Close and re-open Reconcile to refresh."
          );
        }
        if (resp.status === 422) {
          return resp.json().then(function(body) {
            var detail = body.detail || {};
            var claims = (detail.unsupported_claims || []).join("; ");
            throw new Error("Grounding check failed" + (claims ? ": " + claims : "") + ". Edit the draft and try again.");
          });
        }
        if (!resp.ok) return resp.text().then(function(t) { throw new Error("HTTP " + resp.status + ": " + t); });
        return resp.json();
      })
      .then(function() {
        return fetch("/wiki/lint?include_c5=false", { method: "POST" });
      })
      .then(function(resp) {
        if (!resp.ok) return resp.text().then(function(t) { throw new Error("HTTP " + resp.status + ": " + t); });
        return resp.json();
      })
      .then(function(lintData) {
        remediationInFlight = false;
        closeModal();
        lastLintData = lintData;
        if (resultEl) resultEl.replaceChildren(renderLintCard(lintData, resultEl));
        renderCurationQueue(document.getElementById("curation-queue-root"), lintData);
      })
      .catch(function(err) {
        remediationInFlight = false;
        applyBtn.disabled = false;
        cancelBtn.disabled = false;
        (siblingButtons || []).forEach(function(b) { b.disabled = false; });
        statusMsgEl.textContent = "Error: " + (err.message || String(err));
        statusMsgEl.className = "card-status-msg err";
      });
  });

  modal.replaceChildren(
    el("div", { class: "reconcile-modal-head" }, el("span", { text: "Reconcile: " + data.page_a + " / " + data.page_b })),
    el("div", { class: "reconcile-modal-body" },
      conflictPanelEl,
      groundingEl,
      el("div", { class: "reconcile-columns" },
        el("div", { class: "reconcile-col" },
          el("div", { class: "reconcile-col-head", text: data.page_a + " — current" }),
          el("pre", { class: "reconcile-old", text: data.old_content_a }),
          el("div", { class: "reconcile-col-head", text: data.page_a + " — draft (editable)" }),
          textareaA
        ),
        el("div", { class: "reconcile-col" },
          el("div", { class: "reconcile-col-head", text: data.page_b + " — current" }),
          el("pre", { class: "reconcile-old", text: data.old_content_b }),
          el("div", { class: "reconcile-col-head", text: data.page_b + " — draft (editable)" }),
          textareaB
        )
      )
    ),
    el("div", { class: "reconcile-actions" }, applyBtn, cancelBtn, statusMsgEl)
  );
}

/* ── C4 collision dual resolution modal (tier-B S2, issue #378, ADR-0028) ──
   POST /wiki/pages/collision/{merge,differentiate}, then render the
   preview in a modal overlay — same shell as the C5 Reconcile modal above
   (reuses every .reconcile-* class), parameterised by `mode`. `groupSlugs`
   is the merge's variant_slugs (base excluded) for mode "merge", or the
   full collision group (base included when present) for mode
   "differentiate" — collisionAction() above builds the right list per
   button before calling this. */
function openCollisionModal(mode, baseSlug, groupSlugs, resultEl, siblingButtons) {
  var title = mode === "merge"
    ? "Merge: " + baseSlug + " ← " + groupSlugs.join(", ")
    : "Differentiate: " + groupSlugs.join(", ");
  var overlay = el("div", { class: "reconcile-overlay" });
  var modal = el("div", { class: "reconcile-modal" },
    el("div", { class: "reconcile-modal-head" }, el("span", { text: title })),
    el("div", { class: "reconcile-modal-body" },
      el("span", { class: "spinner" }),
      document.createTextNode(" Generating draft…")
    )
  );
  overlay.append(modal);
  document.body.append(overlay);

  function closeModal() { overlay.remove(); }
  overlay.addEventListener("click", function(e) { if (e.target === overlay) closeModal(); });

  var genPath = mode === "merge" ? "/wiki/pages/collision/merge" : "/wiki/pages/collision/differentiate";
  var genBody = mode === "merge"
    ? { base_slug: baseSlug, variant_slugs: groupSlugs }
    : { slugs: groupSlugs };

  fetch(genPath, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(genBody),
  })
    .then(function(resp) {
      if (!resp.ok) return resp.text().then(function(t) { throw new Error("HTTP " + resp.status + ": " + t); });
      return resp.json();
    })
    .then(function(data) {
      if (mode === "merge") renderCollisionMergePreview(modal, data, resultEl, closeModal, siblingButtons);
      else renderCollisionDifferentiatePreview(modal, data, resultEl, closeModal, siblingButtons);
    })
    .catch(function(err) {
      modal.replaceChildren(
        el("div", { class: "reconcile-modal-head" }, el("span", { text: title + " — error" })),
        el("div", { class: "reconcile-modal-body reconcile-error", text: err.message || String(err) }),
        el("div", { class: "reconcile-actions" },
          el("button", { class: "reconcile-cancel-btn", type: "button",
            text: LINT_CHROME[consoleLang].collisionClose, onclick: closeModal })
        )
      );
    });
}

/* After a successful apply, both collision preview renderers below re-run
   the SAME fast (include_c5=false) re-lint + re-render every other
   remediation uses (issue #363/#376 convention), so the fixed C4 group
   drops out of the re-rendered Coherence section. */
function _finishCollisionApply(resultEl, closeModal) {
  return fetch("/wiki/lint?include_c5=false", { method: "POST" })
    .then(function(resp) {
      if (!resp.ok) return resp.text().then(function(t) { throw new Error("HTTP " + resp.status + ": " + t); });
      return resp.json();
    })
    .then(function(lintData) {
      remediationInFlight = false;
      closeModal();
      lastLintData = lintData;
      if (resultEl) resultEl.replaceChildren(renderLintCard(lintData, resultEl));
      renderCurationQueue(document.getElementById("curation-queue-root"), lintData);
    });
}

/* Renders the generate-time merge draft: a grounding report, the base
   page's old-vs-editable columns, the (informational) list of variants
   slated for deletion, then Apply/Cancel. A 409 guard-refusal renders
   HONESTLY — who references what — rather than a generic error (ADR-0028
   AC: "guard refusals render honestly"). */
function renderCollisionMergePreview(modal, data, resultEl, closeModal, siblingButtons) {
  var textareaBase = el("textarea", { class: "reconcile-textarea", rows: "10" });
  textareaBase.value = data.content_base;

  var passed = !!(data.grounding && data.grounding.passed);
  var groundingEl = el("div", { class: "reconcile-grounding" },
    el("span", { class: passed ? "badge badge-ok" : "badge badge-fail" },
      el("span", { class: "dot" }),
      el("span", { text: passed ? "grounded" : "grounding failed" })
    )
  );
  var unsupported = (data.grounding && data.grounding.unsupported_claims) || [];
  if (unsupported.length > 0) {
    var claimsList = el("ul", { class: "reconcile-claims" });
    unsupported.forEach(function(c) { claimsList.append(el("li", { text: c })); });
    groundingEl.append(claimsList);
  }

  var guardEl = el("div"); // populated on 409 inbound-reference guard refusal

  var statusMsgEl = el("span", { class: "card-status-msg" });
  var cancelBtn = el("button", { class: "reconcile-cancel-btn", type: "button",
    text: LINT_CHROME[consoleLang].collisionCancel, onclick: closeModal });
  var applyBtn = el("button", { class: "reconcile-apply-btn", type: "button",
    text: LINT_CHROME[consoleLang].collisionApply });

  applyBtn.addEventListener("click", function() {
    if (applyBtn.disabled || remediationInFlight) return;
    remediationInFlight = true;
    applyBtn.disabled = true;
    cancelBtn.disabled = true;
    (siblingButtons || []).forEach(function(b) { b.disabled = true; });
    guardEl.replaceChildren();
    statusMsgEl.replaceChildren(el("span", { class: "spinner" }),
      document.createTextNode(LINT_CHROME[consoleLang].collisionWorking));
    statusMsgEl.className = "card-status-msg";

    fetch("/wiki/pages/collision/merge/apply", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        base_slug: data.base_slug,
        variant_slugs: data.variant_slugs,
        content_base: textareaBase.value,
        hash_base: data.hash_base,
        hash_variants: data.hash_variants,
      }),
    })
      .then(function(resp) {
        if (resp.status === 409) {
          return resp.json().then(function(body) {
            var detail = body.detail;
            // The server distinguishes hash-mismatch (plain-string detail)
            // from a guard refusal (dict detail carrying `referrers`) — see
            // routes.py collision_merge_apply docstring.
            if (detail && typeof detail === "object" && detail.referrers) {
              var list = el("ul", { class: "collision-referrers" });
              detail.referrers.forEach(function(r) {
                var refs = (r.wiki_referrers || []).concat(r.qa_referrers || []);
                list.append(el("li", { text: r.variant_slug + ": " + refs.join(", ") }));
              });
              guardEl.replaceChildren(
                el("div", { class: "collision-guard-failed",
                  text: LINT_CHROME[consoleLang].collisionGuardFailed }),
                list
              );
              throw new Error(LINT_CHROME[consoleLang].collisionGuardFailed);
            }
            throw new Error(
              "Cannot apply: one or more pages changed since this draft was generated " +
              "(the collision may no longer hold). Close and re-open Merge to refresh."
            );
          });
        }
        if (resp.status === 422) {
          return resp.json().then(function(body) {
            var detail = body.detail || {};
            var claims = (detail.unsupported_claims || []).join("; ");
            throw new Error("Grounding check failed" + (claims ? ": " + claims : "") + ". Edit the draft and try again.");
          });
        }
        if (!resp.ok) return resp.text().then(function(t) { throw new Error("HTTP " + resp.status + ": " + t); });
        return resp.json();
      })
      .then(function() { return _finishCollisionApply(resultEl, closeModal); })
      .catch(function(err) {
        remediationInFlight = false;
        applyBtn.disabled = false;
        cancelBtn.disabled = false;
        (siblingButtons || []).forEach(function(b) { b.disabled = false; });
        statusMsgEl.textContent = "Error: " + (err.message || String(err));
        statusMsgEl.className = "card-status-msg err";
      });
  });

  modal.replaceChildren(
    el("div", { class: "reconcile-modal-head" },
      el("span", { text: "Merge: " + data.base_slug + " ← " + data.variant_slugs.join(", ") })),
    el("div", { class: "reconcile-modal-body" },
      groundingEl,
      guardEl,
      el("div", { class: "reconcile-columns" },
        el("div", { class: "reconcile-col" },
          el("div", { class: "reconcile-col-head", text: data.base_slug + " — current" }),
          el("pre", { class: "reconcile-old", text: data.old_content_base }),
          el("div", { class: "reconcile-col-head", text: data.base_slug + " — merged draft (editable)" }),
          textareaBase
        )
      ),
      el("div", { class: "reconcile-col-head",
        text: "Variants deleted on apply (only if reference-free): " + data.variant_slugs.join(", ") })
    ),
    el("div", { class: "reconcile-actions" }, applyBtn, cancelBtn, statusMsgEl)
  );
}

/* Renders the generate-time differentiate drafts: a grounding report, then
   one old-vs-editable column PER group member — nobody is deleted on this
   path, so there is no reference guard to render. */
function renderCollisionDifferentiatePreview(modal, data, resultEl, closeModal, siblingButtons) {
  var textareas = {};
  var columnsEl = el("div", { class: "reconcile-columns" });
  data.slugs.forEach(function(slug) {
    var ta = el("textarea", { class: "reconcile-textarea", rows: "8" });
    ta.value = data.content[slug];
    textareas[slug] = ta;
    columnsEl.append(
      el("div", { class: "reconcile-col" },
        el("div", { class: "reconcile-col-head", text: slug + " — current" }),
        el("pre", { class: "reconcile-old", text: data.old_content[slug] }),
        el("div", { class: "reconcile-col-head", text: slug + " — differentiated draft (editable)" }),
        ta
      )
    );
  });

  var passed = !!(data.grounding && data.grounding.passed);
  var groundingEl = el("div", { class: "reconcile-grounding" },
    el("span", { class: passed ? "badge badge-ok" : "badge badge-fail" },
      el("span", { class: "dot" }),
      el("span", { text: passed ? "grounded" : "grounding failed" })
    )
  );
  var unsupported = (data.grounding && data.grounding.unsupported_claims) || [];
  if (unsupported.length > 0) {
    var claimsList = el("ul", { class: "reconcile-claims" });
    unsupported.forEach(function(c) { claimsList.append(el("li", { text: c })); });
    groundingEl.append(claimsList);
  }

  var statusMsgEl = el("span", { class: "card-status-msg" });
  var cancelBtn = el("button", { class: "reconcile-cancel-btn", type: "button",
    text: LINT_CHROME[consoleLang].collisionCancel, onclick: closeModal });
  var applyBtn = el("button", { class: "reconcile-apply-btn", type: "button",
    text: LINT_CHROME[consoleLang].collisionApply });

  applyBtn.addEventListener("click", function() {
    if (applyBtn.disabled || remediationInFlight) return;
    remediationInFlight = true;
    applyBtn.disabled = true;
    cancelBtn.disabled = true;
    (siblingButtons || []).forEach(function(b) { b.disabled = true; });
    statusMsgEl.replaceChildren(el("span", { class: "spinner" }),
      document.createTextNode(LINT_CHROME[consoleLang].collisionWorking));
    statusMsgEl.className = "card-status-msg";

    var content = {};
    data.slugs.forEach(function(slug) { content[slug] = textareas[slug].value; });

    fetch("/wiki/pages/collision/differentiate/apply", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ slugs: data.slugs, content: content, hashes: data.hashes }),
    })
      .then(function(resp) {
        if (resp.status === 409) {
          throw new Error(
            "Cannot apply: one or more pages changed since this draft was generated " +
            "(the collision may no longer hold). Close and re-open Differentiate to refresh."
          );
        }
        if (resp.status === 422) {
          return resp.json().then(function(body) {
            var detail = body.detail || {};
            var claims = (detail.unsupported_claims || []).join("; ");
            throw new Error("Grounding check failed" + (claims ? ": " + claims : "") + ". Edit the drafts and try again.");
          });
        }
        if (!resp.ok) return resp.text().then(function(t) { throw new Error("HTTP " + resp.status + ": " + t); });
        return resp.json();
      })
      .then(function() { return _finishCollisionApply(resultEl, closeModal); })
      .catch(function(err) {
        remediationInFlight = false;
        applyBtn.disabled = false;
        cancelBtn.disabled = false;
        (siblingButtons || []).forEach(function(b) { b.disabled = false; });
        statusMsgEl.textContent = "Error: " + (err.message || String(err));
        statusMsgEl.className = "card-status-msg err";
      });
  });

  modal.replaceChildren(
    el("div", { class: "reconcile-modal-head" },
      el("span", { text: "Differentiate: " + data.slugs.join(", ") })),
    el("div", { class: "reconcile-modal-body" }, groundingEl, columnsEl),
    el("div", { class: "reconcile-actions" }, applyBtn, cancelBtn, statusMsgEl)
  );
}

/* Generic error card — used by any step on network/HTTP error */
function renderErrorCard(stepLabel, message) {
  return el("div", { class: "result-card" },
    el("div", { class: "result-card-head" },
      el("span", { text: stepLabel + " — error" })
    ),
    el("div", { style: "padding:12px 16px; font-size:13px; color:var(--fail);", text: message })
  );
}

/* Busy-row shown while a request is in flight */
function makeBusyCard(label) {
  return el("div", { class: "result-card" },
    el("div", { class: "busy-row" },
      el("span", { class: "spinner" }),
      el("span", { text: label + "…" })
    )
  );
}

/* ============================================================
   Staleness guard — module-level flag (#173)
   indexStale is set to true when Ingest completes and cleared when
   Index completes. The flag drives a persistent banner above the stepper.

   Integration point for slice #172 (Ingest expansion):
   - Call markIngestDone() at the end of the Ingest run().finally (or .then)
     block so the staleness banner appears after a successful ingest.
   - markIndexDone() is already called in the Index run().finally here.
   ============================================================ */
var indexStale = false;

function markIngestDone() {
  indexStale = true;
  var banner = document.getElementById("staleness-banner");
  if (banner) banner.classList.add("visible");
}

function markIndexDone() {
  indexStale = false;
  var banner = document.getElementById("staleness-banner");
  if (banner) banner.classList.remove("visible");
}

/* ============================================================
   Step definitions
   Each step exposes:
     id, label, desc
     buildBody(resultEl)  — returns the DOM subtree for the step body
     busy flag           — managed internally
   The run() callback is in each STEP_DEFS entry.
   ============================================================ */

/* ── Upload step body builder ─────────────────────────────── */
function buildUploadBody(resultEl) {
  /* File input (hidden) */
  var fileInput = el("input", { type: "file", multiple: "", accept: ".html,.txt,.md,.pdf", style: "display:none" });
  var uploadBusy = false;

  function setUploadBusy(v) {
    uploadBusy = v;
    if (v) {
      dropZone.classList.add("busy");
      dropBtn.disabled = true;
    } else {
      dropZone.classList.remove("busy");
      dropBtn.disabled = false;
    }
  }

  function handleFiles(files) {
    if (uploadBusy) return;
    setUploadBusy(true);

    resultEl.replaceChildren(makeBusyCard("Uploading " + files.length + " file" + (files.length !== 1 ? "s" : "")));

    var formData = new FormData();
    for (var i = 0; i < files.length; i++) {
      formData.append("files", files[i], files[i].name);
    }

    fetch("/upload", { method: "POST", body: formData })
      .then(function(resp) {
        if (!resp.ok) return resp.text().then(function(t) { throw new Error("HTTP " + resp.status + ": " + t); });
        return resp.json();
      })
      .then(function(data) { resultEl.replaceChildren(renderUploadCard(data.results || [])); })
      .catch(function(err)  { resultEl.replaceChildren(renderErrorCard("Upload", err.message || String(err))); })
      .finally(function()   { setUploadBusy(false); });
  }

  fileInput.addEventListener("change", function() {
    if (fileInput.files && fileInput.files.length > 0) handleFiles(Array.from(fileInput.files));
  });

  var dropBtn = el("button", { class: "drop-btn", type: "button", text: "Choose files",
    onclick: function() { if (!uploadBusy) fileInput.click(); }
  });

  var dropZone = el("div", { class: "drop-zone" },
    el("div", { class: "drop-hint" },
      el("strong", { text: "Drag and drop files here" }),
      el("br"),
      "or click to select files"
    ),
    el("div", { class: "drop-ext", text: "Accepts .html · .txt · .md · .pdf — max 10 MB each. HTML/TXT/PDF stage into the inbox for Import; MD goes straight to docs/." }),
    dropBtn,
    fileInput
  );

  dropZone.addEventListener("dragover", function(e) {
    e.preventDefault();
    if (!uploadBusy) dropZone.classList.add("drag-over");
  });
  dropZone.addEventListener("dragleave", function() { dropZone.classList.remove("drag-over"); });
  dropZone.addEventListener("drop", function(e) {
    e.preventDefault();
    dropZone.classList.remove("drag-over");
    if (uploadBusy) return;
    var files = e.dataTransfer.files;
    if (files && files.length > 0) handleFiles(Array.from(files));
  });

  return dropZone;
}

/* ── Pipeline state ────────────────────────────────────────── */
/* Tracks the bare doc filenames from the last Import run so the Ingest step
   can send exactly those sources in the batch call (§12.8 single-batch rule).
   null = no import has been run this session → Ingest falls back to all-docs. */
var lastImportedDocFilenames = null;

/* ── Step definitions ─────────────────────────────────────── */
/* §12.8 / §12.5: No fake progress percentages. Use indeterminate spinner only.
   Index/Lint (#173) run-functions will be wired in their slice. */

/* ── Per-step what-it-does one-liners (ADR-0021 §12 legibility) ───────────
   Always-visible text beside each action: what it does + its principle.
   Rendered via textContent (el() helper, §12.4); strings are static literals
   so the test_ui_console_legibility suite can assert them via plain text search. */

var STEP_DEFS = [
  {
    id: "upload",
    label: "Upload",
    desc: "Upload: stage source files for processing — entry point; .md goes to docs/, HTML/TXT/PDF needs Import.",
    buildBody: function(resultEl) {
      return buildUploadBody(resultEl);
    },
    /* Upload step has its own inline controls — no top-level Run button */
    noRunBtn: true,
  },
  {
    id: "import",
    label: "Import",
    desc: "Import: convert HTML/TXT to Markdown — normalises raw sources before LLM synthesis.",
    buildBody: null,
    run: function(resultEl, setStepBusy) {
      setStepBusy(true);
      resultEl.replaceChildren(makeBusyCard("Running Import"));

      fetch("/wiki/import", { method: "POST" })
        .then(function(resp) {
          if (!resp.ok) return resp.text().then(function(t) { throw new Error("HTTP " + resp.status + ": " + t); });
          return resp.json();
        })
        .then(function(data) {
          resultEl.replaceChildren(renderImportCard(data));
          /* Capture imported filenames for the Ingest step.
             Extract the bare filename from docs_path (e.g. "docs/x.md" → "x.md").
             imported_sources + skipped_sources both represent available docs/ files.
             §12.5: extraction logic is trivial (basename), not business logic. */
          var allImported = (data.imported_sources || []).concat(data.skipped_sources || []);
          if (allImported.length > 0) {
            lastImportedDocFilenames = allImported.map(function(r) {
              var p = r.docs_path || "";
              return p.split(/[/\\]/).pop();
            }).filter(Boolean);
          }
        })
        .catch(function(err)  { resultEl.replaceChildren(renderErrorCard("Import", err.message || String(err))); })
        .finally(function()   { setStepBusy(false); });
    },
  },
  {
    id: "ingest",
    label: "Ingest",
    desc: "Ingest: an LLM synthesises a curated wiki page from a Source, grounding-checked — builds the knowledge layer.",
    buildBody: null,
    run: function(resultEl, setStepBusy) {
      /* Phase 15 S3 (#172): single-batch-call rule (§12.8 / ADR-0011).
         Sources come from the last Import run (lastImportedDocFilenames);
         falls back to all-docs if no Import has been run this session.
         >5 sources → sequential single-batch calls with "Batch k/N" indicator
         (client owns the counter; no fake % — §12.8); within each batch an
         indeterminate spinner only.

         #173 staleness-guard integration: markIngestDone() must fire when the
         batch sequence finishes (success OR error) so the stale banner appears
         regardless of ingest outcome. runIngestBatches calls setStepBusy(false)
         exactly once at completion, so we wrap that callback to also set the
         stale signal then — keeping runIngestBatches free of guard coupling. */
      setStepBusy(true);
      var onIngestStepDone = function(b) {
        setStepBusy(b);
        if (b === false) markIngestDone();
      };
      runIngestBatches(lastImportedDocFilenames, resultEl, onIngestStepDone);
    },
  },
  {
    id: "index",
    label: "Index",
    desc: "Index: rebuild the BM25 search index from wiki pages — makes curated knowledge retrievable.",
    buildBody: null,
    run: function(resultEl, setStepBusy) {
      /* Phase 15 S4 (#173): real IndexResponse card + staleness guard clear */
      setStepBusy(true);
      resultEl.replaceChildren(makeBusyCard("Rebuilding Section Index…"));

      fetch("/wiki/index", { method: "POST" })
        .then(function(resp) {
          if (!resp.ok) return resp.text().then(function(t) { throw new Error("HTTP " + resp.status + ": " + t); });
          return resp.json();
        })
        .then(function(data) { resultEl.replaceChildren(renderIndexCard(data)); })
        .catch(function(err)  { resultEl.replaceChildren(renderErrorCard("Index", err.message || String(err))); })
        .finally(function()   {
          setStepBusy(false);
          markIndexDone(); /* staleness guard: clear stale signal after Index run */
        });
    },
  },
  {
    id: "lint",
    label: "Lint",
    desc: "Lint: audit the wiki for orphans and red links locally — keeps the knowledge base coherent (Deep audit adds the LLM contradiction check).",
    buildBody: null,
    run: function(resultEl, setStepBusy) {
      /* Phase 15 S4 (#173): real LintResponse card with per-check grouped findings */
      /* Phase 15 S6 (#174): store lint data + trigger Curation Queue render */
      /* issue #441: fast, LLM-free by default — include_c5=false skips the
         C5 contradiction audit (up to 30 gpt-4o-mini page-pair calls); that
         check now runs only on demand via the Deep audit control below.
         The completion chain below is deliberately kept inline (not
         factored into a shared helper with deepAudit) — existing structural
         tests (test_ui_console_routed_coverage_fill.py,
         test_ui_console_c3_routed_fix_source.py) pin the exact ordering of
         checkCoverageFillOutcome / checkFixSourceOutcome / renderLintCard
         inside THIS function's own body. */
      setStepBusy(true);
      resultEl.replaceChildren(makeBusyCard("Running Lint audit…"));

      fetch("/wiki/lint?include_c5=false", { method: "POST" })
        .then(function(resp) {
          if (!resp.ok) return resp.text().then(function(t) { throw new Error("HTTP " + resp.status + ": " + t); });
          return resp.json();
        })
        .then(function(data) {
          /* tier-B S7 (issue #383, ADR-0027): resolve any pending Routed
             Coverage Fill BEFORE rendering, so a one-shot outcome banner is
             already queued (mirrors the lastBatchSummary ordering above). */
          checkCoverageFillOutcome(data);
          /* issue #408 (ADR-0029): same ordering for a pending C3 Fix Source. */
          checkFixSourceOutcome(data);
          resultEl.replaceChildren(renderLintCard(data, resultEl));
          /* Phase 15 S6: store latest lint data and render the Curation Queue */
          lastLintData = data;
          renderCurationQueue(document.getElementById("curation-queue-root"), data);
        })
        .catch(function(err)  { resultEl.replaceChildren(renderErrorCard("Lint", err.message || String(err))); })
        .finally(function()   { setStepBusy(false); });
    },
    deepAudit: function(resultEl, setStepBusy) {
      /* issue #441: on-demand C5 contradiction audit. Mirrors run() above
         exactly (same completion chain — outcome banners -> renderLintCard
         -> lastLintData -> Curation Queue) so C5 findings render exactly as
         they do today, in the same card (AC "same card, same downstream
         flows"); only include_c5 and the busy label differ. */
      setStepBusy(true);
      resultEl.replaceChildren(makeBusyCard("Running deep audit (C5)"));

      fetch("/wiki/lint?include_c5=true", { method: "POST" })
        .then(function(resp) {
          if (!resp.ok) return resp.text().then(function(t) { throw new Error("HTTP " + resp.status + ": " + t); });
          return resp.json();
        })
        .then(function(data) {
          checkCoverageFillOutcome(data);
          checkFixSourceOutcome(data);
          // issue #489: the ONLY call site that ever requests include_c5=true
          // — a one-shot signal (mirrors lastBatchSummary/lastCoverageFillOutcome's
          // pattern) telling the upcoming renderLintCard this response's
          // page_pairs is a genuine fresh judgment, the baseline every later
          // fast (include_c5=false) relint falls back to. Not passed as a 3rd
          // renderLintCard argument: test_ui_console_lint_fast_default.py pins
          // the literal 2-arg call in both run() and deepAudit() bodies.
          pendingDeepC5Audit = true;
          resultEl.replaceChildren(renderLintCard(data, resultEl));
          lastLintData = data;
          renderCurationQueue(document.getElementById("curation-queue-root"), data);
        })
        .catch(function(err)  { resultEl.replaceChildren(renderErrorCard("Lint", err.message || String(err))); })
        .finally(function()   { setStepBusy(false); });
    },
  },
];

/* ============================================================
   Build the pipeline DOM
   ============================================================ */
function buildPipeline(rootEl) {
  /* ── Step track (breadcrumb row) ─────────────────────── */
  var trackItems = [];
  STEP_DEFS.forEach(function(step, i) {
    if (i > 0) trackItems.push(el("span", { class: "step-arrow", text: "→" }));
    trackItems.push(
      el("span", { class: "step-pill" + (i === 0 ? " active" : ""), id: "track-" + step.id },
        el("span", { class: "step-num", text: String(i + 1) }),
        el("span", { text: step.label })
      )
    );
  });

  var track = el.apply(null, ["div", { class: "step-track" }].concat(trackItems));

  /* ── Step panels ─────────────────────────────────────── */
  var panels = el("div", { class: "step-panels" });

  STEP_DEFS.forEach(function(step) {
    var resultEl = el("div", { class: "step-result" });
    // Stash the Lint step's own result container (issue #365) so the
    // header language toggle can re-render an already-visible Lint card
    // in place, without waiting for another Run click.
    if (step.id === "lint") lintResultEl = resultEl;

    /* Per-step busy state + button toggle */
    var runBtn, deepAuditBtn;
    function setStepBusy(busy) {
      if (runBtn) runBtn.disabled = busy;
      /* issue #441: the Lint step's Run and Deep audit both hit
         POST /wiki/lint — disable each other while either is in flight so
         they never race the same underlying lint pass. */
      if (deepAuditBtn) deepAuditBtn.disabled = busy;
      /* Update track pill */
      var pill = document.getElementById("track-" + step.id);
      if (pill) {
        if (busy) {
          pill.classList.add("active");
          pill.classList.remove("done");
        }
      }
    }

    /* Header */
    var headLeft = el("div", { style: "display:flex; align-items:center; gap:12px; min-width:0; flex:1;" },
      el("span", { class: "step-panel-title", text: step.label }),
      el("span", { class: "step-panel-desc",  text: step.desc })
    );

    var headEl;
    if (step.noRunBtn) {
      /* Upload: no Run button in the header — controlled inside the drop zone */
      headEl = el("div", { class: "step-panel-head" }, headLeft);
    } else {
      runBtn = el("button", { class: "run-btn", type: "button", text: "Run",
        onclick: function() { step.run(resultEl, setStepBusy); }
      });
      var headActions = [runBtn];
      if (step.deepAudit) {
        /* issue #441: Lint-only second control — the on-demand C5
           contradiction audit, kept out of the now-fast default Run path.
           Wrapped together with runBtn in .step-panel-actions below so
           .step-panel-head's space-between layout still sees exactly two
           flex children regardless of how many action buttons a step has. */
        deepAuditBtn = el("button", { class: "deep-audit-btn", type: "button",
          text: LINT_CHROME[consoleLang].deepAudit,
          onclick: function() { step.deepAudit(resultEl, setStepBusy); }
        });
        headActions.push(deepAuditBtn);
      }
      headEl = el("div", { class: "step-panel-head" }, headLeft,
        el.apply(null, ["div", { class: "step-panel-actions" }].concat(headActions)));
    }

    /* Body */
    var bodyChildren = [];
    if (step.buildBody) {
      bodyChildren.push(step.buildBody(resultEl));
    }
    bodyChildren.push(resultEl);

    var panel = el.apply(null, ["div", { class: "step-panel" }, headEl].concat(bodyChildren));
    panels.append(panel);
  });

  rootEl.append(
    el("div", { class: "pipeline" },
      el("div", { class: "pipeline-header", text: "Pipeline" }),
      track,
      panels
    )
  );
}

/* ============================================================
   Phase 15 S6 (#174) — Curation Queue
   Driven by the latest LintResponse stored in lastLintData.
   Sections:
     - C8 Promotion candidates (draft Filed Answers, ranked) — Promote + Discard
