<title>Operator Console — KB Gateway</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">

<!--
  KB Gateway Operator Console — Phase 15 (S1–S6).
  Single vanilla HTML/CSS/JS file. NO framework, NO build step (CODING_STANDARD §12.1).
  XSS: all server-derived content inserted via textContent, never innerHTML (§12.4).
  No business logic: validation and routing decisions are server-derived (§12.5).

  Phase 15 S1 (#169): Drag-drop Upload drop zone: POST /upload (multipart) → renders result card.
  Phase 15 S2 (#170): Guided pipeline stepper: Upload → Import → Ingest → Index → Lint.
    - Each step has its own Run button (single-step re-run).
    - Controls are disabled while the step's request is in flight.
    - Import step calls POST /wiki/import → renders ImportResponse per-file result card.
    - Generic step renderer + per-step card renderer pattern for Ingest/Index/Lint reuse.
  Phase 15 S3 (#172): Ingest step wired with batch chunker + per-page grounding cards.
    - Single POST /wiki/ingest call per batch of ≤5 named sources (§12.8 single-batch rule).
    - >5 sources → sequential single-batch calls with "Batch k/N" indicator (client-owned).
    - Indeterminate spinner within each batch (NO fake percentage — §12.8).
    - Per-page grounding pass/fail badge + hash-skip (unchanged) status from IngestResponse.
      (Red-link counts are NOT an ingest concern: they are a cross-page Lint C2 finding —
      IngestResponse carries no red-link field — surfaced on the Lint card. AC #14 amended
      accordingly; see #172/#168.)
    - Sources tracked from Import step results; falls back to all-docs if not available.
  Phase 15 S4 (#173): Index + Lint full result cards, RAG rebuild action, staleness guard.
    - Index step calls POST /wiki/index → renders IndexResponse: files/sections counts +
      wiki_index_written confirmation. Indeterminate spinner only (§12.8 — no fake %).
    - Lint step calls POST /wiki/lint → renders LintResponse findings grouped by check
      (orphan / stale / contradiction / coverage gap / promotion candidates / stale-qa /
      invalid-qa / failed-grounding / slug-collision / red-links). Indeterminate only.
    - RAG rebuild action: POST /rag/index → parallel track (independent of Wiki chain).
    - Staleness guard: module-level indexStale flag set by Ingest run, cleared by Index run.
      Integration point: slice #172 Ingest run() calls markIngestDone() on resolve;
      markIndexDone() is called in the Index run.finally block.
  Phase 15 S6 (#174): Curation Queue — Promote + Discard (DELETE /qa inert-only).
    - Rendered after Lint runs (driven by the stored LintResponse).
    - C8 promotion candidates: each card shows question, answer (fetched via GET /read/file),
      and cited Sources. Promote button → POST /wiki/qa/{slug}/promote (draft→live).
      Discard button → DELETE /wiki/qa/{slug} (inert only; live refused by server → 409).
    - C9 stale filed answers: read-only flag with "re-ingest the source" hint. No
      destructive action (live pages are never deleted — ADR-0012).
    - C10 invalid qa schema: read-only flag with "fix frontmatter or discard" hint.
      Discard button offered (inert; server decides eligibility — §12.5).
    - All server-derived text via textContent (§12.4).
    - Re-runs lint on "Refresh" to pick up queue changes.
  Shared design tokens: linked from shared.css (Phase 15 S1).
-->

<!-- Shared design tokens (Phase 15 S1 / issue #169) -->
<link rel="stylesheet" href="/static/shared.css">

<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  button { font: inherit; cursor: pointer; }
  a { color: inherit; }
  ::selection { background: var(--selection); color: var(--ink); }

  @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation: none !important; transition: none !important; } }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: "IBM Plex Sans", system-ui, sans-serif;
    font-size: 15px;
    line-height: 1.5;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .page {
    max-width: 1240px;
    margin: 0 auto;
    padding: 0 32px 64px;
  }

  /* ── Two-column console: flow (left) | resource rail (right) ─────────
     The Resource Browser is pinned to the right as a persistent retrieval
     rail (sticky, own scroll) so a file is always one glance away and never
     covers the pipeline flow on the left. Below 900px this collapses to a
     single column and the rail becomes a hamburger-triggered drawer. The
     58/42 split keeps the pipeline cards near their original ~680px width. */
  .console-split { display: flex; align-items: flex-start; }
  .console-main  { flex: 58 1 0; min-width: 0; padding-right: 34px; }
  .console-rail {
    flex: 42 1 0; min-width: 0;
    /* Stick BELOW the now-pinned masthead (~61px tall) so its top content isn't
       tucked behind the header when the page is scrolled. */
    position: sticky; top: 72px;
    max-height: calc(100dvh - 92px);
    overflow-y: auto; overscroll-behavior: contain;
    padding-left: 34px;
    border-left: 1px solid var(--rule);
    scrollbar-width: thin; scrollbar-color: var(--rule) transparent;
  }
  /* the rail owns its top spacing; drop the browser section-label's 40px lead */
  .console-rail .section-label { margin-top: 4px; }
  .console-rail::-webkit-scrollbar { width: 8px; }
  .console-rail::-webkit-scrollbar-thumb { background: var(--rule); border-radius: 4px; }
  .rail-close { display: none; }   /* shown only inside the mobile drawer */
  .rail-scrim { display: none; }   /* shown only behind the mobile drawer */

  /* Masthead hamburger — opens the resource rail as a drawer on small
     screens; hidden on desktop where the rail is always visible. */
  .mast-hamburger {
    display: none;
    background: none;
    font-size: 15px; line-height: 1;
    color: var(--ink-3);
    border: 1px solid var(--rule);
    border-radius: 4px;
    padding: 5px 9px;
    transition: color .15s ease, border-color .15s ease;
  }
  .mast-hamburger:hover { color: var(--ink); border-color: var(--ink-3); }

  /* ── Masthead (shared with reader, §12.1) ────────────────── */
  /* Pinned to the top of the viewport: the console can scroll a long way, and on
     mobile the Resource Browser opens from the masthead hamburger — pinning it
     keeps "view the original file" one tap away without scrolling back up. Needs
     an opaque background (content scrolls under it) and a z-index above the flow
     but below the mobile rail drawer/scrim (z 1000/999). */
  .masthead {
    flex: none;
    position: sticky; top: 0; z-index: 50;
    padding: 22px 0 16px;
    display: flex; align-items: center; gap: 16px;
    border-bottom: 1px solid var(--rule);
    background: var(--bg);
  }
  .mast-logo {
    font-family: "IBM Plex Sans", sans-serif;
    font-weight: 500; font-size: 15px;
    letter-spacing: -.005em; color: var(--ink);
    text-decoration: none;
  }
  .mast-logo .dot { color: var(--ink-4); margin: 0 1px; }
  .mast-logo .amp { color: var(--ink-4); margin: 0 1px; font-weight: 400; }

  /* Breadcrumb separator */
  .mast-sep {
    color: var(--ink-4);
    font-family: "IBM Plex Mono", monospace;
    font-size: 12px;
  }
  .mast-page {
    font-family: "IBM Plex Mono", monospace;
    font-size: 12px;
    letter-spacing: .04em;
    color: var(--ink-2);
    text-transform: uppercase;
  }

  /* zh/en Lint chrome toggle (issue #365) — grouped flush-right beside the
     reader link. Only THIS element carries margin-left:auto: a single auto
     absorbs all the row's free space, so the toggle + reader + hamburger sit
     together on the right (two auto margins would SPLIT the space and strand the
     toggle mid-row). Styled as a filled accent pill — the palette is monochrome,
     so the system signals emphasis with a solid fill (cf. .reingest-btn / the
     reader's own send button), making the language switch noticeable among the
     outline-style masthead controls. */
  .mast-lang-toggle {
    margin-left: auto;
    background: var(--accent);
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    letter-spacing: .04em;
    color: var(--surface);
    border: 1px solid var(--accent);
    border-radius: 4px;
    padding: 5px 10px;
    transition: opacity .15s ease;
  }
  .mast-lang-toggle:hover { opacity: .82; }

  /* Reader link — navigates back. No margin-left:auto (the lang toggle's auto
     already pushes this whole right-hand group over), so it sits flush beside
     the toggle. */
  .mast-reader {
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    letter-spacing: .04em;
    color: var(--ink-3);
    text-decoration: none;
    border: 1px solid var(--rule);
    border-radius: 4px;
    padding: 5px 10px;
    transition: color .15s ease, border-color .15s ease;
  }
  .mast-reader:hover {
    color: var(--ink);
    border-color: var(--ink-3);
  }

  /* ── Pipeline stepper ────────────────────────────────────── */
  .pipeline {
    margin-top: 32px;
  }

  .pipeline-header {
    font-family: "IBM Plex Mono", monospace;
    font-size: 10.5px; letter-spacing: .08em; text-transform: uppercase;
    color: var(--ink-3);
    margin-bottom: 20px;
    display: flex; align-items: center; gap: 8px;
  }

  /* Step track */
  .step-track {
    display: flex;
    align-items: center;
    gap: 0;
    margin-bottom: 24px;
    overflow-x: auto;
    padding-bottom: 2px;
  }

  .step-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    letter-spacing: .04em;
    color: var(--ink-4);
    white-space: nowrap;
    padding: 5px 0;
    transition: color .15s ease;
  }
  .step-pill.active { color: var(--ink); }
  .step-pill.done   { color: var(--pass); }

  .step-num {
    width: 20px; height: 20px;
    border-radius: 50%;
    border: 1.5px solid currentColor;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px;
    flex-shrink: 0;
  }
  .step-pill.done .step-num {
    background: var(--pass);
    border-color: var(--pass);
    color: #fff;
  }
  .step-pill.active .step-num {
    background: var(--ink);
    border-color: var(--ink);
    color: var(--surface);
  }

  .step-arrow {
    color: var(--ink-4);
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    padding: 0 8px;
    flex-shrink: 0;
    user-select: none;
  }

  /* Individual step panel */
  .step-panel {
    border: 1px solid var(--rule);
    border-radius: 6px;
    background: var(--surface);
    overflow: hidden;
    margin-bottom: 16px;
  }

  .step-panel-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    border-bottom: 1px solid var(--rule);
    gap: 12px;
  }

  .step-panel-title {
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    letter-spacing: .06em;
    text-transform: uppercase;
    color: var(--ink-2);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .step-panel-desc {
    font-size: 12px;
    color: var(--ink-3);
    flex: 1;
    min-width: 0;
  }

  /* Run button */
  .run-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--ink);
    color: var(--surface);
    border: 0;
    padding: 6px 14px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    letter-spacing: .04em;
    border-radius: 4px;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
    transition: background .15s ease, opacity .15s ease;
  }
  .run-btn:hover:not(:disabled) { background: #000; }
  .run-btn:disabled {
    opacity: .45;
    cursor: not-allowed;
  }

  /* Groups the Run button with the Lint step's extra Deep audit control
     (issue #441) so .step-panel-head's space-between still sees exactly
     two flex children (headLeft, actions) regardless of button count. */
  .step-panel-actions {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }

  /* Deep audit (C5) — secondary/outline styling to read as "on-demand,
     heavier" next to the primary filled Run button (issue #441). */
  .deep-audit-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: transparent;
    color: var(--ink);
    border: 1px solid var(--rule);
    padding: 6px 14px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    letter-spacing: .04em;
    border-radius: 4px;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
    transition: background .15s ease, opacity .15s ease;
  }
  .deep-audit-btn:hover:not(:disabled) { background: var(--rule-2); }
  .deep-audit-btn:disabled {
    opacity: .45;
    cursor: not-allowed;
  }

  /* Step result area */
  .step-result {
    /* populated by JS — empty by default */
  }

  /* ── Upload drop zone ────────────────────────────────────── */
  .drop-zone {
    border: 1.5px dashed var(--rule);
    border-radius: 0 0 5px 5px; /* fits inside panel */
    padding: 28px 20px;
    text-align: center;
    cursor: pointer;
    transition: border-color .2s ease, background .2s ease;
    background: var(--bg);
  }
  .drop-zone.drag-over {
    border-color: var(--ink-3);
    background: var(--rule-2);
  }
  .drop-zone.busy {
    opacity: .65;
    cursor: not-allowed;
    pointer-events: none;
  }
  .drop-hint {
    font-size: 14px;
    color: var(--ink-3);
    line-height: 1.6;
  }
  .drop-hint strong {
    color: var(--ink-2);
    font-weight: 500;
  }
  .drop-ext {
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    color: var(--ink-4);
    margin-top: 8px;
    letter-spacing: .03em;
  }
  .drop-btn {
    display: inline-block;
    margin-top: 14px;
    background: var(--ink);
    color: var(--surface);
    border: 0;
    padding: 7px 14px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    letter-spacing: .04em;
    border-radius: 4px;
    cursor: pointer;
    transition: background .15s ease;
  }
  .drop-btn:hover { background: #000; }
  .drop-btn:disabled {
    opacity: .45;
    cursor: not-allowed;
  }

  /* ── Result card ─────────────────────────────────────────── */
  .result-card {
    border-top: 1px solid var(--rule);
    background: var(--surface);
    overflow: hidden;
  }
  .result-card-head {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 16px;
    border-bottom: 1px solid var(--rule);
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    letter-spacing: .06em;
    text-transform: uppercase;
    color: var(--ink-3);
  }
  .result-card-head .badge {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 10.5px;
    letter-spacing: .04em;
  }
  .result-card-head .badge .dot {
    width: 6px; height: 6px; border-radius: 50%;
  }
  .badge-ok .dot    { background: var(--pass); }
  .badge-ok         { color: var(--pass); }
  .badge-warn .dot  { background: #c47f17; }
  .badge-warn       { color: #c47f17; }
  .badge-fail .dot  { background: var(--fail); }
  .badge-fail       { color: var(--fail); }

  /* File rows inside result card — reuse .rec layout from the reader */
  .rec {
    display: grid;
    grid-template-columns: 24px 1fr auto;
    column-gap: 12px;
    padding: 10px 16px;
    border-top: 1px solid var(--rule-2);
  }
  .rec:first-child { border-top: none; }
  .rec .num {
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px; color: var(--ink-3);
    font-variant-numeric: tabular-nums;
    padding-top: 2px;
  }
  .rec .body { min-width: 0; }
  .rec .id {
    font-family: "IBM Plex Mono", monospace;
    font-size: 12px; color: var(--ink); font-weight: 500;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .rec .crumb {
    font-size: 12px; color: var(--ink-3); margin-top: 2px;
  }
  .rec .label {
    font-family: "IBM Plex Mono", monospace;
    font-size: 10.5px;
    padding-top: 2px;
    text-align: right;
    min-width: 60px;
  }
  .label-created  { color: var(--pass); }
  .label-updated  { color: #c47f17; }
  .label-skipped  { color: var(--ink-3); }
  .label-failed   { color: var(--fail); }
  /* Upload result labels */
  .label-written  { color: var(--pass); }
  .label-rejected { color: var(--fail); }
  .label-error    { color: var(--fail); }
  /* Ingest grounding labels */
  .label-grounded   { color: var(--pass); }
  .label-failed-grounding { color: var(--fail); }
  .label-skipped-hash { color: var(--ink-3); }

  /* ── Prominent Import failure row (issue #447) ──────────────
     Failures used to be a plain .rec row identical to a success row except
     for the .label-failed text colour — easy to miss inside a busy Import
     card. Failed rows now render FIRST (see renderImportCard) with a tinted
     background + left accent bar, and show BOTH the error_type (small mono
     badge) and the full error_message (not one or the other). */
  .rec-failed {
    background: #fdf1ef;
    border-left: 3px solid var(--fail);
  }
  .rec-failed .crumb { color: var(--ink); }
  .rec-failed .error-type {
    display: inline-block;
    font-family: "IBM Plex Mono", monospace;
    font-size: 10px;
    letter-spacing: .04em;
    color: var(--fail);
    text-transform: uppercase;
    margin-right: 6px;
  }

  /* Transcribe action (issue #447, ADR-0032) — offered on a NoTextLayer (and
     Transcribe-family) Import failure row. Same filled-accent "this
     executes" treatment as .assign-alias-btn / .reconcile-btn. */
  .transcribe-btn {
    display: inline-flex; align-items: center; gap: 5px;
    background: var(--accent);
    color: #fff;
    border: 0;
    padding: 4px 10px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 10.5px;
    letter-spacing: .04em;
    border-radius: 4px;
    cursor: pointer;
    transition: opacity .15s ease;
  }
  .transcribe-btn:hover:not(:disabled) { opacity: .82; }
  .transcribe-btn:disabled { opacity: .45; cursor: not-allowed; }

  /* Transcribe progress bar (issue #447/#459) — a REAL determinate bar
     driven by GET /wiki/transcribe/jobs/{job_id}'s pages_done/pages_total
     (the server-owned page-completion count, issue #459 AC4), not a
     client-guessed percentage — CODING_STANDARD §12.8 bans the latter, not
     a real server-reported count (the same "client owns the count"
     exception that already authorises the pipeline's own "Batch k/N"). */
  .transcribe-progress-track {
    width: 100%;
    height: 8px;
    background: var(--rule-2);
    border-radius: 4px;
    overflow: hidden;
    margin-top: 8px;
  }
  .transcribe-progress-fill {
    height: 100%;
    background: var(--accent);
    transition: width .2s ease;
  }
  .transcribe-progress-label {
    font-family: "IBM Plex Mono", monospace;
    font-size: 10.5px;
    color: var(--ink-3);
    margin-top: 4px;
  }

  /* ── Spinner (busy state) ────────────────────────────────── */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid var(--rule);
    border-top-color: var(--ink-3);
    border-radius: 50%;
    animation: spin .7s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
    flex-shrink: 0;
  }
  .busy-row {
    padding: 12px 16px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    color: var(--ink-3);
    letter-spacing: .04em;
    display: flex; align-items: center;
    border-top: 1px solid var(--rule);
  }

  /* ── Resource Browser (Phase 15 S5, issue #171) ─────────── */
  .section-label {
    font-family: "IBM Plex Mono", monospace;
    font-size: 10.5px; letter-spacing: .08em; text-transform: uppercase;
    color: var(--ink-3);
    margin: 40px 0 16px;
    display: flex; align-items: center; gap: 8px;
  }
  .browser-breadcrumb {
    display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
    font-family: "IBM Plex Mono", monospace;
    font-size: 11.5px; letter-spacing: .02em;
    color: var(--ink-3);
    margin-bottom: 14px;
  }
  .browser-breadcrumb .crumb-btn {
    background: none; border: none;
    color: var(--ink-2); cursor: pointer; padding: 0;
    font: inherit; font-size: 11.5px;
    text-decoration: underline;
    text-underline-offset: 2px;
  }
  .browser-breadcrumb .crumb-btn:hover { color: var(--ink); }
  .browser-breadcrumb .crumb-sep { color: var(--ink-4); user-select: none; }
  .browser-breadcrumb .crumb-current { color: var(--ink-3); }

  .browser-entries {
    border: 1px solid var(--rule);
    border-radius: 6px;
    background: var(--surface);
    overflow: hidden;
    transition: opacity .15s ease;
  }
  /* Dim the listing in place while the next folder loads instead of collapsing it
     to a spinner — the box keeps its height, so switching folders no longer jolts
     the page. Contents swap with a height morph + staggered reveal on resolve. */
  .browser-entries.is-loading { opacity: .4; pointer-events: none; }
  .browser-empty {
    padding: 20px 16px;
    font-size: 13px;
    color: var(--ink-3);
    text-align: center;
  }

  /* Entry rows */
  .entry-row {
    display: grid;
    grid-template-columns: 20px 1fr auto;
    column-gap: 10px;
    padding: 11px 16px;
    border-top: 1px solid var(--rule-2);
    cursor: pointer;
    transition: background .12s ease;
  }
  .entry-row:first-child { border-top: none; }
  .entry-row:hover { background: var(--rule-2); }
  .entry-icon {
    font-size: 13px;
    color: var(--ink-3);
    padding-top: 1px;
    user-select: none;
    transition: transform .18s cubic-bezier(.22,.61,.36,1), color .15s ease;
  }
  .entry-row.is-dir:hover .entry-icon { transform: translateX(2px); color: var(--ink-2); }
  .entry-name {
    font-family: "IBM Plex Mono", monospace;
    font-size: 12.5px;
    color: var(--ink);
    font-weight: 500;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .entry-row.is-dir .entry-name { color: var(--ink-2); }
  .entry-meta {
    font-family: "IBM Plex Mono", monospace;
    font-size: 10.5px;
    color: var(--ink-4);
    padding-top: 2px;
    text-align: right;
  }

  /* Per-row failure notice (issue #444) — sits directly under the entry row
     that was clicked, so a failing open is visible at the point of action
     instead of only in the file viewer further down the page. Hidden by
     default; toggled with .visible when openFile's error callback fires. */
  .entry-row-notice {
    display: none;
    padding: 0 16px 10px 46px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    color: var(--fail);
  }
  .entry-row-notice.visible { display: block; }

  /* File content viewer */
  .file-viewer {
    margin-top: 20px;
    border: 1px solid var(--rule);
    border-radius: 6px;
    background: var(--surface);
    overflow: hidden;
  }
  .file-viewer-head {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 16px;
    border-bottom: 1px solid var(--rule);
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px; letter-spacing: .04em;
    color: var(--ink-3);
  }
  .file-viewer-head .file-name { color: var(--ink-2); }
  .file-viewer-close {
    margin-left: auto;
    background: none; border: 1px solid var(--rule);
    border-radius: 3px; padding: 2px 8px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 10.5px; color: var(--ink-3); cursor: pointer;
  }
  .file-viewer-close:hover { color: var(--ink); border-color: var(--ink-3); }
  .file-content {
    padding: 16px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 12px;
    line-height: 1.6;
    color: var(--ink);
    white-space: pre-wrap;
    overflow-x: auto;
    max-height: 600px;
    overflow-y: auto;
    word-break: break-word;
  }
  /* Wikilink linkify (issue #410, ADR-0030 decision 5) — curator surface:
     resolved -> navigable link; unresolved -> red-link styling (the SAME
     judgment C2 reports for the same corpus), non-navigating. */
  .wikilink {
    color: var(--accent);
    text-decoration: underline;
    cursor: pointer;
  }
  .wikilink-unresolved {
    color: var(--fail);
    text-decoration: none;
    cursor: default;
  }

  /* Busy feedback across every file-open trigger (issue #444) — navigateTo()
     and openFile() share one browserBusy flag, so a click on ANY of these
     while either is in flight must visibly refuse rather than silently
     no-op. pointer-events:none means the click never reaches the handler at
     all, so this "disabled" look is real, not just cosmetic; mirrors the
     existing .browser-entries.is-loading dim treatment above. */
  body.file-open-busy .entry-row,
  body.file-open-busy .view-source-btn,
  body.file-open-busy .wikilink {
    pointer-events: none;
    opacity: .5;
    cursor: wait;
  }

  /* ── Staleness guard banner ──────────────────────────────── */
  .staleness-banner {
    display: none; /* shown via JS when indexStale=true */
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    background: #fff8eb;
    border: 1px solid #e8c66a;
    border-radius: 6px;
    margin-bottom: 16px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    letter-spacing: .03em;
    color: #7a5a00;
  }
  .staleness-banner.visible { display: flex; }
  .staleness-banner .stale-icon { font-size: 13px; flex-shrink: 0; }
  .staleness-banner .stale-msg { flex: 1; }

  /* ── Daily budget usage banner (issue #510) ─────────────────── */
  .budget-usage-banner {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    background: var(--bg);
    border: 1px solid var(--rule);
    border-radius: 6px;
    margin-bottom: 16px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    letter-spacing: .03em;
    color: var(--ink-2);
  }
  .budget-usage-banner .budget-usage-icon { font-size: 13px; flex-shrink: 0; }
  .budget-usage-banner .budget-usage-text { flex: 1; }

  /* ── RAG rebuild panel ───────────────────────────────────── */
  .rag-track {
    margin-top: 32px;
  }
  .rag-track-header {
    font-family: "IBM Plex Mono", monospace;
    font-size: 10.5px; letter-spacing: .08em; text-transform: uppercase;
    color: var(--ink-3);
    margin-bottom: 16px;
    display: flex; align-items: center; gap: 8px;
  }
  .rag-track-note {
    font-size: 12px;
    color: var(--ink-3);
    font-family: "IBM Plex Sans", sans-serif;
    text-transform: none;
    letter-spacing: 0;
    font-weight: 400;
  }

  /* ── Hybrid dense rebuild panel (ADR-0022, issue #348) ──── */
  .hybrid-track {
    margin-top: 32px;
  }
  .hybrid-track-header {
    font-family: "IBM Plex Mono", monospace;
    font-size: 10.5px; letter-spacing: .08em; text-transform: uppercase;
    color: var(--ink-3);
    margin-bottom: 16px;
    display: flex; align-items: center; gap: 8px;
  }
  .hybrid-track-note {
    font-size: 12px;
    color: var(--ink-3);
    font-family: "IBM Plex Sans", sans-serif;
    text-transform: none;
    letter-spacing: 0;
    font-weight: 400;
  }

  /* Lint Axis section heading (issue #363 — reuses S1's LINT_AXIS_ORDER:
     Freshness -> Coherence -> Coverage -> Lifecycle). display:flex so an
     optional axis-level batch button (issue #364 — Freshness only) sits
     flush right of the label. */
  .lint-axis-head {
    padding: 16px 16px 12px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: .06em;
    text-transform: uppercase;
    color: var(--ink);
    border-top: 2px solid var(--rule);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .lint-axis-head:first-child { border-top: none; padding-top: 0; }

  /* Lint check group heading inside result card. display:flex so an
     optional check-level batch button (issue #364 — C6 "Re-ingest all",
     C10 "Discard all") sits flush right of the label. */
  .lint-group-head {
    padding: 12px 16px 7px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 10px;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--ink-3);
    border-top: 1px solid var(--rule);
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .lint-axis-head + .lint-group-head { border-top: none; }

  /* ── Collapsible lint axes + Curation Queue ─────────────────────────
     A lint run can be long; letting the operator fold a processed (or not-
     yet-relevant) section avoids scrolling past it every time. Default is
     expanded — the chevron toggles a grid-rows height animation. The same
     toggle/chevron/body chrome is reused for the Curation Queue header. */
  .lint-collapse-toggle {
    flex: 1 1 auto; min-width: 0;
    display: inline-flex; align-items: center; gap: 9px;
    background: none; border: 0; padding: 0; margin: 0;
    font: inherit; color: inherit; letter-spacing: inherit;
    text-transform: inherit; text-align: left; cursor: pointer;
    transition: color .15s ease;
  }
  .lint-collapse-toggle:hover { color: var(--ink); }
  .lint-collapse-toggle:focus-visible {
    outline: 2px solid var(--accent); outline-offset: 3px; border-radius: 3px;
  }
  /* The chevron is a real disclosure control, not decoration: give it a boxed
     hit-target that reads as tappable, a strong-enough default colour to be
     noticed (not the faint --ink-4 it was), and a filled hover state so it's
     obvious the header row toggles the section. */
  .lint-chevron {
    flex: none;
    width: 18px; height: 18px;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 11px; line-height: 1; color: var(--ink-3);
    border: 1px solid var(--rule); border-radius: 4px;
    transition: transform .2s ease, color .15s ease,
                background-color .15s ease, border-color .15s ease;
  }
  .lint-collapse-toggle:hover .lint-chevron {
    color: var(--ink); background: var(--surface); border-color: var(--ink-3);
  }
  .lint-axis.collapsed .lint-chevron,
  .curation-collapse.collapsed .lint-chevron { transform: rotate(-90deg); }
  .lint-collapse-count { color: var(--ink-3); font-weight: 400; }
  .lint-collapse-body {
    display: grid; grid-template-rows: 1fr;
    transition: grid-template-rows .26s ease;
  }
  .lint-axis.collapsed .lint-collapse-body,
  .curation-collapse.collapsed .lint-collapse-body { grid-template-rows: 0fr; }
  .lint-collapse-inner { overflow: hidden; min-height: 0; }
  /* The 2px inter-axis divider moves from the head to the wrapper, since each
     axis head is now nested (always a wrapper's first child). */
  .lint-axis { border-top: 2px solid var(--rule); }
  .lint-axis:first-child { border-top: none; }
  .lint-axis > .lint-axis-head { border-top: none; padding-top: 20px; }
  .lint-axis:first-child > .lint-axis-head { padding-top: 6px; }
  .lint-collapse-inner > .lint-group-head:first-child { border-top: none; }

  /* Batch-remediation summary banner (issue #364) — a one-shot notice
     ("re-ingested 5: 4 ok, 1 still failing") shown at the top of the
     re-rendered Lint card right after a batch completes. */
  .lint-batch-summary {
    padding: 8px 16px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    letter-spacing: .03em;
    color: var(--ink-2);
    background: var(--bg);
    border-bottom: 1px solid var(--rule);
  }

  /* Per-row Remediation actions (issue #363 — Direct Remediation buttons +
     the disabled Authored/tier-B affordance). Sits inside the .rec "body"
     cell (below the id/crumb text) so the existing 3-column .rec grid used
     by every other result card is untouched. */
  .lint-row-actions {
    margin-top: 6px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .reingest-btn {
    display: inline-flex; align-items: center; gap: 5px;
    background: var(--accent);
    color: #fff;
    border: 0;
    padding: 4px 10px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 10.5px;
    letter-spacing: .04em;
    border-radius: 4px;
    cursor: pointer;
    transition: opacity .15s ease;
  }
  .reingest-btn:hover:not(:disabled) { opacity: .82; }
  .reingest-btn:disabled { opacity: .45; cursor: not-allowed; }

  /* Authored-tier ("tier B") affordance — visible, never actionable
     (ADR-0023: Authored Remediation is out of tier-A scope). */
  .tier-b-btn {
    display: inline-flex; align-items: center; gap: 5px;
    background: none;
    color: var(--ink-4);
    border: 1px dashed var(--ink-4);
    padding: 4px 10px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 10.5px;
    letter-spacing: .04em;
    border-radius: 4px;
    cursor: not-allowed;
  }

  /* ── C1/C2 Routed Coverage Fill (tier-B S7, issue #383, ADR-0027) ──────
     Replaces the disabled .tier-b-btn above for C1/C2 only: a Routed
     remediation is a navigation, not an execution, so this is a REAL
     clickable button (solid border, not dashed/disabled) — but its click
     handler never fetches anything (ADR-0027 Invariant). The outline style
     (no filled background) visually distinguishes "this navigates" from the
     filled-accent execute buttons (.reingest-btn / .reconcile-btn /
     .discard-btn) elsewhere on this card. */
  .fill-import-btn {
    display: inline-flex; align-items: center; gap: 5px;
    background: none;
    color: var(--accent);
    border: 1px solid var(--accent);
    padding: 4px 10px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 10.5px;
    letter-spacing: .04em;
    border-radius: 4px;
    cursor: pointer;
    transition: opacity .15s ease;
  }
  .fill-import-btn:hover { opacity: .7; }

  /* ── C1 Verify: re-ask (tier-B S8, issue #384, ADR-0027 decision 2) ────
     Unlike .fill-import-btn above (a navigation that never fetches —
     ADR-0027 Invariant), this control DOES issue a request (the existing
     POST /wiki/chat) and re-lints on completion, so it gets the same
     filled-accent "this executes" treatment as .reingest-btn /
     .reconcile-btn / .discard-btn rather than the outline navigation
     style. */
  .verify-reask-btn {
    display: inline-flex; align-items: center; gap: 5px;
    background: var(--accent);
    color: #fff;
    border: 0;
    padding: 4px 10px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 10.5px;
    letter-spacing: .04em;
    border-radius: 4px;
    cursor: pointer;
    transition: opacity .15s ease;
  }
  .verify-reask-btn:hover:not(:disabled) { opacity: .82; }
  .verify-reask-btn:disabled { opacity: .45; cursor: not-allowed; }

  /* Persistent context banner shown above the pipeline stepper once a
     "Fill via Import" control is clicked — carries the finding's fields
     (AC: C2 slug + referenced_by + sample_context; C1 sample_raw_queries +
     hit_count) into the existing Upload -> Import -> Ingest flow. Same
     info-banner palette as .demo-reset-banner; toggled via .visible like
     .staleness-banner (hidden until JS shows it). */
  .coverage-fill-banner {
    display: none;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 16px;
    background: #f0f4ff;
    border: 1px solid #93b3e6;
    border-radius: 6px;
    margin-bottom: 16px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    letter-spacing: .03em;
    color: #2a4080;
    line-height: 1.5;
  }
  .coverage-fill-banner.visible { display: flex; }

  /* ── C3 Routed fix-the-Source (issue #408, ADR-0029) ───────────────────
     C3 is the first finding carrying two remediation classes at once: the
     existing .reingest-btn (Direct "Re-ingest (retry)") stays wired
     unchanged, and this adds a Routed navigation control alongside it —
     same visual language as .fill-import-btn above (outline, never fetches
     — the click handler only carries context into the existing Upload ->
     Re-ingest -> Lint flow, ADR-0029 Invariant: commits nothing itself). */
  .fix-source-btn {
    display: inline-flex; align-items: center; gap: 5px;
    background: none;
    color: var(--accent);
    border: 1px solid var(--accent);
    padding: 4px 10px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 10.5px;
    letter-spacing: .04em;
    border-radius: 4px;
    cursor: pointer;
    transition: opacity .15s ease;
  }
  .fix-source-btn:hover { opacity: .7; }

  /* Read-only "view the current Source" control inside the fix-source
     banner — reuses the existing openFile() resource-browser viewer
     (GET /read/file), so this is a second navigation control, never a
     mutation. Same outline visual language as .fix-source-btn. */
  .view-source-btn {
    display: inline-flex; align-items: center; gap: 5px;
    background: none;
    color: var(--accent);
    border: 1px solid var(--accent);
    padding: 4px 10px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 10.5px;
    letter-spacing: .04em;
    border-radius: 4px;
    cursor: pointer;
    transition: opacity .15s ease;
  }
  .view-source-btn:hover { opacity: .7; }

  /* Give-up path advisory (issue #408, ADR-0029 decision 4) — always
     visible under a C3 row, no button: naming the C11 full-orphan path is
     "card copy", not an affordance (ADR-0029 Invariant — no delete
     affordance on a C3 finding). Mirrors .card-status-msg's quiet tone. */
  .c3-give-up-note {
    display: block;
    margin-top: 4px;
    color: var(--ink-4);
    font-size: 10.5px;
  }

  /* Persistent context banner shown above the pipeline stepper once "Fix
     Source" is clicked — carries the finding's context (Source filename +
     unsupported_claims + a view-the-file control) into the existing
     Upload -> Re-ingest -> Lint flow. Same info-banner palette as
     .coverage-fill-banner above. */
  .fix-source-banner {
    display: none;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    background: #f0f4ff;
    border: 1px solid #93b3e6;
    border-radius: 6px;
    margin-bottom: 16px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    letter-spacing: .03em;
    color: #2a4080;
    line-height: 1.5;
  }
  .fix-source-banner.visible { display: flex; }

  /* ── C5 fix-source BATCH panel (issue #538, ADR-0036 decisions 3-5) ────
     Generalises the single-pending-target banner pattern above
     (.fix-source-banner / fixSourceAction, C3's ADR-0029 flow) into a
     multi-item checklist: the Reconcile modal's Source comparison "Fix
     this Source" entry points accumulate targets here instead of tracking
     one pending slot. Column layout (not the single-line banner shape
     above) since the list can grow past one row. Same info-banner palette
     as .coverage-fill-banner / .fix-source-banner. */
  .fix-source-batch-panel {
    display: none;
    flex-direction: column;
    gap: 8px;
    padding: 10px 16px;
    background: #f0f4ff;
    border: 1px solid #93b3e6;
    border-radius: 6px;
    margin-bottom: 16px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    letter-spacing: .03em;
    color: #2a4080;
    line-height: 1.5;
  }
  .fix-source-batch-panel.visible { display: flex; }
  .fix-source-batch-head { font-weight: 600; }
  .fix-source-batch-list { display: flex; flex-direction: column; gap: 4px; }
  .fix-source-batch-item { display: flex; align-items: center; gap: 8px; }
  .fix-source-batch-item-path { flex: 1; word-break: break-word; }
  .fix-source-batch-remove-btn {
    background: none;
    border: none;
    color: var(--fail);
    font-family: "IBM Plex Mono", monospace;
    font-size: 10.5px;
    text-decoration: underline;
    text-underline-offset: 2px;
    cursor: pointer;
    padding: 0;
  }
  .fix-source-batch-controls { display: flex; align-items: center; gap: 10px; }
  .fix-source-batch-upload-btn {
    display: inline-flex; align-items: center; gap: 5px;
    background: var(--accent);
    color: #fff;
    border: 0;
    padding: 4px 10px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 10.5px;
    letter-spacing: .04em;
    border-radius: 4px;
    cursor: pointer;
    transition: opacity .15s ease;
  }
  .fix-source-batch-upload-btn:hover:not(:disabled) { opacity: .82; }
  .fix-source-batch-upload-btn:disabled { opacity: .45; cursor: not-allowed; }

  /* ── C2 Assign-Alias picker (issue #409, ADR-0030 decision 3) ──────────
     The red link's SECOND exit alongside .fill-import-btn (a picker +
     execute button, not just navigation — this one DOES fetch, so the
     Assign button gets the same filled-accent "this executes" treatment as
     .verify-reask-btn / .reingest-btn). First <select> in this file — kept
     visually consistent with the existing monospace form-control language
     (.draft-card-edit-form input/textarea) rather than a bare native
     control. */
  .assign-alias-select {
    font-family: "IBM Plex Mono", monospace;
    font-size: 10.5px;
    color: var(--ink);
    background: var(--bg);
    border: 1px solid var(--rule);
    border-radius: 4px;
    padding: 4px 6px;
    max-width: 220px;
  }
  .assign-alias-btn {
    display: inline-flex; align-items: center; gap: 5px;
    background: var(--accent);
    color: #fff;
    border: 0;
    padding: 4px 10px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 10.5px;
    letter-spacing: .04em;
    border-radius: 4px;
    cursor: pointer;
    transition: opacity .15s ease;
  }
  .assign-alias-btn:hover:not(:disabled) { opacity: .82; }
  .assign-alias-btn:disabled { opacity: .45; cursor: not-allowed; }

  /* Honest-miss offer buttons (issue #409, ADR-0030 decision 3) — rendered
     inside the existing .lint-batch-summary post-fill banner (ADR-0027
     decision 3), one per page the triggering Ingest run actually created.
     Same filled-accent "this executes" treatment as .assign-alias-btn. */
  .assign-alias-offer-btn {
    display: inline-flex; align-items: center; gap: 5px;
    background: var(--accent);
    color: #fff;
    border: 0;
    padding: 4px 10px;
    margin-top: 6px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 10.5px;
    letter-spacing: .04em;
    border-radius: 4px;
    cursor: pointer;
    transition: opacity .15s ease;
  }
  .assign-alias-offer-btn:hover:not(:disabled) { opacity: .82; }
  .assign-alias-offer-btn:disabled { opacity: .45; cursor: not-allowed; }

  /* ── C12 alias-collision Remove control (issue #491) — the mirror-image
     of .assign-alias-btn (removeAliasAction is the mirror of
     assignAliasRequest — see the JS comment above removeAliasFromClaimants-
     Request). Same filled-accent "this executes" treatment as
     .assign-alias-btn / .reconcile-btn / .collision-merge-btn (issue #536:
     was previously unstyled, off-convention). */
  .remove-alias-btn {
    display: inline-flex; align-items: center; gap: 5px;
    background: var(--accent);
    color: #fff;
    border: 0;
    padding: 4px 10px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 10.5px;
    letter-spacing: .04em;
    border-radius: 4px;
    cursor: pointer;
    transition: opacity .15s ease;
  }
  .remove-alias-btn:hover:not(:disabled) { opacity: .82; }
  .remove-alias-btn:disabled { opacity: .45; cursor: not-allowed; }

  /* ── C5 Reconcile (tier-B S1, issue #376, ADR-0028) ─────────────
     The one Authored-tier check with a real Gated affordance this slice —
     C4 keeps the disabled .tier-b-btn above until its own slice. */
  .reconcile-btn {
    display: inline-flex; align-items: center; gap: 5px;
    background: var(--accent);
    color: #fff;
    border: 0;
    padding: 4px 10px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 10.5px;
    letter-spacing: .04em;
    border-radius: 4px;
    cursor: pointer;
    transition: opacity .15s ease;
  }
  .reconcile-btn:hover:not(:disabled) { opacity: .82; }
  .reconcile-btn:disabled { opacity: .45; cursor: not-allowed; }

  .reconcile-overlay {
    position: fixed; inset: 0;
    background: rgba(17,17,17,.45);
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
    z-index: 1000;
  }
  .reconcile-modal {
    background: var(--surface);
    border: 1px solid var(--rule);
    border-radius: 8px;
    max-width: 920px;
    width: 100%;
    max-height: 90vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .reconcile-modal-head {
    padding: 12px 16px;
    border-bottom: 1px solid var(--rule);
    font-family: "IBM Plex Mono", monospace;
    font-size: 12px;
    letter-spacing: .03em;
    color: var(--ink);
  }
  .reconcile-modal-body {
    padding: 16px;
    overflow-y: auto;
    font-size: 12.5px;
  }
  .reconcile-grounding { margin-bottom: 14px; }
  .reconcile-claims {
    margin: 6px 0 0;
    padding-left: 18px;
    color: var(--fail);
    font-size: 12px;
  }
  .reconcile-columns {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  .reconcile-col-head {
    font-family: "IBM Plex Mono", monospace;
    font-size: 10.5px;
    letter-spacing: .04em;
    text-transform: uppercase;
    color: var(--ink-3);
    margin: 10px 0 4px;
  }
  .reconcile-col-head:first-child { margin-top: 0; }
  .reconcile-old {
    white-space: pre-wrap;
    word-break: break-word;
    background: var(--bg);
    border: 1px solid var(--rule);
    border-radius: 4px;
    padding: 8px 10px;
    font-size: 12px;
    color: var(--ink-2);
    max-height: 160px;
    overflow-y: auto;
    margin: 0;
  }
  .reconcile-textarea {
    width: 100%;
    box-sizing: border-box;
    font-family: "IBM Plex Mono", monospace;
    font-size: 12px;
    line-height: 1.5;
    padding: 8px 10px;
    border: 1px solid var(--rule);
    border-radius: 4px;
    resize: vertical;
  }
  .reconcile-actions {
    padding: 12px 16px;
    border-top: 1px solid var(--rule);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .reconcile-apply-btn {
    background: var(--pass);
    color: #fff;
    border: 0;
    padding: 6px 14px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    letter-spacing: .04em;
    border-radius: 4px;
    cursor: pointer;
  }
  .reconcile-apply-btn:hover:not(:disabled) { opacity: .85; }
  .reconcile-apply-btn:disabled { opacity: .45; cursor: not-allowed; }
  .reconcile-cancel-btn {
    background: none;
    color: var(--ink-2);
    border: 1px solid var(--rule);
    padding: 6px 14px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    letter-spacing: .04em;
    border-radius: 4px;
    cursor: pointer;
  }
  .reconcile-cancel-btn:hover:not(:disabled) { border-color: var(--ink-3); }
  .reconcile-error { color: var(--fail); }

  /* ── C5 two-view Reconcile modal (issue #538, ADR-0036 decisions 2-3) ───
     Header toggle between Wiki comparison (.reconcile-columns above — the
     pre-existing view) and Source comparison (this section). Default view
     is chosen by the generate response's grounding.passed; both toggle
     buttons stay present regardless (renderReconcilePreview). */
  .reconcile-view-toggle { display: flex; gap: 6px; margin-bottom: 12px; }
  .reconcile-view-toggle-btn {
    background: none;
    color: var(--ink-2);
    border: 1px solid var(--rule);
    padding: 4px 10px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 10.5px;
    letter-spacing: .04em;
    border-radius: 4px;
    cursor: pointer;
  }
  .reconcile-view-toggle-btn.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  .sources-disagree-note {
    display: block;
    margin-bottom: 12px;
    padding: 8px 10px;
    background: var(--bg);
    border: 1px solid var(--fail);
    border-radius: 4px;
    color: var(--fail);
    font-size: 12px;
    line-height: 1.5;
  }
  .reconcile-source-columns {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  .reconcile-source-card { display: flex; flex-direction: column; gap: 10px; }
  .reconcile-source-section {
    border: 1px solid var(--rule);
    border-radius: 4px;
    padding: 8px 10px;
  }
  .reconcile-source-section-head {
    font-family: "IBM Plex Mono", monospace;
    font-size: 10.5px;
    letter-spacing: .03em;
    color: var(--ink-3);
    margin-bottom: 4px;
  }
  .reconcile-source-section-content {
    white-space: pre-wrap;
    word-break: break-word;
    font-size: 12px;
    color: var(--ink-2);
    max-height: 140px;
    overflow-y: auto;
    margin: 0 0 8px;
  }
  .reconcile-source-section-actions { display: flex; gap: 8px; }

  /* ── C5 conflict panel (issue #443) — surfaces the LLM's own evidence
     (page_a_claim / page_b_claim / summary / suggested_action) wherever a
     C5 finding appears: the finding row AND the Reconcile modal, above the
     editable drafts. Shared by both via c5ConflictPanel(). */
  .c5-conflict-panel {
    margin: 8px 0 14px;
    padding: 10px 12px;
    background: var(--bg);
    border: 1px solid var(--rule);
    border-radius: 4px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .c5-conflict-row { font-size: 12.5px; color: var(--ink-2); line-height: 1.5; }
  .c5-conflict-label {
    font-family: "IBM Plex Mono", monospace;
    font-size: 10.5px;
    letter-spacing: .03em;
    color: var(--ink-3);
    margin-right: 5px;
  }
  .c5-expand-btn {
    background: none;
    border: none;
    padding: 0;
    margin-left: 4px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 10.5px;
    color: var(--accent);
    text-decoration: underline;
    text-underline-offset: 2px;
    cursor: pointer;
  }

  /* ── C4 collision dual resolution (tier-B S2, issue #378, ADR-0028) ──
     Both real Gated affordances. Reuses every .reconcile-* modal/column
     class above (the shape is identical: old-vs-editable preview + apply). */
  .collision-merge-btn, .collision-differentiate-btn {
    display: inline-flex; align-items: center; gap: 5px;
    background: var(--accent);
    color: #fff;
    border: 0;
    padding: 4px 10px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 10.5px;
    letter-spacing: .04em;
    border-radius: 4px;
    cursor: pointer;
    transition: opacity .15s ease;
  }
  .collision-merge-btn:hover:not(:disabled), .collision-differentiate-btn:hover:not(:disabled) { opacity: .82; }
  .collision-merge-btn:disabled, .collision-differentiate-btn:disabled { opacity: .45; cursor: not-allowed; }

  .collision-guard-failed {
    color: var(--fail);
    margin: 0 0 10px;
    font-size: 12.5px;
  }
  .collision-referrers {
    margin: 6px 0 0;
    padding-left: 18px;
    color: var(--fail);
    font-size: 12px;
  }

  /* Lint finding rows — extend .rec with a note subrow */
  .rec .note {
    grid-column: 2 / -1;
    font-size: 11.5px;
    color: var(--ink-3);
    margin-top: 2px;
    white-space: pre-wrap;
    word-break: break-word;
  }

  /* ── Curation Queue (Phase 15 S6, issue #174) ───────────── */
  .curation-queue {
    margin-top: 40px;
  }

  .queue-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }

  .queue-header-label {
    font-family: "IBM Plex Mono", monospace;
    font-size: 10.5px; letter-spacing: .08em; text-transform: uppercase;
    color: var(--ink-3);
  }

  .queue-refresh-btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: none;
    color: var(--ink-3);
    border: 1px solid var(--rule);
    padding: 4px 10px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 10.5px;
    letter-spacing: .04em;
    border-radius: 4px;
    cursor: pointer;
    margin-left: auto;
    transition: color .15s ease, border-color .15s ease;
  }
  .queue-refresh-btn:hover:not(:disabled) {
    color: var(--ink);
    border-color: var(--ink-3);
  }
  .queue-refresh-btn:disabled { opacity: .45; cursor: not-allowed; }

  .queue-section {
    margin-bottom: 24px;
  }

  .queue-section-head {
    font-family: "IBM Plex Mono", monospace;
    font-size: 10px; letter-spacing: .08em; text-transform: uppercase;
    color: var(--ink-3);
    padding: 8px 0 8px;
    border-bottom: 1px solid var(--rule);
    margin-bottom: 10px;
    display: flex; align-items: center; gap: 8px;
  }

  .queue-empty {
    padding: 14px 0;
    font-size: 13px;
    color: var(--ink-3);
    font-style: italic;
  }

  /* Per-section what-it-does one-liner (ADR-0021 legibility) */
  .queue-section-desc {
    font-size: 12px;
    color: var(--ink-3);
    margin: 0 0 10px;
    line-height: 1.45;
  }

  /* Promote-all batch action (tier-B S6, issue #382) — sits flush right of
     the C8 section-head label/count, same margin-left:auto technique as
     .queue-refresh-btn in .queue-header. */
  .queue-batch-action {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* One-shot Promote-all result banner (issue #382 AC — per-item skipped
     list). Cleared after a single render, mirrors .lint-batch-summary. */
  .promote-batch-summary {
    padding: 8px 0;
    font-size: 12px;
  }
  .promote-batch-skipped {
    margin: 6px 0 0;
    padding-left: 18px;
    color: var(--ink-3);
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    line-height: 1.6;
  }

  /* Draft card: bordered, full-width, body preview */
  .draft-card {
    border: 1px solid var(--rule);
    border-radius: 6px;
    background: var(--surface);
    overflow: hidden;
    margin-bottom: 10px;
  }

  .draft-card-head {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 12px 16px 10px;
    border-bottom: 1px solid var(--rule-2);
  }

  .draft-card-question {
    font-size: 13.5px;
    font-weight: 500;
    color: var(--ink);
    flex: 1;
    min-width: 0;
    line-height: 1.4;
  }

  .draft-card-meta {
    font-family: "IBM Plex Mono", monospace;
    font-size: 10.5px;
    color: var(--ink-4);
    flex-shrink: 0;
    padding-top: 2px;
    white-space: nowrap;
  }

  .draft-card-body {
    padding: 10px 16px;
    font-size: 13px;
    color: var(--ink-2);
    line-height: 1.55;
    white-space: pre-wrap;
    word-break: break-word;
    max-height: 160px;
    overflow-y: auto;
    border-bottom: 1px solid var(--rule-2);
  }

  .draft-card-sources {
    padding: 6px 16px 8px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    color: var(--ink-4);
    border-bottom: 1px solid var(--rule-2);
    display: flex; align-items: flex-start; gap: 6px; flex-wrap: wrap;
  }

  .draft-card-sources .src-label {
    color: var(--ink-3);
    flex-shrink: 0;
  }

  .draft-card-actions {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 16px;
  }

  .promote-btn {
    display: inline-flex; align-items: center; gap: 5px;
    background: var(--pass);
    color: #fff;
    border: 0;
    padding: 5px 12px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    letter-spacing: .04em;
    border-radius: 4px;
    cursor: pointer;
    transition: background .15s ease, opacity .15s ease;
  }
  .promote-btn:hover:not(:disabled) { background: #276a40; }
  .promote-btn:disabled { opacity: .45; cursor: not-allowed; }

  .discard-btn {
    display: inline-flex; align-items: center; gap: 5px;
    background: none;
    color: var(--fail);
    border: 1px solid var(--fail);
    padding: 5px 12px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    letter-spacing: .04em;
    border-radius: 4px;
    cursor: pointer;
    transition: background .15s ease, opacity .15s ease;
  }
  .discard-btn:hover:not(:disabled) { background: #fff0f0; }
  .discard-btn:disabled { opacity: .45; cursor: not-allowed; }

  .edit-btn {
    display: inline-flex; align-items: center; gap: 5px;
    background: none;
    color: var(--ink-3);
    border: 1px solid var(--rule);
    padding: 5px 12px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    letter-spacing: .04em;
    border-radius: 4px;
    cursor: pointer;
    transition: color .15s ease, border-color .15s ease, opacity .15s ease;
  }
  .edit-btn:hover:not(:disabled) { color: var(--ink); border-color: var(--ink-3); }
  .edit-btn:disabled { opacity: .45; cursor: not-allowed; }

  /* Gate legibility (issue #379 / ADR-0026): operator-language "what this
     button does" line, distinct from the section-level ADR-referencing
     description above the card list. */
  .draft-card-what-it-means {
    padding: 0 16px 8px;
    font-size: 11.5px;
    color: var(--ink-3);
    line-height: 1.4;
    font-style: italic;
  }

  .draft-card-edit-form {
    padding: 10px 16px;
    border-bottom: 1px solid var(--rule-2);
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .draft-card-edit-form label {
    font-family: "IBM Plex Mono", monospace;
    font-size: 10px; letter-spacing: .06em; text-transform: uppercase;
    color: var(--ink-3);
  }

  .draft-card-edit-form input[type="text"],
  .draft-card-edit-form textarea {
    width: 100%;
    box-sizing: border-box;
    font-family: inherit;
    font-size: 13px;
    color: var(--ink);
    background: var(--bg);
    border: 1px solid var(--rule);
    border-radius: 4px;
    padding: 6px 8px;
    resize: vertical;
  }

  .draft-card-edit-form textarea { min-height: 100px; line-height: 1.5; }

  .edit-validation-errors {
    margin: 0;
    padding: 8px 10px;
    background: #fff0f0;
    border: 1px solid var(--fail);
    border-radius: 4px;
    font-size: 12px;
    color: var(--fail);
    line-height: 1.5;
  }

  .edit-validation-errors ul { margin: 4px 0 0; padding-left: 18px; }

  .edit-form-actions { display: flex; align-items: center; gap: 8px; }

  .card-status-msg {
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    letter-spacing: .03em;
    margin-left: 8px;
    flex: 1;
  }
  .card-status-msg.ok   { color: var(--pass); }
  .card-status-msg.err  { color: var(--fail); }

  /* Flag card (C9 stale / C10 invalid). C9 offers Re-file (tier-B S4,
     issue #380) — never destructive: a failed re-ground writes nothing and
     the live page keeps serving; C10 offers Discard (inert only). */
  .flag-card {
    border: 1px solid var(--rule);
    border-radius: 6px;
    background: var(--surface);
    overflow: hidden;
    margin-bottom: 8px;
    padding: 10px 16px;
    display: grid;
    grid-template-columns: 24px 1fr auto;
    column-gap: 12px;
    align-items: start;
  }

  .flag-icon {
    font-size: 13px;
    color: var(--ink-4);
    padding-top: 2px;
    text-align: center;
  }

  .flag-body { min-width: 0; }

  .flag-slug {
    font-family: "IBM Plex Mono", monospace;
    font-size: 12px;
    color: var(--ink);
    font-weight: 500;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }

  .flag-hint {
    font-size: 12px;
    color: var(--ink-3);
    margin-top: 3px;
    line-height: 1.4;
  }

  .flag-actions { display: flex; align-items: flex-start; padding-top: 1px; }

  /* Full-width status row (issue #496): a long Re-file/Discard outcome
     message inside .flag-actions inflates the auto grid column's
     max-content, collapsing the 1fr body column to one word per line.
     The message lives on its own grid row spanning the whole card; the
     span keeps churning its own card-status-msg ok/err classes freely.
     :empty keeps the row invisible until there is something to say. */
  .flag-status-row { grid-column: 1 / -1; min-width: 0; }
  .flag-status-row .card-status-msg {
    display: block;
    flex: none;
    margin: 6px 0 0 36px; /* aligns under .flag-body: 24px icon col + 12px gap */
  }
  .flag-status-row .card-status-msg:empty { display: none; }

  /* Collapse the two-column split below 900px: single column, and the
     resource rail becomes an off-canvas drawer opened from the masthead
     hamburger (grey scrim, ease-in-out slide, X / scrim / Esc to close). The
     same #browser-section node serves both layouts — no JS re-render, so the
     open folder / open file survive a resize across the breakpoint. */
  @media (max-width: 899px) {
    .page { max-width: 680px; }
    .console-split { display: block; }
    .console-main { padding-right: 0; }
    .mast-hamburger { display: inline-flex; align-items: center; }

    .console-rail {
      position: fixed; top: 0; right: 0; bottom: 0;
      width: min(88vw, 420px);
      max-height: none;
      padding: 52px 22px calc(24px + env(safe-area-inset-bottom));
      background: var(--surface);
      border-left: 1px solid var(--rule);
      box-shadow: -10px 0 30px rgba(17, 17, 17, .12);
      transform: translateX(100%);
      transition: transform .28s cubic-bezier(.4, 0, .2, 1);
      z-index: 1000;
    }
    body.rail-open .console-rail { transform: none; }
    body.rail-open { overflow: hidden; }

    .rail-close {
      display: block;
      position: absolute; top: 14px; right: 16px;
      background: none; border: 1px solid var(--rule); border-radius: 4px;
      color: var(--ink-3); font-size: 13px; line-height: 1;
      padding: 6px 10px; min-height: 32px;
      transition: color .15s ease, border-color .15s ease;
    }
    .rail-close:hover { color: var(--ink); border-color: var(--ink-3); }

    .rail-scrim {
      display: block; position: fixed; inset: 0; z-index: 999;
      background: rgba(17, 17, 17, .34);
      opacity: 0; pointer-events: none;
      transition: opacity .28s ease;
    }
    body.rail-open .rail-scrim { opacity: 1; pointer-events: auto; }
  }

  @media (max-width: 540px) {
    .page { padding: 0 20px 48px; }
    .console-rail { width: min(92vw, 380px); }
    /* the masthead gains the hamburger on small screens — tighten the gap so
       logo + breadcrumb + lang toggle + reader + ☰ still fit a ~375px phone */
    .masthead { gap: 8px; }
  }

  /* ── Demo environment reset banner (ADR-0021) ───────── */
  /* Always visible — no display:none, no JS .visible toggle.
     Explains that the public demo is ephemeral and resets to
     the seeded KB periodically, so writes are not permanent. */
  .demo-reset-banner {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 16px;
    background: #f0f4ff;
    border: 1px solid #93b3e6;
    border-radius: 6px;
    margin-top: 20px;
    margin-bottom: 4px;
    font-size: 12.5px;
    color: #2a4080;
    line-height: 1.45;
  }
  .demo-reset-banner .demo-reset-icon {
    font-size: 14px;
    flex-shrink: 0;
    margin-top: 1px;
    color: #3b5daa;
  }
  .demo-reset-banner .demo-reset-text { flex: 1; }
  .demo-reset-banner strong { font-weight: 600; }
</style>
</head>
<body>
  <div class="page">
    <header class="masthead">
      <!-- §12.4: all text via textContent; no innerHTML -->
      <a class="mast-logo" href="/">
        <span>ask</span><span class="dot">.</span><span>Wiki</span><span class="amp">&amp;</span><span>RAG</span>
      </a>
      <span class="mast-sep">/</span>
      <span class="mast-page">console</span>
      <!-- zh/en Lint chrome toggle (issue #365) — label is set/updated by
           applyConsoleLang() below; this static "中文" is the pre-JS/no-JS
           fallback (default language is English). -->
      <button id="lang-toggle" class="mast-lang-toggle" type="button" aria-label="Toggle console language">中文</button>
      <a class="mast-reader" href="/">reader</a>
      <!-- Opens the Resource Browser as a drawer on small screens; hidden on
           desktop where the browser is a permanent right-hand rail. -->
      <button id="rail-toggle" class="mast-hamburger" type="button"
              aria-label="Open resource browser" aria-expanded="false"
              aria-controls="console-rail">&#9776;</button>
    </header>

    <!-- Demo environment reset banner (ADR-0021) — always visible, static HTML, no JS toggle.
         Changes made here are real (the endpoints are live) but ephemeral: the console
         resets to the committed seed on every deploy and on the ~2-day cron reset. -->
    <div class="demo-reset-banner" role="status" aria-label="Demo environment notice">
      <span class="demo-reset-icon">&#9432;</span>
      <!-- issue #498: strong/body split into two bound spans so the JS
           i18n toggle (bindText, see I18N_BOUND below) can retro-switch
           each in place while keeping the <strong> emphasis structure. -->
      <span class="demo-reset-text"><strong id="banner-demo-strong">Demo environment</strong><span id="banner-demo-text"> — changes are real but ephemeral. This console resets to the seeded knowledge base periodically (~2 days) and on each deploy.</span></span>
    </div>

    <!-- Daily budget usage display (issue #510) — populated on boot from the
         read-only, never-charging GET /healthz/budget probe (renderBudgetUsage,
         see Boot below). The ledger was previously invisible until a heavy
         request got a 503; this makes today's estimated spend visible ahead
         of that. -->
    <div id="budget-usage-banner" class="budget-usage-banner" role="status" aria-live="polite">
      <span class="budget-usage-icon">&#9432;</span>
      <span id="budget-usage-text" class="budget-usage-text">Loading budget…</span>
    </div>

    <!-- Staleness guard: warns when Ingest ran but Index hasn't been rebuilt (#173) -->
    <div id="staleness-banner" class="staleness-banner" role="alert" aria-live="polite">
      <span class="stale-icon">&#9888;</span>
      <span id="staleness-msg" class="stale-msg">Section Index may be stale — Ingest has run since the last Index build. Run the Index step to rebuild.</span>
    </div>

    <!-- Routed Coverage Fill context banner (tier-B S7, issue #383, ADR-0027):
         shown when a C1/C2 "Fill via Import" control is clicked, carrying the
         finding's context into the pipeline below. Text is set by JS
         (showCoverageFillBanner); this element is a pure navigation aid — it
         never triggers a request itself. -->
    <div id="coverage-fill-banner" class="coverage-fill-banner" role="status" aria-live="polite"></div>

    <!-- C3 Routed fix-the-Source context banner (issue #408, ADR-0029):
         shown when a C3 "Fix Source" control is clicked, carrying the
         finding's Source filename + unsupported_claims + a view-the-file
         control into the pipeline below. Populated by JS
         (showFixSourceBanner); this element is a pure navigation aid — it
         never triggers a request itself (ADR-0029 Invariant). -->
    <div id="fix-source-banner" class="fix-source-banner" role="status" aria-live="polite"></div>

    <!-- C5 fix-source BATCH panel (issue #538, ADR-0036 decisions 3-5):
         accumulates Source targets from the Reconcile modal's Source
         comparison "Fix this Source" entry points, across possibly several
         C5 findings. Unlike the single-target banners above, this is a
         multi-item checklist — the curator corrects every listed Source
         locally, then uploads them together; that ONE batch Upload drives
         ONE force re-ingest and ONE deep-audit (never a per-target stepper).
         Populated by JS (renderC5FixSourcePanel). -->
    <div id="c5-fix-source-panel" class="fix-source-batch-panel" role="status" aria-live="polite"></div>

    <!-- Two-column split (console flow | resource rail). The left column holds
         the whole operator flow; the right rail pins the Resource Browser so a
         file is always retrievable. Below 900px the rail collapses into the
         hamburger drawer (#console-rail is reused as-is — see CSS). -->
    <div class="console-split">
      <div class="console-main">
        <div id="pipeline-root"></div>

        <!-- RAG rebuild track: parallel to Wiki chain (#173) -->
        <div id="rag-track-root"></div>

        <!-- Hybrid dense rebuild track: operator-triggered full re-embed (ADR-0022, issue #348) -->
        <div id="hybrid-track-root"></div>

        <!-- Curation Queue: built by JS after Lint runs (Phase 15 S6, issue #174) -->
        <div id="curation-queue-root"></div>
      </div>

      <aside class="console-rail" id="console-rail" aria-label="Resource browser">
        <button type="button" class="rail-close" id="rail-close"
                aria-label="Close resource browser">&#10005;</button>
        <div id="browser-section">
          <!-- Resource browser built by JS below (Phase 15 S5, issue #171) -->
        </div>
      </aside>
    </div>
  </div>

  <!-- Grey scrim behind the resource-rail drawer (small screens only) -->
  <div class="rail-scrim" id="rail-scrim"></div>

<script>
"use strict";

/* ============================================================
   §12.4: textContent-only DOM helper — innerHTML is banned.
   Accepts: el(tag, props?, ...children)
   - props.class   → className
   - props.text    → textContent
   - props.html    → THROWS (banned)
   - props.on*     → addEventListener
   - other props   → setAttribute
   Children may be DOM nodes, strings, null/false (skipped).
   ============================================================ */
function el(tag, props) {
  var kids = Array.prototype.slice.call(arguments, 2);
  var n = document.createElement(tag);
  if (props) {
    var entries = Object.entries(props);
    for (var i = 0; i < entries.length; i++) {
      var k = entries[i][0], v = entries[i][1];
      if (v == null) continue;
      if (k === "class") n.className = v;
      else if (k === "text") n.textContent = v;
      else if (k === "html") throw new Error("innerHTML banned (CODING_STANDARD §12.4)");
      else if (k.startsWith("on") && typeof v === "function") n.addEventListener(k.slice(2).toLowerCase(), v);
      else n.setAttribute(k, v);
    }
  }
  for (var j = 0; j < kids.length; j++) {
    var kid = kids[j];
    if (kid == null || kid === false) continue;
    n.append(kid.nodeType ? kid : document.createTextNode(String(kid)));
  }
  return n;
}

/* ============================================================
   Pipeline step descriptors.

   Each step has:
     id      — machine key, used for CSS and state
     label   — display name in the stepper track
     desc    — one-line description shown in the step panel header
     run     — async function(setState) → fires the request + renders result
               setState(busy) enables/disables the button

   Steps declared in pipeline order. Later slices (Ingest #172, Index/Lint #173)
   replace the stub run() functions here with real implementations.
   ============================================================ */

/* ── Per-step result-card renderers ───────────────────────── */

/* Upload result card — matches Phase 15 S1 logic, now inside the stepper panel */
function renderUploadCard(results) {
  var chrome = LINT_CHROME[consoleLang];
  var written  = results.filter(function(r) { return r.status === "written";  }).length;
  var rejected = results.filter(function(r) { return r.status === "rejected"; }).length;
  var errors   = results.filter(function(r) { return r.status === "error";    }).length;

  var parts = [];
  if (written > 0)  parts.push(written  + " " + chrome.uploadWordWritten);
  if (rejected > 0) parts.push(rejected + " " + chrome.uploadWordRejected);
  if (errors > 0)   parts.push(errors   + " " + (errors !== 1 ? chrome.uploadWordErrors : chrome.uploadWordError));
  var summaryText = parts.join(" · ") || chrome.uploadZeroFiles;

  var badgeClass = errors > 0 ? "badge badge-fail"
                 : rejected > 0 ? "badge badge-warn"
                 : "badge badge-ok";

  var head = el("div", { class: "result-card-head" },
    el("span", { text: chrome.stepUploadLabel }),
    el("span", { text: "·" }),
    el("span", { class: badgeClass },
      el("span", { class: "dot" }),
      el("span", { text: summaryText })
    )
  );

  var rows = el("div");
  results.forEach(function(r, i) {
    var labelClass = "label label-" + r.status;
    var labelText  = r.status;
    var subtitle   = "";

    if (r.status === "written") {
      /* .md routes straight to docs/ (final Source — it SKIPS the Import step);
         .html/.txt/.pdf land in raw/ and still need Import to convert. Make
         that distinction explicit so a user who uploaded a .md sees it
         succeeded here, instead of looking for it (in vain) on the Import card. */
      var lastSeg = r.target_dir ? r.target_dir.split(/[/\\]/).filter(Boolean).pop() : "";
      if (lastSeg === "docs") {
        labelText = chrome.uploadInDocsLabel;
        subtitle  = chrome.uploadInDocsCrumb;
      } else {
        labelText = chrome.uploadStagedLabel;
        subtitle  = chrome.uploadStagedCrumb;
      }
    } else if ((r.status === "rejected" || r.status === "error") && r.reason) {
      subtitle = r.reason;
    }

    var bodyEl = el("div", { class: "body" },
      el("div", { class: "id", text: r.filename })
    );
    if (subtitle) bodyEl.append(el("div", { class: "crumb", text: subtitle }));

    rows.append(el("div", { class: "rec" },
      el("div", { class: "num", text: String(i + 1).padStart(2, "0") }),
      bodyEl,
      el("div", { class: labelClass, text: labelText })
    ));
  });

  return el("div", { class: "result-card" }, head, rows);
}

/* Import result card — renders ImportResponse (imported_sources + skipped_sources
   + failed_sources). issue #447: failures render FIRST (not buried after every
   success row) with a prominent tinted/accented treatment, and a NoTextLayer
   failure offers a guarded Transcribe action that turns its OWN row into a
   normal success row in place on completion — no full card re-fetch, since
   ImportResponse is a one-shot batch result with nothing to re-GET. */
function renderImportCard(data) {
  var chrome = LINT_CHROME[consoleLang];
  var imported = data.imported_sources || [];
  var skipped  = data.skipped_sources  || [];
  var failed   = data.failed_sources   || [];

  var badgeTextEl = el("span", { text: "" });
  var badgeEl = el("span", { class: "badge" }, el("span", { class: "dot" }), badgeTextEl);

  /* Recomputed on load AND after a Transcribe success turns a failure into a
     success — keeps the head badge/counts honest without a full re-render. */
  function updateSummary() {
    var parts = [];
    if (imported.length > 0) parts.push(imported.length + " " + chrome.importCardImported);
    if (skipped.length > 0)  parts.push(skipped.length  + " " + chrome.importCardSkipped);
    if (failed.length > 0)   parts.push(failed.length   + " " + chrome.importCardFailed);
    badgeTextEl.textContent = parts.join(" · ") || chrome.importCardZeroFiles;
    badgeEl.className = failed.length > 0  ? "badge badge-fail"
                      : skipped.length > 0 ? "badge badge-warn"
                      : "badge badge-ok";
  }
  updateSummary();

  var head = el("div", { class: "result-card-head" },
    el("span", { text: chrome.importCardWord }),
    el("span", { text: "·" }),
    badgeEl
  );

  var rows = el("div");
  var rowIndex = 0;

  /* Helper: build a row from ImportSourceResultSchema (imported / skipped) */
  function makeSourceRow(r) {
    rowIndex++;
    /* raw_path → docs_path breadcrumb */
    var rawName  = r.raw_path  ? r.raw_path.split(/[/\\]/).pop()  : "";
    var docsName = r.docs_path ? r.docs_path.split(/[/\\]/).pop() : "";
    var subtitle = rawName && docsName ? rawName + " → " + docsName : rawName || docsName;

    var bodyEl = el("div", { class: "body" },
      el("div", { class: "id", text: rawName || r.raw_path })
    );
    if (r.original_format) {
      bodyEl.append(el("div", { class: "crumb", text: subtitle + " · " + r.original_format }));
    } else if (subtitle) {
      bodyEl.append(el("div", { class: "crumb", text: subtitle }));
    }

    var labelClass = "label label-" + r.status; /* created | updated | skipped */
    rows.append(el("div", { class: "rec" },
      el("div", { class: "num", text: String(rowIndex).padStart(2, "0") }),
      bodyEl,
      el("div", { class: labelClass, text: r.status })
    ));
  }

  /* Helper: build a row from ImportFailureSchema — prominent treatment
     (issue #447): the row itself carries .rec-failed (tinted background +
     accent bar), and shows the error_type as a small badge ALONGSIDE the
     full error_message, never one in place of the other. A NoTextLayer
     failure additionally offers a guarded Transcribe action; on success the
     row mutates itself into a normal success row in place (label, id, crumb)
     and the new doc feeds lastImportedDocFilenames so Ingest picks it up,
     exactly like a normal Import success would. */
  function makeFailureRow(f) {
    rowIndex++;
    var rawName = f.raw_path ? f.raw_path.split(/[/\\]/).pop() : f.raw_path;
    var idEl    = el("div", { class: "id", text: rawName || f.raw_path });
    var crumbEl = el("div", { class: "crumb" },
      el("span", { class: "error-type", text: f.error_type }),
      document.createTextNode(f.error_message || "")
    );
    var bodyEl  = el("div", { class: "body" }, idEl, crumbEl);
    var labelEl = el("div", { class: "label label-failed", text: chrome.importCardFailedLabel });
    var rowEl   = el("div", { class: "rec rec-failed" },
      el("div", { class: "num", text: String(rowIndex).padStart(2, "0") }),
      bodyEl,
      labelEl
    );

    if (f.error_type === "NoTextLayer" && rawName) {
      var actionsEl = transcribeAction(rawName, function(result) {
        /* Turn THIS row into a normal success row in place, and drop the
           now-irrelevant Transcribe action (issue #447: a leftover disabled
           button under a success row would be dead, confusing chrome). */
        var docsName = result.docs_path ? result.docs_path.split(/[/\\]/).pop() : "";
        rowEl.classList.remove("rec-failed");
        idEl.textContent = docsName || rawName;
        crumbEl.replaceChildren(document.createTextNode(
          rawName + " → " + docsName + " · " + LINT_CHROME[consoleLang].transcribeSuccess
        ));
        labelEl.className = "label label-" + result.status; /* created | updated | skipped */
        labelEl.textContent = result.status;
        actionsEl.remove();

        failed.splice(failed.indexOf(f), 1);
        imported.push({ raw_path: f.raw_path, docs_path: result.docs_path, status: result.status });
        updateSummary();

        if (docsName) {
          if (!lastImportedDocFilenames) lastImportedDocFilenames = [];
          if (lastImportedDocFilenames.indexOf(docsName) === -1) {
            lastImportedDocFilenames.push(docsName);
          }
        }
      });
      bodyEl.append(actionsEl);
    }

    rows.append(rowEl);
  }

  failed.forEach(makeFailureRow);
  imported.forEach(makeSourceRow);
  skipped.forEach(makeSourceRow);

  return el("div", { class: "result-card" }, head, rows);
}

/* ── Transcribe action (issue #447, ADR-0032) ─────────────────────────────
   Offered on a NoTextLayer Import failure row. Uses the SAME async
   batch+poll job #459 built (POST /wiki/transcribe/batch + GET
   .../jobs/{job_id}) rather than the synchronous POST /wiki/transcribe,
   because only the job status exposes pages_done/pages_total — the real,
   server-owned progress data the confirm modal's progress bar renders
   (CODING_STANDARD §12.8 bans a CLIENT-GUESSED percentage, not a real
   server-reported count — the same exception that already authorises the
   pipeline's own "Batch k/N" indicator). Only one Transcribe run at a time
   (mirrors the Lint card's remediationInFlight guard). */
var transcribeInFlight = false;
/* True while ANY row's confirm modal is on screen (pre-confirm included,
   when transcribeInFlight is still false) — a sibling row's Transcribe click
   during that window used to stack a second confirm modal (issue #476 L1). */
var transcribeModalOpen = false;

function transcribeAction(source, onSuccess) {
  var btn = el("button", { class: "transcribe-btn", type: "button",
    text: LINT_CHROME[consoleLang].transcribe });
  var statusMsgEl = el("span", { class: "card-status-msg" });

  btn.addEventListener("click", function() {
    if (btn.disabled || transcribeInFlight) return;
    if (transcribeModalOpen) {
