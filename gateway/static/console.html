/* Applies consoleLang to <html lang> (accessibility) and the header toggle
   button's own label. Looked up fresh by id each call rather than a cached
   reference — it is called once at boot and again on every toggle click, so
   there is no hot-path cost to avoiding a second module-level DOM handle. */
function applyConsoleLang() {
  document.documentElement.lang = consoleLang === "zh" ? "zh-Hant" : "en";
  var btn = document.getElementById("lang-toggle");
  if (btn) btn.textContent = LINT_CHROME[consoleLang].langToggleLabel;
}

/* ── In-flight guard + durability notice (issue #364) ──────────────
   remediationInFlight is true while ANY Direct Remediation request (single
   row or batch) is running. It drives two things: (1) every remediation
   button on the Lint card disables its siblings while one is in flight —
   no double-submit (re-clicking mid-flight would just repeat a forced
   re-ingest at redundant LLM cost, since /ingest is idempotent by
   hash-skip and _index_lock serialises writes server-side; the guard saves
   cost/confusion, it is not what guarantees correctness — ADR-0023);
   (2) a native beforeunload confirm while the flag is true. POST /ingest
   is synchronous and completes server-side under _index_lock regardless of
   whether the client stays connected (ADR-0023 "durable across
   disconnect") — so this is a SOFT accidental-navigation guard, never a
   "you'll corrupt data" warning; browsers render their own generic prompt
   text (custom beforeunload messages have been ignored since ~2016), and
   nothing else in this file frames a refresh as destructive. */
var remediationInFlight = false;
var lastBatchSummary = null;

window.addEventListener("beforeunload", function(e) {
  if (!remediationInFlight) return;
  e.preventDefault();
  e.returnValue = "";
});

/* ── Remediation requests — thin wrappers around the *existing* endpoints
   (ADR-0023: zero new endpoints). Each resolves/rejects with the parsed
   JSON body (or null for a 204), never re-implementing server eligibility
   decisions (§12.5) — a 409 from Discard still surfaces as a rejection the
   caller renders verbatim. */
function ingestRemediationRequest(source, force) {
  var payload = { source: source };
  if (force) payload.force = true;
  return fetch("/wiki/ingest", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload),
  }).then(function(resp) {
    if (!resp.ok) return resp.text().then(function(t) { throw new Error("HTTP " + resp.status + ": " + t); });
    return resp.json();
  });
}

function discardRemediationRequest(slug) {
  return fetch("/wiki/qa/" + encodeURIComponent(slug), { method: "DELETE" })
    .then(function(resp) {
      if (resp.status === 409) {
        throw new Error("Cannot discard: page is live (status=live). Use Re-ingest to refresh it instead.");
      }
      if (!resp.ok) {
        return resp.text().then(function(t) { throw new Error("HTTP " + resp.status + ": " + t); });
      }
      return null;
    });
}

/* Batch variant of ingestRemediationRequest — the Freshness axis-level and
   C6 check-level "Re-ingest all" buttons collapse N per-row calls into this
   ONE POST /ingest {sources:[...], force} call (issue #364 / ADR-0023's
   N -> 1 batch invariant; mirrors the existing drop-batch path's
   single-call rule, §12.8 / the #54 used_slugs guarantee). */
function batchIngestRemediationRequest(sources, force) {
  var payload = { sources: sources };
  if (force) payload.force = true;
  return fetch("/wiki/ingest", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload),
  }).then(function(resp) {
    if (!resp.ok) return resp.text().then(function(t) { throw new Error("HTTP " + resp.status + ": " + t); });
    return resp.json();
  });
}

/* De-duplicated source / slug lists for a batch call. A finding with no
   recorded source (lint.py's source="" case) is skipped — same honesty
   guard as the per-row reingestAction: no click that can only error
   (issue #364). */
function dedupeSourceList(items) {
  var seen = {};
  var out = [];
  items.forEach(function(item) {
    if (item.source && !seen[item.source]) { seen[item.source] = true; out.push(item.source); }
  });
  return out;
}

function dedupeSlugList(items) {
  var seen = {};
  var out = [];
  items.forEach(function(item) {
    if (item.page_slug && !seen[item.page_slug]) { seen[item.page_slug] = true; out.push(item.page_slug); }
  });
  return out;
}

/* Partial-failure summary for a completed C6/C3 batch — mirrors
   renderIngestCard's per-page grounding derivation (source -> pages_written
   -> slug -> pages_with_failed_grounding). failed_sources covers a harder
   failure (source not found/parseable); a source counts as "still failing"
   if either applies (issue #364 AC example: "re-ingested 5: 4 ok, 1 still
   failing"). */
function ingestPartialSummary(sources, data) {
  var results = data.results || [];
  var groundingFailedPages = data.pages_with_failed_grounding || [];
  var stillFailing = {};
  (data.failed_sources || []).forEach(function(s) { stillFailing[s] = true; });
  results.forEach(function(r) {
    var pages = r.pages_written || [];
    var anyFailed = pages.some(function(p) {
      var slug = p.split("/").pop().replace(/\.md$/, "");
      return groundingFailedPages.indexOf(slug) !== -1;
    });
    if (anyFailed) stillFailing[r.source] = true;
  });
  var failedCount = Object.keys(stillFailing).length;
  var okCount = Math.max(sources.length - failedCount, 0);
  return "re-ingested " + sources.length + ": " + okCount + " ok, " +
    failedCount + " still failing";
}

/* Shared batch-completion path — re-lints (fast, include_c5=false path)
   and re-renders both the Lint card and the Curation Queue (issue #363
   AC, unchanged), then stashes the partial-failure summary so the
   re-rendered Lint card can show it as a one-shot banner (the calling
   button's own status message node is destroyed by the replaceChildren
   re-render below — issue #364 AC "a partial-failure summary is shown").
   siblingButtons is re-enabled if the re-lint call itself fails (rare: the
   batch's own mutation already succeeded and is durable — only the
   read-back failed) so the card is not left permanently disabled with no
   way to retry short of a full page reload. */
function finishBatchRemediation(summaryText, resultEl, siblingButtons) {
  lastBatchSummary = summaryText;
  // Keep remediationInFlight true until the re-lint read-back resolves —
  // matching the per-row runLintRemediation path — so the beforeunload confirm
  // stays armed for the whole batch loop, including the re-lint window (issue
  // #364 verify finding: clearing it before the fetch left a request in flight
  // with the unload guard already disabled).
  fetch("/wiki/lint?include_c5=false", { method: "POST" })
    .then(function(resp) {
      if (!resp.ok) return resp.text().then(function(t) { throw new Error("HTTP " + resp.status + ": " + t); });
      return resp.json();
    })
    .then(function(data) {
      remediationInFlight = false;
      lastLintData = data;
      if (resultEl) resultEl.replaceChildren(renderLintCard(data, resultEl));
      renderCurationQueue(document.getElementById("curation-queue-root"), data);
    })
    .catch(function(err) {
      remediationInFlight = false;
      lastBatchSummary = summaryText + " (re-lint failed: " + (err.message || String(err)) + " — re-run Lint to refresh)";
      (siblingButtons || []).forEach(function(b) { b.disabled = false; });
    });
}

/* ── Shared remediation runner ────────────────────────────────
   On success, re-runs the fast (include_c5=false) lint path and re-renders
   BOTH the Lint card and the Curation Queue, so the fixed finding
   disappears and a still-failing one reappears (issue #363 AC). In-flight
   guard: every remediation button on the card is disabled while this
   request runs, not just the one clicked (issue #364 — the shared
   remediationInFlight flag + allButtons list, which also drives the
   beforeunload confirm). The fix itself is durable server-side across a
   disconnect (sync /ingest under _index_lock, ADR-0023) — a network error
   here just means the status message failed to update, not that the fix
   was lost. */
function runLintRemediation(requestPromise, btn, statusMsgEl, resultEl, siblingButtons) {
  // siblingButtons (issue #364): every remediation button on the Lint card,
  // so an in-flight remediation — single-row or batch — disables the whole
  // card's buttons, not just the one clicked (no double-submit).
  var buttons = siblingButtons || [btn];
  remediationInFlight = true;
  buttons.forEach(function(b) { b.disabled = true; });
  statusMsgEl.replaceChildren(el("span", { class: "spinner" }), document.createTextNode("Working…"));
  statusMsgEl.className = "card-status-msg";

  requestPromise
    .then(function() {
      return fetch("/wiki/lint?include_c5=false", { method: "POST" });
    })
    .then(function(resp) {
      if (!resp.ok) return resp.text().then(function(t) { throw new Error("HTTP " + resp.status + ": " + t); });
      return resp.json();
    })
    .then(function(data) {
      remediationInFlight = false;
      lastLintData = data;
      if (resultEl) resultEl.replaceChildren(renderLintCard(data, resultEl));
      renderCurationQueue(document.getElementById("curation-queue-root"), data);
    })
    .catch(function(err) {
      remediationInFlight = false;
      statusMsgEl.textContent = "Error: " + (err.message || String(err));
      statusMsgEl.className = "card-status-msg err";
      buttons.forEach(function(b) { b.disabled = false; });
    });
}

/* Lint result card — renders LintResponse findings grouped by Lint Axis
   (issue #363), each check labelled, with per-row Direct Remediation
   buttons (C6/C3 Re-ingest, C10 Discard) and a disabled tier-B affordance
   on Authored-tier findings (C5/C4/C1/C2). ``resultEl`` is the Lint step's
   own result container — passed through so a remediation button's success
   handler can re-render this same card in place. */
function renderLintCard(data, resultEl) {
  var summary  = data.summary  || {};
  var findings = data.findings || {};
  var checkErrors = data.check_errors || {};

  var total       = summary.total_findings != null ? summary.total_findings : "?";
  var badgeClass  = total === 0 ? "badge badge-ok" : "badge badge-warn";
  var badgeLabel  = total === "?" ? "?" : (total + " finding" + (total !== 1 ? "s" : ""));

  var head = el("div", { class: "result-card-head" },
    el("span", { text: "Lint" }),
    el("span", { text: "·" }),
    el("span", { class: badgeClass },
      el("span", { class: "dot" }),
      el("span", { text: badgeLabel })
    )
  );

  var bodyEl = el("div");

  /* Batch-remediation summary banner (issue #364) — one-shot: cleared
     immediately after being shown so it does not linger across an
     unrelated later re-render (e.g. the Refresh button). */
  if (lastBatchSummary) {
    bodyEl.append(el("div", { class: "lint-batch-summary", text: lastBatchSummary }));
    lastBatchSummary = null;
  }

  /* Every clickable remediation button this card renders (per-row AND
     batch) — the in-flight guard disables the whole set while any one of
     them is running (issue #364). Permanently-disabled affordances (the
     empty-source guard, the Authored tier-B button) are never pushed here
     since they must never become clickable. */
  var allButtons = [];

  /* Helper: emit an axis section heading. batchBtnEl (optional) renders an
     axis-level batch action flush right (issue #364 — Freshness only).
     Display text is bilingual (issue #365) — LINT_AXIS_LABEL_ZH mirrors
     markdown_kb/app/lint.py's zh strings; the axis identifier itself
     (``axis``) stays English, only its rendered label switches. */
  function axisHead(axis, batchBtnEl) {
    var label = consoleLang === "zh" ? LINT_AXIS_LABEL_ZH[axis] : axis;
    return el("div", { class: "lint-axis-head" },
      el("span", { text: label }),
      batchBtnEl || null
    );
  }

  /* Helper: emit a check group heading, e.g. "C6 stale (2)". batchBtnEl
     (optional) renders a check-level batch action flush right (issue #364
     — C6 "Re-ingest all", C10 "Discard all"). Check label is bilingual
     (issue #365) — LINT_CHECK_LABEL_ZH mirrors LintCheckMeta.label_zh; the
     code itself (e.g. "C6") is never translated. */
  function checkHead(code, count, batchBtnEl) {
    var meta = LINT_CHECK_META[code];
    var label = consoleLang === "zh" ? LINT_CHECK_LABEL_ZH[code] : meta.label;
    return el("div", { class: "lint-group-head" },
      el("span", { text: code + " " + label + " (" + count + ")" }),
      batchBtnEl || null
    );
  }

  /* Helper: emit one finding row. actionsEl (optional) is appended inside
     the body cell, below the id/crumb text, so the existing 3-column .rec
     grid used by every other result card stays untouched. */
  function findingRow(idx, title, subtitle, labelText, labelClass, actionsEl) {
    var numStr = String(idx).padStart(2, "0");
    var rowBodyEl = el("div", { class: "body" },
      el("div", { class: "id", text: title })
    );
    if (subtitle) rowBodyEl.append(el("div", { class: "crumb", text: subtitle }));
    if (actionsEl) rowBodyEl.append(actionsEl);
    return el("div", { class: "rec" },
      el("div", { class: "num",    text: numStr }),
      rowBodyEl,
      el("div", { class: "label " + labelClass, text: labelText })
    );
  }

  /* Disabled "tier B" affordance for Authored-tier rows — visible, never
     actionable (ADR-0023: Authored Remediation is out of tier-A scope).
     Text is bilingual (issue #365) via LINT_CHROME. */
  function tierBAffordance() {
    return el("div", { class: "lint-row-actions" },
      el("button", { class: "tier-b-btn", type: "button", disabled: "", text: LINT_CHROME[consoleLang].tierB })
    );
  }

  /* ── C5 Reconcile — the flagship Gated (Authored) remediation (tier-B S1,
     issue #376, ADR-0028). Opens a stateless two-phase flow: generate a
     grounded draft (nothing written yet) → side-by-side old-vs-editable-
     draft preview → apply re-verifies grounding on the EXACT submitted
     content and refuses honestly (409 stale draft, 422 ungrounded) rather
     than silently retrying. C4/C1/C2 still render tierBAffordance() above —
     only C5 ships a real affordance this slice. */
  function reconcileAction(pageA, pageB) {
    var btn = el("button", { class: "reconcile-btn", type: "button",
      text: LINT_CHROME[consoleLang].reconcile });
    allButtons.push(btn);
    btn.addEventListener("click", function() {
      if (btn.disabled || remediationInFlight) return;
      openReconcileModal(pageA, pageB, resultEl, allButtons);
    });
    return el("div", { class: "lint-row-actions" }, btn);
  }

  /* Re-ingest / Re-ingest (retry) action for a C6/C3 finding.
     C3 MUST send force:true — omitting it lets hash-skip (#93) no-op the
     retry into a false fix (ADR-0023 Invariant / CODING_STANDARD §12.8).
     Button text + the empty-source note are bilingual (issue #365). */
  function reingestAction(source, retry) {
    var btn = el("button", { class: "reingest-btn", type: "button",
      text: retry ? LINT_CHROME[consoleLang].reingestRetry : LINT_CHROME[consoleLang].reingest });
    var statusMsgEl = el("span", { class: "card-status-msg" });
    // A finding can carry no source (e.g. a failed_grounding page whose
    // frontmatter.sources is empty — lint.py records source=""). There is
    // nothing to re-ingest, and POST /wiki/ingest of "" fails server-side, so
    // disable the button and say why rather than offering a click that can only
    // error (ADR-0023 "honest, not alarmist" — no false affordance).
    if (!source) {
      btn.disabled = true;
      statusMsgEl.textContent = LINT_CHROME[consoleLang].noSource;
      return el("div", { class: "lint-row-actions" }, btn, statusMsgEl);
    }
    allButtons.push(btn);
    btn.addEventListener("click", function() {
      if (btn.disabled) return;
      runLintRemediation(ingestRemediationRequest(source, retry === true), btn, statusMsgEl, resultEl, allButtons);
    });
    return el("div", { class: "lint-row-actions" }, btn, statusMsgEl);
  }

  /* Discard action for a C10 finding — DELETE /wiki/qa/{slug}, server-gated
     (refuses status:live with 409; §12.5). Button text is bilingual
     (issue #365). */
  function discardAction(slug) {
    var btn = el("button", { class: "discard-btn", type: "button", text: LINT_CHROME[consoleLang].discard });
    var statusMsgEl = el("span", { class: "card-status-msg" });
    allButtons.push(btn);
    btn.addEventListener("click", function() {
      if (btn.disabled) return;
      runLintRemediation(discardRemediationRequest(slug), btn, statusMsgEl, resultEl, allButtons);
    });
    return el("div", { class: "lint-row-actions" }, btn, statusMsgEl);
  }

  /* "Re-ingest all" batch action — collapses N C6/C3 rows into a single
     POST /ingest {sources, force} call (issue #364; Direct-tier-only,
     ADR-0023 Invariant). Reused for both the C6 check-level button (force
     mirrors the per-row C6 action: false) and the Freshness axis-level
     button (C6∪C3, force:true — mandatory because C3 sources are mixed in;
     ADR-0023 Invariant). extraClass distinguishes the two call sites in the
     DOM (structural test anchor). Button text is bilingual (issue #365). */
  function reingestAllAction(sources, force, extraClass) {
    var btn = el("button", { class: "reingest-btn " + extraClass, type: "button",
      text: LINT_CHROME[consoleLang].reingestAll + " (" + sources.length + ")" });
    var statusMsgEl = el("span", { class: "card-status-msg" });
    allButtons.push(btn);
    btn.addEventListener("click", function() {
      if (btn.disabled || remediationInFlight) return;
      remediationInFlight = true;
      allButtons.forEach(function(b) { b.disabled = true; });
      statusMsgEl.replaceChildren(
        el("span", { class: "spinner" }),
        document.createTextNode(
          "Re-ingesting " + sources.length + " source" + (sources.length !== 1 ? "s" : "") +
          "… this may take a moment"
        )
      );
      statusMsgEl.className = "card-status-msg";

      batchIngestRemediationRequest(sources, force)
        .then(function(data) {
          finishBatchRemediation(ingestPartialSummary(sources, data), resultEl, allButtons);
        })
        .catch(function(err) {
          remediationInFlight = false;
          allButtons.forEach(function(b) { b.disabled = false; });
          statusMsgEl.textContent = "Error: " + (err.message || String(err));
          statusMsgEl.className = "card-status-msg err";
        });
    });
    return el("div", { class: "lint-row-actions" }, btn, statusMsgEl);
  }

  /* "Discard all" batch action (C10) — no batch-delete endpoint exists
     (ADR-0023 Consequences), so this fires the individual
     DELETE /wiki/qa/{slug} calls sequentially behind one click/button — an
     N -> 1 *click*, not an N -> 1 *call* (unlike the ingest batches above,
     which share cross-item used_slugs state that a client loop would
     break — DELETE /qa has no such shared state, so looping here is safe).
     Button text is bilingual (issue #365): built with the English string
     literally (kept verbatim so it stays a stable anchor for the existing
     S4 structural test), then overwritten via the same imperative
     .textContent pattern this file already uses elsewhere (e.g. the status
     message updates below) when the zh chrome is active. */
  function discardAllAction(slugs) {
    var btn = el("button", { class: "discard-btn check-batch-btn", type: "button",
      text: "Discard all (" + slugs.length + ")" });
    if (consoleLang === "zh") {
      btn.textContent = LINT_CHROME.zh.discardAll + " (" + slugs.length + ")";
    }
    var statusMsgEl = el("span", { class: "card-status-msg" });
    allButtons.push(btn);
    btn.addEventListener("click", function() {
      if (btn.disabled || remediationInFlight) return;
      remediationInFlight = true;
      allButtons.forEach(function(b) { b.disabled = true; });
      statusMsgEl.replaceChildren(
        el("span", { class: "spinner" }),
        document.createTextNode(
          "Discarding " + slugs.length + " page" + (slugs.length !== 1 ? "s" : "") +
          "… this may take a moment"
        )
      );
      statusMsgEl.className = "card-status-msg";

      var okCount = 0, failCount = 0;
      function next(i) {
        if (i >= slugs.length) {
          var summary = "discarded " + slugs.length + ": " + okCount + " ok, " + failCount + " still failing";
          finishBatchRemediation(summary, resultEl, allButtons);
          return;
        }
        discardRemediationRequest(slugs[i])
          .then(function() { okCount++; next(i + 1); })
          .catch(function() { failCount++; next(i + 1); });
      }
      next(0);
    });
    return el("div", { class: "lint-row-actions" }, btn, statusMsgEl);
  }

  /* Per-check row renderers, keyed by code — driven by the axis loop below.
     C8 and C9 render no actionsEl: C8's Promote/Discard stay in the
     dedicated Curation Queue block (issue #363 AC); C9 is deferred. */
  var ROW_RENDERERS = {
    C11: function(i, f) {
      return findingRow(i, f.page_slug,
        "missing: " + (f.missing_sources || []).join(", "),
        "orphan", "label-failed");
    },
    C6: function(i, f) {
      var drift = f.drift_days != null ? f.drift_days.toFixed(1) + "d drift" : "";
      return findingRow(i, f.page_slug, f.source + (drift ? " · " + drift : ""),
        "stale", "label-updated", reingestAction(f.source, false));
    },
    C3: function(i, f) {
      return findingRow(i, f.page_slug, f.reason,
        "grounding", "label-failed", reingestAction(f.source, true));
    },
    C5: function(i, f) {
      return findingRow(i, f.page_a + " / " + f.page_b,
        f.severity + ": " + (f.summary || "").slice(0, 80),
        f.severity, f.severity === "direct" ? "label-failed" : "label-updated",
        reconcileAction(f.page_a, f.page_b));
    },
    C4: function(i, f) {
      return findingRow(i, f.base_slug, (f.pages_in_group || []).join(", "),
        "collision", "label-updated", tierBAffordance());
    },
    C1: function(i, f) {
      return findingRow(i, f.query_canonical,
        f.reason + " · " + f.hit_count + " hit" + (f.hit_count !== 1 ? "s" : ""),
        "gap", "label-skipped", tierBAffordance());
    },
    C2: function(i, f) {
      return findingRow(i, f.slug,
        f.mention_count + " mention" + (f.mention_count !== 1 ? "s" : "") +
        " · " + (f.referenced_by || []).slice(0, 3).join(", "),
        "red-link", "label-failed", tierBAffordance());
    },
    C8: function(i, f) {
      return findingRow(i, f.slug, f.question, "count:" + f.count, "label-created");
    },
    C10: function(i, f) {
      return findingRow(i, f.page_slug, f.property_name + " = " + f.offending_value,
        "invalid", "label-failed", discardAction(f.page_slug));
    },
    C9: function(i, f) {
      return findingRow(i, f.page_slug, f.max_drift_days.toFixed(1) + "d drift",
        "stale-qa", "label-updated");
    },
  };

  /* ── Axis-grouped rendering (issue #363 — reuses S1's LINT_AXIS_ORDER).
     An axis header (and its checks) is skipped entirely when every check
     under it has zero findings — matching this card's existing skip-empty
     convention (the written lint-report.md uses a placeholder-text
     convention instead; this is a UI-only difference, see S1).

     Batch buttons (issue #364) are Direct-tier-only (ADR-0023 Invariant):
     C6 gets a check-level "Re-ingest all"; Freshness gets an axis-level
     "Re-ingest all" over C6∪C3 (force:true, mandatory); C10 gets a
     check-level "Discard all". Lifecycle gets no axis-level button
     (promote/delete are different intents), and C8's Promote-all is
     explicitly deferred (no batch-promote endpoint — ADR-0023
     Consequences), so C10 is the only Lifecycle check-level batch shipped
     here. Coherence/Coverage (Authored tier) get no batch at all — nothing
     below wires one for those axes, so the omission is structural. */
  // Tracks real findings separately from bodyEl.children.length (issue #364
  // — the batch summary banner is also a bodyEl child, and must not by
  // itself suppress the "wiki is clean" message below when a batch just
  // fixed everything).
  var renderedAnyFindings = false;

  LINT_AXIS_ORDER.forEach(function(axis) {
    var axisBody = [];
    var freshnessSources = {}; // dedupe set for the Freshness axis-level batch

    AXIS_CHECK_CODES[axis].forEach(function(code) {
      var meta = LINT_CHECK_META[code];
      var items = findings[meta.findingsKey];
      if (!items || items.length === 0) return;

      var checkBatchBtnEl = null;
      if (code === "C6") {
        var c6Sources = dedupeSourceList(items);
        if (c6Sources.length > 0) checkBatchBtnEl = reingestAllAction(c6Sources, false, "check-batch-btn");
      } else if (code === "C10") {
        var c10Slugs = dedupeSlugList(items);
        if (c10Slugs.length > 0) checkBatchBtnEl = discardAllAction(c10Slugs);
      }
      axisBody.push(checkHead(code, items.length, checkBatchBtnEl));
      items.forEach(function(item, i) { axisBody.push(ROW_RENDERERS[code](i + 1, item)); });

      if (axis === "Freshness" && (code === "C6" || code === "C3")) {
        items.forEach(function(item) { if (item.source) freshnessSources[item.source] = true; });
      }
    });
    if (axisBody.length === 0) return;

    var axisBatchBtnEl = null;
    if (axis === "Freshness") {
      var freshnessSourceList = Object.keys(freshnessSources);
      if (freshnessSourceList.length > 0) {
        axisBatchBtnEl = reingestAllAction(freshnessSourceList, true, "axis-batch-btn");
      }
    }
    renderedAnyFindings = true;
    bodyEl.append(axisHead(axis, axisBatchBtnEl));
    axisBody.forEach(function(node) { bodyEl.append(node); });
  });

  /* Check errors — not axis-scoped, surfaced after the axis groups.
     Header text is bilingual (issue #365). */
  var errKeys = Object.keys(checkErrors);
  if (errKeys.length > 0) {
    renderedAnyFindings = true;
    bodyEl.append(el("div", { class: "lint-group-head", text: LINT_CHROME[consoleLang].checkErrors + " (" + errKeys.length + ")" }));
    errKeys.forEach(function(k, i) {
      bodyEl.append(findingRow(i + 1, k, checkErrors[k], "error", "label-failed"));
    });
  }

  /* No findings at all — empty-state text is bilingual (issue #365) */
  if (!renderedAnyFindings) {
    bodyEl.append(el("div", { style: "padding:12px 16px; font-size:13px; color:var(--pass);",
      text: LINT_CHROME[consoleLang].noFindings }));
  }

  return el("div", { class: "result-card" }, head, bodyEl);
}

/* ── C5 Reconcile modal (tier-B S1, issue #376, ADR-0028) ────────────────
   POST /wiki/pages/reconcile, then render the side-by-side + editable draft
   preview in a modal overlay appended to document.body (outside the Lint
   card so a later card re-render never disturbs an open modal). Closed via
   the Cancel/Close button or a backdrop click. */
function openReconcileModal(pageA, pageB, resultEl, siblingButtons) {
  var overlay = el("div", { class: "reconcile-overlay" });
  var modal = el("div", { class: "reconcile-modal" },
    el("div", { class: "reconcile-modal-head" }, el("span", { text: "Reconcile: " + pageA + " / " + pageB })),
    el("div", { class: "reconcile-modal-body" },
      el("span", { class: "spinner" }),
      document.createTextNode(" Generating draft…")
    )
  );
  overlay.append(modal);
  document.body.append(overlay);

  function closeModal() { overlay.remove(); }
  overlay.addEventListener("click", function(e) { if (e.target === overlay) closeModal(); });

  fetch("/wiki/pages/reconcile", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ page_a: pageA, page_b: pageB }),
  })
    .then(function(resp) {
      if (!resp.ok) return resp.text().then(function(t) { throw new Error("HTTP " + resp.status + ": " + t); });
      return resp.json();
    })
    .then(function(data) { renderReconcilePreview(modal, data, resultEl, closeModal, siblingButtons); })
    .catch(function(err) {
      modal.replaceChildren(
        el("div", { class: "reconcile-modal-head" }, el("span", { text: "Reconcile — error" })),
        el("div", { class: "reconcile-modal-body reconcile-error", text: err.message || String(err) }),
        el("div", { class: "reconcile-actions" },
          el("button", { class: "reconcile-cancel-btn", type: "button",
            text: LINT_CHROME[consoleLang].reconcileClose, onclick: closeModal })
        )
      );
    });
}

/* Renders the generate-time draft: a grounding report, then old-vs-editable
   columns per page, then Apply/Cancel. Apply sends the (possibly edited)
   textarea values back with the hash tokens captured verbatim from the
   generate response — never recomputed client-side (§12.5 no business
   logic in the client). On success, closes the modal and re-runs the SAME
   fast (include_c5=false) re-lint + re-render every other remediation uses,
   so the fixed finding (and every other still-unjudged C5 finding) drops
   out of the re-rendered Coherence section until the curator re-runs a
   full Lint. ``siblingButtons`` (issue #364's shared in-flight-guard list)
   is disabled for the duration of the apply request — same no-double-submit
   guarantee every other remediation on the card already gets. */
function renderReconcilePreview(modal, data, resultEl, closeModal, siblingButtons) {
  var textareaA = el("textarea", { class: "reconcile-textarea", rows: "8" });
  textareaA.value = data.content_a;
  var textareaB = el("textarea", { class: "reconcile-textarea", rows: "8" });
  textareaB.value = data.content_b;

  var passed = !!(data.grounding && data.grounding.passed);
  var groundingEl = el("div", { class: "reconcile-grounding" },
    el("span", { class: passed ? "badge badge-ok" : "badge badge-fail" },
      el("span", { class: "dot" }),
      el("span", { text: passed ? "grounded" : "grounding failed" })
    )
  );
  var unsupported = (data.grounding && data.grounding.unsupported_claims) || [];
  if (unsupported.length > 0) {
    var claimsList = el("ul", { class: "reconcile-claims" });
    unsupported.forEach(function(c) { claimsList.append(el("li", { text: c })); });
    groundingEl.append(claimsList);
  }

  var statusMsgEl = el("span", { class: "card-status-msg" });
  var cancelBtn = el("button", { class: "reconcile-cancel-btn", type: "button",
    text: LINT_CHROME[consoleLang].reconcileCancel, onclick: closeModal });
  var applyBtn = el("button", { class: "reconcile-apply-btn", type: "button",
    text: LINT_CHROME[consoleLang].reconcileApply });

  applyBtn.addEventListener("click", function() {
    if (applyBtn.disabled || remediationInFlight) return;
    remediationInFlight = true;
    applyBtn.disabled = true;
    cancelBtn.disabled = true;
    (siblingButtons || []).forEach(function(b) { b.disabled = true; });
    statusMsgEl.replaceChildren(el("span", { class: "spinner" }),
      document.createTextNode(LINT_CHROME[consoleLang].reconcileWorking));
    statusMsgEl.className = "card-status-msg";

    fetch("/wiki/pages/reconcile/apply", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        page_a: data.page_a,
        page_b: data.page_b,
        content_a: textareaA.value,
        content_b: textareaB.value,
        hash_a: data.hash_a,
        hash_b: data.hash_b,
      }),
    })
      .then(function(resp) {
        if (resp.status === 409) {
          throw new Error(
            "Cannot apply: one or both pages changed since this draft was generated " +
            "(the contradiction may no longer hold). Close and re-open Reconcile to refresh."
          );
        }
        if (resp.status === 422) {
          return resp.json().then(function(body) {
            var detail = body.detail || {};
            var claims = (detail.unsupported_claims || []).join("; ");
            throw new Error("Grounding check failed" + (claims ? ": " + claims : "") + ". Edit the draft and try again.");
          });
        }
        if (!resp.ok) return resp.text().then(function(t) { throw new Error("HTTP " + resp.status + ": " + t); });
        return resp.json();
      })
      .then(function() {
        return fetch("/wiki/lint?include_c5=false", { method: "POST" });
      })
      .then(function(resp) {
        if (!resp.ok) return resp.text().then(function(t) { throw new Error("HTTP " + resp.status + ": " + t); });
        return resp.json();
      })
      .then(function(lintData) {
        remediationInFlight = false;
        closeModal();
        lastLintData = lintData;
        if (resultEl) resultEl.replaceChildren(renderLintCard(lintData, resultEl));
        renderCurationQueue(document.getElementById("curation-queue-root"), lintData);
      })
      .catch(function(err) {
        remediationInFlight = false;
        applyBtn.disabled = false;
        cancelBtn.disabled = false;
        (siblingButtons || []).forEach(function(b) { b.disabled = false; });
        statusMsgEl.textContent = "Error: " + (err.message || String(err));
        statusMsgEl.className = "card-status-msg err";
      });
  });

  modal.replaceChildren(
    el("div", { class: "reconcile-modal-head" }, el("span", { text: "Reconcile: " + data.page_a + " / " + data.page_b })),
    el("div", { class: "reconcile-modal-body" },
      groundingEl,
      el("div", { class: "reconcile-columns" },
        el("div", { class: "reconcile-col" },
          el("div", { class: "reconcile-col-head", text: data.page_a + " — current" }),
          el("pre", { class: "reconcile-old", text: data.old_content_a }),
          el("div", { class: "reconcile-col-head", text: data.page_a + " — draft (editable)" }),
          textareaA
        ),
        el("div", { class: "reconcile-col" },
          el("div", { class: "reconcile-col-head", text: data.page_b + " — current" }),
          el("pre", { class: "reconcile-old", text: data.old_content_b }),
          el("div", { class: "reconcile-col-head", text: data.page_b + " — draft (editable)" }),
          textareaB
        )
      )
    ),
    el("div", { class: "reconcile-actions" }, applyBtn, cancelBtn, statusMsgEl)
  );
}

/* Generic error card — used by any step on network/HTTP error */
function renderErrorCard(stepLabel, message) {
  return el("div", { class: "result-card" },
    el("div", { class: "result-card-head" },
      el("span", { text: stepLabel + " — error" })
    ),
    el("div", { style: "padding:12px 16px; font-size:13px; color:var(--fail);", text: message })
  );
}

/* Busy-row shown while a request is in flight */
function makeBusyCard(label) {
  return el("div", { class: "result-card" },
    el("div", { class: "busy-row" },
      el("span", { class: "spinner" }),
      el("span", { text: label + "…" })
    )
  );
}

/* ============================================================
   Staleness guard — module-level flag (#173)
   indexStale is set to true when Ingest completes and cleared when
   Index completes. The flag drives a persistent banner above the stepper.

   Integration point for slice #172 (Ingest expansion):
   - Call markIngestDone() at the end of the Ingest run().finally (or .then)
     block so the staleness banner appears after a successful ingest.
   - markIndexDone() is already called in the Index run().finally here.
   ============================================================ */
var indexStale = false;

function markIngestDone() {
  indexStale = true;
  var banner = document.getElementById("staleness-banner");
  if (banner) banner.classList.add("visible");
}

function markIndexDone() {
  indexStale = false;
  var banner = document.getElementById("staleness-banner");
  if (banner) banner.classList.remove("visible");
}

/* ============================================================
   Step definitions
   Each step exposes:
     id, label, desc
     buildBody(resultEl)  — returns the DOM subtree for the step body
     busy flag           — managed internally
   The run() callback is in each STEP_DEFS entry.
   ============================================================ */

/* ── Upload step body builder ─────────────────────────────── */
function buildUploadBody(resultEl) {
  /* File input (hidden) */
  var fileInput = el("input", { type: "file", multiple: "", accept: ".html,.txt,.md", style: "display:none" });
  var uploadBusy = false;

  function setUploadBusy(v) {
    uploadBusy = v;
    if (v) {
      dropZone.classList.add("busy");
      dropBtn.disabled = true;
    } else {
      dropZone.classList.remove("busy");
      dropBtn.disabled = false;
    }
  }

  function handleFiles(files) {
    if (uploadBusy) return;
    setUploadBusy(true);

    resultEl.replaceChildren(makeBusyCard("Uploading " + files.length + " file" + (files.length !== 1 ? "s" : "")));

    var formData = new FormData();
    for (var i = 0; i < files.length; i++) {
      formData.append("files", files[i], files[i].name);
    }

    fetch("/upload", { method: "POST", body: formData })
      .then(function(resp) {
        if (!resp.ok) return resp.text().then(function(t) { throw new Error("HTTP " + resp.status + ": " + t); });
        return resp.json();
      })
      .then(function(data) { resultEl.replaceChildren(renderUploadCard(data.results || [])); })
      .catch(function(err)  { resultEl.replaceChildren(renderErrorCard("Upload", err.message || String(err))); })
      .finally(function()   { setUploadBusy(false); });
  }

  fileInput.addEventListener("change", function() {
    if (fileInput.files && fileInput.files.length > 0) handleFiles(Array.from(fileInput.files));
  });

  var dropBtn = el("button", { class: "drop-btn", type: "button", text: "Choose files",
    onclick: function() { if (!uploadBusy) fileInput.click(); }
  });

  var dropZone = el("div", { class: "drop-zone" },
    el("div", { class: "drop-hint" },
      el("strong", { text: "Drag and drop files here" }),
      el("br"),
      "or click to select files"
    ),
    el("div", { class: "drop-ext", text: "Accepts .html · .txt · .md — max 10 MB each" }),
    dropBtn,
    fileInput
  );

  dropZone.addEventListener("dragover", function(e) {
    e.preventDefault();
    if (!uploadBusy) dropZone.classList.add("drag-over");
  });
  dropZone.addEventListener("dragleave", function() { dropZone.classList.remove("drag-over"); });
  dropZone.addEventListener("drop", function(e) {
    e.preventDefault();
    dropZone.classList.remove("drag-over");
    if (uploadBusy) return;
    var files = e.dataTransfer.files;
    if (files && files.length > 0) handleFiles(Array.from(files));
  });

  return dropZone;
}

/* ── Pipeline state ────────────────────────────────────────── */
/* Tracks the bare doc filenames from the last Import run so the Ingest step
   can send exactly those sources in the batch call (§12.8 single-batch rule).
   null = no import has been run this session → Ingest falls back to all-docs. */
var lastImportedDocFilenames = null;

/* ── Step definitions ─────────────────────────────────────── */
/* §12.8 / §12.5: No fake progress percentages. Use indeterminate spinner only.
   Index/Lint (#173) run-functions will be wired in their slice. */

/* ── Per-step what-it-does one-liners (ADR-0021 §12 legibility) ───────────
   Always-visible text beside each action: what it does + its principle.
   Rendered via textContent (el() helper, §12.4); strings are static literals
   so the test_ui_console_legibility suite can assert them via plain text search. */

var STEP_DEFS = [
  {
    id: "upload",
    label: "Upload",
    desc: "Upload: stage source files for processing — entry point; .md goes to docs/, HTML/TXT needs Import.",
    buildBody: function(resultEl) {
      return buildUploadBody(resultEl);
    },
    /* Upload step has its own inline controls — no top-level Run button */
    noRunBtn: true,
  },
  {
    id: "import",
    label: "Import",
    desc: "Import: convert HTML/TXT to Markdown — normalises raw sources before LLM synthesis.",
    buildBody: null,
    run: function(resultEl, setStepBusy) {
      setStepBusy(true);
      resultEl.replaceChildren(makeBusyCard("Running Import"));

      fetch("/wiki/import", { method: "POST" })
        .then(function(resp) {
          if (!resp.ok) return resp.text().then(function(t) { throw new Error("HTTP " + resp.status + ": " + t); });
          return resp.json();
        })
        .then(function(data) {
          resultEl.replaceChildren(renderImportCard(data));
          /* Capture imported filenames for the Ingest step.
             Extract the bare filename from docs_path (e.g. "docs/x.md" → "x.md").
             imported_sources + skipped_sources both represent available docs/ files.
             §12.5: extraction logic is trivial (basename), not business logic. */
          var allImported = (data.imported_sources || []).concat(data.skipped_sources || []);
          if (allImported.length > 0) {
            lastImportedDocFilenames = allImported.map(function(r) {
              var p = r.docs_path || "";
              return p.split(/[/\\]/).pop();
            }).filter(Boolean);
          }
        })
        .catch(function(err)  { resultEl.replaceChildren(renderErrorCard("Import", err.message || String(err))); })
        .finally(function()   { setStepBusy(false); });
    },
  },
  {
    id: "ingest",
    label: "Ingest",
    desc: "Ingest: an LLM synthesises a curated wiki page from a Source, grounding-checked — builds the knowledge layer.",
    buildBody: null,
    run: function(resultEl, setStepBusy) {
      /* Phase 15 S3 (#172): single-batch-call rule (§12.8 / ADR-0011).
         Sources come from the last Import run (lastImportedDocFilenames);
         falls back to all-docs if no Import has been run this session.
         >5 sources → sequential single-batch calls with "Batch k/N" indicator
         (client owns the counter; no fake % — §12.8); within each batch an
         indeterminate spinner only.

         #173 staleness-guard integration: markIngestDone() must fire when the
         batch sequence finishes (success OR error) so the stale banner appears
         regardless of ingest outcome. runIngestBatches calls setStepBusy(false)
         exactly once at completion, so we wrap that callback to also set the
         stale signal then — keeping runIngestBatches free of guard coupling. */
      setStepBusy(true);
      var onIngestStepDone = function(b) {
        setStepBusy(b);
        if (b === false) markIngestDone();
      };
      runIngestBatches(lastImportedDocFilenames, resultEl, onIngestStepDone);
    },
  },
  {
    id: "index",
    label: "Index",
    desc: "Index: rebuild the BM25 search index from wiki pages — makes curated knowledge retrievable.",
    buildBody: null,
    run: function(resultEl, setStepBusy) {
      /* Phase 15 S4 (#173): real IndexResponse card + staleness guard clear */
      setStepBusy(true);
      resultEl.replaceChildren(makeBusyCard("Rebuilding Section Index…"));

      fetch("/wiki/index", { method: "POST" })
        .then(function(resp) {
          if (!resp.ok) return resp.text().then(function(t) { throw new Error("HTTP " + resp.status + ": " + t); });
          return resp.json();
        })
        .then(function(data) { resultEl.replaceChildren(renderIndexCard(data)); })
        .catch(function(err)  { resultEl.replaceChildren(renderErrorCard("Index", err.message || String(err))); })
        .finally(function()   {
          setStepBusy(false);
          markIndexDone(); /* staleness guard: clear stale signal after Index run */
        });
    },
  },
  {
    id: "lint",
    label: "Lint",
    desc: "Lint: audit the wiki for orphans, red links, and contradictions — keeps the knowledge base coherent.",
    buildBody: null,
    run: function(resultEl, setStepBusy) {
      /* Phase 15 S4 (#173): real LintResponse card with per-check grouped findings */
      /* Phase 15 S6 (#174): store lint data + trigger Curation Queue render */
      setStepBusy(true);
      resultEl.replaceChildren(makeBusyCard("Running Lint audit…"));

      fetch("/wiki/lint", { method: "POST" })
        .then(function(resp) {
          if (!resp.ok) return resp.text().then(function(t) { throw new Error("HTTP " + resp.status + ": " + t); });
          return resp.json();
        })
        .then(function(data) {
          resultEl.replaceChildren(renderLintCard(data, resultEl));
          /* Phase 15 S6: store latest lint data and render the Curation Queue */
          lastLintData = data;
          renderCurationQueue(document.getElementById("curation-queue-root"), data);
        })
        .catch(function(err)  { resultEl.replaceChildren(renderErrorCard("Lint", err.message || String(err))); })
        .finally(function()   { setStepBusy(false); });
    },
  },
];

/* ============================================================
   Build the pipeline DOM
   ============================================================ */
function buildPipeline(rootEl) {
  /* ── Step track (breadcrumb row) ─────────────────────── */
  var trackItems = [];
  STEP_DEFS.forEach(function(step, i) {
    if (i > 0) trackItems.push(el("span", { class: "step-arrow", text: "→" }));
    trackItems.push(
      el("span", { class: "step-pill" + (i === 0 ? " active" : ""), id: "track-" + step.id },
        el("span", { class: "step-num", text: String(i + 1) }),
        el("span", { text: step.label })
      )
    );
  });

  var track = el.apply(null, ["div", { class: "step-track" }].concat(trackItems));

  /* ── Step panels ─────────────────────────────────────── */
  var panels = el("div", { class: "step-panels" });

  STEP_DEFS.forEach(function(step) {
    var resultEl = el("div", { class: "step-result" });
    // Stash the Lint step's own result container (issue #365) so the
    // header language toggle can re-render an already-visible Lint card
    // in place, without waiting for another Run click.
    if (step.id === "lint") lintResultEl = resultEl;

    /* Per-step busy state + button toggle */
    var runBtn;
    function setStepBusy(busy) {
      if (runBtn) runBtn.disabled = busy;
      /* Update track pill */
      var pill = document.getElementById("track-" + step.id);
      if (pill) {
        if (busy) {
          pill.classList.add("active");
          pill.classList.remove("done");
        }
      }
    }

    /* Header */
    var headLeft = el("div", { style: "display:flex; align-items:center; gap:12px; min-width:0; flex:1;" },
      el("span", { class: "step-panel-title", text: step.label }),
      el("span", { class: "step-panel-desc",  text: step.desc })
    );

    var headEl;
    if (step.noRunBtn) {
      /* Upload: no Run button in the header — controlled inside the drop zone */
      headEl = el("div", { class: "step-panel-head" }, headLeft);
    } else {
      runBtn = el("button", { class: "run-btn", type: "button", text: "Run",
        onclick: function() { step.run(resultEl, setStepBusy); }
      });
      headEl = el("div", { class: "step-panel-head" }, headLeft, runBtn);
    }

    /* Body */
    var bodyChildren = [];
    if (step.buildBody) {
      bodyChildren.push(step.buildBody(resultEl));
    }
    bodyChildren.push(resultEl);

    var panel = el.apply(null, ["div", { class: "step-panel" }, headEl].concat(bodyChildren));
    panels.append(panel);
  });

  rootEl.append(
    el("div", { class: "pipeline" },
      el("div", { class: "pipeline-header", text: "Pipeline" }),
      track,
      panels
    )
  );
}

/* ============================================================
   Phase 15 S6 (#174) — Curation Queue
   Driven by the latest LintResponse stored in lastLintData.
   Sections:
     - C8 Promotion candidates (draft Filed Answers, ranked) — Promote + Discard
     - C9 Stale filed answers — read-only flag, "re-ingest source" hint
     - C10 Invalid qa schema — read-only flag + optional Discard (inert only)
   §12.4: all server-derived text via textContent.
   §12.5: server decides inert/live eligibility; the client just calls and shows.
   ============================================================ */

/* Module-level store for the latest LintResponse */
var lastLintData = null;

/* Module-level handle to the Lint step's own result container, set by
   buildPipeline (issue #365) so the header language toggle can re-render an
   already-visible Lint card in place. */
var lintResultEl = null;

/* ── Curation Queue renderer ──────────────────────────────── */
function renderCurationQueue(rootEl, lintData) {
  if (!rootEl) return;
  if (!lintData || !lintData.findings) {
    /* No data yet — clear the queue section */
    rootEl.replaceChildren();
    return;
  }

  var findings     = lintData.findings;
  var candidates   = findings.promotion_candidates  || [];   /* C8 */
  var staleQa      = findings.stale_filed_answers   || [];   /* C9 */
  var invalidQa    = findings.invalid_qa_schemas    || [];   /* C10 */

  /* If all categories are empty, render a clean-slate message */
  if (candidates.length === 0 && staleQa.length === 0 && invalidQa.length === 0) {
    rootEl.replaceChildren(
      el("div", { class: "curation-queue" },
        el("div", { class: "queue-header" },
          el("span", { class: "queue-header-label", text: "Curation Queue" }),
          makeRefreshBtn()
        ),
        el("div", { class: "queue-empty", text: "No curation items — all Filed Answers are clean." })
      )
    );
    return;
  }

  var queueEl = el("div", { class: "curation-queue" });

  /* ── Header ─────────────────────────────────────────────── */
  queueEl.append(
    el("div", { class: "queue-header" },
      el("span", { class: "queue-header-label", text: "Curation Queue" }),
      makeRefreshBtn()
    )
  );

  /* ── C8: Promotion candidates ───────────────────────────── */
  if (candidates.length > 0) {
    /* ADR-0021 per-action one-liner for Promote and Discard (§12.4: textContent only).
       Promote: the human gate of ADR-0020's validated write-back loop.
       Discard: inert-only server decision; refused for live answers. */
    var c8Section = el("div", { class: "queue-section" },
      el("div", { class: "queue-section-head" },
        el("span", { text: "Promotion Candidates (C8)" }),
        el("span", { class: "label label-created", text: String(candidates.length) })
      ),
      el("p", { class: "queue-section-desc",
        text: "Promote: a curator approves a draft Filed Answer so it becomes retrievable — the human gate of ADR-0020's validated write-back. Discard: remove an inert (draft) entry from the queue — refused for live answers (server decides eligibility)." })
    );
    candidates.forEach(function(f) {
      c8Section.append(buildDraftCard(f));
    });
    queueEl.append(c8Section);
  }

  /* ── C9: Stale filed answers ────────────────────────────── */
  if (staleQa.length > 0) {
    /* Deduplicate by page_slug — C10 may overlap, show each slug once */
    var staleMap = {};
    staleQa.forEach(function(f) { staleMap[f.page_slug] = f; });
    var staleSlugs = Object.keys(staleMap);

    var c9Section = el("div", { class: "queue-section" },
      el("div", { class: "queue-section-head" },
        el("span", { text: "Stale Filed Answers (C9)" }),
        el("span", { class: "label label-updated", text: String(staleSlugs.length) })
      )
    );
    staleSlugs.forEach(function(slug) {
      var f = staleMap[slug];
      var drift = f.max_drift_days != null ? f.max_drift_days.toFixed(1) + "d drift" : "";
      var hint = "Re-ingest the source document to refresh this live Filed Answer.";
      c9Section.append(buildFlagCard(
        /* icon */ "~",
        /* slug */ f.page_slug,
        /* subtitle */ drift + (drift ? " — " : "") + hint,
        /* discardBtn? */ false
      ));
    });
    queueEl.append(c9Section);
  }

  /* ── C10: Invalid qa schema ─────────────────────────────── */
  if (invalidQa.length > 0) {
    /* Group by slug — multiple findings per slug are possible */
    var invalidMap = {};
    invalidQa.forEach(function(f) {
      if (!invalidMap[f.page_slug]) invalidMap[f.page_slug] = [];
      invalidMap[f.page_slug].push(f);
    });
    var invalidSlugs = Object.keys(invalidMap);

    var c10Section = el("div", { class: "queue-section" },
      el("div", { class: "queue-section-head" },
        el("span", { text: "Invalid QA Schema (C10)" }),
        el("span", { class: "label label-failed", text: String(invalidSlugs.length) })
      )
    );
    invalidSlugs.forEach(function(slug) {
      var items = invalidMap[slug];
      var propSummary = items.map(function(i) {
        return i.property_name + "=" + i.offending_value;
      }).join("; ");
      var hint = "Fix the frontmatter property or Discard to clear this invalid entry.";
      c10Section.append(buildFlagCard(
        /* icon */ "!",
        /* slug */ slug,
        /* subtitle */ propSummary + " — " + hint,
        /* discardBtn? */ true,
        /* onDiscard */ function(cardEl) { doDiscard(slug, cardEl); }
      ));
    });
    queueEl.append(c10Section);
  }

  rootEl.replaceChildren(queueEl);
}

/* ── Refresh button ─────────────────────────────────────────
   Re-runs lint and refreshes the queue without opening the
   full pipeline stepper — keeps the queue self-contained.    */
function makeRefreshBtn() {
  var btn = el("button", {
    class: "queue-refresh-btn",
    type: "button",
    text: "Refresh"
  });
  btn.addEventListener("click", function() {
    btn.disabled = true;
    btn.textContent = "Refreshing…";

    /* Fast path (include_c5=false): the queue needs only the local C8/C9/C10
       checks, so skip the slow C5 LLM contradiction audit. */
    fetch("/wiki/lint?include_c5=false", { method: "POST" })
      .then(function(resp) {
        if (!resp.ok) return resp.text().then(function(t) { throw new Error("HTTP " + resp.status + ": " + t); });
        return resp.json();
      })
      .then(function(data) {
        lastLintData = data;
        renderCurationQueue(document.getElementById("curation-queue-root"), data);
      })
      .catch(function() {
        btn.disabled = false;
        btn.textContent = "Refresh";
      });
  });
  return btn;
}

/* ── Draft card builder (C8) ────────────────────────────────
   Fetches the draft body via GET /read/file?path=wiki/qa/<slug>.md
   (the S5 read API, issue #171). Shows question, answer, sources.
   Promote → POST /wiki/qa/{slug}/promote
   Discard → DELETE /wiki/qa/{slug}                              */
function buildDraftCard(f) {
  /* slug, question, count, age_days, cited_count come from PromotionCandidateFinding */
  var slug = f.slug;
  var question = f.question || "";
  var metaText = "asked " + f.count + "×";
  if (f.age_days != null) metaText += " · " + f.age_days.toFixed(0) + "d ago";

  /* Action state */
  var actionBusy = false;
  var statusMsgEl = el("span", { class: "card-status-msg" });

  /* Buttons */
  var promoteBtn = el("button", {
    class: "promote-btn",
    type: "button",
    text: "Promote"
  });
  var discardBtn = el("button", {
    class: "discard-btn",
    type: "button",
    text: "Discard"
  });

  function setActionBusy(v) {
    actionBusy = v;
    promoteBtn.disabled = v;
    discardBtn.disabled = v;
  }

  promoteBtn.addEventListener("click", function() {
    if (actionBusy) return;
    setActionBusy(true);
    statusMsgEl.textContent = "Promoting…";
    statusMsgEl.className = "card-status-msg";

    fetch("/wiki/qa/" + encodeURIComponent(slug) + "/promote", { method: "POST" })
      .then(function(resp) {
        if (!resp.ok) return resp.text().then(function(t) { throw new Error("HTTP " + resp.status + ": " + t); });
        return resp.json();
      })
      .then(function() {
        statusMsgEl.textContent = "Promoted — now live in corpus.";
        statusMsgEl.className = "card-status-msg ok";
        promoteBtn.disabled = true;
        discardBtn.disabled = true;
        /* Mark the card as promoted visually */
        cardEl.style.opacity = "0.6";
      })
      .catch(function(err) {
        statusMsgEl.textContent = "Error: " + (err.message || String(err));
        statusMsgEl.className = "card-status-msg err";
        setActionBusy(false);
      });
  });

  discardBtn.addEventListener("click", function() {
    if (actionBusy) return;
    setActionBusy(true);
    statusMsgEl.textContent = "Discarding…";
    statusMsgEl.className = "card-status-msg";
    doDiscard(slug, cardEl, statusMsgEl, setActionBusy);
  });

  /* Answer body + sources: fetch asynchronously from the S5 read API */
  var bodyPlaceholder = el("div", { class: "draft-card-body" });
  bodyPlaceholder.textContent = "Loading…";

  var sourcesEl = el("div", { class: "draft-card-sources" },
    el("span", { class: "src-label", text: "sources:" })
  );
  /* cited_count from PromotionCandidateFinding — we can't list the IDs from
     the finding alone; the actual IDs live in the file frontmatter which the
     read API gives us. Populate from the file once fetched. */

  fetch("/read/file?" + new URLSearchParams({ path: "wiki/qa/" + slug + ".md" }))
    .then(function(r) {
      if (!r.ok) return r.json().then(function(j) { throw new Error(j.detail || ("HTTP " + r.status)); });
      return r.json();
    })
    .then(function(data) {
      var content = data.content || "";
      /* Extract body (everything after the second ---) */
      var lines = content.split("\n");
      var dashIdxs = [];
      for (var i = 0; i < lines.length; i++) {
        if (lines[i].trim() === "---") dashIdxs.push(i);
        if (dashIdxs.length === 2) break;
      }
      var bodyText = dashIdxs.length >= 2
        ? lines.slice(dashIdxs[1] + 1).join("\n").replace(/^\n+/, "")
        : content;
      bodyPlaceholder.textContent = bodyText.trim() || "(no body)";

      /* Extract sources from frontmatter YAML text */
      if (dashIdxs.length >= 2) {
        var fmLines = lines.slice(dashIdxs[0] + 1, dashIdxs[1]);
        /* Find the sources: list — look for "sources:" then subsequent "- " items */
        var inSources = false;
        var srcs = [];
        for (var j = 0; j < fmLines.length; j++) {
          var ln = fmLines[j];
          if (/^sources\s*:/.test(ln)) { inSources = true; continue; }
          if (inSources) {
            /* List items are written at column 0 (`- slug#heading`) by the
               filing layer, so allow zero-or-more leading spaces (\s*), not
               one-or-more (\s+) — otherwise the sources never render. */
            var m = ln.match(/^\s*-\s+(.*)/);
            if (m) {
              srcs.push(m[1].trim());
            } else {
              inSources = false;
            }
          }
        }
        if (srcs.length > 0) {
          srcs.forEach(function(s) {
            sourcesEl.append(el("span", { text: s }));
          });
        } else {
          sourcesEl.append(el("span", { text: "(none listed)" }));
        }
      }
    })
    .catch(function() {
      bodyPlaceholder.textContent = "(could not load answer body)";
      sourcesEl.append(el("span", { text: "(unknown)" }));
    });

  var cardEl = el("div", { class: "draft-card" },
    el("div", { class: "draft-card-head" },
      el("div", { class: "draft-card-question", text: question }),
      el("div", { class: "draft-card-meta",     text: metaText })
    ),
    bodyPlaceholder,
    sourcesEl,
    el("div", { class: "draft-card-actions" },
      promoteBtn,
      discardBtn,
      statusMsgEl
    )
  );

  return cardEl;
}

/* ── Flag card builder (C9 / C10) ───────────────────────────
   Read-only card with icon, slug, hint text, and optional Discard.
   C9 (live stale):  discardBtn=false — never offer destructive action on live.
   C10 (invalid):    discardBtn=true  — inert, safe to discard.            */
function buildFlagCard(icon, slug, subtitle, showDiscard, onDiscard) {
  var actionBusy = false;
  var statusMsgEl = el("span", { class: "card-status-msg" });

  var actionsChildren = [statusMsgEl];
  if (showDiscard) {
    var dBtn = el("button", {
      class: "discard-btn",
      type: "button",
      text: "Discard"
    });
    dBtn.addEventListener("click", function() {
      if (actionBusy) return;
      actionBusy = true;
      dBtn.disabled = true;
      statusMsgEl.textContent = "Discarding…";
      statusMsgEl.className = "card-status-msg";
      if (onDiscard) onDiscard(cardEl);
    });
    actionsChildren = [dBtn, statusMsgEl];
  }

  var bodyEl = el("div", { class: "flag-body" },
    el("div", { class: "flag-slug", text: slug }),
    el("div", { class: "flag-hint", text: subtitle })
  );

  var cardEl = el("div", { class: "flag-card" },
    el("div", { class: "flag-icon", text: icon }),
    bodyEl,
    el("div", { class: "flag-actions" }, actionsChildren[0],
      actionsChildren.length > 1 ? actionsChildren[1] : null)
  );

  return cardEl;
}

/* ── Shared discard helper ─────────────────────────────────
   Calls DELETE /wiki/qa/{slug}. On 204 → mark card as discarded.
   On 409 → server decided this page is live; show message.
   statusMsgEl / setActionBusy may be null in the flag-card path.    */
function doDiscard(slug, cardEl, statusMsgEl, setActionBusy) {
  fetch("/wiki/qa/" + encodeURIComponent(slug), { method: "DELETE" })
    .then(function(resp) {
      if (resp.status === 409) {
        /* Server refused — this page is live (ADR-0012 §12.5 server decides) */
        var msg = "Cannot discard: page is live (status=live). Use re-ingest to refresh.";
        if (statusMsgEl) {
          statusMsgEl.textContent = msg;
          statusMsgEl.className = "card-status-msg err";
        }
        if (setActionBusy) setActionBusy(false);
        return;
      }
      if (!resp.ok) {
        return resp.text().then(function(t) {
          var msg = "Error: HTTP " + resp.status + " " + t;
          if (statusMsgEl) {
            statusMsgEl.textContent = msg;
            statusMsgEl.className = "card-status-msg err";
          }
          if (setActionBusy) setActionBusy(false);
        });
      }
      /* 204 No Content — success */
      if (statusMsgEl) {
        statusMsgEl.textContent = "Discarded.";
        statusMsgEl.className = "card-status-msg ok";
      }
      cardEl.style.opacity = "0.5";
      /* Visually strike out the card title if present */
      var slug_el = cardEl.querySelector(".flag-slug");
      if (slug_el) slug_el.style.textDecoration = "line-through";
    })
    .catch(function(err) {
      var msg = "Error: " + (err.message || String(err));
      if (statusMsgEl) {
        statusMsgEl.textContent = msg;
        statusMsgEl.className = "card-status-msg err";
      }
      if (setActionBusy) setActionBusy(false);
    });
}

/* ── Boot ──────────────────────────────────────────────────── */
buildPipeline(document.getElementById("pipeline-root"));

/* zh/en Console header language toggle (issue #365) — wired after
   buildPipeline so lintResultEl is already set. Persists the choice to
   localStorage and, if a Lint card is already on screen, re-renders it in
   place so the switch is visible immediately. */
(function initConsoleLangToggle() {
  var btn = document.getElementById("lang-toggle");
  if (btn) {
    btn.addEventListener("click", function() {
      consoleLang = consoleLang === "zh" ? "en" : "zh";
      try { localStorage.setItem(LANG_STORAGE_KEY, consoleLang); }
      catch (e) { /* private-mode / disabled storage — language still switches for this session */ }
      applyConsoleLang();
      // Do NOT re-render the Lint card while a remediation is in flight: that
      // would mint fresh (enabled) buttons and defeat the #364 no-double-submit
      // busy-state guard. The static chrome switches immediately via
      // applyConsoleLang() above; the card itself re-renders in the new language
      // when the in-flight remediation finishes its own re-lint (which runs only
      // after remediationInFlight is cleared).
      if (lastLintData && lintResultEl && !remediationInFlight) {
        lintResultEl.replaceChildren(renderLintCard(lastLintData, lintResultEl));
      }
    });
  }
  applyConsoleLang();
})();

/* Populate the Curation Queue immediately via the fast (LLM-free) lint path.
   The queue only needs the local C8/C9/C10 checks, so it must not wait on the
   slow C5 contradiction audit (one LLM call per page-pair, minutes on a large
   wiki). The full Lint button still runs C5 for the deliberate audit; the queue
   Refresh button also uses this fast path. */
(function loadCurationQueueFast() {
  fetch("/wiki/lint?include_c5=false", { method: "POST" })
    .then(function(resp) { return resp.ok ? resp.json() : null; })
    .then(function(data) {
      if (!data) return;
      lastLintData = data;
      renderCurationQueue(document.getElementById("curation-queue-root"), data);
    })
    .catch(function() { /* non-fatal: queue stays empty until Lint/Refresh */ });
})();

/* ============================================================
   RAG rebuild track (#173)
   POST /rag/index — runs in parallel with the Wiki pipeline chain.
   RAG depends only on docs/ so it is a separate, independent track.
   No fake progress: single blocking call + indeterminate spinner (§12.8).
   ============================================================ */
function buildRagTrack(rootEl) {
  var ragResultEl = el("div", { class: "step-result" });
  var ragRunBtn;

  function setRagBusy(busy) {
    if (ragRunBtn) ragRunBtn.disabled = busy;
  }

  ragRunBtn = el("button", { class: "run-btn", type: "button", text: "Rebuild",
    onclick: function() {
      setRagBusy(true);
      ragResultEl.replaceChildren(makeBusyCard("Rebuilding RAG index…"));

      fetch("/rag/index", { method: "POST" })
        .then(function(resp) {
          if (!resp.ok) return resp.text().then(function(t) { throw new Error("HTTP " + resp.status + ": " + t); });
          return resp.json();
        })
        .then(function(data) {
          /* RAG IndexResponse: files_indexed + chunks_indexed */
          var filesIdx  = data.files_indexed  != null ? data.files_indexed  : "?";
          var chunksIdx = data.chunks_indexed != null ? data.chunks_indexed : "?";
          var summaryText = filesIdx + " file" + (filesIdx !== 1 ? "s" : "") +
                            " · " + chunksIdx + " chunk" + (chunksIdx !== 1 ? "s" : "");
          var card = el("div", { class: "result-card" },
            el("div", { class: "result-card-head" },
              el("span", { text: "RAG Index" }),
              el("span", { text: "·" }),
              el("span", { class: "badge badge-ok" },
                el("span", { class: "dot" }),
                el("span", { text: "rebuilt" })
              )
            ),
            el("div", { class: "rec" },
              el("div", { class: "num", text: "01" }),
              el("div", { class: "body" },
                el("div", { class: "id",   text: "Files indexed" }),
                el("div", { class: "crumb", text: "docs/ files embedded" })
              ),
              el("div", { class: "label label-created", text: String(filesIdx) })
            ),
            el("div", { class: "rec" },
              el("div", { class: "num", text: "02" }),
              el("div", { class: "body" },
                el("div", { class: "id",   text: "Chunks indexed" }),
                el("div", { class: "crumb", text: "vector units stored" })
              ),
              el("div", { class: "label label-created", text: String(chunksIdx) })
            )
          );
          ragResultEl.replaceChildren(card);
        })
        .catch(function(err) {
          ragResultEl.replaceChildren(renderErrorCard("RAG Index", err.message || String(err)));
        })
        .finally(function() { setRagBusy(false); });
    }
  });

  var headLeft = el("div", { style: "display:flex; align-items:center; gap:12px; min-width:0; flex:1;" },
    el("span", { class: "step-panel-title", text: "RAG Index" }),
    el("span", { class: "step-panel-desc",  text: "RAG rebuild: re-embed docs/ into the vector index — makes raw sources retrievable via semantic search; runs in parallel." })
  );
  var headEl = el("div", { class: "step-panel-head" }, headLeft, ragRunBtn);
  var panel  = el("div", { class: "step-panel" }, headEl, ragResultEl);

  rootEl.append(
    el("div", { class: "rag-track" },
      el("div", { class: "rag-track-header" },
        el("span", { text: "RAG Track" }),
        el("span", { class: "rag-track-note", text: "— independent of Wiki pipeline; runs against docs/ only" })
      ),
      panel
    )
  );
}

buildRagTrack(document.getElementById("rag-track-root"));

buildHybridTrack(document.getElementById("hybrid-track-root"));

/* ══════════════════════════════════════════════════════════
   Resource Browser (Phase 15 S5, issue #171)
   §12.4: all server-derived text via textContent (never innerHTML)
   §12.5: no business logic in the client (paths validated server-side)
   ══════════════════════════════════════════════════════════ */

/* ── Motion helpers (Phase 15 UI polish) ─────────────────────
   element.animate() (WAAPI) is NOT covered by the prefers-reduced-motion CSS
   block above — that only disables CSS animations/transitions — so guard every
   call here. scrollSoftIntoView falls back to an instant jump under reduced
   motion. */
var REDUCED_MOTION = matchMedia("(prefers-reduced-motion: reduce)");
function animateIn(node, dur, delay, dy) {
  if (REDUCED_MOTION.matches) return;
  node.animate(
    [{ opacity: 0, transform: "translateY(" + (dy == null ? 6 : dy) + "px)" }, { opacity: 1, transform: "none" }],
    { duration: dur || 320, delay: delay || 0, easing: "cubic-bezier(.22,.61,.36,1)", fill: "backwards" }
  );
}
function scrollSoftIntoView(node, block) {
  node.scrollIntoView({ behavior: REDUCED_MOTION.matches ? "auto" : "smooth", block: block || "nearest" });
}

/* Bring the whole Browse section into view after a folder switch. If it fits in
   the viewport, centre it so every folder is visible at once; if it's taller than
   the viewport, anchor its top — the "Browse" label — to the top of the screen so
   the listing reads from the start. Driven with window.scrollTo to a FIXED pixel
   target (not scrollIntoView) so a concurrent height morph can't make it
   re-measure a box that's still resizing. Measure AFTER the new entries are in the
   DOM and BEFORE the morph starts, so it reads the final layout. */
function scrollBrowserIntoView() {
  var rect = browserSection.getBoundingClientRect();
  var vh = window.innerHeight || document.documentElement.clientHeight;
  var maxScroll = Math.max(0, document.documentElement.scrollHeight - vh);
  var absTop = rect.top + window.scrollY;
  var target = rect.height <= vh ? absTop - (vh - rect.height) / 2 : absTop;
  target = Math.max(0, Math.min(target, maxScroll));
  if (REDUCED_MOTION.matches) window.scrollTo(0, target);
  else window.scrollTo({ top: target, behavior: "smooth" });
}

/* ── Browser state ───────────────────────────────────────── */
var browserPath = "";   /* current relpath in the tree */
var browserBusy = false;
var browserBooted = false;   /* suppress auto-scroll on the initial boot load */

/* ── Browser containers ──────────────────────────────────── */
var browserSection = document.getElementById("browser-section");
var breadcrumbEl = el("div", { class: "browser-breadcrumb" });
var entriesEl = el("div", { class: "browser-entries" });
var fileViewerEl = el("div", { id: "file-viewer-container" });

browserSection.append(
  el("div", { class: "section-label", text: "Browse" }),
  breadcrumbEl,
  entriesEl,
  fileViewerEl
);

/* ── Breadcrumb builder ──────────────────────────────────── */
function renderBreadcrumb(relpath) {
  /* §12.4: all textContent */
  var parts = relpath ? relpath.split("/") : [];
  var kids = [];

  /* Root crumb — always a clickable button when inside a subpath */
  if (relpath === "") {
    kids.push(el("span", { class: "crumb-current", text: "root" }));
  } else {
    kids.push(el("button", {
      class: "crumb-btn", type: "button", text: "root",
      onclick: function() { navigateTo(""); }
    }));
  }

  /* Intermediate segments */
  for (var i = 0; i < parts.length; i++) {
    kids.push(el("span", { class: "crumb-sep", text: "/" }));
    var segPath = parts.slice(0, i + 1).join("/");
    var segName = parts[i];
    if (i === parts.length - 1) {
      kids.push(el("span", { class: "crumb-current", text: segName }));
    } else {
      (function(p, n) {
        kids.push(el("button", {
          class: "crumb-btn", type: "button", text: n,
          onclick: function() { navigateTo(p); }
        }));
      })(segPath, segName);
    }
  }

  breadcrumbEl.replaceChildren.apply(breadcrumbEl, kids);
}

/* ── Format bytes helper ─────────────────────────────────── */
function fmtBytes(n) {
  if (n < 1024) return n + " B";
  if (n < 1024 * 1024) return (n / 1024).toFixed(1) + " KB";
  return (n / (1024 * 1024)).toFixed(1) + " MB";
}

/* ── Navigate to a directory ─────────────────────────────── */
function navigateTo(relpath) {
  if (browserBusy) return;
  browserBusy = true;
  /* Close any open file viewer */
  fileViewerEl.replaceChildren();

  /* Loading affordance. If a listing is already showing, dim it in place (no
     collapse-to-spinner) so the box keeps its height and the page doesn't jolt.
     On the very first paint the box is empty, so fall back to the spinner. */
  var hadEntries = entriesEl.childElementCount > 0;
  if (hadEntries) {
    entriesEl.classList.add("is-loading");
  } else {
    entriesEl.replaceChildren(
      el("div", { class: "busy-row" },
        el("span", { class: "spinner" }),
        el("span", { text: relpath ? "Loading " + relpath + "…" : "Loading roots…" })
      )
    );
  }

  fetch("/read/tree?" + new URLSearchParams({ path: relpath }))
    .then(function(r) {
      if (!r.ok) return r.json().then(function(j) { throw new Error(j.detail || ("HTTP " + r.status)); });
      return r.json();
    })
    .then(function(data) {
      browserPath = relpath;
      var firstLoad = !browserBooted;
      browserBooted = true;
      renderBreadcrumb(relpath);

      /* Soft switch: measure the box, swap in the new entries, then glide the
         section into view and morph the box height from old → new so the listing
         resizes gently instead of snapping. Order matters — scrollBrowserIntoView
         must read the FINAL layout (entries rendered, morph not yet started). */
      entriesEl.classList.remove("is-loading");
      var oldH = entriesEl.getBoundingClientRect().height;
      renderEntries(data.entries || []);
      var newH = entriesEl.getBoundingClientRect().height;

      if (!firstLoad) {
        scrollBrowserIntoView();
        if (!REDUCED_MOTION.matches && Math.abs(newH - oldH) > 1) {
          entriesEl.animate(
            [{ height: oldH + "px" }, { height: newH + "px" }],
            { duration: 240, easing: "cubic-bezier(.22,.61,.36,1)" }
          );
        }
      }
    })
    .catch(function(err) {
      browserBooted = true;
      entriesEl.classList.remove("is-loading");
      entriesEl.replaceChildren(
        el("div", { class: "busy-row" },
          el("span", { style: "color:var(--fail);", text: "Failed to load: " + (err.message || String(err)) })
        )
      );
    })
    .finally(function() { browserBusy = false; });
}

/* ── Render directory entries ────────────────────────────── */
function renderEntries(entries) {
  if (entries.length === 0) {
    entriesEl.replaceChildren(
      el("div", { class: "browser-empty", text: "(empty directory)" })
    );
    return;
  }

  var rows = entries.map(function(entry) {
    /* §12.4: all textContent via el() */
    var icon = entry.is_dir ? "▸" : "·";
    var meta = entry.is_dir ? "" : fmtBytes(entry.size);
    var rowClass = "entry-row" + (entry.is_dir ? " is-dir" : "");

    return el("div", { class: rowClass,
      onclick: function() {
        if (entry.is_dir) {
          navigateTo(entry.relpath);
        } else {
          openFile(entry.relpath, entry.name);
        }
      }
    },
      el("span", { class: "entry-icon", text: icon }),
      el("span", { class: "entry-name", text: entry.name }),
      el("span", { class: "entry-meta", text: meta })
    );
  });

  entriesEl.replaceChildren.apply(entriesEl, rows);

  /* Soft staggered reveal as a folder's contents swap in — gives opening and
     closing (breadcrumb up) a gentle motion instead of an instant hard cut.
     Stagger is capped so a large directory still settles quickly. */
  if (!REDUCED_MOTION.matches) {
    rows.forEach(function(row, i) {
      animateIn(row, 300, Math.min(i * 26, 260), 5);
    });
  }
}

/* ── Open and display a file ─────────────────────────────── */
function openFile(relpath, name) {
  if (browserBusy) return;
  browserBusy = true;

  /* Show loading in viewer area, then glide down to it so the user sees the
     article that just appeared at the bottom (otherwise it opens off-screen).
     The content replaces this node in place, so a single scroll here is enough. */
  var loadingViewer = el("div", { class: "file-viewer" },
    el("div", { class: "file-viewer-head" },
      el("span", { class: "file-name", text: relpath }),
      el("span", { text: "loading…" })
    )
  );
  fileViewerEl.replaceChildren(loadingViewer);
  animateIn(loadingViewer, 320, 0, 8);
  /* NB: the scroll-into-view happens AFTER the content renders (below), not here.
     During loading the viewer is only a thin placeholder, so the page is short
     and a scroll now would stop a few pixels down; once the full article swaps
     in the page grows but would not re-scroll. */

  fetch("/read/file?" + new URLSearchParams({ path: relpath }))
    .then(function(r) {
      if (!r.ok) return r.json().then(function(j) { throw new Error(j.detail || ("HTTP " + r.status)); });
      return r.json();
    })
    .then(function(data) {
      /* §12.4: raw Markdown shown via textContent (NOT rendered HTML) */
      var content = data.content;
      var closeBtn = el("button", {
        class: "file-viewer-close", type: "button", text: "close",
        onclick: function() { fileViewerEl.replaceChildren(); }
      });

      var contentViewer = el("div", { class: "file-viewer" },
        el("div", { class: "file-viewer-head" },
          el("span", { text: "raw" }),
          el("span", { text: "·" }),
          el("span", { class: "file-name", text: relpath }),
          closeBtn
        ),
        el("pre", { class: "file-content", text: content })
      );
      fileViewerEl.replaceChildren(contentViewer);
      animateIn(contentViewer, 300, 0, 4);
      /* Glide down to the now full-height article so the user sees it appear at
         the bottom. Done after render (final layout) on the next frame. */
      requestAnimationFrame(function() { scrollSoftIntoView(contentViewer, "start"); });
    })
    .catch(function(err) {
      fileViewerEl.replaceChildren(
        el("div", { class: "file-viewer" },
          el("div", { class: "file-viewer-head" },
            el("span", { style: "color:var(--fail);", text: "Failed: " + (err.message || String(err)) })
          )
        )
      );
    })
    .finally(function() { browserBusy = false; });
}

/* ── Boot the browser ────────────────────────────────────── */
navigateTo("");
</script>
</body>
</html>
