# Phase 8 Structural probe Paraphrases — HAND-WRITTEN (CONTEXT.md § Phase 8 >
# Paraphrase Type). The two probe types are NOT LLM-generated: typo_fatfinger
# (keyboard-adjacent misspellings of salient terms) and industry_jargon
# (domain shorthand a power user would type). They are merged unchanged into the
# committed queries.yaml by generate_paraphrases.py and reported as their own
# per-type rows alongside the five Core types.
#
# Same Paraphrase schema as the Core types (loader.py reads these field names):
# paraphrase_id, paraphrase_type, text, gold_docs_section_id, key_tokens_docs,
# key_tokens_wiki, generation_notes. Key Tokens are the un-typo'd / de-jargoned
# distinctive tokens, so the C5c metric still confirms the answer content.

paraphrases:
  # --- typo_fatfinger: keyboard-adjacent / transposed misspellings ---
  - paraphrase_id: typo_fatfinger-001
    paraphrase_type: typo_fatfinger
    text: "How lnog do I have to retrun an item for a refnud?"
    gold_docs_section_id: returns_policy.md#return-window
    key_tokens_docs: [return, days, refund, packaging, receipt]
    key_tokens_wiki: [thirty, refund, packaging, receipt, unused]
    generation_notes: "hand-written probe; typos: long->lnog return->retrun refund->refnud"

