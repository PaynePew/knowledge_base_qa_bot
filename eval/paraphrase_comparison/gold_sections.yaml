# Gold Section inventory for Phase 8 Paraphrase generation (PRD #100, issue #102).
#
# The committed source of truth the generator's deterministic sampler reads
# (generation/sampling.py). One entry per docs Gold Section eligible to source a
# Paraphrase — i.e. every concept-type section. The single entity Source
# (warranty.md -> wiki/entities/acme-shop.md) is deliberately ABSENT: entity
# pages are excluded as Paraphrase sources (CONTEXT.md § Phase 8 > Gold Section).
#
# `concept_slug` is the 1:1 concept Wiki Page slug `/ingest` synthesised for the
# section (= slugify(heading)). `multi_sub_fact: true` marks a section carrying
# several distinct retrievable facts, so a `specificity_narrowing` Paraphrase can
# narrow to one high-distinctiveness sub-fact. Only those sections are sampled
# for specificity_narrowing (sampling.sample_sections(multi_sub_fact_only=True)).
#
# Stats: 42 sections; 15 multi-sub-fact (~36%, inside the 30-40% target band).
#
# This file is hand-maintained alongside the corpus; if a corpus section's fact
# count changes, update its `multi_sub_fact` flag here in the same commit.

