# Phase 8 Paraphrase set (CONTEXT.md § Phase 8 > Paraphrase, PRD #100).
#
# Slice 1 (tracer) ships hand-written synonym_swap Paraphrases only. Each
# targets one docs Gold Section and carries dual-side Key Tokens
# (key_tokens_docs ∪ key_tokens_wiki) the C5c metric overlaps against retrieved
# content. Later slices add the other six Paraphrase Types.
#
# This file is written atomically (tmp + os.replace) by tooling that mutates
# it; it is hand-authored here.

paraphrases:
